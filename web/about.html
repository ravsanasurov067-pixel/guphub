<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>gaphub - about</title>

<style>
:root{
    --accent:#cb6ce6;
    --accent-2:#a855f7;
    --text:#ffffff;
    --muted:#a6a0b3;
    --bg:#0c0b14;
    --card:#111117;
    --card-soft:#17171f;
    --line:rgba(255,255,255,.08);
    --shadow:0 10px 35px rgba(0,0,0,.35);

    --radius-xl:clamp(22px,2vw,30px);
    --radius-lg:20px;
    --radius-md:16px;

    --title-size:clamp(30px,4vw,64px);
    --section-title:clamp(22px,2vw,30px);
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html, body{
    margin:0;
    padding:0;
    min-height:100%;
    font-family:Arial, sans-serif;
    background:#000;
    color:#fff;
}

body{
    position:relative;
}

img{
    display:block;
    max-width:100%;
}

button{
    font-family:inherit;
    cursor:pointer;
}

.desktop-only{
    display:none;
}

.btn{
    border:none;
    border-radius:16px;
    transition:.2s ease;
    font-weight:700;
}

.btn:active{
    transform:scale(.99);
}

.btn-primary{
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    color:#fff;
}

.lang{
    display:flex;
    align-items:center;
    background:#1a1a1a;
    border-radius:999px;
    padding:3px;
    gap:3px;
    flex-shrink:0;
}

.lang span{
    min-width:48px;
    padding:8px 12px;
    font-size:14px;
    color:#fff;
    cursor:pointer;
    border-radius:999px;
    text-align:center;
    user-select:none;
}

.lang .active{
    background:var(--accent);
}

.glow-card{
    background:
        radial-gradient(circle at 84% 14%, rgba(203,108,230,.18), transparent 28%),
        radial-gradient(circle at 16% 88%, rgba(203,108,230,.06), transparent 24%),
        linear-gradient(180deg, #15141e 0%, #0f0e17 100%);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:var(--shadow);
}

.soft-card{
    background:
        radial-gradient(circle at 88% 18%, rgba(203,108,230,.10), transparent 24%),
        linear-gradient(180deg, #111117 0%, #0d0d12 100%);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:var(--shadow);
}

/* =========================
   MOBILE
========================= */
/* =========================
   MOBILE
========================= */
.mobile-shell{
    display:block;
}

.mobile-page{
    min-height:calc(100vh + 24px);
    padding:
        calc(env(safe-area-inset-top) + 78px)
        16px
        calc(112px + env(safe-area-inset-bottom));

    background:
        radial-gradient(circle at 20% 8%, rgba(203,108,230,.12), transparent 24%),
        linear-gradient(180deg, #09080f 0%, #0c0b14 100%);
}

.mobile-header{
    animation:fadeUp .42s ease both;
}

.mobile-title{
    margin:0 0 8px;
    font-size:clamp(34px,9vw,42px);
    line-height:.94;
    font-weight:800;
    letter-spacing:-1px;
}

.mobile-desc{
    margin:0;
    max-width:340px;
    color:var(--muted);
    font-size:15px;
    line-height:1.45;
}

.mobile-art-card{
    margin-top:18px;
    height:230px;
    border-radius:28px;
    padding:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    animation:fadeUp .45s ease both;
    animation-delay:.06s;
}

.mobile-art{
    width:100%;
    height:100%;
    object-fit:contain;
    filter:drop-shadow(0 22px 50px rgba(203,108,230,.22));
}

.mobile-section{
    margin-top:22px;
}

.mobile-section-title{
    margin:0 0 14px;
    font-size:22px;
    line-height:1.1;
    font-weight:800;
    animation:fadeUp .45s ease both;
    animation-delay:.10s;
}

.mobile-feature-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:12px;
}

.mobile-feature-card{
    border-radius:24px;
    padding:16px;
    display:flex;
    align-items:flex-start;
    gap:14px;
    animation:fadeUp .45s ease both;
    transition:transform .18s ease, opacity .18s ease;
}

.mobile-feature-grid .mobile-feature-card:nth-child(1){
    animation-delay:.14s;
}

.mobile-feature-grid .mobile-feature-card:nth-child(2){
    animation-delay:.20s;
}

.mobile-feature-grid .mobile-feature-card:nth-child(3){
    animation-delay:.26s;
}

.mobile-feature-card:active{
    transform:scale(.985);
    opacity:.92;
}

.mobile-feature-icon{
    width:48px;
    height:48px;
    border-radius:16px;
    background:rgba(255,255,255,.06);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    overflow:hidden;
}

.mobile-feature-icon img{
    width:28px;
    height:28px;
    object-fit:contain;
}

.mobile-feature-title{
    margin:0 0 5px;
    font-size:17px;
    font-weight:800;
    line-height:1.2;
}

.mobile-feature-text{
    margin:0;
    color:var(--muted);
    font-size:14px;
    line-height:1.45;
}

.mobile-fit-card{
    border-radius:26px;
    padding:18px;
    animation:fadeUp .45s ease both;
    animation-delay:.30s;
}

.mobile-fit-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.mobile-fit-item{
    display:flex;
    align-items:flex-start;
    gap:11px;
    color:#e8e3f0;
    font-size:15px;
    line-height:1.4;
}

.mobile-fit-check{
    width:22px;
    height:22px;
    border-radius:50%;
    border:2px solid var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    margin-top:1px;
}

.mobile-fit-check::after{
    content:"";
    width:8px;
    height:4px;
    border-left:2px solid var(--accent);
    border-bottom:2px solid var(--accent);
    transform:rotate(-45deg);
    margin-top:-1px;
}

.mobile-cta-wrap{
    margin-top:18px;
    animation:fadeUp .45s ease both;
    animation-delay:.36s;
}

.mobile-cta{
    width:100%;
    min-height:58px;
    border:none;
    border-radius:20px;
    color:#fff;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    box-shadow:0 14px 32px rgba(203,108,230,.25);
    font-size:16px;
    font-weight:800;
    transition:transform .18s ease, opacity .18s ease;
}

.mobile-cta:active{
    transform:scale(.985);
    opacity:.92;
}

.mobile-back{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:46px;
    height:32px;
    padding:0;
    border-radius:999px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(203,108,230,.55);
    color:#fff;
    font-size:16px;
    font-weight:800;
    margin-bottom:18px;
    backdrop-filter:blur(12px);
    transition:transform .18s ease, opacity .18s ease;
}

.mobile-back:active{
    transform:scale(.94);
    opacity:.9;
}

.mobile-back-text{
    display:none;
}

.mobile-back-arrow{
    font-size:20px;
    line-height:1;
    transform:translateY(-1px);
}

/* BOTTOM NAV */
.bottom-nav{
    position:fixed;
    left:0;
    bottom:0;
    width:100%;
    background:#000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 10px;
    padding-bottom:calc(8px + env(safe-area-inset-bottom));
    z-index:50;
}

.nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:12px;
    color:#fff;
    width:20%;
    text-align:center;
    cursor:pointer;
}

.nav-item img{
    width:27px;
    margin-bottom:2px;
}

.nav-item span{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.nav-center{
    position:relative;
    top:-18px;
    width:20%;
    display:flex;
    justify-content:center;
}

.circle{
    width:60px;
    height:60px;
    background:#ffffff;
    border-radius:50%;
    border:4px solid var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 10px 30px rgba(203,108,230,.25);
}

.circle img{
    width:24px;
    height:24px;
    object-fit:contain;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(14px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* =========================
   DESKTOP
========================= */
@media (min-width:1024px){

    html, body{
        min-height:100vh;
        background:
            radial-gradient(circle at 15% 18%, rgba(203,108,230,.08), transparent 24%),
            radial-gradient(circle at 85% 28%, rgba(203,108,230,.07), transparent 24%),
            linear-gradient(180deg, #09080f 0%, #0c0b14 100%);
        color:var(--text);
    }

    body{
        overflow:hidden;
    }

    .mobile-shell{
        display:none;
    }

    .desktop-only{
        display:block;
    }

    .desktop-app{
        min-height:100vh;
        color:var(--text);
    }

    .desktop-layout{
        display:grid;
        grid-template-columns:270px minmax(0,1fr);
        min-height:100vh;
    }

    .desktop-sidebar{
        padding:22px 20px;
        border-right:1px solid rgba(255,255,255,.05);
        background:linear-gradient(180deg, rgba(14,13,23,.70) 0%, rgba(12,11,20,.40) 100%);
        overflow:auto;
    }

    .desktop-brand{
        font-size:34px;
        font-weight:800;
        line-height:1;
        margin:8px 0 56px;
    }

    .desktop-nav{
        display:flex;
        flex-direction:column;
        gap:10px;
        margin-top:4px;
    }

    .desktop-nav-item{
        display:flex;
        align-items:center;
        gap:14px;
        width:100%;
        min-height:56px;
        padding:0 18px;
        border-radius:16px;
        color:#f1f1f1;
        background:transparent;
        border:1px solid transparent;
        font-size:16px;
        font-weight:600;
        transition:.2s ease;
        cursor:pointer;
        text-align:left;
    }

    .desktop-nav-item img{
        width:28px;
        height:28px;
        object-fit:contain;
        flex-shrink:0;
    }

    .desktop-nav-item.active-nav{
        background:linear-gradient(180deg, rgba(255,255,255,.06) 0%, rgba(255,255,255,.03) 100%);
        border-color:rgba(255,255,255,.06);
        box-shadow:var(--shadow);
    }

    .desktop-nav-item-accent{
        background:linear-gradient(90deg, #b85bda 0%, #cb6ce6 100%);
        border-color:transparent;
        color:#fff;
        box-shadow:0 12px 26px rgba(203,108,230,.28);
        margin-top:8px;
    }

    .desktop-nav-item-accent:hover{
        transform:translateY(-1px);
    }

    .desktop-nav-item-accent img{
        filter:brightness(0) invert(1);
    }

    .desktop-main{
        padding:24px 22px 34px;
        height:100vh;
        overflow:auto;
    }

    .desktop-back{
        display:inline-flex;
        align-items:center;
        gap:14px;
        font-size:24px;
        color:#fff;
        margin-bottom:18px;
        cursor:pointer;
        user-select:none;
    }

    .desktop-back-arrow{
        font-size:42px;
        line-height:1;
        transform:translateY(-1px);
    }

    .desktop-hero{
        position:relative;
        overflow:hidden;
        border-radius:var(--radius-xl);
        padding:26px 24px 22px;
    }

    .desktop-kicker{
        display:inline-flex;
        align-items:center;
        gap:8px;
        background:rgba(255,255,255,.06);
        border:1px solid rgba(255,255,255,.06);
        border-radius:999px;
        padding:10px 14px;
        font-size:13px;
        color:#e8e3f0;
        margin-bottom:18px;
    }

    .desktop-hero-top{
        display:grid;
        grid-template-columns:minmax(0,1fr) 220px;
        gap:20px;
        align-items:start;
    }

    .desktop-title{
        margin:0 0 12px;
        font-size:var(--title-size);
        line-height:.94;
        font-weight:800;
        letter-spacing:-1px;
        max-width:760px;
    }

    .desktop-desc{
        margin:0;
        color:var(--muted);
        font-size:18px;
        line-height:1.55;
        max-width:760px;
    }

    .desktop-art-wrap{
        display:flex;
        justify-content:flex-end;
        align-items:flex-start;
    }

    .desktop-art{
        width:220px;
        height:220px;
        object-fit:contain;
        border-radius:24px;
        background:#1a1a1a;
        padding:16px;
    }

    .desktop-quote{
        margin-top:20px;
        background:rgba(255,255,255,.04);
        border-radius:20px;
        padding:18px 18px;
        color:#f0ebf8;
        font-size:16px;
        line-height:1.55;
        max-width:960px;
    }

    .desktop-grid-section{
        margin-top:16px;
        display:grid;
        grid-template-columns:repeat(4, minmax(0,1fr));
        gap:14px;
    }

    .desktop-grid-card{
        border-radius:22px;
        padding:18px 16px;
        min-height:190px;
    }

    .desktop-grid-number{
        color:var(--accent);
        font-size:13px;
        font-weight:700;
        margin-bottom:10px;
    }

    .desktop-grid-title{
        margin:0 0 10px;
        font-size:20px;
        line-height:1.2;
        font-weight:800;
    }

    .desktop-grid-text{
        margin:0;
        color:var(--muted);
        font-size:15px;
        line-height:1.5;
    }

    .desktop-wide-section{
        margin-top:16px;
        border-radius:28px;
        padding:22px 20px 20px;
    }

    .desktop-section-title{
        margin:0 0 14px;
        font-size:var(--section-title);
        line-height:1.05;
        font-weight:800;
    }

    .desktop-list{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:14px;
    }

    .desktop-list-item{
        display:flex;
        gap:14px;
        align-items:flex-start;
        background:#181821;
        border-radius:20px;
        padding:18px;
        min-height:138px;
    }

    .desktop-list-icon{
        width:50px;
        height:50px;
        object-fit:contain;
        flex-shrink:0;
        border-radius:14px;
        background:#22222d;
        padding:10px;
    }

    .desktop-list-title{
        margin:0 0 6px;
        font-size:18px;
        line-height:1.3;
        font-weight:700;
    }

    .desktop-list-text{
        margin:0;
        color:var(--muted);
        font-size:15px;
        line-height:1.5;
    }

    .desktop-cta-wrap{
        margin-top:18px;
        display:flex;
        justify-content:center;
    }

    .desktop-cta{
        width:100%;
        max-width:560px;
        height:60px;
        border:none;
        border-radius:18px;
        font-size:20px;
        font-weight:700;
        box-shadow:0 14px 32px rgba(203,108,230,.25);
    }
}

@media (max-width:1439px){
    .desktop-layout{
        grid-template-columns:250px minmax(0,1fr);
    }

    .desktop-main{
        padding:22px 18px 30px;
    }

    .desktop-title{
        font-size:clamp(38px, 4vw, 54px);
    }

    .desktop-desc{
        font-size:16px;
    }

    .desktop-art{
        width:190px;
        height:190px;
    }

    .desktop-grid-section{
        grid-template-columns:repeat(2, minmax(0,1fr));
    }
}

@media (max-width:1180px){
    .desktop-layout{
        grid-template-columns:230px minmax(0,1fr);
    }

    .desktop-hero-top{
        grid-template-columns:1fr;
    }

    .desktop-art-wrap{
        justify-content:flex-start;
    }

    .desktop-list{
        grid-template-columns:1fr;
    }
}

@media (max-width:1023px){
    .desktop-only{
        display:none;
    }

    .mobile-shell{
        display:block;
    }

    body{
        overflow:visible;
    }
}

@media (max-width:420px){
    .mobile-page{
        padding:calc(env(safe-area-inset-top) + 76px) 14px calc(110px + env(safe-area-inset-bottom));
    }

    .mobile-hero,
    .mobile-card,
    .mobile-list-item{
        border-radius:20px;
    }

    .mobile-grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<!-- =========================
     MOBILE VERSION
========================= -->
<!-- MOBILE -->
<div class="mobile-shell">
    <div class="mobile-page">

        <button class="mobile-back" onclick="goBack()">
            <span class="mobile-back-arrow">←</span>
            <span class="mobile-back-text" id="back-mobile"></span>
        </button>

        <section class="mobile-header">
            <h1 class="mobile-title" id="title-mobile"></h1>
            <p class="mobile-desc" id="desc-mobile"></p>
        </section>

        <section class="mobile-art-card glow-card">
            <img
                src="images/home/about2.webp"
                alt="gaphub"
                class="mobile-art"
            >
        </section>

        <section class="mobile-section">
            <h2 class="mobile-section-title" id="featuresTitle-mobile"></h2>

            <div class="mobile-feature-grid">

                <div class="mobile-feature-card soft-card">
                    <div class="mobile-feature-icon">
                        <img src="images/icon/courses2.png" alt="">
                    </div>

                    <div>
                        <h3 class="mobile-feature-title" id="feature1Title-mobile"></h3>
                        <p class="mobile-feature-text" id="feature1Text-mobile"></p>
                    </div>
                </div>

                <div class="mobile-feature-card soft-card">
                    <div class="mobile-feature-icon">
                        <img src="images/icon/target.png" alt="">
                    </div>

                    <div>
                        <h3 class="mobile-feature-title" id="feature2Title-mobile"></h3>
                        <p class="mobile-feature-text" id="feature2Text-mobile"></p>
                    </div>
                </div>

                <div class="mobile-feature-card soft-card">
                    <div class="mobile-feature-icon">
                        <img src="images/icon/ai.png" alt="">
                    </div>

                    <div>
                        <h3 class="mobile-feature-title" id="feature3Title-mobile"></h3>
                        <p class="mobile-feature-text" id="feature3Text-mobile"></p>
                    </div>
                </div>

            </div>
        </section>

        <section class="mobile-section">
            <h2 class="mobile-section-title" id="fitTitle-mobile"></h2>

            <div class="mobile-fit-card soft-card">
                <div class="mobile-fit-list">

                    <div class="mobile-fit-item">
                        <div class="mobile-fit-check"></div>
                        <div id="fit1-mobile"></div>
                    </div>

                    <div class="mobile-fit-item">
                        <div class="mobile-fit-check"></div>
                        <div id="fit2-mobile"></div>
                    </div>

                    <div class="mobile-fit-item">
                        <div class="mobile-fit-check"></div>
                        <div id="fit3-mobile"></div>
                    </div>

                </div>
            </div>
        </section>

        <div class="mobile-cta-wrap">
            <button class="mobile-cta" onclick="goCourses()" id="cta-mobile"></button>
        </div>

    </div>

    <div class="bottom-nav">

        <div class="nav-item" onclick="goPage('mycourses.html')">
            <img src="images/icon/courses2.png" alt="">
            <span id="m1-mobile"></span>
        </div>

        <div class="nav-item" onclick="goPage('support.html')">
            <img src="images/icon/support.png" alt="">
            <span id="m4-mobile"></span>
        </div>

        <div class="nav-center" onclick="goHome()">
            <div class="circle">
                <img src="images/icon/home2.png" alt="home">
            </div>
        </div>

        <div class="nav-item" onclick="goPage('chat.html')">
            <img src="images/icon/feedback.png" alt="">
            <span id="m5-mobile"></span>
        </div>

        <div class="nav-item" onclick="goPage('myprofile.html')">
            <img src="images/icon/profile2.png" alt="">
            <span id="m6-mobile"></span>
        </div>

    </div>
</div>

<!-- =========================
     DESKTOP VERSION
========================= -->
<div class="desktop-app desktop-only">
    <div class="desktop-layout">
        <aside class="desktop-sidebar">
            <div class="desktop-brand">gaphub</div>

            <nav class="desktop-nav">
                <button class="desktop-nav-item" onclick="goHome()">
                    <img src="images/icon/home.png" alt="">
                    <span id="home-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('mycourses.html')">
                    <img src="images/icon/courses2.png" alt="">
                    <span id="m1-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('support.html')">
                    <img src="images/icon/support.png" alt="">
                    <span id="m4-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('chat.html')">
                    <img src="images/icon/feedback.png" alt="">
                    <span id="m5-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('myprofile.html')">
                    <img src="images/icon/profile2.png" alt="">
                    <span id="m6-desktop"></span>
                </button>

                <button class="desktop-nav-item desktop-nav-item-accent" onclick="goCourses()">
                    <img src="images/icon/catalog.png" alt="">
                    <span id="catalog-desktop"></span>
                </button>
            </nav>
        </aside>

        <main class="desktop-main">
            <div class="desktop-back" onclick="goBack()">
                <span class="desktop-back-arrow">←</span>
                <span id="back-desktop"></span>
            </div>

            <section class="desktop-hero glow-card">
                <div class="desktop-kicker" id="kicker-desktop"></div>
