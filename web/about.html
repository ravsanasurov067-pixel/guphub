<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>gaphub - about</title>

<style>
/* =========================
   BASE
========================= */
:root{
    --accent:#cb6ce6;
    --text:#ffffff;
    --muted:#9d93a9;
    --bg:#0c0b14;
    --panel:#111018;
    --card:#07070b;
    --line:rgba(203,108,230,.75);
    --shadow:0 10px 35px rgba(0,0,0,.35);
}

*{
    box-sizing:border-box;
}

html, body{
    margin:0;
    padding:0;
    min-height:100%;
    font-family:Arial, sans-serif;
    background:#000;
    color:#fff;
}

body{
    position:relative;
}

img{
    display:block;
    max-width:100%;
}

button{
    font-family:inherit;
    cursor:pointer;
}

.btn{
    background:linear-gradient(90deg, #ba5ddd 0%, #cb6ce6 100%);
    border:none;
    color:#fff;
    border-radius:12px;
}

.btn:active{
    transform:scale(.99);
}

.desktop-only{
    display:none;
}

/* =========================
   MOBILE
========================= */
.mobile-shell{
    display:block;
}

.header{
    height:140px;
    padding-top:env(safe-area-inset-top);
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    padding:0 16px 12px;
    background:#000;
}

.logo{
    font-size:32px;
    font-weight:800;
    line-height:1;
}

.wrap{
    padding:16px;
    padding-bottom:32px;
}

.back{
    color:#ffffff;
    margin-bottom:15px;
    cursor:pointer;
    font-size:18px;
}

.card{
    background:#181818;
    border-radius:14px;
    padding:20px;
}

.top{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:10px;
}

.top img{
    width:120px;
    flex-shrink:0;
}

.top h2{
    margin:0;
    font-size:35px;
    line-height:1.05;
}

.desc{
    color:#aaa;
    margin-bottom:10px;
    margin-top:0;
    font-size:16px;
    line-height:1.4;
}

.title{
    color:#cb6ce6;
    margin:18px 0 10px;
    font-size:20px;
    font-weight:700;
}

.item{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:14px;
    font-size:18px;
}

.item img{
    width:34px;
    height:34px;
    object-fit:contain;
    flex-shrink:0;
}

.btn-mobile{
    margin-top:18px;
    width:100%;
    padding:14px;
    font-size:18px;
    border:none;
    border-radius:14px;
}

/* =========================
   DESKTOP
========================= */
@media (min-width:1024px){

    html, body{
        min-height:100vh;
        background:
            radial-gradient(circle at 15% 18%, rgba(203,108,230,.08), transparent 24%),
            radial-gradient(circle at 85% 28%, rgba(203,108,230,.07), transparent 24%),
            linear-gradient(180deg, #09080f 0%, #0c0b14 100%);
        color:var(--text);
    }

    body{
        overflow:hidden;
    }

    .mobile-shell{
        display:none;
    }

    .desktop-only{
        display:block;
    }

    .desktop-app{
        min-height:100vh;
        color:var(--text);
    }

    .desktop-layout{
    display:grid;
    grid-template-columns:280px 1fr;
    min-height:100vh;
    }

    .desktop-sidebar{
    padding:22px 22px;
    border-right:1px solid rgba(255,255,255,.05);
    background:linear-gradient(180deg, rgba(14,13,23,.70) 0%, rgba(12,11,20,.40) 100%);
    }

    .desktop-brand{
        font-size:34px;
        font-weight:800;
        line-height:1;
        margin:8px 0 56px;
    }

    .desktop-nav{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:4px;
    }

    .desktop-nav-item{
    display:flex;
    align-items:center;
    gap:14px;
    width:100%;
    min-height:56px;
    padding:0 18px;
    border-radius:16px;
    color:#f1f1f1;
    background:transparent;
    border:1px solid transparent;
    font-size:16px;
    font-weight:600;
    transition:.2s ease;
    cursor:pointer;
    text-align:left;
    }

    .desktop-nav-item img{
    width:28px;
    height:28px;
    object-fit:contain;
    flex-shrink:0;
    }

    .desktop-nav-item.active-nav{
    background:linear-gradient(180deg, rgba(255,255,255,.06) 0%, rgba(255,255,255,.03) 100%);
    border-color:rgba(255,255,255,.06);
    box-shadow:var(--shadow);
    }

    .desktop-main{
        padding:42px 46px;
    }

    .desktop-back{
        display:inline-flex;
        align-items:center;
        gap:14px;
        font-size:24px;
        color:#fff;
        margin-bottom:22px;
        cursor:pointer;
        user-select:none;
    }

    .desktop-back-arrow{
        font-size:42px;
        line-height:1;
        transform:translateY(-1px);
    }

    .desktop-card{
        border:2px solid var(--line);
        border-radius:28px;
        padding:12px;
        background:rgba(255,255,255,.015);
        box-shadow:0 10px 40px rgba(0,0,0,.24);
    }

    .desktop-card-inner{
    min-height:auto;
    border-radius:22px;
    background:
        radial-gradient(circle at 80% 40%, rgba(203,108,230,.06), transparent 28%),
        linear-gradient(180deg, rgba(7,7,11,.98) 0%, rgba(8,8,13,.96) 100%);
    padding:38px 42px 24px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    }

    .desktop-top{
        display:grid;
        grid-template-columns:360px 1fr;
        gap:44px;
        align-items:start;
    }

    .desktop-top-left{
        display:flex;
        justify-content:center;
        align-items:flex-start;
        padding-top:8px;
    }

    .desktop-top-left img{
        width:300px;
        max-width:100%;
    }

    .desktop-top-right h1{
        margin:0;
        font-size:86px;
        line-height:.96;
        letter-spacing:-1.5px;
        font-weight:800;
    }

    .desktop-desc{
        margin:24px 0 0;
        color:var(--muted);
        font-size:28px;
        line-height:1.35;
    }

    .desktop-bottom{
    margin-top:12px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:72px;
    align-items:start;
    }

    .desktop-block-title{
    margin:0 0 16px;
    color:var(--accent);
    font-size:24px;
    font-weight:700;
    }

    .desktop-item{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:14px;
    font-size:22px;
    color:#fff;
    }

    .desktop-item img{
    width:42px;
    height:42px;
    object-fit:contain;
    flex-shrink:0;
    }

    .desktop-btn-wrap{
    margin-top:14px;
    }

    .desktop-btn{
    width:100%;
    height:60px;
    border-radius:18px;
    font-size:22px;
    font-weight:500;
    border:none;
    }
}

@media (min-width:1024px) and (max-width:1400px){
    .desktop-layout{
    grid-template-columns:260px 1fr;
    }

    .desktop-main{
        padding:30px 28px;
    }

    .desktop-card-inner{
        padding:40px 38px 30px;
    }

    .desktop-top{
        grid-template-columns:280px 1fr;
        gap:28px;
    }

    .desktop-top-left img{
        width:230px;
    }

    .desktop-top-right h1{
        font-size:62px;
    }

    .desktop-desc{
        font-size:22px;
    }

    .desktop-bottom{
        gap:50px;
    }

    .desktop-block-title{
        font-size:24px;
    }

    .desktop-item{
        font-size:22px;
        gap:16px;
    }

    .desktop-item img{
        width:44px;
        height:44px;
    }

    .desktop-btn{
        height:64px;
        font-size:24px;
        border-radius:18px;
    }
}
</style>
</head>

<body>

<!-- =========================
     MOBILE VERSION
========================= -->
<div class="mobile-shell">
    <div class="header">
        <div class="logo">gaphub</div>
    </div>

    <div class="wrap">
        <div class="back" onclick="goBack()" id="back-mobile"></div>

        <div class="card">
            <div class="top">
                <img src="images/about2.png" alt="about">
                <h2 id="title-mobile"></h2>
            </div>

            <p class="desc" id="desc-mobile"></p>

            <div class="title" id="block1-mobile"></div>

            <div class="item">
                <img src="images/skills.png" alt="">
                <span id="b1_1-mobile"></span>
            </div>

            <div class="item">
                <img src="images/support.png" alt="">
                <span id="b1_2-mobile"></span>
            </div>

            <div class="item">
                <img src="images/money2.png" alt="">
                <span id="b1_3-mobile"></span>
            </div>

            <div class="title" id="block2-mobile"></div>

            <div class="item">
                <img src="images/time.png" alt="">
                <span id="b2_1-mobile"></span>
            </div>

            <div class="item">
                <img src="images/brain.png" alt="">
                <span id="b2_2-mobile"></span>
            </div>

            <div class="item">
                <img src="images/rocket.png" alt="">
                <span id="b2_3-mobile"></span>
            </div>

            <button class="btn btn-mobile" id="btn-mobile"></button>
        </div>
    </div>
    </div>

<!-- =========================
     DESKTOP VERSION
========================= -->
<div class="desktop-app desktop-only">
    <div class="desktop-layout">

        <aside class="desktop-sidebar">
            <div class="desktop-brand">gaphub</div>

            <nav class="desktop-nav">
                <button class="desktop-nav-item" onclick="goHome()">
                    <img src="images/home.png" alt="">
                    <span id="home-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('mycourses.html')">
                    <img src="images/courses2.png" alt="">
                    <span id="m1-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('support.html')">
                    <img src="images/support.png" alt="">
                    <span id="m4-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('chat.html')">
                    <img src="images/chat2.png" alt="">
                    <span id="m5-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('myprofile.html')">
                    <img src="images/profile2.png" alt="">
                    <span id="m6-desktop"></span>
                </button>
            </nav>
        </aside>

        <main class="desktop-main">
            <div class="desktop-back" onclick="goBack()">
                <span class="desktop-back-arrow">←</span>
                <span id="back-desktop"></span>
            </div>

            <section class="desktop-card">
                <div class="desktop-card-inner">

                    <div class="desktop-top">
                        <div class="desktop-top-left">
                            <img src="images/about2.png" alt="about">
                        </div>

                        <div class="desktop-top-right">
                            <h1 id="title-desktop"></h1>
                            <p class="desktop-desc" id="desc-desktop"></p>
                        </div>
                    </div>

                    <div class="desktop-bottom">
                        <div class="desktop-block">
                            <h3 class="desktop-block-title" id="block1-desktop"></h3>

                            <div class="desktop-item">
                                <img src="images/skills.png" alt="">
                                <span id="b1_1-desktop"></span>
                            </div>

                            <div class="desktop-item">
                                <img src="images/support.png" alt="">
                                <span id="b1_2-desktop"></span>
                            </div>

                            <div class="desktop-item">
                                <img src="images/money2.png" alt="">
                                <span id="b1_3-desktop"></span>
                            </div>
                        </div>

                        <div class="desktop-block">
                            <h3 class="desktop-block-title" id="block2-desktop"></h3>

                            <div class="desktop-item">
                                <img src="images/time.png" alt="">
                                <span id="b2_1-desktop"></span>
                            </div>

                            <div class="desktop-item">
                                <img src="images/brain.png" alt="">
                                <span id="b2_2-desktop"></span>
                            </div>

                            <div class="desktop-item">
                                <img src="images/rocket.png" alt="">
                                <span id="b2_3-desktop"></span>
                            </div>
                        </div>
                    </div>

                    <div class="desktop-btn-wrap">
                        <button class="btn desktop-btn" id="btn-desktop"></button>
                    </div>

                </div>
            </section>
        </main>

    </div>
</div>

<script>
let lang = localStorage.getItem("lang") || "uz"

const t = {
    uz:{
        back:"Orqaga",
        title:"gaphub nima bu?",
        desc:"Ko'nikmalar va amaliyot platformasi",

        block1:"Sen olasan",
        b1_1:"Amaliy ko'nikmalar",
        b1_2:"Qo'llab-quvvatlash",
        b1_3:"Daromad",

        block2:"Bizning maqsad",
        b2_1:"Tez o'rgan",
        b2_2:"Amalda qo'lla",
        b2_3:"Pul top",

        btn:"Kurs tanlash",

        home:"Bosh sahifa",
        m1:"Kurslarim",
        m4:"Aloqa",
        m5:"Sharhlar",
        m6:"Profil"
    },

    ru:{
        back:"Назад",
        title:"Что такое\ngaphub?",
        desc:"Платформа навыков и практики",

        block1:"Ты получишь",
        b1_1:"Навыки",
        b1_2:"Поддержку",
        b1_3:"Доход",

        block2:"Наша цель",
        b2_1:"Учись быстро",
        b2_2:"Применяй",
        b2_3:"Зарабатывай",

        btn:"Подобрать курс",

        home:"Главное меню",
        m1:"Мои курсы",
        m4:"Поддержка",
        m5:"Отзывы",
        m6:"Профиль"
    }
}

function setText(id, value){
    const el = document.getElementById(id)
    if(el) el.innerText = value
}

function goHome(){
    localStorage.setItem("lang", lang)
    window.location.href = "index.html"
}

function update(){
    const d = t[lang]

    // mobile
    setText("back-mobile", "← " + d.back)
    setText("title-mobile", d.title.replace("\n", " "))
    setText("desc-mobile", d.desc)
    setText("block1-mobile", d.block1)
    setText("b1_1-mobile", d.b1_1)
    setText("b1_2-mobile", d.b1_2)
    setText("b1_3-mobile", d.b1_3)
    setText("block2-mobile", d.block2)
    setText("b2_1-mobile", d.b2_1)
    setText("b2_2-mobile", d.b2_2)
    setText("b2_3-mobile", d.b2_3)
    setText("btn-mobile", d.btn)

    // desktop
    setText("back-desktop", d.back)
    setText("title-desktop", d.title)
    setText("desc-desktop", d.desc)
    setText("block1-desktop", d.block1)
    setText("b1_1-desktop", d.b1_1)
    setText("b1_2-desktop", d.b1_2)
    setText("b1_3-desktop", d.b1_3)
    setText("block2-desktop", d.block2)
    setText("b2_1-desktop", d.b2_1)
    setText("b2_2-desktop", d.b2_2)
    setText("b2_3-desktop", d.b2_3)
    setText("btn-desktop", d.btn)

    setText("home-desktop", d.home)
    setText("m1-desktop", d.m1)
    setText("m4-desktop", d.m4)
    setText("m5-desktop", d.m5)
    setText("m6-desktop", d.m6)
}

function goBack(){
    if (window.history.length > 1) {
        window.history.back()
    } else {
        window.location.href = "index.html"
    }
}

function goBack(){
    localStorage.setItem("lang", lang)
    window.location.href = "index.html"
}

function goPage(page){
    localStorage.setItem("lang", lang)
    window.location.href = page
}

update()

function initTelegram(){
    if(window.Telegram && Telegram.WebApp){
        const tg = Telegram.WebApp

        tg.ready()
        tg.expand()

        try{
            tg.requestFullscreen()
        }catch(e){}

        document.body.style.minHeight = tg.viewportHeight + "px"
    }
}

initTelegram()
</script>

</body>
</html>
