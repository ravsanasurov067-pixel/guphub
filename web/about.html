<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>gaphub - about</title>

<style>
:root{
    --accent:#cb6ce6;
    --text:#ffffff;
    --muted:#a6a0b3;
    --bg:#0c0b14;
    --card:#111117;
    --card-soft:#17171f;
    --line:rgba(255,255,255,.08);
    --shadow:0 10px 35px rgba(0,0,0,.35);
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html, body{
    margin:0;
    padding:0;
    min-height:100%;
    font-family:Arial, sans-serif;
    background:#000;
    color:#fff;
}

body{
    position:relative;
}

img{
    display:block;
    max-width:100%;
}

button{
    font-family:inherit;
    cursor:pointer;
}

.desktop-only{
    display:none;
}

.btn-gradient{
    border:none;
    color:#fff;
    background:linear-gradient(90deg,#cb6ce6,#a855f7);
}

/* =========================
   MOBILE
========================= */
.mobile-shell{
    display:block;
}

.mobile-page{
    padding:calc(env(safe-area-inset-top) + 14px) 16px calc(110px + env(safe-area-inset-bottom));
}

.mobile-back{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:#1a1a1a;
    color:#fff;
    border:none;
    border-radius:12px;
    padding:10px 14px;
    font-size:15px;
    margin-bottom:18px;
}

.mobile-back svg{
    width:16px;
    height:16px;
    flex-shrink:0;
}

.mobile-hero{
    position:relative;
    overflow:hidden;
    border-radius:28px;
    background:
        radial-gradient(circle at 80% 20%, rgba(203,108,230,.18), transparent 28%),
        linear-gradient(180deg, #15141e 0%, #0d0c14 100%);
    border:1px solid rgba(255,255,255,.05);
    padding:24px 18px 22px;
    box-shadow:var(--shadow);
}

.mobile-hero-top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:14px;
    margin-bottom:18px;
}

.mobile-kicker{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.06);
    border-radius:999px;
    padding:8px 12px;
    font-size:12px;
    color:#e8e3f0;
    margin-bottom:14px;
}

.mobile-title{
    margin:0 0 10px;
    font-size:36px;
    line-height:.95;
    font-weight:800;
    letter-spacing:-0.8px;
}

.mobile-desc{
    margin:0;
    color:var(--muted);
    font-size:15px;
    line-height:1.5;
    max-width:92%;
}

.mobile-hero-art{
    width:96px;
    height:96px;
    flex-shrink:0;
    object-fit:contain;
    border-radius:18px;
    background:#1a1a1a;
    padding:10px;
}

.mobile-quote{
    margin-top:18px;
    background:rgba(255,255,255,.04);
    border-radius:18px;
    padding:14px;
    color:#f0ebf8;
    font-size:14px;
    line-height:1.5;
}

.mobile-section{
    margin-top:14px;
    background:#121218;
    border:1px solid rgba(255,255,255,.05);
    border-radius:22px;
    padding:18px 14px;
    box-shadow:var(--shadow);
}

.mobile-section-title{
    margin:0 0 12px;
    font-size:22px;
    line-height:1.1;
    font-weight:800;
}

.mobile-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.mobile-card{
    background:#181821;
    border-radius:16px;
    padding:14px 12px;
    min-height:112px;
}

.mobile-card-number{
    color:var(--accent);
    font-size:12px;
    font-weight:700;
    margin-bottom:8px;
}

.mobile-card-title{
    margin:0 0 8px;
    font-size:15px;
    line-height:1.25;
    font-weight:700;
}

.mobile-card-text{
    margin:0;
    color:var(--muted);
    font-size:13px;
    line-height:1.45;
}

.mobile-list{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.mobile-list-item{
    display:flex;
    gap:12px;
    align-items:flex-start;
    background:#181821;
    border-radius:16px;
    padding:14px;
}

.mobile-list-icon{
    width:40px;
    height:40px;
    object-fit:contain;
    flex-shrink:0;
    border-radius:12px;
    background:#22222d;
    padding:8px;
}

.mobile-list-title{
    margin:0 0 4px;
    font-size:15px;
    line-height:1.3;
    font-weight:700;
}

.mobile-list-text{
    margin:0;
    color:var(--muted);
    font-size:13px;
    line-height:1.45;
}

.mobile-wide{
    background:
        radial-gradient(circle at 85% 20%, rgba(203,108,230,.10), transparent 26%),
        linear-gradient(180deg, #121218 0%, #101017 100%);
}

.mobile-cta-wrap{
    margin-top:16px;
}

.mobile-cta{
    width:100%;
    height:56px;
    border:none;
    border-radius:18px;
    font-size:17px;
    font-weight:700;
    box-shadow:0 14px 32px rgba(203,108,230,.25);
}

/* BOTTOM NAV */
.bottom-nav{
    position:fixed;
    left:0;
    bottom:0;
    width:100%;
    background:#000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 10px;
    padding-bottom:calc(8px + env(safe-area-inset-bottom));
    z-index:50;
}

.nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:12px;
    color:#fff;
    width:20%;
    text-align:center;
    cursor:pointer;
}

.nav-item img{
    width:27px;
    margin-bottom:2px;
}

.nav-item span{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.nav-center{
    position:relative;
    top:-18px;
    width:20%;
    display:flex;
    justify-content:center;
}

.circle{
    width:60px;
    height:60px;
    background:#ffffff;
    border-radius:50%;
    border:4px solid var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
}

.circle img{
    width:24px;
    height:24px;
    object-fit:contain;
}

/* =========================
   DESKTOP
========================= */
@media (min-width:1024px){

    html, body{
        min-height:100vh;
        background:
            radial-gradient(circle at 15% 18%, rgba(203,108,230,.08), transparent 24%),
            radial-gradient(circle at 85% 28%, rgba(203,108,230,.07), transparent 24%),
            linear-gradient(180deg, #09080f 0%, #0c0b14 100%);
        color:var(--text);
    }

    body{
        overflow:hidden;
    }

    .mobile-shell{
        display:none;
    }

    .desktop-only{
        display:block;
    }

    .desktop-app{
        min-height:100vh;
        color:var(--text);
    }

    .desktop-layout{
        display:grid;
        grid-template-columns:280px 1fr;
        min-height:100vh;
    }

    .desktop-sidebar{
        padding:22px 22px;
        border-right:1px solid rgba(255,255,255,.05);
        background:linear-gradient(180deg, rgba(14,13,23,.70) 0%, rgba(12,11,20,.40) 100%);
    }

    .desktop-brand{
        font-size:34px;
        font-weight:800;
        line-height:1;
        margin:8px 0 56px;
    }

    .desktop-nav{
        display:flex;
        flex-direction:column;
        gap:10px;
        margin-top:4px;
    }

    .desktop-nav-item{
        display:flex;
        align-items:center;
        gap:14px;
        width:100%;
        min-height:56px;
        padding:0 18px;
        border-radius:16px;
        color:#f1f1f1;
        background:transparent;
        border:1px solid transparent;
        font-size:16px;
        font-weight:600;
        transition:.2s ease;
        cursor:pointer;
        text-align:left;
    }

    .desktop-nav-item img{
        width:28px;
        height:28px;
        object-fit:contain;
        flex-shrink:0;
    }

    .desktop-nav-item.active-nav{
        background:linear-gradient(180deg, rgba(255,255,255,.06) 0%, rgba(255,255,255,.03) 100%);
        border-color:rgba(255,255,255,.06);
        box-shadow:var(--shadow);
    }

    .desktop-main{
        padding:26px 28px 40px;
        height:100vh;
        overflow:auto;
    }

    .desktop-back{
        display:inline-flex;
        align-items:center;
        gap:14px;
        font-size:24px;
        color:#fff;
        margin-bottom:18px;
        cursor:pointer;
        user-select:none;
    }

    .desktop-back-arrow{
        font-size:42px;
        line-height:1;
        transform:translateY(-1px);
    }

    .desktop-hero{
        position:relative;
        overflow:hidden;
        border-radius:32px;
        background:
            radial-gradient(circle at 82% 18%, rgba(203,108,230,.20), transparent 24%),
            radial-gradient(circle at 15% 85%, rgba(203,108,230,.08), transparent 26%),
            linear-gradient(180deg, #15141e 0%, #0d0c14 100%);
        border:1px solid rgba(255,255,255,.05);
        box-shadow:var(--shadow);
        padding:34px 32px 30px;
    }

    .desktop-hero-top{
        display:grid;
        grid-template-columns:1.1fr .9fr;
        gap:24px;
        align-items:center;
    }

    .desktop-kicker{
        display:inline-flex;
        align-items:center;
        gap:8px;
        background:rgba(255,255,255,.06);
        border:1px solid rgba(255,255,255,.06);
        border-radius:999px;
        padding:10px 14px;
        font-size:13px;
        color:#e8e3f0;
        margin-bottom:18px;
    }

    .desktop-title{
        margin:0 0 12px;
        font-size:72px;
        line-height:.94;
        font-weight:800;
        letter-spacing:-1.2px;
        max-width:760px;
    }

    .desktop-desc{
        margin:0;
        color:var(--muted);
        font-size:21px;
        line-height:1.5;
        max-width:760px;
    }

    .desktop-art-wrap{
        display:flex;
        justify-content:flex-end;
        align-items:center;
    }

    .desktop-art{
        width:260px;
        height:260px;
        object-fit:contain;
        border-radius:28px;
        background:#1a1a1a;
        padding:18px;
    }

    .desktop-quote{
        margin-top:24px;
        background:rgba(255,255,255,.04);
        border-radius:22px;
        padding:18px 20px;
        color:#f0ebf8;
        font-size:18px;
        line-height:1.55;
        max-width:920px;
    }

    .desktop-grid-section{
        margin-top:16px;
        display:grid;
        grid-template-columns:repeat(3, minmax(0,1fr));
        gap:14px;
    }

    .desktop-grid-card{
        background:#141419;
        border:1px solid rgba(255,255,255,.05);
        border-radius:24px;
        padding:20px 18px;
        box-shadow:var(--shadow);
        min-height:210px;
    }

    .desktop-grid-number{
        color:var(--accent);
        font-size:13px;
        font-weight:700;
        margin-bottom:10px;
    }

    .desktop-grid-title{
        margin:0 0 10px;
        font-size:22px;
        line-height:1.2;
        font-weight:800;
    }

    .desktop-grid-text{
        margin:0;
        color:var(--muted);
        font-size:16px;
        line-height:1.55;
    }

    .desktop-wide-section{
        margin-top:16px;
        background:
            radial-gradient(circle at 85% 18%, rgba(203,108,230,.10), transparent 22%),
            linear-gradient(180deg, #121218 0%, #101017 100%);
        border:1px solid rgba(255,255,255,.05);
        border-radius:28px;
        padding:24px 22px 22px;
        box-shadow:var(--shadow);
    }

    .desktop-section-title{
        margin:0 0 14px;
        font-size:34px;
        line-height:1.05;
        font-weight:800;
    }

    .desktop-list{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:14px;
    }

    .desktop-list-item{
        display:flex;
        gap:14px;
        align-items:flex-start;
        background:#181821;
        border-radius:20px;
        padding:18px;
        min-height:142px;
    }

    .desktop-list-icon{
        width:50px;
        height:50px;
        object-fit:contain;
        flex-shrink:0;
        border-radius:14px;
        background:#22222d;
        padding:10px;
    }

    .desktop-list-title{
        margin:0 0 6px;
        font-size:18px;
        line-height:1.3;
        font-weight:700;
    }

    .desktop-list-text{
        margin:0;
        color:var(--muted);
        font-size:15px;
        line-height:1.5;
    }

    .desktop-cta-wrap{
        margin-top:18px;
        display:flex;
        justify-content:center;
    }

    .desktop-cta{
        width:100%;
        max-width:560px;
        height:62px;
        border:none;
        border-radius:18px;
        font-size:21px;
        font-weight:700;
        box-shadow:0 14px 32px rgba(203,108,230,.25);
    }
}

@media (min-width:1024px) and (max-width:1400px){
    .desktop-layout{
        grid-template-columns:260px 1fr;
    }

    .desktop-main{
        padding:22px 22px 34px;
    }

    .desktop-hero{
        padding:26px 22px 22px;
    }

    .desktop-title{
        font-size:56px;
    }

    .desktop-desc{
        font-size:18px;
    }

    .desktop-art{
        width:210px;
        height:210px;
    }

    .desktop-quote{
        font-size:16px;
    }

    .desktop-grid-section{
        grid-template-columns:1fr;
    }

    .desktop-grid-card{
        min-height:auto;
    }

    .desktop-section-title{
        font-size:28px;
    }

    .desktop-list{
        grid-template-columns:1fr;
    }
}
</style>
</head>
