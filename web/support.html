<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>gaphub - support</title>

<style>
:root{
    --accent:#cb6ce6;
    --text:#ffffff;
    --muted:#aaa;
    --muted-soft:#9f98aa;
    --bg:#0c0b14;
    --card:#111117;
    --card-soft:#17171f;
    --line:rgba(255,255,255,.08);
    --shadow:0 10px 35px rgba(0,0,0,.35);
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html, body{
    margin:0;
    padding:0;
    min-height:100%;
    font-family:Arial, sans-serif;
    background:#000;
    color:#fff;
}

body{
    position:relative;
}

img{
    display:block;
    max-width:100%;
}

button{
    font-family:inherit;
    cursor:pointer;
}

.desktop-only{
    display:none;
}

.btn-gradient{
    border:none;
    color:#fff;
    background:linear-gradient(90deg,#cb6ce6,#a855f7);
}

/* =========================
   MOBILE
========================= */
.mobile-shell{
    display:block;
}

.mobile-page{
    min-height:100vh;
    padding:calc(env(safe-area-inset-top) + 76px) 14px calc(110px + env(safe-area-inset-bottom));
    background:
        radial-gradient(circle at 20% 10%, rgba(203,108,230,.10), transparent 24%),
        linear-gradient(180deg, #09080f 0%, #0c0b14 100%);
}

.mobile-back{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:#1a1a1a;
    color:#fff;
    border:none;
    border-radius:12px;
    padding:10px 14px;
    font-size:15px;
    margin-bottom:16px;
}

.mobile-back svg{
    width:16px;
    height:16px;
    flex-shrink:0;
}

.mobile-hero{
    position:relative;
    overflow:hidden;
    border-radius:26px;
    background:
        radial-gradient(circle at 85% 15%, rgba(203,108,230,.18), transparent 25%),
        linear-gradient(180deg, #15141e 0%, #0f0e17 100%);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:var(--shadow);
    padding:20px 16px 18px;
}

.mobile-kicker{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.06);
    border-radius:999px;
    padding:8px 12px;
    font-size:12px;
    color:#ebe4f5;
    margin-bottom:14px;
}

.mobile-hero-row{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:14px;
}

.mobile-hero-text{
    min-width:0;
    flex:1;
}

.mobile-hero-art{
    width:92px;
    height:92px;
    object-fit:contain;
    border-radius:18px;
    background:#1a1a1a;
    padding:10px;
    flex-shrink:0;
}

.mobile-title{
    margin:0 0 10px;
    font-size:34px;
    line-height:.96;
    font-weight:800;
    letter-spacing:-0.8px;
}

.mobile-desc{
    margin:0;
    color:var(--muted);
    font-size:14px;
    line-height:1.5;
    max-width:96%;
}

.mobile-note{
    margin-top:16px;
    background:rgba(255,255,255,.04);
    border-radius:18px;
    padding:14px;
    color:#f0ebf8;
    font-size:14px;
    line-height:1.5;
}

.mobile-section{
    margin-top:14px;
    background:#121218;
    border:1px solid rgba(255,255,255,.05);
    border-radius:22px;
    padding:16px 14px;
    box-shadow:var(--shadow);
}

.mobile-section-title{
    margin:0 0 12px;
    font-size:20px;
    font-weight:800;
    line-height:1.15;
}

.mobile-contacts{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.mobile-contact{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    background:#181821;
    border-radius:16px;
    padding:14px;
}

.mobile-contact-left{
    display:flex;
    align-items:center;
    gap:12px;
    min-width:0;
}

.mobile-contact-icon{
    width:40px;
    height:40px;
    object-fit:contain;
    border-radius:12px;
    background:#22222d;
    padding:8px;
    flex-shrink:0;
}

.mobile-contact-title{
    font-size:15px;
    font-weight:700;
    line-height:1.3;
}

.mobile-contact-text{
    font-size:13px;
    color:var(--muted-soft);
    margin-top:2px;
    line-height:1.4;
}

.mobile-contact-arrow{
    font-size:18px;
    color:#bfbfbf;
    line-height:1;
    flex-shrink:0;
}

.mobile-faq-list{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.mobile-faq-item{
    background:#181821;
    border-radius:16px;
    overflow:hidden;
}

.mobile-faq-question{
    width:100%;
    background:transparent;
    border:none;
    color:#fff;
    padding:14px;
    font-size:15px;
    line-height:1.35;
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    text-align:left;
}

.mobile-faq-question-text{
    flex:1;
}

.mobile-faq-icon{
    width:10px;
    height:10px;
    flex-shrink:0;
    border-right:2px solid var(--accent);
    border-bottom:2px solid var(--accent);
    transform:rotate(45deg);
    transition:transform .25s ease;
    margin-right:4px;
}

.mobile-faq-item.open .mobile-faq-icon{
    transform:rotate(225deg);
}

.mobile-faq-answer-wrap{
    max-height:0;
    overflow:hidden;
    transition:max-height .28s ease;
}

.mobile-faq-answer{
    padding:0 14px 14px;
    font-size:14px;
    line-height:1.5;
    color:#d3d3d3;
}

.mobile-cta-wrap{
    margin-top:14px;
}

.mobile-cta{
    width:100%;
    height:56px;
    border:none;
    border-radius:18px;
    font-size:17px;
    font-weight:700;
    box-shadow:0 14px 32px rgba(203,108,230,.25);
}

/* BOTTOM NAV */
.bottom-nav{
    position:fixed;
    left:0;
    bottom:0;
    width:100%;
    background:#000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 10px;
    padding-bottom:calc(8px + env(safe-area-inset-bottom));
    z-index:50;
}

.nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:12px;
    color:#fff;
    width:20%;
    text-align:center;
    cursor:pointer;
}

.nav-item img{
    width:27px;
    margin-bottom:2px;
}

.nav-item span{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.nav-center{
    position:relative;
    top:-18px;
    width:20%;
    display:flex;
    justify-content:center;
}

.circle{
    width:60px;
    height:60px;
    background:#ffffff;
    border-radius:50%;
    border:4px solid var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
}

.circle img{
    width:24px;
    height:24px;
    object-fit:contain;
}

/* =========================
   DESKTOP
========================= */
@media (min-width:1024px){

    html, body{
        min-height:100vh;
        background:
            radial-gradient(circle at 15% 18%, rgba(203,108,230,.08), transparent 24%),
            radial-gradient(circle at 85% 28%, rgba(203,108,230,.07), transparent 24%),
            linear-gradient(180deg, #09080f 0%, #0c0b14 100%);
        color:var(--text);
    }

    body{
        overflow:hidden;
    }

    .mobile-shell{
        display:none;
    }

    .desktop-only{
        display:block;
    }

    .desktop-app{
        min-height:100vh;
        color:var(--text);
    }

    .desktop-layout{
        display:grid;
        grid-template-columns:280px minmax(0,1fr);
        min-height:100vh;
    }

    .desktop-sidebar{
        padding:22px 22px;
        border-right:1px solid rgba(255,255,255,.05);
        background:linear-gradient(180deg, rgba(14,13,23,.70) 0%, rgba(12,11,20,.40) 100%);
        overflow:auto;
    }

    .desktop-brand{
        font-size:34px;
        font-weight:800;
        line-height:1;
        margin:8px 0 56px;
    }

    .desktop-nav{
        display:flex;
        flex-direction:column;
        gap:10px;
        margin-top:4px;
    }

    .desktop-nav-item{
        display:flex;
        align-items:center;
        gap:14px;
        width:100%;
        min-height:56px;
        padding:0 18px;
        border-radius:16px;
        color:#f1f1f1;
        background:transparent;
        border:1px solid transparent;
        font-size:16px;
        font-weight:600;
        transition:.2s ease;
        cursor:pointer;
        text-align:left;
    }

    .desktop-nav-item img{
        width:28px;
        height:28px;
        object-fit:contain;
        flex-shrink:0;
    }

    .desktop-nav-item.active-nav{
        background:linear-gradient(180deg, rgba(255,255,255,.06) 0%, rgba(255,255,255,.03) 100%);
        border-color:rgba(255,255,255,.06);
        box-shadow:var(--shadow);
    }

    .desktop-nav-item-accent{
        background:linear-gradient(90deg, #b85bda 0%, #cb6ce6 100%);
        border-color:transparent;
        color:#fff;
        box-shadow:0 12px 26px rgba(203,108,230,.28);
        margin-top:8px;
    }

    .desktop-nav-item-accent:hover{
        transform:translateY(-1px);
    }

    .desktop-nav-item-accent img{
        filter:brightness(0) invert(1);
    }

    .desktop-main{
        padding:26px 28px 34px;
        height:100vh;
        overflow:auto;
    }

    .desktop-back{
        display:inline-flex;
        align-items:center;
        gap:14px;
        font-size:24px;
        color:#fff;
        margin-bottom:18px;
        cursor:pointer;
        user-select:none;
    }

    .desktop-back-arrow{
        font-size:42px;
        line-height:1;
        transform:translateY(-1px);
    }

    .desktop-hero{
        position:relative;
        overflow:hidden;
        border-radius:30px;
        background:
            radial-gradient(circle at 82% 18%, rgba(203,108,230,.18), transparent 24%),
            radial-gradient(circle at 12% 85%, rgba(203,108,230,.08), transparent 24%),
            linear-gradient(180deg, #15141e 0%, #0f0e17 100%);
        border:1px solid rgba(255,255,255,.05);
        box-shadow:var(--shadow);
        padding:28px 26px 24px;
    }

    .desktop-kicker{
        display:inline-flex;
        align-items:center;
        gap:8px;
        background:rgba(255,255,255,.06);
        border:1px solid rgba(255,255,255,.06);
        border-radius:999px;
        padding:10px 14px;
        font-size:13px;
        color:#ebe4f5;
        margin-bottom:18px;
    }

    .desktop-hero-top{
        display:grid;
        grid-template-columns:minmax(0,1.05fr) minmax(220px,.95fr);
        gap:26px;
        align-items:center;
    }

    .desktop-hero-text{
        min-width:0;
    }

    .desktop-title{
        margin:0 0 12px;
        font-size:clamp(42px,4.2vw,64px);
        line-height:.94;
        font-weight:800;
        letter-spacing:-1.2px;
        max-width:760px;
    }

    .desktop-desc{
        margin:0;
        color:var(--muted);
        font-size:clamp(16px,1.15vw,19px);
        line-height:1.6;
        max-width:760px;
    }

    .desktop-art-wrap{
        display:flex;
        justify-content:flex-end;
        align-items:center;
    }

    .desktop-art{
        width:clamp(170px,18vw,230px);
        height:clamp(170px,18vw,230px);
        object-fit:contain;
        border-radius:26px;
        background:#1a1a1a;
        padding:18px;
    }

    .desktop-note{
        margin-top:22px;
        background:rgba(255,255,255,.04);
        border-radius:22px;
        padding:18px 20px;
        color:#f0ebf8;
        font-size:16px;
        line-height:1.55;
        max-width:920px;
    }

    .desktop-grid{
        margin-top:16px;
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:14px;
    }

    .desktop-contact-card{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:14px;
        background:#141419;
        border:1px solid rgba(255,255,255,.05);
        border-radius:24px;
        padding:18px;
        box-shadow:var(--shadow);
        cursor:pointer;
    }

    .desktop-contact-left{
        display:flex;
        align-items:center;
        gap:14px;
        min-width:0;
    }

    .desktop-contact-icon{
        width:48px;
        height:48px;
        object-fit:contain;
        border-radius:14px;
        background:#22222d;
        padding:10px;
        flex-shrink:0;
    }

    .desktop-contact-title{
        font-size:18px;
        font-weight:700;
        line-height:1.25;
    }

    .desktop-contact-text{
        font-size:14px;
        color:var(--muted-soft);
        margin-top:3px;
        line-height:1.45;
    }

    .desktop-contact-arrow{
        font-size:24px;
        color:#bfbfbf;
        line-height:1;
        flex-shrink:0;
    }

    .desktop-wide{
        margin-top:16px;
        background:
            radial-gradient(circle at 88% 18%, rgba(203,108,230,.10), transparent 20%),
            linear-gradient(180deg, #121218 0%, #101017 100%);
        border:1px solid rgba(255,255,255,.05);
        border-radius:28px;
        padding:22px;
        box-shadow:var(--shadow);
    }

    .desktop-section-title{
        margin:0 0 14px;
        font-size:30px;
        line-height:1.1;
        font-weight:800;
    }

    .desktop-faq-list{
        display:flex;
        flex-direction:column;
        gap:12px;
    }

    .desktop-faq-item{
        background:#181821;
        border-radius:18px;
        overflow:hidden;
    }

    .desktop-faq-question{
        width:100%;
        min-height:78px;
        background:transparent;
        border:none;
        color:#fff;
        padding:0 20px;
        font-size:18px;
        line-height:1.3;
        font-weight:700;
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:14px;
        text-align:left;
    }

    .desktop-faq-question-text{
        flex:1;
    }

    .desktop-faq-icon{
        width:12px;
        height:12px;
        flex-shrink:0;
        border-right:3px solid var(--accent);
        border-bottom:3px solid var(--accent);
        transform:rotate(45deg);
        transition:transform .25s ease;
        margin-right:4px;
    }

    .desktop-faq-item.open .desktop-faq-icon{
        transform:rotate(225deg);
    }

    .desktop-faq-answer-wrap{
        max-height:0;
        overflow:hidden;
        transition:max-height .28s ease;
    }

    .desktop-faq-answer{
        padding:0 20px 18px;
        font-size:16px;
        line-height:1.55;
        color:#d3d3d3;
    }

    .desktop-cta-wrap{
        margin-top:18px;
        display:flex;
        justify-content:center;
    }

    .desktop-cta{
        width:100%;
        max-width:560px;
        height:62px;
        border:none;
        border-radius:18px;
        font-size:21px;
        font-weight:700;
        box-shadow:0 14px 32px rgba(203,108,230,.25);
    }
}

@media (min-width:1024px) and (max-width:1400px){
    .desktop-layout{
        grid-template-columns:260px minmax(0,1fr);
    }

    .desktop-main{
        padding:22px 22px 28px;
    }

    .desktop-hero{
        padding:22px 20px 20px;
    }

    .desktop-note{
        font-size:15px;
    }
}

@media (min-width:1024px) and (max-width:1180px){
    .desktop-hero-top{
        grid-template-columns:1fr;
    }

    .desktop-art-wrap{
        justify-content:flex-start;
    }

    .desktop-grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<!-- =========================
     MOBILE VERSION
========================= -->
<div class="mobile-shell">
    <div class="mobile-page">
        <button class="mobile-back" onclick="goBack()">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M15 5L8 12L15 19" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span id="back-mobile"></span>
        </button>

        <section class="mobile-hero">
            <div class="mobile-kicker" id="kicker-mobile"></div>

            <div class="mobile-hero-row">
                <div class="mobile-hero-text">
                    <h1 class="mobile-title" id="title-mobile"></h1>
                    <p class="mobile-desc" id="desc-mobile"></p>
                </div>

                <img class="mobile-hero-art" src="images/support-hero-mobile.png" alt="support">
            </div>

            <div class="mobile-note" id="note-mobile"></div>
        </section>

        <section class="mobile-section">
            <h2 class="mobile-section-title" id="contactTitle-mobile"></h2>

            <div class="mobile-contacts">
                <div class="mobile-contact" onclick="openSupport()">
                    <div class="mobile-contact-left">
                        <img class="mobile-contact-icon" src="images/support-contact-1.png" alt="">
                        <div>
                            <div class="mobile-contact-title" id="contact1Title-mobile"></div>
                            <div class="mobile-contact-text" id="contact1Text-mobile"></div>
                        </div>
                    </div>
                    <span class="mobile-contact-arrow">›</span>
                </div>

                <div class="mobile-contact" onclick="openSupport()">
                    <div class="mobile-contact-left">
                        <img class="mobile-contact-icon" src="images/support-contact-2.png" alt="">
                        <div>
                            <div class="mobile-contact-title" id="contact2Title-mobile"></div>
                            <div class="mobile-contact-text" id="contact2Text-mobile"></div>
                        </div>
                    </div>
                    <span class="mobile-contact-arrow">›</span>
                </div>
            </div>
        </section>

        <section class="mobile-section">
            <h2 class="mobile-section-title" id="faqTitle-mobile"></h2>
            <div class="mobile-faq-list" id="faqList-mobile"></div>

            <div class="mobile-cta-wrap">
                <button class="btn-gradient mobile-cta" id="supportBtn-mobile"></button>
            </div>
        </section>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="goPage('mycourses.html')">
            <img src="images/courses2.png" alt="">
            <span id="m1-mobile"></span>
        </div>

        <div class="nav-item" onclick="goPage('support.html')">
            <img src="images/support.png" alt="">
            <span id="m4-mobile"></span>
        </div>

        <div class="nav-center" onclick="goHome()">
            <div class="circle">
                <img src="images/home2.png" alt="home">
            </div>
        </div>

        <div class="nav-item" onclick="goPage('chat.html')">
            <img src="images/chat2.png" alt="">
            <span id="m5-mobile"></span>
        </div>

        <div class="nav-item" onclick="goPage('myprofile.html')">
            <img src="images/profile2.png" alt="">
            <span id="m6-mobile"></span>
        </div>
    </div>
</div>

<!-- =========================
     DESKTOP VERSION
========================= -->
<div class="desktop-app desktop-only">
    <div class="desktop-layout">
        <aside class="desktop-sidebar">
            <div class="desktop-brand">gaphub</div>

            <nav class="desktop-nav">
                <button class="desktop-nav-item" onclick="goHome()">
                    <img src="images/home.png" alt="">
                    <span id="home-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('mycourses.html')">
                    <img src="images/courses2.png" alt="">
                    <span id="m1-desktop"></span>
                </button>

                <button class="desktop-nav-item active-nav" onclick="goPage('support.html')">
                    <img src="images/support.png" alt="">
                    <span id="m4-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('chat.html')">
                    <img src="images/chat2.png" alt="">
                    <span id="m5-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('myprofile.html')">
                    <img src="images/profile2.png" alt="">
                    <span id="m6-desktop"></span>
                </button>

                <button class="desktop-nav-item desktop-nav-item-accent" onclick="goCourses()">
                    <img src="images/courses-catalog.png" alt="">
                    <span id="catalog-desktop"></span>
                </button>
            </nav>
        </aside>

        <main class="desktop-main">
            <div class="desktop-back" onclick="goBack()">
                <span class="desktop-back-arrow">←</span>
                <span id="back-desktop"></span>
            </div>

            <section class="desktop-hero">
                <div class="desktop-kicker" id="kicker-desktop"></div>

                <div class="desktop-hero-top">
                    <div class="desktop-hero-text">
                        <h1 class="desktop-title" id="title-desktop"></h1>
                        <p class="desktop-desc" id="desc-desktop"></p>
                    </div>

                    <div class="desktop-art-wrap">
                        <img class="desktop-art" src="images/support-hero-desktop.png" alt="support">
                    </div>
                </div>

                <div class="desktop-note" id="note-desktop"></div>
            </section>

            <section class="desktop-grid">
                <article class="desktop-contact-card" onclick="openSupport()">
                    <div class="desktop-contact-left">
                        <img class="desktop-contact-icon" src="images/support-contact-1.png" alt="">
                        <div>
                            <div class="desktop-contact-title" id="contact1Title-desktop"></div>
                            <div class="desktop-contact-text" id="contact1Text-desktop"></div>
                        </div>
                    </div>
                    <span class="desktop-contact-arrow">›</span>
                </article>

                <article class="desktop-contact-card" onclick="openSupport()">
                    <div class="desktop-contact-left">
                        <img class="desktop-contact-icon" src="images/support-contact-2.png" alt="">
                        <div>

const t = {

function setText(id, value){
    const el = document.getElementById(id);
    if(el) el.innerText = value;
}

function update(){
    const d = t[lang];

    document.documentElement.lang = lang === "uz" ? "uz" : "ru";

    setText("back-mobile", d.back);
    setText("kicker-mobile", d.kicker);
    setText("title-mobile", d.title);
    setText("desc-mobile", d.desc);
    setText("note-mobile", d.note);
    setText("contactTitle-mobile", d.contactTitle);
    setText("contact1Title-mobile", d.contact1Title);
    setText("contact1Text-mobile", d.contact1Text);
    setText("contact2Title-mobile", d.contact2Title);
    setText("contact2Text-mobile", d.contact2Text);
    setText("faqTitle-mobile", d.faqTitle);
    setText("supportBtn-mobile", d.supportBtn);
    setText("m1-mobile", d.m1);
    setText("m4-mobile", d.m4);
    setText("m5-mobile", d.m5);
    setText("m6-mobile", d.m6);

    setText("home-desktop", d.home);
    setText("back-desktop", d.back);
    setText("title-desktop", d.title);
    setText("desc-desktop", d.desc);
    setText("kicker-desktop", d.kicker);
    setText("note-desktop", d.note);

    setText("contact2Title-desktop", d.contact2Title);

    setText("m6-desktop", d.m6);
    setText("catalog-desktop", d.catalog);

    renderFaqMobile();
    renderFaqDesktop();
}

function renderFaqMobile(){
    const list = document.getElementById("faqList-mobile");
    const data = t[lang].faq;

    list.innerHTML = data.map(item => `
        <div class="mobile-faq-item">
            <button class="mobile-faq-question" onclick="toggleFaqMobile(this)">
                <span class="mobile-faq-question-text">${item.q}</span>
                <span class="mobile-faq-icon"></span>
            </button>
            <div class="mobile-faq-answer-wrap">
                <div class="mobile-faq-answer">${item.a}</div>
            </div>
        </div>
    `).join("");
}

function renderFaqDesktop(){
    const list = document.getElementById("faqList-desktop");
    const data = t[lang].faq;

    list.innerHTML = data.map(item => `
        <div class="desktop-faq-item">
            <button class="desktop-faq-question" onclick="toggleFaqDesktop(this)">
                <span class="desktop-faq-question-text">${item.q}</span>
                <span class="desktop-faq-icon"></span>
            </button>
            <div class="desktop-faq-answer-wrap">
                <div class="desktop-faq-answer">${item.a}</div>
            </div>
        </div>
    `).join("");
}

function toggleFaqMobile(button){
    const item = button.parentElement;
    const wrap = item.querySelector(".mobile-faq-answer-wrap");
    const isOpen = item.classList.contains("open");

    document.querySelectorAll(".mobile-faq-item").forEach(el => {
        el.classList.remove("open");
        const target = el.querySelector(".mobile-faq-answer-wrap");
        if(target) target.style.maxHeight = null;
    });

    if(!isOpen){
        item.classList.add("open");
        wrap.style.maxHeight = wrap.scrollHeight + "px";
    }
}

function toggleFaqDesktop(button){
    const item = button.parentElement;
    const wrap = item.querySelector(".desktop-faq-answer-wrap");
    const isOpen = item.classList.contains("open");

    document.querySelectorAll(".desktop-faq-item").forEach(el => {
        el.classList.remove("open");
        const target = el.querySelector(".desktop-faq-answer-wrap");
        if(target) target.style.maxHeight = null;
    });

    if(!isOpen){
        item.classList.add("open");
        wrap.style.maxHeight = wrap.scrollHeight + "px";
    }
}

function goBack(){
    if (window.history.length > 1) {
        window.history.back();
    } else {
        window.location.href = "index.html";
    }
}

function goHome(){
    localStorage.setItem("lang", lang);
    window.location.href = "index.html";
}

function goPage(page){
    localStorage.setItem("lang", lang);
    window.location.href = page;
}

function goCourses(){
    localStorage.setItem("lang", lang);
    window.location.href = "courses.html";
}

function openSupport(){
    localStorage.setItem("lang", lang);
    window.location.href = "https://t.me/Yusuf_bayer";
}

function initButtons(){
    const mobileBtn = document.getElementById("supportBtn-mobile");
    const desktopBtn = document.getElementById("supportBtn-desktop");

    if(mobileBtn) mobileBtn.onclick = openSupport;
    if(desktopBtn) desktopBtn.onclick = openSupport;
}

function initTelegram(){
    if(window.Telegram && Telegram.WebApp){
        const tg = Telegram.WebApp;

        tg.ready();
        tg.expand();

        try{
            tg.requestFullscreen();
        }catch(e){}

        document.body.style.minHeight = tg.viewportHeight + "px";
    }
}

update();
initButtons();
initTelegram();
</script>
