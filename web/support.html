<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>gaphub - support</title>

<style>
:root{
    --accent:#cb6ce6;
    --text:#ffffff;
    --muted:#aaa;
    --muted-soft:#9f98aa;
    --bg:#0c0b14;
    --card:#111117;
    --card-soft:#17171f;
    --line:rgba(255,255,255,.08);
    --shadow:0 10px 35px rgba(0,0,0,.35);
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html, body{
    margin:0;
    padding:0;
    min-height:100%;
    font-family:Arial, sans-serif;
    background:#000;
    color:#fff;
}

body{
    position:relative;
}

img{
    display:block;
    max-width:100%;
}

button{
    font-family:inherit;
    cursor:pointer;
}

.desktop-only{
    display:none;
}

.btn-gradient{
    border:none;
    color:#fff;
    background:linear-gradient(90deg,#cb6ce6,#a855f7);
}

/* =========================
   MOBILE
========================= */
.mobile-shell{
    display:block;
}

.mobile-page{
    min-height:calc(100vh + 24px);
    padding:
        calc(env(safe-area-inset-top) + 78px)
        16px
        calc(112px + env(safe-area-inset-bottom));

    background:
        radial-gradient(circle at 20% 8%, rgba(203,108,230,.12), transparent 24%),
        linear-gradient(180deg, #09080f 0%, #0c0b14 100%);
}

.mobile-header{
    animation:fadeUp .42s ease both;
}

.mobile-title{
    margin:0 0 8px;
    font-size:clamp(34px,9vw,42px);
    line-height:.94;
    font-weight:800;
    letter-spacing:-1px;
}

.mobile-desc{
    margin:0;
    max-width:330px;
    color:var(--muted);
    font-size:15px;
    line-height:1.45;
}

.mobile-main-action{
    margin-top:18px;
    animation:fadeUp .45s ease both;
    animation-delay:.06s;
}

.mobile-support-btn{
    width:100%;
    min-height:58px;
    border:none;
    border-radius:20px;
    color:#fff;
    background:linear-gradient(90deg,#cb6ce6,#a855f7);
    box-shadow:0 14px 32px rgba(203,108,230,.25);
    font-size:16px;
    font-weight:800;
    transition:transform .18s ease, opacity .18s ease;
}

.mobile-support-btn:active{
    transform:scale(.985);
    opacity:.92;
}

.mobile-section{
    margin-top:22px;
}

.mobile-section-title{
    margin:0 0 14px;
    font-size:22px;
    line-height:1.1;
    font-weight:800;
    animation:fadeUp .45s ease both;
    animation-delay:.10s;
}

.mobile-faq-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.mobile-faq-item{
    border-radius:22px;
    overflow:hidden;
    background:
        radial-gradient(circle at 88% 18%, rgba(203,108,230,.10), transparent 24%),
        linear-gradient(180deg, #121219 0%, #0d0d12 100%);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:var(--shadow);
    animation:fadeUp .45s ease both;
}

.mobile-faq-item:nth-child(1){
    animation-delay:.14s;
}

.mobile-faq-item:nth-child(2){
    animation-delay:.20s;
}

.mobile-faq-item:nth-child(3){
    animation-delay:.26s;
}

.mobile-faq-item:nth-child(4){
    animation-delay:.32s;
}

.mobile-faq-question{
    width:100%;
    min-height:62px;
    background:transparent;
    border:none;
    color:#fff;
    padding:0 16px;
    font-size:15px;
    line-height:1.35;
    font-weight:800;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    text-align:left;
}

.mobile-faq-question-text{
    flex:1;
}

.mobile-faq-icon{
    width:38px;
    height:38px;
    border-radius:14px;
    background:rgba(255,255,255,.05);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    transition:.22s ease;
}

.mobile-faq-icon::before{
    content:"";
    width:10px;
    height:10px;
    border-right:2px solid var(--accent);
    border-bottom:2px solid var(--accent);
    transform:rotate(45deg) translate(-1px,-1px);
    transition:.22s ease;
}

.mobile-faq-item.open .mobile-faq-icon{
    background:rgba(203,108,230,.16);
}

.mobile-faq-item.open .mobile-faq-icon::before{
    transform:rotate(225deg) translate(-1px,-1px);
}

.mobile-faq-answer-wrap{
    max-height:0;
    overflow:hidden;
    transition:max-height .28s ease;
}

.mobile-faq-answer{
    padding:0 16px 16px;
    font-size:14px;
    line-height:1.55;
    color:#d3d3d3;
}

.mobile-divider{
    margin:22px 0 0;
    height:1px;
    background:linear-gradient(90deg, transparent, rgba(203,108,230,.55), transparent);
    animation:fadeUp .45s ease both;
    animation-delay:.36s;
}

/* BOTTOM NAV */
.bottom-nav{
    position:fixed;
    left:0;
    bottom:0;
    width:100%;
    background:#000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 10px;
    padding-bottom:calc(8px + env(safe-area-inset-bottom));
    z-index:50;
}

.nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:12px;
    color:#fff;
    width:20%;
    text-align:center;
    cursor:pointer;
}

.nav-item img{
    width:27px;
    margin-bottom:2px;
}

.nav-item span{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.nav-item.active-mobile-nav span{
    color:#d68cff;
}

.nav-item.active-mobile-nav img{
    filter:
        drop-shadow(0 0 10px rgba(203,108,230,.45))
        brightness(1.08);
}

.nav-center{
    position:relative;
    top:-18px;
    width:20%;
    display:flex;
    justify-content:center;
}

.circle{
    width:60px;
    height:60px;
    background:#ffffff;
    border-radius:50%;
    border:4px solid var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 10px 30px rgba(203,108,230,.25);
}

.circle img{
    width:24px;
    height:24px;
    object-fit:contain;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(14px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* =========================
   DESKTOP
========================= */
@media (min-width:1024px){

    html, body{
        min-height:100vh;
        background:
            radial-gradient(circle at 15% 18%, rgba(203,108,230,.08), transparent 24%),
            radial-gradient(circle at 85% 28%, rgba(203,108,230,.07), transparent 24%),
            linear-gradient(180deg, #09080f 0%, #0c0b14 100%);
        color:var(--text);
    }

    body{
        overflow:hidden;
    }

    .mobile-shell{
        display:none;
    }

    .desktop-only{
        display:block;
    }

    .desktop-app{
        min-height:100vh;
        color:var(--text);
    }

    .desktop-layout{
        display:grid;
        grid-template-columns:280px minmax(0,1fr);
        min-height:100vh;
    }

    .desktop-sidebar{
        padding:22px 22px;
        border-right:1px solid rgba(255,255,255,.05);
        background:linear-gradient(180deg, rgba(14,13,23,.70) 0%, rgba(12,11,20,.40) 100%);
        overflow:auto;
    }

    .desktop-brand{
        font-size:34px;
        font-weight:800;
        line-height:1;
        margin:8px 0 56px;
    }

    .desktop-nav{
        display:flex;
        flex-direction:column;
        gap:10px;
        margin-top:4px;
    }

    .desktop-nav-item{
        display:flex;
        align-items:center;
        gap:14px;
        width:100%;
        min-height:56px;
        padding:0 18px;
        border-radius:16px;
        color:#f1f1f1;
        background:transparent;
        border:1px solid transparent;
        font-size:16px;
        font-weight:600;
        transition:.2s ease;
        cursor:pointer;
        text-align:left;
    }

    .desktop-nav-item img{
        width:28px;
        height:28px;
        object-fit:contain;
        flex-shrink:0;
    }

    .desktop-nav-item.active-nav{
        background:linear-gradient(180deg, rgba(255,255,255,.06) 0%, rgba(255,255,255,.03) 100%);
        border-color:rgba(255,255,255,.06);
        box-shadow:var(--shadow);
    }

    .desktop-nav-item-accent{
        background:linear-gradient(90deg, #b85bda 0%, #cb6ce6 100%);
        border-color:transparent;
        color:#fff;
        box-shadow:0 12px 26px rgba(203,108,230,.28);
        margin-top:8px;
    }

    .desktop-nav-item-accent:hover{
        transform:translateY(-1px);
    }

    .desktop-nav-item-accent img{
        filter:brightness(0) invert(1);
    }

    .desktop-main{
        padding:26px 28px 34px;
        height:100vh;
        overflow:auto;
    }

    .desktop-back{
        display:inline-flex;
        align-items:center;
        gap:14px;
        font-size:24px;
        color:#fff;
        margin-bottom:18px;
        cursor:pointer;
        user-select:none;
    }

    .desktop-back-arrow{
        font-size:42px;
        line-height:1;
        transform:translateY(-1px);
    }

    .desktop-hero{
    position:relative;
    overflow:hidden;
    border-radius:30px;
    background:
        radial-gradient(circle at 82% 18%, rgba(203,108,230,.18), transparent 24%),
        radial-gradient(circle at 12% 85%, rgba(203,108,230,.08), transparent 24%),
        linear-gradient(180deg, #15141e 0%, #0f0e17 100%);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:var(--shadow);
    padding:28px 26px;
}

.desktop-hero-layout{
    display:grid;
    grid-template-columns:minmax(0,1fr) 360px;
    gap:22px;
    align-items:stretch;
}

.desktop-kicker{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.06);
    border-radius:999px;
    padding:10px 14px;
    font-size:13px;
    color:#ebe4f5;
    margin-bottom:18px;
}

.desktop-title{
    margin:0 0 12px;
    font-size:clamp(42px,4.2vw,64px);
    line-height:.94;
    font-weight:800;
    letter-spacing:-1.2px;
    max-width:760px;
}

.desktop-desc{
    margin:0;
    color:var(--muted);
    font-size:clamp(16px,1.15vw,19px);
    line-height:1.6;
    max-width:760px;
}

.desktop-hero-action{
    margin-top:22px;
    display:flex;
}

.desktop-hero-support-btn{
    width:100%;
    max-width:380px;
    height:60px;
    border:none;
    border-radius:18px;
    font-size:18px;
    font-weight:800;
    box-shadow:0 14px 32px rgba(203,108,230,.25);
}

.desktop-help-card{
    border-radius:24px;
    padding:20px;
    background:
        radial-gradient(circle at 88% 18%, rgba(203,108,230,.12), transparent 24%),
        linear-gradient(180deg, #121219 0%, #0d0d12 100%);
    border:1px solid rgba(255,255,255,.06);
    box-shadow:var(--shadow);
}

.desktop-help-title{
    margin:0 0 12px;
    font-size:22px;
    line-height:1.1;
    font-weight:800;
}

.desktop-help-list{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.desktop-help-item{
    min-height:48px;
    border-radius:16px;
    padding:12px 13px;
    background:rgba(255,255,255,.045);
    border:1px solid rgba(255,255,255,.06);
    color:#e8e3f0;
    font-size:15px;
    line-height:1.35;
    font-weight:700;
}

.desktop-wide{
    margin-top:18px;
    background:
        radial-gradient(circle at 88% 18%, rgba(203,108,230,.10), transparent 20%),
        linear-gradient(180deg, #121218 0%, #101017 100%);
    border:1px solid rgba(255,255,255,.05);
    border-radius:28px;
    padding:22px;
    box-shadow:var(--shadow);
}

.desktop-section-title{
    margin:0 0 16px;
    font-size:30px;
    line-height:1.1;
    font-weight:800;
}

.desktop-faq-list{
    display:grid;
    grid-template-columns:repeat(2, minmax(0,1fr));
    gap:12px;
}

.desktop-faq-item{
    background:#181821;
    border-radius:18px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.05);
}

.desktop-faq-question{
    width:100%;
    min-height:72px;
    background:transparent;
    border:none;
    color:#fff;
    padding:0 18px;
    font-size:17px;
    line-height:1.3;
    font-weight:800;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    text-align:left;
}

.desktop-faq-question-text{
    flex:1;
}

.desktop-faq-icon{
    width:38px;
    height:38px;
    border-radius:14px;
    background:rgba(255,255,255,.05);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    transition:.22s ease;
}

.desktop-faq-icon::before{
    content:"";
    width:10px;
    height:10px;
    border-right:2px solid var(--accent);
    border-bottom:2px solid var(--accent);
    transform:rotate(45deg) translate(-1px,-1px);
    transition:.22s ease;
}

.desktop-faq-item.open .desktop-faq-icon{
    background:rgba(203,108,230,.16);
}

.desktop-faq-item.open .desktop-faq-icon::before{
    transform:rotate(225deg) translate(-1px,-1px);
}

.desktop-faq-answer-wrap{
    max-height:0;
    overflow:hidden;
    transition:max-height .28s ease;
}

.desktop-faq-answer{
    padding:0 18px 18px;
    font-size:15px;
    line-height:1.55;
    color:#d3d3d3;
}

}

@media (min-width:1024px) and (max-width:1400px){
    .desktop-layout{
        grid-template-columns:260px minmax(0,1fr);
    }

    .desktop-main{
        padding:22px 22px 28px;
    }

    .desktop-hero{
        padding:22px 20px 20px;
    }
}

@media (min-width:1024px) and (max-width:1180px){
    .desktop-hero-layout{
        grid-template-columns:1fr;
    }

    .desktop-faq-list{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<!-- MOBILE VERSION -->
<div class="mobile-shell">
    <div class="mobile-page">

        <section class="mobile-header">
            <h1 class="mobile-title" id="title-mobile"></h1>
            <p class="mobile-desc" id="desc-mobile"></p>
        </section>

        <div class="mobile-main-action">
            <button class="mobile-support-btn" id="supportBtn-mobile"></button>
        </div>

        <div class="mobile-divider"></div>

        <section class="mobile-section">
            <h2 class="mobile-section-title" id="faqTitle-mobile"></h2>
            <div class="mobile-faq-list" id="faqList-mobile"></div>
        </section>

    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="goPage('mycourses.html')">
            <img src="images/icon/courses2.png" alt="">
            <span id="m1-mobile"></span>
        </div>

        <div class="nav-item active-mobile-nav" onclick="goPage('support.html')">
            <img src="images/icon/support.png" alt="">
            <span id="m4-mobile"></span>
        </div>

        <div class="nav-center" onclick="goHome()">
            <div class="circle">
                <img src="images/icon/home2.png" alt="home">
            </div>
        </div>

        <div class="nav-item" onclick="goPage('chat.html')">
            <img src="images/icon/feedback.png" alt="">
            <span id="m5-mobile"></span>
        </div>

        <div class="nav-item" onclick="goPage('myprofile.html')">
            <img src="images/icon/profile2.png" alt="">
            <span id="m6-mobile"></span>
        </div>
    </div>
</div>

<!-- DESKTOP VERSION -->
<div class="desktop-app desktop-only">
    <div class="desktop-layout">
        <aside class="desktop-sidebar">
            <div class="desktop-brand">gaphub</div>

            <nav class="desktop-nav">
                <button class="desktop-nav-item" onclick="goHome()">
                    <img src="images/icon/home.png" alt="">
                    <span id="home-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('mycourses.html')">
                    <img src="images/icon/courses2.png" alt="">
                    <span id="m1-desktop"></span>
                </button>

                <button class="desktop-nav-item active-nav" onclick="goPage('support.html')">
                    <img src="images/icon/support.png" alt="">
                    <span id="m4-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('chat.html')">
                    <img src="images/icon/feedback.png" alt="">
                    <span id="m5-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('myprofile.html')">
                    <img src="images/icon/profile2.png" alt="">
                    <span id="m6-desktop"></span>
                </button>

                <button class="desktop-nav-item desktop-nav-item-accent" onclick="goCourses()">
                    <img src="images/icon/catalog.png" alt="">
                    <span id="catalog-desktop"></span>
                </button>
            </nav>
        </aside>

        <main class="desktop-main">

    <section class="desktop-hero">
        <div class="desktop-hero-layout">

            <div class="desktop-hero-left">
                <div class="desktop-kicker" id="kicker-desktop"></div>

                <h1 class="desktop-title" id="title-desktop"></h1>
                <p class="desktop-desc" id="desc-desktop"></p>

                <div class="desktop-hero-action">
                    <button class="btn-gradient desktop-hero-support-btn" id="supportBtn-desktop"></button>
                </div>
            </div>

            <aside class="desktop-help-card">
                <h2 class="desktop-help-title" id="helpCardTitle-desktop"></h2>

                <div class="desktop-help-list">
                    <div class="desktop-help-item" id="helpItem1-desktop"></div>
                    <div class="desktop-help-item" id="helpItem2-desktop"></div>
                    <div class="desktop-help-item" id="helpItem3-desktop"></div>
                </div>
            </aside>

        </div>
    </section>

    <section class="desktop-wide">
        <h2 class="desktop-section-title" id="faqTitle-desktop"></h2>
        <div class="desktop-faq-list" id="faqList-desktop"></div>
    </section>

</main>
    </div>
</div>

<script>
let lang = localStorage.getItem("lang") || "uz"

const SUPPORT_LINK = "https://t.me/username"

const t = {
    uz:{
        home:"Bosh sahifa",
        m1:"Kurslarim",
        m4:"Aloqa",
        m5:"Sharhlar",
        m6:"Profil",

        title:"Yordam",
        desc:"Kurslar, to‘lov yoki platforma bo‘yicha savollarda yordam beramiz.",

        supportBtn:"Telegram orqali yozish",

        faqTitle:"Ko‘p beriladigan savollar",

        faq:[
            {
                q:"Men yangi boshlovchiman. Kurs menga mos keladimi?",
                a:"Ha. Kurslar aynan yangi boshlayotganlar uchun sodda va tushunarli formatda tayyorlangan."
            },

            {
                q:"Telefon orqali o‘qisa bo‘ladimi?",
                a:"Ha. Platforma mobil qurilmalar uchun moslashtirilgan va darslarni telefondan ham o‘tish mumkin."
            },

            {
                q:"Kurslardan keyin amaliyot bo‘ladimi?",
                a:"Darslar amaliy yo‘nalishda qurilgan. Siz kontent, portfolio va real vazifalar bilan ishlaysiz."
            },

            {
                q:"Savolim bo‘lsa qayerga yozaman?",
                a:"Telegram orqali qo‘llab-quvvatlashga yozishingiz mumkin. Iloji boricha tez javob beramiz."
            }
        ]
    },

    ru:{
        home:"Главное меню",
        m1:"Мои курсы",
        m4:"Поддержка",
        m5:"Отзывы",
        m6:"Профиль",

        title:"Поддержка",
        desc:"Поможем с вопросами по курсам, оплате и работе платформы.",

        supportBtn:"Написать в Telegram",

        faqTitle:"Частые вопросы",

        faq:[
            {
                q:"Я новичок. Мне подойдут курсы?",
                a:"Да. Курсы сделаны так, чтобы человек мог спокойно зайти в digital даже без опыта."
            },

            {
                q:"Можно проходить курс с телефона?",
                a:"Да. Платформа адаптирована под мобильные устройства, поэтому проходить уроки можно прямо со смартфона."
            },

            {
                q:"Будет ли практика?",
                a:"Да. Уроки построены вокруг практики, контента и реальных задач, а не только теории."
            },

            {
                q:"Куда писать, если появятся вопросы?",
                a:"Можно написать в поддержку через Telegram. Мы постараемся ответить как можно быстрее."
            }
        ]
    }
}

function impact(){
    if(window.Telegram && Telegram.WebApp && Telegram.WebApp.HapticFeedback){
        Telegram.WebApp.HapticFeedback.impactOccurred("light")
    }
}

function setText(id, value){
    const el = document.getElementById(id)
    if(el) el.innerText = value
}

function renderFaq(){
    const d = t[lang]
    const mobileList = document.getElementById("faqList-mobile")
    const desktopList = document.getElementById("faqList-desktop")

    const mobileHTML = d.faq.map((item, index) => `
        <div class="mobile-faq-item" id="mobile-faq-item-${index}">
            <button class="mobile-faq-question" onclick="toggleFaq('mobile', ${index})">
                <div class="mobile-faq-question-text">${item.q}</div>
                <div class="mobile-faq-icon"></div>
            </button>

            <div class="mobile-faq-answer-wrap" id="mobile-faq-wrap-${index}">
                <div class="mobile-faq-answer">${item.a}</div>
            </div>
        </div>
    `).join("")

    const desktopHTML = d.faq.map((item, index) => `
        <div class="desktop-faq-item" id="desktop-faq-item-${index}">
            <button class="desktop-faq-question" onclick="toggleFaq('desktop', ${index})">
                <div class="desktop-faq-question-text">${item.q}</div>
                <div class="desktop-faq-icon"></div>
            </button>

            <div class="desktop-faq-answer-wrap" id="desktop-faq-wrap-${index}">
                <div class="desktop-faq-answer">${item.a}</div>
            </div>
        </div>
    `).join("")

    if(mobileList) mobileList.innerHTML = mobileHTML
    if(desktopList) desktopList.innerHTML = desktopHTML
}

function toggleFaq(type, index){
    impact()

    const item = document.getElementById(`${type}-faq-item-${index}`)
    const wrap = document.getElementById(`${type}-faq-wrap-${index}`)

    if(!item || !wrap) return

    const isOpen = item.classList.contains("open")

    document.querySelectorAll(`.${type}-faq-item`).forEach(el => {
        el.classList.remove("open")
    })

    document.querySelectorAll(`.${type}-faq-answer-wrap`).forEach(el => {
        el.style.maxHeight = "0px"
    })

    if(!isOpen){
        item.classList.add("open")
        wrap.style.maxHeight = wrap.scrollHeight + "px"
    }
}
