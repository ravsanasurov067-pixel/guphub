<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>gaphub - SMM lessons</title>

<style>
:root{
    --accent:#cb6ce6;
    --accent-2:#a855f7;
    --bg:#0c0b14;
    --bg-soft:#15141e;
    --card:#111117;
    --card-2:#17171f;
    --text:#ffffff;
    --muted:#a8a4b5;
    --muted-soft:#8f8a9e;
    --line:rgba(255,255,255,.07);
    --shadow:0 12px 38px rgba(0,0,0,.35);

    --radius-xl:28px;
    --radius-lg:22px;
    --radius-md:16px;
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html, body{
    margin:0;
    padding:0;
    min-height:100%;
    font-family:Arial, sans-serif;
    background:#000;
    color:#fff;
}

body{
    position:relative;
}

img{
    display:block;
    max-width:100%;
}

button{
    font-family:inherit;
    cursor:pointer;
}

.desktop-only{
    display:none;
}

.btn{
    border:none;
    border-radius:18px;
    transition:.2s ease;
    font-weight:700;
}

.btn:active{
    transform:scale(.99);
}

.btn-primary{
    color:#fff;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    box-shadow:0 14px 32px rgba(203,108,230,.22);
}

.btn-secondary{
    color:#fff;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.10);
}

.glow-card{
    background:
        radial-gradient(circle at 86% 14%, rgba(203,108,230,.18), transparent 26%),
        radial-gradient(circle at 15% 88%, rgba(203,108,230,.08), transparent 22%),
        linear-gradient(180deg, #171621 0%, #0f0e17 100%);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:var(--shadow);
}

.soft-card{
    background:
        radial-gradient(circle at 88% 18%, rgba(203,108,230,.10), transparent 24%),
        linear-gradient(180deg, #121219 0%, #0d0d12 100%);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:var(--shadow);
}

/* =========================
   MOBILE
========================= */
.mobile-shell{
    display:block;
}

.mobile-page{
    min-height:100vh;
    padding:calc(env(safe-area-inset-top) + 76px) 14px calc(110px + env(safe-area-inset-bottom));
    background:
        radial-gradient(circle at 20% 10%, rgba(203,108,230,.10), transparent 24%),
        linear-gradient(180deg, #09080f 0%, #0c0b14 100%);
}

.mobile-back{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:#1a1a1a;
    color:#fff;
    border:none;
    border-radius:12px;
    padding:10px 14px;
    font-size:15px;
    margin-bottom:16px;
}

.mobile-back svg{
    width:16px;
    height:16px;
    flex-shrink:0;
}

.mobile-hero{
    position:relative;
    overflow:hidden;
    border-radius:var(--radius-xl);
    padding:18px 16px 16px;
}

.mobile-badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.06);
    border-radius:999px;
    padding:8px 12px;
    font-size:12px;
    color:#ebe4f5;
    margin-bottom:14px;
}

.mobile-hero-title{
    margin:0 0 8px;
    font-size:32px;
    line-height:1;
    font-weight:800;
    letter-spacing:-.4px;
}

.mobile-hero-text{
    margin:0;
    color:var(--muted);
    font-size:14px;
    line-height:1.45;
}

.mobile-progress-wrap{
    margin-top:16px;
}

.mobile-progress-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:8px;
}

.mobile-progress-percent{
    font-size:28px;
    line-height:1;
    font-weight:800;
}

.mobile-progress-count{
    color:var(--muted-soft);
    font-size:13px;
    text-align:right;
}

.mobile-progress-line{
    height:10px;
    border-radius:999px;
    background:rgba(255,255,255,.08);
    overflow:hidden;
}

.mobile-progress-fill{
    height:100%;
    border-radius:999px;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    width:0%;
}

.mobile-hero-actions{
    margin-top:14px;
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
}

.mobile-hero-btn{
    width:100%;
    height:54px;
    font-size:16px;
}

.mobile-section{
    margin-top:16px;
}

.mobile-section-title{
    margin:0 0 12px;
    font-size:21px;
    line-height:1.1;
    font-weight:800;
}

.mobile-lessons-list{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.mobile-lesson-card{
    display:flex;
    align-items:center;
    gap:12px;
    border-radius:20px;
    padding:13px;
    cursor:pointer;
    overflow:hidden;
}

.mobile-lesson-card.locked{
    opacity:.58;
    cursor:not-allowed;
}

.mobile-lesson-number{
    width:42px;
    height:42px;
    border-radius:14px;
    background:#22222d;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:15px;
    font-weight:800;
    flex-shrink:0;
}

.mobile-lesson-card.done .mobile-lesson-number{
    background:rgba(203,108,230,.22);
    color:#e4b5f2;
}

.mobile-lesson-card.current .mobile-lesson-number{
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    box-shadow:0 10px 24px rgba(203,108,230,.22);
}

.mobile-lesson-body{
    min-width:0;
    flex:1;
}

.mobile-lesson-title{
    margin:0 0 4px;
    font-size:15px;
    font-weight:800;
    line-height:1.25;
}

.mobile-lesson-meta{
    color:var(--muted-soft);
    font-size:13px;
    line-height:1.35;
}

.mobile-lesson-status{
    width:34px;
    height:34px;
    border-radius:12px;
    background:rgba(255,255,255,.05);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#d9d9d9;
    font-size:16px;
    flex-shrink:0;
}

.mobile-lesson-card.current .mobile-lesson-status{
    color:#fff;
    background:rgba(203,108,230,.20);
}

.mobile-lesson-card.done .mobile-lesson-status{
    color:#d68cff;
    background:rgba(203,108,230,.14);
}

/* BOTTOM NAV */
.bottom-nav{
    position:fixed;
    left:0;
    bottom:0;
    width:100%;
    background:#000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 10px;
    padding-bottom:calc(8px + env(safe-area-inset-bottom));
    z-index:50;
}

.nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:12px;
    color:#fff;
    width:20%;
    text-align:center;
    cursor:pointer;
}

.nav-item img{
    width:27px;
    margin-bottom:2px;
}

.nav-item span{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.nav-item.active-mobile-nav span{
    color:#d68cff;
}

.nav-center{
    position:relative;
    top:-18px;
    width:20%;
    display:flex;
    justify-content:center;
}

.circle{
    width:60px;
    height:60px;
    background:#ffffff;
    border-radius:50%;
    border:4px solid var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
}

.circle img{
    width:24px;
    height:24px;
    object-fit:contain;
}

/* =========================
   DESKTOP
========================= */

    .desktop-badge{

    .desktop-hero-title{

    .desktop-progress-panel{

<!-- MOBILE -->
<div class="mobile-shell">
    <div class="mobile-page">
        <button class="mobile-back" onclick="goBack()">

function setText(id, value){
    const el = document.getElementById(id);
    if(el) el.innerText = value;
}

function getLessonTitle(lesson){
    return lang === "uz" ? lesson.uz : lesson.ru;
}

function getLessonStatus(lessonId){
    if(lessonId <= completedLessons) return "done";
    if(lessonId === currentLesson) return "current";
    return "locked";
}

function getStatusText(status){
    const d = t[lang];

    if(status === "done") return d.done;
    if(status === "current") return d.current;
    return d.locked;
}

function getStatusIcon(status){
    if(status === "done") return "✓";
    if(status === "current") return "▶";
    return "🔒";
}

function updateProgress(){
    const percent = Math.round((completedLessons / TOTAL_LESSONS) * 100);
    const d = t[lang];

    setText("progressPercent-mobile", percent + "%");
    setText("progressPercent-desktop", percent + "%");

    setText("progressCount-mobile", `${completedLessons} ${d.from} ${TOTAL_LESSONS} ${d.completed}`);
    setText("progressCount-desktop", `${completedLessons} ${d.from} ${TOTAL_LESSONS} ${d.completed}`);

    const mobileFill = document.getElementById("progressFill-mobile");
    const desktopFill = document.getElementById("progressFill-desktop");

    if(mobileFill) mobileFill.style.width = percent + "%";
    if(desktopFill) desktopFill.style.width = percent + "%";
}

function renderLessons(){
    const d = t[lang];

    const mobile = document.getElementById("lessonsList-mobile");
    const desktop = document.getElementById("lessonsList-desktop");

    const mobileHtml = lessons.map(lesson => {
        const status = getLessonStatus(lesson.id);

        return `
            <div class="mobile-lesson-card soft-card ${status}" onclick="openLesson(${lesson.id})">
                <div class="mobile-lesson-number">${lesson.id}</div>

                <div class="mobile-lesson-body">
                    <h3 class="mobile-lesson-title">${getLessonTitle(lesson)}</h3>
                    <div class="mobile-lesson-meta">${d.lesson} ${lesson.id} • ${lesson.duration} • ${getStatusText(status)}</div>
                </div>

                <div class="mobile-lesson-status">${getStatusIcon(status)}</div>
            </div>
        `;
    }).join("");

    const desktopHtml = lessons.map(lesson => {
        const status = getLessonStatus(lesson.id);

        return `
            <div class="desktop-lesson-card soft-card ${status}" onclick="openLesson(${lesson.id})">
                <div class="desktop-lesson-top">
                    <div class="desktop-lesson-number">${lesson.id}</div>
                    <div class="desktop-lesson-status">${getStatusIcon(status)}</div>
                </div>

                <div>
                    <h3 class="desktop-lesson-title">${getLessonTitle(lesson)}</h3>
                    <div class="desktop-lesson-meta">${d.lesson} ${lesson.id} • ${lesson.duration} • ${getStatusText(status)}</div>
                </div>
            </div>
        `;
    }).join("");

    if(mobile) mobile.innerHTML = mobileHtml;
    if(desktop) desktop.innerHTML = desktopHtml;
}

function updateStaticText(){
    const d = t[lang];

    document.documentElement.lang = lang === "uz" ? "uz" : "ru";

    setText("back-mobile", d.back);
    setText("badge-mobile", d.badge);
    setText("courseTitle-mobile", d.courseTitle);
    setText("heroText-mobile", d.heroText);
    setText("continueBtn-mobile", d.continueBtn);
    setText("lessonsTitle-mobile", d.lessonsTitle);
    setText("m1-mobile", d.m1);
    setText("m4-mobile", d.m4);
    setText("m5-mobile", d.m5);
    setText("m6-mobile", d.m6);

    setText("back-desktop", d.back);
    setText("home-desktop", d.home);
    setText("m1-desktop", d.m1);
    setText("m4-desktop", d.m4);
    setText("m5-desktop", d.m5);
    setText("m6-desktop", d.m6);
    setText("catalog-desktop", d.catalog);
    setText("badge-desktop", d.badge);
    setText("courseTitle-desktop", d.courseTitle);
    setText("heroText-desktop", d.heroText);
    setText("continueBtn-desktop", d.continueBtn);
    setText("lessonsTitle-desktop", d.lessonsTitle);

    updateProgress();
    renderLessons();
}

function loadProgress(userId){
    fetch(`https://api.gaphub.uz/progress/${userId}/${COURSE_SLUG}`)
        .then(res => res.json())
        .then(data => {
            completedLessons = Number(data.completed_lessons || data.completedLessons || 0);
            completedLessons = Math.max(0, Math.min(TOTAL_LESSONS, completedLessons));

            currentLesson = completedLessons + 1;
            if(currentLesson > TOTAL_LESSONS) currentLesson = TOTAL_LESSONS;

            updateStaticText();
        })
        .catch(err => {
            console.log("Progress fetch error:", err);
            completedLessons = 0;
            currentLesson = 1;
            updateStaticText();
        });
}

function openLesson(lessonId){
    const status = getLessonStatus(lessonId);

    if(status === "locked") return;

    localStorage.setItem("lang", lang);
    localStorage.setItem("current_course", COURSE_SLUG);
    localStorage.setItem("current_lesson", String(lessonId));

    window.location.href = `${COURSE_SLUG}-lesson-${lessonId}.html`;
}

function continueCourse(){
    openLesson(currentLesson);
}

function goHome(){
    localStorage.setItem("lang", lang);
    window.location.href = "index.html";
}

function goPage(page){
    localStorage.setItem("lang", lang);
    window.location.href = page;
}

function goCourses(){
    localStorage.setItem("lang", lang);
    window.location.href = "courses.html";
}

function goBack(){
    if (window.history.length > 1) {
        window.history.back();
    } else {
        window.location.href = "mycourses.html";
    }
}

function initTelegram(){
    if(window.Telegram && Telegram.WebApp){
        const tg = Telegram.WebApp;

        tg.ready();
        tg.expand();

        try{
            tg.requestFullscreen();
        }catch(e){}

        document.body.style.minHeight = tg.viewportHeight + "px";

        const user = tg.initDataUnsafe?.user;

        if(user && user.id){
            loadProgress(user.id);
        }else{
            updateStaticText();
        }
    }else{
        updateStaticText();
    }
}

initTelegram();
