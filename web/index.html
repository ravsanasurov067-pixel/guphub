<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>gaphub</title>

<style>
:root{
    --accent:#cb6ce6;
    --accent-2:#a855f7;
    --bg:#0c0b14;
    --text:#ffffff;
    --muted:#a8a8b3;
    --line:rgba(255,255,255,.08);
    --shadow:0 10px 35px rgba(0,0,0,.35);

    --radius-xl:clamp(22px,2vw,30px);
    --radius-lg:20px;
    --radius-md:16px;

    --hero-title:clamp(32px,4vw,58px);
    --hero-text:clamp(14px,1.15vw,18px);
    --section-title:clamp(22px,2vw,30px);
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html, body{
    margin:0;
    padding:0;
    min-height:100%;
    font-family:Arial, sans-serif;
    background:#000;
    color:#fff;
}

body{
    position:relative;
}

img{
    display:block;
    max-width:100%;
}

button{
    font-family:inherit;
    cursor:pointer;
}

.desktop-only{
    display:none;
}

.btn{
    border:none;
    border-radius:16px;
    transition:.2s ease;
    font-weight:700;
}

.btn:active{
    transform:scale(.99);
}

.btn-primary{
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    color:#fff;
}

.btn-secondary{
    background:rgba(255,255,255,.04);
    color:#fff;
    border:1px solid rgba(255,255,255,.10);
}

.lang{
    display:flex;
    align-items:center;
    background:#1a1a1a;
    border-radius:999px;
    padding:3px;
    gap:3px;
    flex-shrink:0;
}

.lang span{
    min-width:48px;
    padding:8px 12px;
    font-size:14px;
    color:#fff;
    cursor:pointer;
    border-radius:999px;
    text-align:center;
    user-select:none;
}

.lang .active{
    background:var(--accent);
}

.glow-card{
    background:
        radial-gradient(circle at 84% 14%, rgba(203,108,230,.18), transparent 28%),
        radial-gradient(circle at 16% 88%, rgba(203,108,230,.06), transparent 24%),
        linear-gradient(180deg, #15141e 0%, #0f0e17 100%);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:var(--shadow);
}

.soft-card{
    background:
        radial-gradient(circle at 88% 18%, rgba(203,108,230,.10), transparent 24%),
        linear-gradient(180deg, #111117 0%, #0d0d12 100%);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:var(--shadow);
}

/* =========================
   MOBILE
========================= */
.mobile-shell{
    display:block;
}

.mobile-page{
    min-height:100vh;
    padding-bottom:110px;
    background:
        radial-gradient(circle at 20% 10%, rgba(203,108,230,.10), transparent 24%),
        linear-gradient(180deg, #09080f 0%, #0c0b14 100%);
}

.mobile-header{
    padding:calc(env(safe-area-inset-top) + 76px) 16px 0;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:14px;
}

.mobile-logo{
    font-size:clamp(34px,8vw,42px);
    font-weight:800;
    line-height:.95;
    letter-spacing:-1px;
    max-width:56%;
}

.mobile-main{
    padding:14px 16px 0;
}

.mobile-hero{
    position:relative;
    overflow:hidden;
    border-radius:var(--radius-xl);
    padding:18px 16px 18px;
}

.mobile-kicker{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.06);
    border-radius:999px;
    padding:8px 12px;
    font-size:12px;
    color:#ebe4f5;
    margin-bottom:16px;
}

.mobile-hero-title{
    margin:0 0 14px;
    font-size:clamp(30px,8vw,36px);
    line-height:.95;
    font-weight:800;
    letter-spacing:-.9px;
    max-width:95%;
}

.mobile-hero-title .accent-text{
    color:#b85bda;
}

.mobile-points{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:18px;
}

.mobile-point{
    display:flex;
    align-items:flex-start;
    gap:10px;
    color:var(--muted);
    font-size:clamp(14px,3.8vw,15px);
    line-height:1.45;
}

.mobile-point-icon{
    width:22px;
    height:22px;
    border:2px solid var(--accent);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    margin-top:1px;
}

.mobile-point-icon::after{
    content:"";
    width:8px;
    height:4px;
    border-left:2px solid var(--accent);
    border-bottom:2px solid var(--accent);
    transform:rotate(-45deg);
    margin-top:-1px;
}

.mobile-hero-actions{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
}

.mobile-hero-btn{
    width:100%;
    height:56px;
    font-size:15px;
    border-radius:18px;
}

.mobile-section{
    margin-top:16px;
}

.mobile-section-title{
    margin:0 0 14px;
    font-size:clamp(22px,5.4vw,24px);
    line-height:1.1;
    font-weight:800;
}

.mobile-courses{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.mobile-course-card{
    border-radius:24px;
    padding:14px;
    cursor:pointer;
}

.mobile-course-inner{
    display:grid;
    grid-template-columns:92px minmax(0, 1fr) 52px;
    gap:14px;
    align-items:center;
}

.mobile-course-cover{
    width:92px;
    height:92px;
    border-radius:18px;
    background:#1a1a1a;
    object-fit:cover;
}

.mobile-course-info{
    min-width:0;
}

.mobile-course-title{
    margin:0 0 8px;
    font-size:clamp(20px,5.6vw,22px);
    line-height:1.05;
    font-weight:800;
}

.mobile-course-desc{
    margin:0;
    color:var(--muted);
    font-size:14px;
    line-height:1.45;
}

.mobile-course-arrow{
    width:52px;
    height:52px;
    border-radius:50%;
    background:rgba(255,255,255,.07);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
}

.mobile-course-arrow::before{
    content:"›";
    font-size:34px;
    line-height:1;
    color:#fff;
    transform:translateX(1px);
}

/* bottom nav */
.bottom-nav{
    position:fixed;
    left:0;
    bottom:0;
    width:100%;
    background:#000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 10px;
    padding-bottom:calc(8px + env(safe-area-inset-bottom));
    z-index:50;
}

.nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:12px;
    color:#fff;
    width:20%;
    text-align:center;
    cursor:pointer;
}

.nav-item img{
    width:27px;
    margin-bottom:2px;
}

.nav-item span{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.nav-center{
    position:relative;
    top:-18px;
    width:20%;
    display:flex;
    justify-content:center;
}

.circle{
    width:60px;
    height:60px;
    background:#ffffff;
    border-radius:50%;
    border:4px solid var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
}

.circle img{
    width:24px;
    height:24px;
    object-fit:contain;
}

/* =========================
   DESKTOP
========================= */
@media (min-width:1024px){
    html, body{
        min-height:100vh;
        background:
            radial-gradient(circle at 15% 20%, rgba(203,108,230,.10), transparent 28%),
            radial-gradient(circle at 85% 25%, rgba(203,108,230,.10), transparent 26%),
            radial-gradient(circle at 70% 70%, rgba(203,108,230,.07), transparent 24%),
            linear-gradient(180deg, #0b0a13 0%, #0c0b14 100%);
        color:var(--text);
    }

    body{
        overflow:hidden;
    }

    .desktop-only{
        display:block;
    }

    .mobile-shell{
        display:none;
    }

    .desktop-app{
        min-height:100vh;
        color:var(--text);
    }

    .desktop-topbar{
        position:fixed;
        top:0;
        left:0;
        right:0;
        height:78px;
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding:18px clamp(18px,4vw,44px) 14px clamp(18px,2.2vw,30px);
        background:linear-gradient(180deg, rgba(16,14,25,.94) 0%, rgba(16,14,25,.78) 100%);
        border-bottom:1px solid rgba(255,255,255,.04);
        z-index:30;
        backdrop-filter:blur(12px);
    }

    .desktop-brand{
        display:flex;
        align-items:center;
        font-size:clamp(28px,2.2vw,34px);
        font-weight:800;
        line-height:1;
        letter-spacing:-.5px;
    }

    .desktop-right{
        display:flex;
        align-items:center;
        gap:14px;
    }

    .desktop-layout{
        display:grid;
        grid-template-columns:270px minmax(0,1fr);
        height:100vh;
        padding-top:78px;
        overflow:hidden;
    }

    .desktop-sidebar{
        padding:22px 20px;
        border-right:1px solid rgba(255,255,255,.05);
        background:linear-gradient(180deg, rgba(14,13,23,.70) 0%, rgba(12,11,20,.40) 100%);
        overflow:auto;
    }

    .desktop-nav{
        display:flex;
        flex-direction:column;
        gap:10px;
        margin-top:4px;
    }

    .desktop-nav-item{
        display:flex;
        align-items:center;
        gap:14px;
        width:100%;
        min-height:56px;
        padding:0 18px;
        border-radius:16px;
        color:#f1f1f1;
        background:transparent;
        border:1px solid transparent;
        font-size:16px;
        font-weight:600;
        transition:.2s ease;
        cursor:pointer;
        text-align:left;
    }

    .desktop-nav-item img{
        width:28px;
        height:28px;
        object-fit:contain;
        flex-shrink:0;
    }

    .desktop-nav-item.active-nav{
        background:linear-gradient(180deg, rgba(255,255,255,.06) 0%, rgba(255,255,255,.03) 100%);
        border-color:rgba(255,255,255,.06);
        box-shadow:var(--shadow);
    }

    .desktop-nav-item-accent{
        background:linear-gradient(90deg, #b85bda 0%, #cb6ce6 100%);
        border-color:transparent;
        color:#fff;
        box-shadow:0 12px 26px rgba(203,108,230,.28);
        margin-top:8px;
    }

    .desktop-nav-item-accent:hover{
        transform:translateY(-1px);
    }

    .desktop-nav-item-accent img{
        filter:brightness(0) invert(1);
    }

    .desktop-main{
        padding:20px 22px 28px;
        height:100%;
        overflow:auto;
    }

    .desktop-hero{
        position:relative;
        overflow:hidden;
        border-radius:var(--radius-xl);
        padding:22px 22px 20px;
        margin-bottom:18px;
    }

    .desktop-kicker{
        display:inline-flex;
        align-items:center;
        gap:8px;
        background:rgba(255,255,255,.06);
        border:1px solid rgba(255,255,255,.06);
        border-radius:999px;
        padding:10px 14px;
        font-size:13px;
        color:#ebe4f5;
        margin-bottom:16px;
    }

    .desktop-hero-top{
        display:grid;
        grid-template-columns:minmax(0,1fr) 220px;
        gap:20px;
        align-items:start;
    }

    .desktop-hero-text{
        min-width:0;
    }

    .desktop-hero-title{
        margin:0 0 14px;
        font-size:var(--hero-title);
        line-height:.94;
        font-weight:800;
        letter-spacing:-1px;
        max-width:660px;
    }

    .desktop-hero-title .accent-text{
        color:#b85bda;
    }

    .desktop-points{
        display:flex;
        flex-direction:column;
        gap:10px;
        margin-bottom:18px;
        max-width:640px;
    }

    .desktop-point{
        display:flex;
        align-items:flex-start;
        gap:10px;
        color:var(--muted);
        font-size:var(--hero-text);
        line-height:1.45;
    }

    .desktop-point-icon{
        width:22px;
        height:22px;
        border:2px solid var(--accent);
        border-radius:50%;
        display:flex;
        align-items:center;
        justify-content:center;
        flex-shrink:0;
        margin-top:1px;
    }

    .desktop-point-icon::after{
    content:"";
    width:8px;
    height:4px;
    border-left:2px solid var(--accent);
    border-bottom:2px solid var(--accent);
    transform:rotate(-45deg);
    margin-top:-1px;
    }

    .desktop-hero-art-wrap{
        display:flex;
        justify-content:flex-end;
        align-items:flex-start;
    }

    .desktop-hero-art{
        width:220px;
        height:220px;
        object-fit:contain;
        object-position:center;
        border-radius:26px;
        background:#1a1a1a;
        padding:18px;
        flex-shrink:0;
    }

    .desktop-hero-bottom{
        margin-top:4px;
        display:grid;
        grid-template-columns:repeat(4, minmax(0,1fr));
        gap:12px;
    }

    .desktop-mini-stat{
        background:rgba(255,255,255,.04);
        border-radius:18px;
        padding:14px;
        min-height:82px;
    }

    .desktop-mini-stat-title{
        font-size:13px;
        color:#9f98aa;
        margin-bottom:8px;
    }

    .desktop-mini-stat-value{
        font-size:15px;
        font-weight:700;
        line-height:1.35;
    }

    .desktop-hero-actions{
    margin-top:20px;
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    justify-content:center;
    }

    .desktop-hero-btn{
    min-width:280px;
    height:60px;
    padding:0 34px;
    font-size:17px;
    border-radius:18px;
    }

    .desktop-section{
        margin-top:4px;
    }

    .desktop-section-title{
        margin:0 0 14px;
        font-size:var(--section-title);
        font-weight:800;
        line-height:1.08;
        letter-spacing:-.2px;
    }

    .desktop-courses{
        display:grid;
        grid-template-columns:repeat(3, minmax(0,1fr));
        gap:16px;
    }

    .desktop-course-card{
        border-radius:24px;
        padding:18px;
        display:flex;
        flex-direction:column;
        justify-content:space-between;
        gap:16px;
        cursor:pointer;
        transition:.2s ease;
        min-height:270px;
    }

    .desktop-course-card:hover{
        transform:translateY(-2px);
        border-color:rgba(203,108,230,.35);
    }

    .desktop-course-top{
        display:flex;
        align-items:flex-start;
        gap:14px;
    }

    .desktop-course-cover{
        width:88px;
        height:88px;
        object-fit:cover;
        border-radius:18px;
        background:#1a1a1a;
        flex-shrink:0;
    }

    .desktop-course-title{
        margin:0 0 8px;
        font-size:clamp(22px,1.7vw,24px);
        line-height:1.08;
        font-weight:800;
    }

    .desktop-course-desc{
        margin:0;
        font-size:15px;
        line-height:1.6;
        color:var(--muted);
    }

    .desktop-course-arrow{
        width:52px;
        height:52px;
        border-radius:50%;
        background:rgba(255,255,255,.07);
        display:flex;
        align-items:center;
        justify-content:center;
        flex-shrink:0;
        margin-left:auto;
        align-self:center;
    }

    .desktop-course-arrow::before{
        content:"›";
        font-size:34px;
        line-height:1;
        color:#fff;
        transform:translateX(1px);
    }
}

@media (max-width:1439px){
    :root{
        --hero-title: clamp(30px, 3.8vw, 52px);
    }

    .desktop-layout{
        grid-template-columns:250px minmax(0,1fr);
    }

    .desktop-hero-top{
        grid-template-columns:minmax(0,1fr) 190px;
    }

    .desktop-hero-art{
        width:190px;
        height:190px;
    }

    .desktop-hero-bottom{
        grid-template-columns:repeat(2, minmax(0,1fr));
    }

    .desktop-courses{
        grid-template-columns:repeat(2, minmax(0,1fr));
    }
}

@media (max-width:1180px){
    .desktop-layout{
        grid-template-columns:230px minmax(0,1fr);
    }

    .desktop-main{
        padding:18px 18px 24px;
    }

    .desktop-hero-top{
        grid-template-columns:1fr;
    }

    .desktop-hero-art-wrap{
        justify-content:flex-start;
    }

    .desktop-courses{
        grid-template-columns:1fr;
    }
}

@media (max-width:1023px){
    .desktop-only{
        display:none;
    }

    .mobile-shell{
        display:block;
    }

    body{
        overflow:visible;
    }
}

@media (max-width:420px){
    .mobile-header{
        padding:calc(env(safe-area-inset-top) + 76px) 14px 0;
        gap:10px;
    }

    .mobile-main{
        padding:12px 14px 0;
    }

    .mobile-hero,
    .mobile-course-card{
        border-radius:20px;
    }
}

@media (max-width:360px){
    .mobile-header{
        flex-direction:column;
        align-items:flex-start;
    }

    .mobile-header .lang{
        align-self:flex-end;
    }
}
</style>
</head>

<body>

<!-- =========================
     MOBILE VERSION
========================= -->
<div class="mobile-shell">
    <div class="mobile-page">

        <div class="mobile-header">
            <div class="mobile-logo">gaphub</div>

            <div class="lang">
                <span onclick="setLang('uz')" id="uz-mobile">UZ</span>
                <span onclick="setLang('ru')" id="ru-mobile">RU</span>
            </div>
        </div>

        <div class="mobile-main">
            <section class="mobile-hero glow-card">
                <div class="mobile-kicker" id="kicker-mobile"></div>

                <h1 class="mobile-hero-title" id="heroTitle-mobile"></h1>

                <div class="mobile-points">
                    <div class="mobile-point">
                        <span class="mobile-point-icon"></span>
                        <span id="point1-mobile"></span>
                    </div>
                    <div class="mobile-point">
                        <span class="mobile-point-icon"></span>
                        <span id="point2-mobile"></span>
                    </div>
                    <div class="mobile-point">
                        <span class="mobile-point-icon"></span>
                        <span id="point3-mobile"></span>
                    </div>
                    <div class="mobile-point">
                        <span class="mobile-point-icon"></span>
                        <span id="point4-mobile"></span>
                    </div>
                </div>

                <div class="mobile-hero-actions">
                    <button class="btn btn-primary mobile-hero-btn" onclick="goCourses()" id="heroBuy-mobile"></button>
                    <button class="btn btn-secondary mobile-hero-btn" onclick="goAbout()" id="heroAbout-mobile"></button>
                </div>
            </section>

            <section class="mobile-section">
                <h2 class="mobile-section-title" id="popularTitle-mobile"></h2>

                <div class="mobile-courses">
                    <article class="mobile-course-card soft-card" onclick="openCourse('smm')">
                        <div class="mobile-course-inner">
                            <img class="mobile-course-cover" src="images/smm-card-mobile.png" alt="SMM">

                            <div class="mobile-course-info">
                                <h3 class="mobile-course-title">SMM</h3>
                                <p class="mobile-course-desc" id="smmDesc-mobile"></p>
                            </div>

                            <div class="mobile-course-arrow"></div>
                        </div>
                    </article>

                    <article class="mobile-course-card soft-card" onclick="openCourse('target')">
                        <div class="mobile-course-inner">
                            <img class="mobile-course-cover" src="images/target-card-mobile.png" alt="TARGET">

                            <div class="mobile-course-info">
                                <h3 class="mobile-course-title">TARGET</h3>
                                <p class="mobile-course-desc" id="targetDesc-mobile"></p>
                            </div>

                            <div class="mobile-course-arrow"></div>
                        </div>
                    </article>

                    <article class="mobile-course-card soft-card" onclick="openCourse('ai')">
                        <div class="mobile-course-inner">
                            <img class="mobile-course-cover" src="images/ai-card-mobile.png" alt="AI">

                            <div class="mobile-course-info">
                                <h3 class="mobile-course-title" id="ai-mobile"></h3>
                                <p class="mobile-course-desc" id="aiDesc-mobile"></p>
                            </div>

                            <div class="mobile-course-arrow"></div>
                        </div>
                    </article>
                </div>
            </section>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="goPage('mycourses.html')">
            <img src="images/courses2.png" alt="">
            <span id="m1-mobile"></span>
        </div>

        <div class="nav-item" onclick="goPage('support.html')">
            <img src="images/support.png" alt="">
            <span id="m4-mobile"></span>
        </div>

        <div class="nav-center" onclick="goHome()">
            <div class="circle">
                <img src="images/home2.png" alt="home">
            </div>
        </div>

        <div class="nav-item" onclick="goPage('chat.html')">
            <img src="images/chat2.png" alt="">
            <span id="m5-mobile"></span>
        </div>

        <div class="nav-item" onclick="goPage('myprofile.html')">
            <img src="images/profile2.png" alt="">
            <span id="m6-mobile"></span>
        </div>
    </div>
</div>

<!-- =========================
     DESKTOP VERSION
========================= -->
<div class="desktop-app desktop-only">

    <div class="desktop-topbar">
        <div class="desktop-brand">gaphub</div>

        <div class="desktop-right">
            <div class="lang">
                <span onclick="setLang('uz')" id="uz-desktop">UZ</span>
                <span onclick="setLang('ru')" id="ru-desktop">RU</span>
            </div>
        </div>

function setText(id, value){
    const el = document.getElementById(id)
    if(el) el.innerText = value
}

function setHTML(id, value){
    const el = document.getElementById(id)
    if(el) el.innerHTML = value
}

function setActiveLang(idUz, idRu){
    const uz = document.getElementById(idUz)
    const ru = document.getElementById(idRu)

    if(uz) uz.classList.toggle("active", lang === "uz")
    if(ru) ru.classList.toggle("active", lang === "ru")
}

function setLang(l){
    lang = l
    localStorage.setItem("lang", l)
    update()
}

function update(){
    const d = t[lang]

    setText("m1-mobile", d.m1)
    setText("m4-mobile", d.m4)
    setText("m5-mobile", d.m5)
    setText("m6-mobile", d.m6)

    setText("kicker-mobile", d.kicker)
    setHTML("heroTitle-mobile", d.heroTitle)

    setText("stat1Value-desktop", d.stat1Value)
    setText("stat2Title-desktop", d.stat2Title)
    setText("stat2Value-desktop", d.stat2Value)
    setText("stat3Title-desktop", d.stat3Title)
    setText("stat3Value-desktop", d.stat3Value)

    setText("smmDesc-desktop", d.smmDesc)
    setText("targetDesc-desktop", d.targetDesc)
    setText("ai-desktop", d.ai)
    setText("aiDesc-desktop", d.aiDesc)

    setActiveLang("uz-mobile", "ru-mobile")
    setActiveLang("uz-desktop", "ru-desktop")
}

function openCourse(name){
    localStorage.setItem("lang", lang)

    if(name === "smm"){
        window.location.href = "smm.html"
        return
    }

    if(name === "target"){
        window.location.href = "target.html"
        return
    }

    if(name === "ai"){
        window.location.href = "ai.html"
        return
    }
}

function goHome(){
    localStorage.setItem("lang", lang)
    window.location.href = "index.html"
}

function goCourses(){
    localStorage.setItem("lang", lang)
    window.location.href = "courses.html"
}

function goAbout(){
    localStorage.setItem("lang", lang)
    window.location.href = "about.html"
}

function goPage(page){
    localStorage.setItem("lang", lang)
    window.location.href = page
}

function initTelegram(){
    if(window.Telegram && Telegram.WebApp){
        const tg = Telegram.WebApp
        tg.ready()
        tg.expand()

        try{
            tg.requestFullscreen()
        }catch(e){}

        document.body.style.minHeight = tg.viewportHeight + "px"
    }
}

update()
