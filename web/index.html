<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>gaphub</title>

<style>
/* =========================
   BASE
========================= */
:root{
    --accent:#cb6ce6;
    --bg:#0c0b14;
    --bg-soft:#14121f;
    --card:#000000;
    --text:#ffffff;
    --muted:#d9d9d9;
    --line:rgba(255,255,255,0.08);
    --shadow:0 10px 35px rgba(0,0,0,.35);
    --radius:18px;
    --desktop-sidebar:320px;
    --desktop-topbar:92px;
}

*{
    box-sizing:border-box;
}

html, body{
    margin:0;
    padding:0;
    min-height:100%;
    font-family:Arial, sans-serif;
    background:#fff;
    color:#000;
}

body{
    position:relative;
}

img{
    display:block;
    max-width:100%;
}

button{
    font-family:inherit;
    cursor:pointer;
}

.desktop-only{
    display:none;
}

.mobile-only{
    display:block;
}

.btn{
    background:var(--accent);
    border:none;
    color:#fff;
    border-radius:12px;
    transition:.2s ease;
}

.btn:active{
    transform:scale(.99);
}

.lang{
    display:flex;
    align-items:center;
    background:#1a1a1a;
    border-radius:999px;
    padding:3px;
    gap:3px;
}

.lang span{
    min-width:48px;
    padding:8px 12px;
    font-size:14px;
    color:#fff;
    cursor:pointer;
    border-radius:999px;
    text-align:center;
    user-select:none;
}

.lang .active{
    background:var(--accent);
}

/* =========================
   MOBILE STYLES
========================= */
.mobile-shell{
    display:block;
}

.header{
    height:160px;
    padding-top:env(safe-area-inset-top);
    background:#000;
    color:#fff;
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    padding-left:16px;
    padding-right:16px;
    padding-bottom:10px;
}

.logo{
    font-size:50px;
    font-weight:800;
    line-height:1;
}

.main{
    padding:16px;
    padding-bottom:110px;
    background:#fff;
}

.about{
    background:#000;
    color:#fff;
    border-radius:14px;
    padding:16px;
    margin-bottom:14px;
}

.about-top{
    display:flex;
    gap:12px;
    align-items:center;
    margin-bottom:10px;
}

.about-img-wrap{
    width:120px;
    height:120px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
}

.about-img-wrap img{
    max-width:100%;
    max-height:100%;
}

.about-text h3{
    margin:0 0 6px;
    font-size:20px;
    line-height:1.15;
}

.about-text p{
    margin:0;
    font-size:14px;
    line-height:1.4;
    white-space:pre-line;
}

.about .btn{
    width:100%;
    padding:12px;
    font-size:15px;
}

.course{
    background:#000;
    color:#fff;
    border-radius:14px;
    padding:14px;
    margin-bottom:12px;
    display:flex;
    align-items:center;
    gap:14px;
    cursor:pointer;
}

.course-img{
    width:70px;
    height:70px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
}

.course h3{
    margin:0;
    font-size:22px;
    line-height:1.1;
}

.bottom-nav{
    position:fixed;
    left:0;
    bottom:0;
    width:100%;
    background:#000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 10px;
    padding-bottom:calc(8px + env(safe-area-inset-bottom));
    z-index:50;
}

.nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:12px;
    color:#fff;
    width:20%;
    text-align:center;
    cursor:pointer;
}

.nav-item img{
    width:27px;
    margin-bottom:2px;
}

.nav-item span{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.nav-center{
    position:relative;
    top:-18px;
    width:20%;
    display:flex;
    justify-content:center;
}

.circle{
    width:60px;
    height:60px;
    background:#ffffff;
    border-radius:50%;
    border:4px solid var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
}

.circle img{
    width:24px;
    height:24px;
    object-fit:contain;
}

/* =========================
   DESKTOP STYLES
========================= */
@media (min-width: 1024px){

    html, body{
        min-height:100vh;
        background:
            radial-gradient(circle at 15% 20%, rgba(203,108,230,.10), transparent 28%),
            radial-gradient(circle at 85% 25%, rgba(203,108,230,.10), transparent 26%),
            radial-gradient(circle at 70% 70%, rgba(203,108,230,.07), transparent 24%),
            linear-gradient(180deg, #0b0a13 0%, #0c0b14 100%);
        color:var(--text);
    }

    body{
        overflow-x:hidden;
    }

    .mobile-only{
        display:none !important;
    }

    .desktop-only{
        display:block;
    }

    .mobile-shell{
        display:none;
    }

    .desktop-app{
        min-height:100vh;
        position:relative;
        color:var(--text);
    }

    .desktop-topbar{
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:78px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 120px 14px 34px;
    background:linear-gradient(180deg, rgba(16,14,25,.94) 0%, rgba(16,14,25,.78) 100%);
    border-bottom:1px solid rgba(255,255,255,.04);
    z-index:30;
    backdrop-filter:blur(12px);
    }

    .desktop-brand{
        display:flex;
        align-items:center;
        font-size:34px;
        font-weight:800;
        line-height:1;
        letter-spacing:-0.5px;
    }

    .desktop-brand img{
        height:42px;
        width:auto;
        object-fit:contain;
    }

    .desktop-right{
        display:flex;
        align-items:center;
        gap:14px;
    }

    .desktop-layout{
    display:grid;
    grid-template-columns:280px 1fr;
    height:100vh;
    padding-top:78px;
    overflow:hidden;
    }

    .desktop-sidebar{
    padding:22px 22px;
    border-right:1px solid rgba(255,255,255,.05);
    background:linear-gradient(180deg, rgba(14,13,23,.70) 0%, rgba(12,11,20,.40) 100%);
    }

    .desktop-nav{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:4px;
    }

    .desktop-nav-item{
    display:flex;
    align-items:center;
    gap:14px;
    width:100%;
    min-height:56px;
    padding:0 18px;
    border-radius:16px;
    color:#f1f1f1;
    background:transparent;
    border:1px solid transparent;
    font-size:16px;
    font-weight:600;
    transition:.2s ease;
    cursor:pointer;
    text-align:left;
    }

    .desktop-nav-item img{
        width:28px;
        height:28px;
        object-fit:contain;
        flex-shrink:0;
    }

    .desktop-nav-item.active-nav{
        background:linear-gradient(180deg, rgba(255,255,255,.06) 0%, rgba(255,255,255,.03) 100%);
        border-color:rgba(255,255,255,.06);
        box-shadow:var(--shadow);
    }

    .desktop-main{
    padding:24px 28px 24px 28px;
    overflow:hidden;
    }

    .hero-card{
    position:relative;
    border:2px solid rgba(203,108,230,.85);
    border-radius:24px;
    padding:10px;
    background:rgba(255,255,255,.02);
    box-shadow:0 0 0 1px rgba(255,255,255,.02), 0 20px 60px rgba(0,0,0,.35);
    margin-bottom:22px;
    }

    .hero-inner{
    background:
        radial-gradient(circle at 82% 45%, rgba(203,108,230,.10), transparent 28%),
        linear-gradient(180deg, rgba(0,0,0,.95) 0%, rgba(0,0,0,.92) 100%);
    border-radius:20px;
    padding:22px 28px 22px 28px;
    min-height:220px;
    display:grid;
    grid-template-columns:180px 1fr;
    align-items:center;
    gap:18px;
    }

    .hero-image{
        display:flex;
        align-items:center;
        justify-content:center;
    }

    .hero-image img{
        width:180px;
        max-width:100%;
    }

    .hero-content{
        max-width:700px;
    }

    .hero-content h2{
    margin:0 0 8px;
    font-size:34px;
    line-height:1.05;
    letter-spacing:-0.5px;
    font-weight:800;
    }

    .hero-content p{
    margin:0;
    font-size:16px;
    line-height:1.45;
    color:#f0f0f0;
    white-space:pre-line;
    }

    .hero-btn{
        margin-top:26px;
        width:100%;
        max-width:620px;
        height:64px;
        font-size:22px;
        border-radius:16px;
        background:linear-gradient(90deg, #b85bda 0%, #cb6ce6 100%);
        box-shadow:0 14px 30px rgba(203,108,230,.20);
    }

    .desktop-section-title{
    margin:0 0 14px;
    font-size:24px;
    font-weight:800;
    line-height:1.1;
    letter-spacing:-0.2px;
    }

    .desktop-courses{
        display:grid;
        grid-template-columns:repeat(3, minmax(0, 1fr));
        gap:22px;
    }

    .desktop-course-card{
        min-height:360px;
        background:linear-gradient(180deg, rgba(0,0,0,.96) 0%, rgba(0,0,0,.92) 100%);
        border:1px solid rgba(255,255,255,.08);
        border-radius:22px;
        padding:26px 22px 20px;
        box-shadow:var(--shadow);
        display:flex;
        flex-direction:column;
        justify-content:space-between;
        gap:18px;
        cursor:pointer;
        transition:.2s ease;
    }

    .desktop-course-card:hover{
        transform:translateY(-2px);
        border-color:rgba(203,108,230,.35);
    }

    .desktop-course-top{
        display:flex;
        align-items:flex-start;
        gap:18px;
    }

    .desktop-course-icon{
        width:90px;
        height:90px;
        display:flex;
        align-items:center;
        justify-content:center;
        flex-shrink:0;
    }

    .desktop-course-icon img{
        max-width:100%;
        max-height:100%;
        object-fit:contain;
    }

    .desktop-course-top h3{
        margin:0;
        font-size:28px;
        line-height:1.15;
        font-weight:800;
    }

    .desktop-course-desc{
        margin:0;
        font-size:16px;
        line-height:1.65;
        color:var(--muted);
        min-height:88px;
    }

    .desktop-course-btn{
        width:100%;
        height:56px;
        font-size:18px;
        border-radius:14px;
        background:linear-gradient(90deg, #b85bda 0%, #cb6ce6 100%);
    }
}

@media (min-width: 1024px) and (max-width: 1320px){
    .desktop-courses{
        grid-template-columns:1fr;
    }

    .hero-inner{
        grid-template-columns:170px 1fr;
    }

    .hero-content h2{
        font-size:42px;
    }
}

@media (min-width: 1024px) and (max-width: 1160px){
    .desktop-layout{
        grid-template-columns:260px 1fr;
    }

    .desktop-main{
        padding:28px 24px 34px 24px;
    }

    .desktop-topbar{
        padding-left:24px;
        padding-right:24px;
    }
}
</style>
</head>

<body>

<!-- =========================
     MOBILE VERSION
========================= -->
<div class="mobile-shell">

    <div class="header">
        <div class="logo">gaphub</div>

        <div class="lang">
            <span onclick="setLang('uz')" id="uz-mobile">UZ</span>
            <span onclick="setLang('ru')" id="ru-mobile">RU</span>
        </div>
    </div>

    <div class="main">

        <div class="about">
            <div class="about-top">
                <div class="about-img-wrap">
                    <img src="images/about.png" alt="about">
                </div>

                <div class="about-text">
                    <h3 id="title-mobile"></h3>
                    <p id="text-mobile"></p>
                </div>
            </div>

            <button class="btn" id="btn-mobile" onclick="goAbout()"></button>
        </div>

        <div class="course" onclick="openCourse('smm')">
            <div class="course-img">
                <img src="images/smm2.png" alt="SMM">
            </div>
            <h3>SMM</h3>
        </div>

        <div class="course" onclick="openCourse('target')">
            <div class="course-img">
                <img src="images/target2.png" alt="TARGET">
            </div>
            <h3>TARGET</h3>
        </div>

        <div class="course" onclick="openCourse('ai')">
            <div class="course-img">
                <img src="images/ai2.png" alt="AI">
            </div>
            <h3 id="ai-mobile"></h3>
        </div>

    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="goPage('mycourses.html')">
            <img src="images/courses2.png" alt="">
            <span id="m1-mobile"></span>
        </div>

        <div class="nav-item" onclick="goPage('support.html')">
            <img src="images/support.png" alt="">
            <span id="m4-mobile"></span>
        </div>

        <div class="nav-center" onclick="goHome()">
            <div class="circle">
                <img src="images/home2.png" alt="home">
            </div>
        </div>

        <div class="nav-item" onclick="goPage('chat.html')">
            <img src="images/chat2.png" alt="">
            <span id="m5-mobile"></span>
        </div>

        <div class="nav-item" onclick="goPage('myprofile.html')">
            <img src="images/profile2.png" alt="">
            <span id="m6-mobile"></span>
        </div>
    </div>
</div>

<!-- =========================
     DESKTOP VERSION
========================= -->
<div class="desktop-app desktop-only">

    <div class="desktop-topbar">
        <div class="desktop-brand">
            gaphub
        </div>

        <div class="desktop-right">
            <div class="lang">
                <span onclick="setLang('uz')" id="uz-desktop">UZ</span>
                <span onclick="setLang('ru')" id="ru-desktop">RU</span>
            </div>
        </div>
    </div>

    <div class="desktop-layout">
        <aside class="desktop-sidebar">
            <nav class="desktop-nav">
                 <button class="desktop-nav-item active-nav" onclick="goHome()">
                    <img src="images/home.png" alt="">
                    <span id="home-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('mycourses.html')">
                    <img src="images/courses2.png" alt="">
                    <span id="m1-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('support.html')">
                    <img src="images/support.png" alt="">
                    <span id="m4-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('chat.html')">
                    <img src="images/chat2.png" alt="">
                    <span id="m5-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('myprofile.html')">
                    <img src="images/profile2.png" alt="">
                    <span id="m6-desktop"></span>
                </button>
            </nav>
        </aside>

        <main class="desktop-main">
            <section class="hero-card">
                <div class="hero-inner">
                    <div class="hero-image">
                        <img src="images/about.png" alt="about">
                    </div>

                    <div class="hero-content">
                        <h2 id="title-desktop"></h2>
                        <p id="text-desktop"></p>
                        <button class="btn hero-btn" id="btn-desktop" onclick="goAbout()"></button>
                    </div>
                </div>
            </section>

            <section>
                <h2 class="desktop-section-title" id="popularTitle"></h2>

                <div class="desktop-courses">

                    <article class="desktop-course-card" onclick="openCourse('smm')">
                        <div>
                            <div class="desktop-course-top">
                                <div class="desktop-course-icon">
                                    <img src="images/smm2.png" alt="SMM">
                                </div>
                                <h3>SMM</h3>
                            </div>

                            <p class="desktop-course-desc" id="smmDesc"></p>
                        </div>

                        <button class="btn desktop-course-btn" id="courseBtn1"></button>
                    </article>

                    <article class="desktop-course-card" onclick="openCourse('target')">
                        <div>
                            <div class="desktop-course-top">
                                <div class="desktop-course-icon">
                                    <img src="images/target2.png" alt="TARGET">
                                </div>
                                <h3>TARGET</h3>
                            </div>

                            <p class="desktop-course-desc" id="targetDesc"></p>
                        </div>

                        <button class="btn desktop-course-btn" id="courseBtn2"></button>
                    </article>

                    <article class="desktop-course-card" onclick="openCourse('ai')">
                        <div>
                            <div class="desktop-course-top">
                                <div class="desktop-course-icon">
                                    <img src="images/ai2.png" alt="AI">
                                </div>
                                <h3 id="ai-desktop"></h3>
                            </div>

                            <p class="desktop-course-desc" id="aiDesc"></p>
                        </div>

                        <button class="btn desktop-course-btn" id="courseBtn3"></button>
                    </article>

                </div>
            </section>
        </main>
    </div>
</div>

<script>
let lang = localStorage.getItem("lang") || "uz"

const t = {
    uz:{
        home:"Bosh sahifa",
        m1:"Kurslarim",
        m4:"Aloqa",
        m5:"Sharhlar",
        m6:"Profil",

        title:"gaphub nima bu?",
        text:"Kasbni noldan o‘rganing\nKuchli portfolio yig‘ing\nBirinchi buyurtmalarni oling\nBarqaror daromadga chiqing",
        btn:"Batafsil",
        ai:"Sun'iy intellekt",

        popular:"Mashhur kurslar",
        smmDesc:"Ijtimoiy tarmoqlarni o‘rganing va amaliy ko‘nikmalar orqali daromad qilishni boshlang",
        targetDesc:"Target reklama, auditoriya tahlili va natijali kampaniyalarni o‘rganing",
        aiDesc:"Sun'iy intellektdan ish, o‘qish va kundalik vazifalarda samarali foydalanishni o‘rganing",
    },

    ru:{
        home:"Главное меню",
        m1:"Мои курсы",
        m4:"Поддержка",
        m5:"Отзывы",
        m6:"Профиль",

        title:"Что такое gaphub?",
        text:"Освой профессию с нуля\nСобери сильное портфолио\nПолучи первые заказы\nВыйди на стабильный доход",
        btn:"Подробнее",
        ai:"Искусственный интеллект",

        popular:"Популярные курсы",
        smmDesc:"Освой социальные медиа и начни зарабатывать на востребованных навыках",
        targetDesc:"Обучение таргетированной рекламе, аналитике и запуску рабочих рекламных кампаний",
        aiDesc:"Научись применять искусственный интеллект в работе, учебе и повседневных задачах",
    }
}

function setText(id, value){
    const el = document.getElementById(id)
    if(el) el.innerText = value
}

function setActiveLang(idUz, idRu){
    const uz = document.getElementById(idUz)
    const ru = document.getElementById(idRu)

    if(uz) uz.classList.toggle("active", lang === "uz")
    if(ru) ru.classList.toggle("active", lang === "ru")
}

function setLang(l){
    lang = l
    localStorage.setItem("lang", l)
    update()
}

function update(){
    const d = t[lang]

    // mobile
    setText("home-desktop", d.home)
    setText("m1-mobile", d.m1)
    setText("m4-mobile", d.m4)
    setText("m5-mobile", d.m5)
    setText("m6-mobile", d.m6)
    setText("title-mobile", d.title)
    setText("text-mobile", d.text)
    setText("btn-mobile", d.btn)
    setText("ai-mobile", d.ai)

    // desktop
    setText("m1-desktop", d.m1)
    setText("m4-desktop", d.m4)
    setText("m5-desktop", d.m5)
    setText("m6-desktop", d.m6)
    setText("title-desktop", d.title)
    setText("text-desktop", d.text)
    setText("btn-desktop", d.btn)
    setText("ai-desktop", d.ai)
    setText("popularTitle", d.popular)
    setText("smmDesc", d.smmDesc)
    setText("targetDesc", d.targetDesc)
    setText("aiDesc", d.aiDesc)
    setText("courseBtn1", d.btn)
    setText("courseBtn2", d.btn)
    setText("courseBtn3", d.btn)

    setActiveLang("uz-mobile", "ru-mobile")
    setActiveLang("uz-desktop", "ru-desktop")
}

function openCourse(name){
    alert(name)
}

function goHome(){
    localStorage.setItem("lang", lang)
    window.location.href = "index.html"
}

function goAbout(){
    localStorage.setItem("lang", lang)
    window.location.href = "about.html"
}

function goPage(page){
    localStorage.setItem("lang", lang)
    window.location.href = page
}

function initTelegram(){
    if(window.Telegram && Telegram.WebApp){
        const tg = Telegram.WebApp

        tg.ready()
        tg.expand()

        try{
            tg.requestFullscreen()
        }catch(e){}

        document.body.style.minHeight = tg.viewportHeight + "px"
    }
}

update()
initTelegram()
</script>
</body>
</html>
