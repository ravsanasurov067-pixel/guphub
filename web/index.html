<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>gaphub</title>

<style>
:root{
    --accent:#cb6ce6;
    --bg:#0c0b14;
    --bg-soft:#14121f;
    --card:#111117;
    --card-soft:#17171f;
    --text:#ffffff;
    --muted:#a8a8b3;
    --line:rgba(255,255,255,0.08);
    --shadow:0 10px 35px rgba(0,0,0,.35);
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html, body{
    margin:0;
    padding:0;
    min-height:100%;
    font-family:Arial, sans-serif;
    background:#000;
    color:#fff;
}

body{
    position:relative;
}

img{
    display:block;
    max-width:100%;
}

button{
    font-family:inherit;
    cursor:pointer;
}

.desktop-only{
    display:none;
}

.btn{
    border:none;
    color:#fff;
    background:linear-gradient(90deg,#cb6ce6,#a855f7);
    border-radius:16px;
    transition:.2s ease;
}

.btn:active{
    transform:scale(.99);
}

.lang{
    display:flex;
    align-items:center;
    background:#1a1a1a;
    border-radius:999px;
    padding:3px;
    gap:3px;
}

.lang span{
    min-width:48px;
    padding:8px 12px;
    font-size:14px;
    color:#fff;
    cursor:pointer;
    border-radius:999px;
    text-align:center;
    user-select:none;
}

.lang .active{
    background:var(--accent);
}

/* =========================
   MOBILE
========================= */
.mobile-shell{
    display:block;
}

.mobile-page{
    padding-bottom:110px;
    background:
        radial-gradient(circle at 20% 10%, rgba(203,108,230,.10), transparent 24%),
        linear-gradient(180deg, #09080f 0%, #0c0b14 100%);
    min-height:100vh;
}

.mobile-header{
    padding:calc(env(safe-area-inset-top) + 14px) 16px 0;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:14px;
}

.mobile-logo{
    font-size:42px;
    font-weight:800;
    line-height:.95;
    letter-spacing:-1px;
}

.mobile-main{
    padding:14px 16px 0;
}

.mobile-hero{
    position:relative;
    overflow:hidden;
    border-radius:28px;
    background:
        radial-gradient(circle at 84% 14%, rgba(203,108,230,.18), transparent 24%),
        radial-gradient(circle at 18% 85%, rgba(203,108,230,.08), transparent 22%),
        linear-gradient(180deg, #15141e 0%, #0f0e17 100%);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:var(--shadow);
    padding:20px 16px 18px;
}

.mobile-kicker{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.06);
    border-radius:999px;
    padding:8px 12px;
    font-size:12px;
    color:#ebe4f5;
    margin-bottom:14px;
}

.mobile-hero-row{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
}

.mobile-hero-text{
    flex:1;
}

.mobile-hero-title{
    margin:0 0 10px;
    font-size:34px;
    line-height:.96;
    font-weight:800;
    letter-spacing:-0.8px;
}

.mobile-hero-text p{
    margin:0;
    color:var(--muted);
    font-size:14px;
    line-height:1.5;
    white-space:pre-line;
}

.mobile-hero-art{
    width:96px;
    height:96px;
    object-fit:contain;
    border-radius:18px;
    background:#1a1a1a;
    padding:10px;
    flex-shrink:0;
}

.mobile-hero-bottom{
    margin-top:16px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.mobile-hero-cta-wrap{
    margin-top:14px;
}

.mobile-hero-cta{
    width:100%;
    height:52px;
    font-size:15px;
    border-radius:16px;
}

.mobile-mini-stat{
    background:rgba(255,255,255,.04);
    border-radius:16px;
    padding:12px;
}

.mobile-mini-stat-title{
    font-size:12px;
    color:#9f98aa;
    margin-bottom:6px;
}

.mobile-mini-stat-value{
    font-size:14px;
    font-weight:700;
    line-height:1.35;
}

.mobile-about-wrap{
    margin-top:14px;
}

.mobile-about{
    background:#121218;
    border:1px solid rgba(255,255,255,.05);
    border-radius:24px;
    padding:16px;
    box-shadow:var(--shadow);
}

.mobile-about-top{
    display:flex;
    gap:12px;
    align-items:center;
    margin-bottom:12px;
}

.mobile-about-img{
    width:84px;
    height:84px;
    object-fit:contain;
    border-radius:18px;
    background:#1a1a1a;
    padding:8px;
    flex-shrink:0;
}

.mobile-about-title{
    margin:0 0 6px;
    font-size:22px;
    line-height:1.05;
    font-weight:800;
}

.mobile-about-text{
    margin:0;
    font-size:14px;
    line-height:1.45;
    color:var(--muted);
}

.mobile-about .btn{
    width:100%;
    height:50px;
    font-size:15px;
    margin-top:14px;
}

.mobile-section{
    margin-top:14px;
}

.mobile-section-title{
    margin:0 0 12px;
    font-size:22px;
    line-height:1.1;
    font-weight:800;
}

.mobile-courses{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.mobile-course-card{
    position:relative;
    overflow:hidden;
    background:
        radial-gradient(circle at 88% 18%, rgba(203,108,230,.10), transparent 24%),
        linear-gradient(180deg, #111117 0%, #0d0d12 100%);
    border:1px solid rgba(255,255,255,.05);
    border-radius:22px;
    padding:16px;
    box-shadow:var(--shadow);
    cursor:pointer;
}

.mobile-course-top{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:12px;
}

.mobile-course-icon{
    width:64px;
    height:64px;
    object-fit:contain;
    border-radius:16px;
    background:#1a1a1a;
    padding:8px;
    flex-shrink:0;
}

.mobile-course-title{
    margin:0;
    font-size:24px;
    line-height:1.05;
    font-weight:800;
}

.mobile-course-desc{
    margin:0 0 14px;
    color:var(--muted);
    font-size:14px;
    line-height:1.5;
}

.mobile-course-btn{
    width:100%;
    height:48px;
    font-size:15px;
}

.mobile-proof{
    margin-top:14px;
    background:#121218;
    border:1px solid rgba(255,255,255,.05);
    border-radius:24px;
    padding:16px;
    box-shadow:var(--shadow);
}

.mobile-proof-title{
    margin:0 0 10px;
    font-size:20px;
    line-height:1.1;
    font-weight:800;
}

.mobile-proof-text{
    margin:0;
    font-size:14px;
    line-height:1.5;
    color:var(--muted);
}

/* BOTTOM NAV */
.bottom-nav{
    position:fixed;
    left:0;
    bottom:0;
    width:100%;
    background:#000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 10px;
    padding-bottom:calc(8px + env(safe-area-inset-bottom));
    z-index:50;
}

.nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:12px;
    color:#fff;
    width:20%;
    text-align:center;
    cursor:pointer;
}

.nav-item img{
    width:27px;
    margin-bottom:2px;
}

.nav-item span{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.nav-center{
    position:relative;
    top:-18px;
    width:20%;
    display:flex;
    justify-content:center;
}

.circle{
    width:60px;
    height:60px;
    background:#ffffff;
    border-radius:50%;
    border:4px solid var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
}

.circle img{
    width:24px;
    height:24px;
    object-fit:contain;
}

/* =========================
   DESKTOP
========================= */
@media (min-width:1024px){

    html, body{
        min-height:100vh;
        background:
            radial-gradient(circle at 15% 20%, rgba(203,108,230,.10), transparent 28%),
            radial-gradient(circle at 85% 25%, rgba(203,108,230,.10), transparent 26%),
            radial-gradient(circle at 70% 70%, rgba(203,108,230,.07), transparent 24%),
            linear-gradient(180deg, #0b0a13 0%, #0c0b14 100%);
        color:var(--text);
    }

    body{
        overflow:hidden;
    }

    .desktop-only{
        display:block;
    }

    .mobile-shell{
        display:none;
    }

    .desktop-app{
        min-height:100vh;
        position:relative;
        color:var(--text);
    }

    .desktop-topbar{
        position:fixed;
        top:0;
        left:0;
        right:0;
        height:78px;
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding:18px 120px 14px 34px;
        background:linear-gradient(180deg, rgba(16,14,25,.94) 0%, rgba(16,14,25,.78) 100%);
        border-bottom:1px solid rgba(255,255,255,.04);
        z-index:30;
        backdrop-filter:blur(12px);
    }

    .desktop-brand{
        display:flex;
        align-items:center;
        font-size:34px;
        font-weight:800;
        line-height:1;
        letter-spacing:-0.5px;
    }

    .desktop-right{
        display:flex;
        align-items:center;
        gap:14px;
    }

    .desktop-layout{
        display:grid;
        grid-template-columns:280px 1fr;
        height:100vh;
        padding-top:78px;
        overflow:hidden;
    }

    .desktop-sidebar{
        padding:22px 22px;
        border-right:1px solid rgba(255,255,255,.05);
        background:linear-gradient(180deg, rgba(14,13,23,.70) 0%, rgba(12,11,20,.40) 100%);
    }

    .desktop-nav{
        display:flex;
        flex-direction:column;
        gap:10px;
        margin-top:4px;
    }

    .desktop-nav-item{
        display:flex;
        align-items:center;
        gap:14px;
        width:100%;
        min-height:56px;
        padding:0 18px;
        border-radius:16px;
        color:#f1f1f1;
        background:transparent;
        border:1px solid transparent;
        font-size:16px;
        font-weight:600;
        transition:.2s ease;
        cursor:pointer;
        text-align:left;
    }

    .desktop-nav-item img{
        width:28px;
        height:28px;
        object-fit:contain;
        flex-shrink:0;
    }

    .desktop-nav-item-accent{
        background:linear-gradient(90deg, #b85bda 0%, #cb6ce6 100%);
        border-color:transparent;
        color:#fff;
        box-shadow:0 12px 26px rgba(203,108,230,.28);
        margin-top:8px;
    }

    .desktop-nav-item-accent:hover{
        transform:translateY(-1px);
    }

    .desktop-nav-item-accent img{
        filter:brightness(0) invert(1);
    }

    .desktop-nav-item.active-nav{
        background:linear-gradient(180deg, rgba(255,255,255,.06) 0%, rgba(255,255,255,.03) 100%);
        border-color:rgba(255,255,255,.06);
        box-shadow:var(--shadow);
    }

    .desktop-main{
        padding:24px 28px 28px;
        height:100%;
        overflow:auto;
    }

    .desktop-hero{
        position:relative;
        overflow:hidden;
        border-radius:32px;
        background:
            radial-gradient(circle at 84% 16%, rgba(203,108,230,.20), transparent 24%),
            radial-gradient(circle at 12% 85%, rgba(203,108,230,.08), transparent 22%),
            linear-gradient(180deg, #15141e 0%, #0f0e17 100%);
        border:1px solid rgba(255,255,255,.05);
        box-shadow:var(--shadow);
        padding:30px 28px 24px;
        margin-bottom:16px;
    }

    .desktop-kicker{
        display:inline-flex;
        align-items:center;
        gap:8px;
        background:rgba(255,255,255,.06);
        border:1px solid rgba(255,255,255,.06);
        border-radius:999px;
        padding:10px 14px;
        font-size:13px;
        color:#ebe4f5;
        margin-bottom:18px;
    }

    .desktop-hero-top{
        display:grid;
        grid-template-columns:1.05fr .95fr;
        gap:26px;
        align-items:center;
    }

    .desktop-hero-title{
        margin:0 0 12px;
        font-size:68px;
        line-height:.94;
        font-weight:800;
        letter-spacing:-1.2px;
        max-width:760px;
    }

    .desktop-hero-text p{
        margin:0;
        color:var(--muted);
        font-size:19px;
        line-height:1.6;
        white-space:pre-line;
        max-width:760px;
    }

    .desktop-hero-art-wrap{
        display:flex;
        justify-content:flex-end;
        align-items:center;
    }

    .desktop-hero-art{
        width:250px;
        height:250px;
        object-fit:contain;
        border-radius:26px;
        background:#1a1a1a;
        padding:18px;
    }

    .desktop-hero-bottom{
        margin-top:22px;
        display:grid;
        grid-template-columns:repeat(4, minmax(0,1fr));
        gap:12px;
    }

    .desktop-hero-cta-wrap{
    margin-top:22px;
    display:flex;
    justify-content:center;
}

.desktop-hero-cta{
    height:60px;
    padding:0 36px;
    font-size:18px;
    border-radius:18px;
    min-width:280px;
    max-width:420px;
    width:100%;
}

    .desktop-mini-stat{
        background:rgba(255,255,255,.04);
        border-radius:18px;
        padding:14px;
        min-height:86px;
    }

    .desktop-mini-stat-title{
        font-size:13px;
        color:#9f98aa;
        margin-bottom:8px;
    }

    .desktop-mini-stat-value{
        font-size:16px;
        font-weight:700;
        line-height:1.4;
    }

    .desktop-grid{
        display:grid;
        grid-template-columns:1.1fr .9fr;
        gap:16px;
        margin-bottom:16px;
    }

    .desktop-about{
        background:#121218;
        border:1px solid rgba(255,255,255,.05);
        border-radius:28px;
        padding:20px;
        box-shadow:var(--shadow);
    }

    .desktop-about-top{
        display:flex;
        gap:14px;
        align-items:flex-start;
        margin-bottom:14px;
    }

    .desktop-about-img{
        width:108px;
        height:108px;
        object-fit:contain;
        border-radius:22px;
        background:#1a1a1a;
        padding:10px;
        flex-shrink:0;
    }

    .desktop-about-title{
        margin:0 0 8px;
        font-size:30px;
        line-height:1.02;
        font-weight:800;
    }

    .desktop-about-text{
        margin:0;
        color:var(--muted);
        font-size:16px;
        line-height:1.55;
    }

    .desktop-about .btn{
        width:100%;
        height:54px;
        font-size:16px;
        margin-top:14px;
    }

    .desktop-proof{
        background:
            radial-gradient(circle at 88% 18%, rgba(203,108,230,.10), transparent 20%),
            linear-gradient(180deg, #121218 0%, #101017 100%);
        border:1px solid rgba(255,255,255,.05);
        border-radius:28px;
        padding:20px;
        box-shadow:var(--shadow);
    }

    .desktop-proof-title{
        margin:0 0 10px;
        font-size:24px;
        line-height:1.1;
        font-weight:800;
    }

    .desktop-proof-text{
        margin:0;
        color:var(--muted);
        font-size:15px;
        line-height:1.6;
    }

    .desktop-section-title{
        margin:0 0 14px;
        font-size:28px;
        font-weight:800;
        line-height:1.08;
        letter-spacing:-0.2px;
    }

    .desktop-courses{
        display:grid;
        grid-template-columns:repeat(3, minmax(0, 1fr));
        gap:16px;
    }

    .desktop-course-card{
        position:relative;
        overflow:hidden;
        background:
            radial-gradient(circle at 88% 18%, rgba(203,108,230,.10), transparent 24%),
            linear-gradient(180deg, #111117 0%, #0d0d12 100%);
        border:1px solid rgba(255,255,255,.05);
        border-radius:24px;
        padding:18px;
        box-shadow:var(--shadow);
        display:flex;
        flex-direction:column;
        justify-content:space-between;
        gap:16px;
        cursor:pointer;
        transition:.2s ease;
        min-height:300px;
    }

    .desktop-course-card:hover{
        transform:translateY(-2px);
        border-color:rgba(203,108,230,.35);
    }

    .desktop-course-top{
        display:flex;
        align-items:flex-start;
        gap:14px;
    }

    .desktop-course-icon{
        width:72px;
        height:72px;
        display:flex;
        align-items:center;
        justify-content:center;
        flex-shrink:0;
        border-radius:18px;
        background:#1a1a1a;
        padding:8px;
    }

    .desktop-course-icon img{
        max-width:100%;
        max-height:100%;
        object-fit:contain;
    }

    .desktop-course-top h3{
        margin:0;
        font-size:24px;
        line-height:1.08;
        font-weight:800;
    }

    .desktop-course-desc{
        margin:0;
        font-size:15px;
        line-height:1.6;
        color:var(--muted);
        min-height:96px;
    }

    .desktop-course-btn{
        width:100%;
        height:52px;
        font-size:16px;
        border-radius:14px;
    }
}

@media (min-width:1024px) and (max-width:1320px){
    .desktop-courses{
        grid-template-columns:1fr;
    }

    .desktop-grid{
        grid-template-columns:1fr;
    }

    .desktop-hero-top{
        grid-template-columns:1fr;
    }

    .desktop-hero-art-wrap{
        justify-content:flex-start;
    }
}

@media (min-width:1024px) and (max-width:1160px){
    .desktop-layout{
        grid-template-columns:260px 1fr;
    }

    .desktop-main{
        padding:22px 22px 24px;
    }

    .desktop-topbar{
        padding-left:24px;
        padding-right:120px;
    }

    .desktop-hero-title{
        font-size:54px;
    }

    .desktop-hero-bottom{
        grid-template-columns:repeat(2, minmax(0,1fr));
    }
}
</style>
</head>

<body>

<!-- =========================
     MOBILE VERSION
========================= -->
<div class="mobile-shell">
    <div class="mobile-page">

        <div class="mobile-header">
            <div class="mobile-logo">gaphub</div>

            <div class="lang">
                <span onclick="setLang('uz')" id="uz-mobile">UZ</span>
                <span onclick="setLang('ru')" id="ru-mobile">RU</span>
            </div>
        </div>

        <div class="mobile-main">
            <section class="mobile-hero">
                <div class="mobile-kicker" id="kicker-mobile"></div>

                <div class="mobile-hero-row">
                    <div class="mobile-hero-text">
                        <h1 class="mobile-hero-title" id="heroTitle-mobile"></h1>
                        <p id="heroText-mobile"></p>
                    </div>

                    <img class="mobile-hero-art" src="images/home-hero-mobile.png" alt="hero">
                </div>

                <div class="mobile-hero-bottom">
                    <div class="mobile-mini-stat">
                    <div class="mobile-mini-stat-title" id="stat1Title-mobile"></div>
                    <div class="mobile-mini-stat-value" id="stat1Value-mobile"></div>
                </div>

                <div class="mobile-mini-stat">
                    <div class="mobile-mini-stat-title" id="stat2Title-mobile"></div>
                    <div class="mobile-mini-stat-value" id="stat2Value-mobile"></div>
                </div>
            </div>

                <div class="mobile-hero-cta-wrap">
                    <button class="btn mobile-hero-cta" onclick="goCourses()" id="heroBtn-mobile"></button>
                </div>
            </section>

            <div class="mobile-about-wrap">
                <section class="mobile-about">
                    <div class="mobile-about-top">
                        <img class="mobile-about-img" src="images/about.png" alt="about">

                        <div>
                            <h2 class="mobile-about-title" id="aboutTitle-mobile"></h2>
                            <p class="mobile-about-text" id="aboutText-mobile"></p>
                        </div>
                    </div>

                    <button class="btn" id="aboutBtn-mobile" onclick="goAbout()"></button>
                </section>
            </div>

            <section class="mobile-section">
                <h2 class="mobile-section-title" id="popularTitle-mobile"></h2>

                <div class="mobile-courses">
                    <article class="mobile-course-card" onclick="openCourse('smm')">
                        <div>
                            <div class="mobile-course-top">
                                <img class="mobile-course-icon" src="images/smm2.png" alt="SMM">
                                <h3 class="mobile-course-title">SMM</h3>
                            </div>

                            <p class="mobile-course-desc" id="smmDesc-mobile"></p>
                        </div>

                        <button class="btn mobile-course-btn" id="courseBtn1-mobile"></button>
                    </article>

                    <article class="mobile-course-card" onclick="openCourse('target')">
                        <div>
                            <div class="mobile-course-top">
                                <img class="mobile-course-icon" src="images/target2.png" alt="TARGET">
                                <h3 class="mobile-course-title">TARGET</h3>
                            </div>

                            <p class="mobile-course-desc" id="targetDesc-mobile"></p>
                        </div>

                        <button class="btn mobile-course-btn" id="courseBtn2-mobile"></button>
                    </article>

                    <article class="mobile-course-card" onclick="openCourse('ai')">
                        <div>
                            <div class="mobile-course-top">
                                <img class="mobile-course-icon" src="images/ai2.png" alt="AI">
                                <h3 class="mobile-course-title" id="ai-mobile"></h3>
                            </div>

                            <p class="mobile-course-desc" id="aiDesc-mobile"></p>
                        </div>

                        <button class="btn mobile-course-btn" id="courseBtn3-mobile"></button>
                    </article>
                </div>

    const ru = document.getElementById(idRu)

    if(uz) uz.classList.toggle("active", lang === "uz")
    if(ru) ru.classList.toggle("active", lang === "ru")
}

    lang = l

function openCourse(name){
    localStorage.setItem("lang", lang)

    if(name === "smm"){
        window.location.href = "smm.html"
        return

    if(name === "target"){
        window.location.href = "target.html"
        return
    }

    if(name === "ai"){
        window.location.href = "ai.html"
        return
    }

    alert(name)

function initTelegram(){

        tg.ready()
        tg.expand()
