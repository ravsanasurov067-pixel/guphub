<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>gaphub</title>

<style>
:root{
    --accent:#cb6ce6;
    --accent-2:#a855f7;
    --bg:#0c0b14;
    --text:#ffffff;
    --muted:#a8a8b3;
    --line:rgba(255,255,255,.08);
    --shadow:0 10px 35px rgba(0,0,0,.35);

    --radius-xl:clamp(22px,2vw,30px);
    --radius-lg:20px;
    --radius-md:16px;

    --hero-title:clamp(32px,4vw,58px);
    --hero-text:clamp(14px,1.15vw,18px);
    --section-title:clamp(22px,2vw,30px);
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html, body{
    margin:0;
    padding:0;
    min-height:100%;
    font-family:Arial, sans-serif;
    background:#000;
    color:#fff;
}

body{
    position:relative;
}

img{
    display:block;
    max-width:100%;
}

button{
    font-family:inherit;
    cursor:pointer;
}

.desktop-only{
    display:none;
}

.btn{
    border:none;
    border-radius:16px;
    transition:.2s ease;
    font-weight:700;
}

.btn:active{
    transform:scale(.99);
}

.btn-primary{
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    color:#fff;
}

.btn-secondary{
    background:rgba(255,255,255,.04);
    color:#fff;
    border:1px solid rgba(255,255,255,.10);
}

.lang{
    display:flex;
    align-items:center;
    background:#1a1a1a;
    border-radius:999px;
    padding:3px;
    gap:3px;
    flex-shrink:0;
}

.lang span{
    min-width:48px;
    padding:8px 12px;
    font-size:14px;
    color:#fff;
    cursor:pointer;
    border-radius:999px;
    text-align:center;
    user-select:none;
}

.lang .active{
    background:var(--accent);
}

.glow-card{
    background:
        radial-gradient(circle at 84% 14%, rgba(203,108,230,.18), transparent 28%),
        radial-gradient(circle at 16% 88%, rgba(203,108,230,.06), transparent 24%),
        linear-gradient(180deg, #15141e 0%, #0f0e17 100%);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:var(--shadow);
}

.soft-card{
    background:
        radial-gradient(circle at 88% 18%, rgba(203,108,230,.10), transparent 24%),
        linear-gradient(180deg, #111117 0%, #0d0d12 100%);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:var(--shadow);
}

/* =========================
   MOBILE
========================= */
.mobile-shell{
    display:block;
}

.mobile-page{
    min-height:100vh;
    padding-bottom:112px;
    background:
        radial-gradient(circle at 20% 8%, rgba(203,108,230,.12), transparent 25%),
        linear-gradient(180deg, #09080f 0%, #0c0b14 100%);
}

.mobile-header{
    padding:calc(env(safe-area-inset-top) + 76px) 16px 0;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
}

.mobile-logo{
    font-size:clamp(34px,8vw,42px);
    font-weight:800;
    line-height:.95;
    letter-spacing:-1px;
}

.mobile-main{
    padding:22px 16px 0;
}

.mobile-intro{
    margin-bottom:18px;
    animation:fadeUp .42s ease both;
}

.mobile-intro-title{
    margin:0 0 8px;
    font-size:clamp(34px,9vw,42px);
    line-height:.94;
    font-weight:800;
    letter-spacing:-1px;
}

.mobile-intro-text{
    margin:0;
    max-width:320px;
    color:var(--muted);
    font-size:15px;
    line-height:1.45;
}

.mobile-section{
    margin-top:0;
}

.mobile-section-title{
    margin:0 0 14px;
    font-size:clamp(22px,5.4vw,24px);
    line-height:1.1;
    font-weight:800;
}

.mobile-courses{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.mobile-course-card{
    border-radius:24px;
    padding:14px;
    cursor:pointer;
    animation:fadeUp .45s ease both;
    transition:transform .18s ease, opacity .18s ease, border-color .18s ease;
}

.mobile-course-card:nth-child(1){
    animation-delay:.04s;
}

.mobile-course-card:nth-child(2){
    animation-delay:.10s;
}

.mobile-course-card:nth-child(3){
    animation-delay:.16s;
}

.mobile-course-card:active{
    transform:scale(.975);
    opacity:.9;
}

.mobile-course-inner{
    display:grid;
    grid-template-columns:86px minmax(0, 1fr) 44px;
    gap:13px;
    align-items:center;
}

.mobile-course-cover{
    width:86px;
    height:86px;
    border-radius:18px;
    background:#1a1a1a;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

.mobile-course-cover-img{
    width:68px;
    height:68px;
    object-fit:contain;
}

.mobile-course-info{
    min-width:0;
}

.mobile-course-title{
    margin:0 0 7px;
    font-size:clamp(21px,5.8vw,24px);
    line-height:1.02;
    font-weight:800;
    letter-spacing:-.3px;
}

.mobile-course-desc{
    margin:0;
    color:var(--muted);
    font-size:14px;
    line-height:1.36;
}

.mobile-course-arrow{
    width:44px;
    height:44px;
    border-radius:50%;
    background:rgba(255,255,255,.07);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    transition:transform .18s ease, background .18s ease;
}

.mobile-course-card:active .mobile-course-arrow{
    transform:translateX(2px);
    background:rgba(203,108,230,.18);
}

.mobile-course-arrow::before{
    content:"›";
    font-size:31px;
    line-height:1;
    color:#fff;
    transform:translateX(1px);
}

.mobile-about-card{
    margin-top:18px;
    border-radius:24px;
    padding:16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    cursor:pointer;
    animation:fadeUp .45s ease both;
    animation-delay:.22s;
    transition:transform .18s ease, opacity .18s ease, border-color .18s ease;
}

.mobile-about-card:active{
    transform:scale(.98);
    opacity:.92;
}

.mobile-about-card-left{
    min-width:0;
    flex:1;
}

.mobile-about-card-title{
    font-size:19px;
    line-height:1.1;
    font-weight:800;
    margin-bottom:7px;
}

.mobile-about-card-text{
    color:var(--muted);
    font-size:14px;
    line-height:1.4;
}

.mobile-about-card-img{
    width:86px;
    height:86px;
    object-fit:contain;
    flex-shrink:0;
    filter:drop-shadow(0 14px 30px rgba(203,108,230,.22));
}

.mobile-divider{
    margin:18px 0 0;
    height:1px;
    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(203,108,230,.55),
            transparent
        );

    animation:fadeUp .45s ease both;
    animation-delay:.18s;
}

/* bottom nav */
.bottom-nav{
    position:fixed;
    left:0;
    bottom:0;
    width:100%;
    background:#000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 10px;
    padding-bottom:calc(8px + env(safe-area-inset-bottom));
    z-index:50;
}

.nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:12px;
    color:#fff;
    width:20%;
    text-align:center;
    cursor:pointer;
}

.nav-item img{
    width:27px;
    margin-bottom:2px;
}

.nav-item span{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.nav-center{
    position:relative;
    top:-18px;
    width:20%;
    display:flex;
    justify-content:center;
}

.circle{
    width:60px;
    height:60px;
    background:#ffffff;
    border-radius:50%;
    border:4px solid var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 10px 30px rgba(203,108,230,.25);
}

.circle img{
    width:24px;
    height:24px;
    object-fit:contain;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(14px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* =========================
   DESKTOP
========================= */
@media (min-width:1024px){

    html, body{
        min-height:100vh;
        background:
            radial-gradient(circle at 15% 20%, rgba(203,108,230,.10), transparent 28%),
            radial-gradient(circle at 85% 25%, rgba(203,108,230,.10), transparent 26%),
            linear-gradient(180deg, #0b0a13 0%, #0c0b14 100%);
        color:var(--text);
    }

    body{
        overflow:hidden;
    }

    .mobile-shell{
        display:none;
    }

    .desktop-only{
        display:block;
    }

    .desktop-app{
        min-height:100vh;
        color:var(--text);
    }

    .desktop-topbar{
        position:fixed;
        top:0;
        left:0;
        right:0;
        height:72px;
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding:14px 28px;
        background:linear-gradient(180deg, rgba(16,14,25,.94) 0%, rgba(16,14,25,.78) 100%);
        border-bottom:1px solid rgba(255,255,255,.04);
        z-index:30;
    }

    .desktop-brand{
        font-size:30px;
        font-weight:800;
        line-height:1;
    }

    .desktop-layout{
        display:grid;
        grid-template-columns:250px minmax(0,1fr);
        height:100vh;
        padding-top:72px;
        overflow:hidden;
    }

    .desktop-sidebar{
        padding:18px 16px;
        border-right:1px solid rgba(255,255,255,.05);
        background:linear-gradient(180deg, rgba(14,13,23,.70) 0%, rgba(12,11,20,.40) 100%);
        overflow:auto;
    }

    .desktop-nav{
        display:flex;
        flex-direction:column;
        gap:8px;
    }

    .desktop-nav-item{
        display:flex;
        align-items:center;
        gap:12px;
        width:100%;
        min-height:52px;
        padding:0 16px;
        border-radius:16px;
        color:#f1f1f1;
        background:transparent;
        border:1px solid transparent;
        font-size:15px;
        font-weight:600;
        transition:.18s ease;
        cursor:pointer;
        text-align:left;
    }

    .desktop-nav-item img{
        width:26px;
        height:26px;
        object-fit:contain;
        flex-shrink:0;
    }

    .desktop-nav-item:hover{
        background:rgba(255,255,255,.04);
    }

    .desktop-nav-item.active-nav{
        background:linear-gradient(180deg, rgba(255,255,255,.06) 0%, rgba(255,255,255,.03) 100%);
        border-color:rgba(203,108,230,.18);
    }

    .desktop-nav-item-accent{
        background:linear-gradient(90deg, #b85bda 0%, #cb6ce6 100%);
        color:#fff;
        margin-top:6px;
    }

    .desktop-nav-item-accent img{
        filter:brightness(0) invert(1);
    }

    .desktop-main{
        padding:16px 18px 22px;
        height:100%;
        overflow:auto;
    }

    .desktop-hero{
        position:relative;
        overflow:hidden;
        border-radius:28px;
        padding:18px 18px 16px;
        margin-bottom:14px;
    }

    .desktop-kicker{
        padding:8px 12px;
        font-size:12px;
        margin-bottom:12px;
    }

    .desktop-hero-top{
        display:grid;
        grid-template-columns:minmax(0,1fr) 220px;
        gap:12px;
        align-items:center;
    }

    .desktop-hero-title{
        margin:0 0 10px;
        font-size:clamp(34px,3.2vw,52px);
        line-height:.92;
        font-weight:800;
        letter-spacing:-1px;
        max-width:620px;
    }

    .desktop-points{
        display:grid;
        gap:10px;
        margin:18px 0 14px;
        max-width:560px;
    }

    .desktop-point{
        display:grid;
        grid-template-columns:58px 1px minmax(0,1fr);
        align-items:center;
        gap:16px;
        font-size:17px;
        line-height:1.35;
        font-weight:700;
        color:rgba(255,255,255,.92);
    }

    .desktop-point-icon{
        width:auto;
        height:auto;
        font-size:34px;
        line-height:1;
        font-weight:900;
        letter-spacing:-1px;
        color:rgba(203,108,230,.72);
        text-shadow:0 0 22px rgba(203,108,230,.28);
    }

    .desktop-point-icon::after{
        content:"";
        display:block;
        width:1px;
        height:34px;
        margin-left:72px;
        margin-top:-34px;
        background:linear-gradient(
            180deg,
            transparent,
            rgba(203,108,230,.35),
            transparent
        );
    }

    .desktop-hero-art-wrap{
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:auto;
    }

    .desktop-hero-art{
        width:260px;
        margin-left:-20px;
        filter:drop-shadow(0 12px 34px rgba(203,108,230,.22));
    }

    .desktop-hero-bottom{
        margin-top:10px;
        display:grid;
        grid-template-columns:repeat(4, minmax(0,1fr));
        gap:10px;
    }

    .desktop-mini-stat{
        border-radius:16px;
        padding:12px;
        min-height:68px;
        background:rgba(255,255,255,.04);
    }

    .desktop-mini-stat-title{
        font-size:12px;
        margin-bottom:6px;
    }

    .desktop-mini-stat-value{
        font-size:14px;
        line-height:1.3;
    }

   .desktop-hero-actions{
        margin-top:14px;
        display:flex;
        gap:10px;
        justify-content:center;
    }

    .desktop-hero-btn{
        min-width:220px;
        height:50px;
        padding:0 24px;
        font-size:15px;
        border-radius:16px;
    }

    .desktop-section-title{
        margin:0 0 12px;
        font-size:26px;
        font-weight:800;
    }

    .desktop-courses{
        display:grid;
        grid-template-columns:repeat(3, minmax(0,1fr));
        gap:14px;
    }

    .desktop-course-card{
        border-radius:22px;
        padding:16px;
        gap:12px;
        min-height:180px;
        transition:.18s ease;
    }

    .desktop-course-card:hover{
        transform:translateY(-2px);
    }

    .desktop-course-top{
        gap:12px;
    }

    .desktop-course-cover{
        width:74px;
        height:74px;
        border-radius:16px;
    }

    .desktop-course-cover-img{
        width:58px;
        height:58px;
    }

    .desktop-course-title{
        margin:0 0 6px;
        font-size:22px;
        line-height:1.05;
        font-weight:800;
    }

    .desktop-course-desc{
        font-size:14px;
        line-height:1.45;
    }

    .desktop-course-arrow{
        width:44px;
        height:44px;
    }

    .desktop-course-arrow::before{
        font-size:30px;
    }
}

@media (min-width:1024px) and (max-width:1439px){
    .desktop-layout{
        grid-template-columns:250px minmax(0,1fr);
    }

    .desktop-main{
        padding:18px 18px 24px;
    }

    .desktop-hero{
        padding:20px;
        margin-bottom:16px;
    }

    .desktop-hero-top{
        grid-template-columns:minmax(0,1fr) 260px;
        gap:16px;
    }

    .desktop-hero-title{
        font-size:clamp(34px,4vw,50px);
        max-width:620px;
    }

    .desktop-point{
        font-size:15px;
    }

    .desktop-hero-art{
    width:360px;
    margin-left:-40px;
}

    .desktop-hero-bottom{
        grid-template-columns:repeat(2, minmax(0,1fr));
    }

    .desktop-hero-btn{
        min-width:220px;
        height:54px;
    }

    .desktop-courses{
    grid-template-columns:repeat(3, minmax(0,1fr));
}

    .desktop-course-card{
        min-height:210px;
    }
}

@media (min-width:1024px) and (max-width:1180px){
    .desktop-layout{
        grid-template-columns:230px minmax(0,1fr);
    }

    .desktop-hero-top{
        grid-template-columns:1fr;
    }

    .desktop-hero-art-wrap{
        display:none;
    }

    .desktop-points{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:10px 14px;
        max-width:100%;
    }

    .desktop-hero-actions{
        justify-content:flex-start;
    }

    .desktop-courses{
        grid-template-columns:1fr;
    }

    .desktop-course-card{
        min-height:auto;
    }
}

@media (max-width:1023px){
    .desktop-only{
        display:none;
    }

    .mobile-shell{
        display:block;
    }

    body{
        overflow:visible;
    }
}

@media (max-width:420px){
    .mobile-header{
        padding:calc(env(safe-area-inset-top) + 76px) 14px 0;
        gap:10px;
    }

    .mobile-main{
        padding:12px 14px 0;
    }

    .mobile-hero,
    .mobile-course-card{
        border-radius:20px;
    }
}

@media (max-width:360px){
    .mobile-header{
        flex-direction:column;
        align-items:flex-start;
    }

    .mobile-header .lang{
        align-self:flex-end;
    }
}
</style>
</head>

<body>

<!-- =========================
     MOBILE VERSION
========================= -->
<div class="mobile-shell">
    <div class="mobile-page">

        <div class="mobile-header">
            <div class="mobile-logo">gaphub</div>

            <div class="lang">
                <span onclick="setLang('uz')" id="uz-mobile">UZ</span>
                <span onclick="setLang('ru')" id="ru-mobile">RU</span>
            </div>
        </div>

        <div class="mobile-main">

            <section class="mobile-intro">
                <h1 class="mobile-intro-title" id="mobileIntroTitle"></h1>
                <p class="mobile-intro-text" id="mobileIntroText"></p>
            </section>

            <section class="mobile-section">
                <h2 class="mobile-section-title" id="popularTitle-mobile"></h2>

                <div class="mobile-courses">
                    <article class="mobile-course-card soft-card" onclick="openCourse('smm')">
                        <div class="mobile-course-inner">
                            <div class="mobile-course-cover">
                                <img class="mobile-course-cover-img" src="images/home/smm2.webp" alt="SMM">
                            </div>

                            <div class="mobile-course-info">
                                <h3 class="mobile-course-title">SMM</h3>
                                <p class="mobile-course-desc" id="smmDesc-mobile"></p>
                            </div>

                            <div class="mobile-course-arrow"></div>
                        </div>
                    </article>

                    <article class="mobile-course-card soft-card" onclick="openCourse('target')">
                        <div class="mobile-course-inner">
                            <div class="mobile-course-cover">
                                <img class="mobile-course-cover-img" src="images/home/target2.webp" alt="TARGET">
                            </div>

                            <div class="mobile-course-info">
                                <h3 class="mobile-course-title">TARGET</h3>
                                <p class="mobile-course-desc" id="targetDesc-mobile"></p>
                            </div>

                            <div class="mobile-course-arrow"></div>
                        </div>
                    </article>

                    <article class="mobile-course-card soft-card" onclick="openCourse('ai')">
                        <div class="mobile-course-inner">
                            <div class="mobile-course-cover">
                                <img class="mobile-course-cover-img" src="images/home/ai2.webp" alt="AI">
                            </div>

                            <div class="mobile-course-info">
                                <h3 class="mobile-course-title" id="ai-mobile"></h3>
                                <p class="mobile-course-desc" id="aiDesc-mobile"></p>
                            </div>

                            <div class="mobile-course-arrow"></div>
                        </div>
                    </article>
                </div>
                
                <div class="mobile-divider"></div>
                <div class="mobile-about-card soft-card" onclick="goAbout()">
                    <div class="mobile-about-card-left">
                        <div class="mobile-about-card-title" id="heroAbout-mobile"></div>
                    <div class="mobile-about-card-text" id="heroAboutText-mobile"></div>
                </div>

                    <img class="mobile-about-card-img" src="images/home/about2.webp" alt="gaphub">
                </div>
            </section>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="goPage('mycourses.html')">
            <img src="images/icon/courses2.png" alt="">
            <span id="m1-mobile"></span>
        </div>

        <div class="nav-item" onclick="goPage('support.html')">
            <img src="images/icon/support.png" alt="">
            <span id="m4-mobile"></span>
        </div>

        <div class="nav-center" onclick="goHome()">
            <div class="circle">
                <img src="images/icon/home2.png" alt="home">
            </div>
        </div>

        <div class="nav-item" onclick="goPage('chat.html')">
            <img src="images/icon/feedback.png" alt="">
            <span id="m5-mobile"></span>
        </div>

        <div class="nav-item" onclick="goPage('myprofile.html')">
            <img src="images/icon/profile2.png" alt="">
            <span id="m6-mobile"></span>
        </div>
    </div>
</div>

<!-- =========================
     DESKTOP VERSION
========================= -->
<div class="desktop-app desktop-only">

    <div class="desktop-topbar">
        <div class="desktop-brand">gaphub</div>

        <div class="desktop-right">
            <div class="lang">
                <span onclick="setLang('uz')" id="uz-desktop">UZ</span>
                <span onclick="setLang('ru')" id="ru-desktop">RU</span>
            </div>
        </div>
    </div>

    <div class="desktop-layout">
        <aside class="desktop-sidebar">
            <nav class="desktop-nav">
                <button class="desktop-nav-item active-nav" onclick="goHome()">
                    <img src="images/icon/home.png" alt="">

<script>
let lang = localStorage.getItem("lang") || "uz"

const t = {

        catalog:"Каталог курсов",

        introTitle:"Выбери направление",
        introText:"Короткие практические курсы для старта в digital",

        kicker:"От навыка к доходу",
        heroTitle:'Сильная точка входа в <span class="accent-text">digital</span>',
        point1:"Освой профессию с нуля",
        point2:"Собери сильное портфолио",

        aboutMini:"Что такое gaphub?",
        aboutMiniText:"Коротко о платформе, курсах и формате обучения"
    }
}

function impact(){
    if(window.Telegram && Telegram.WebApp && Telegram.WebApp.HapticFeedback){
        Telegram.WebApp.HapticFeedback.impactOccurred("light")
    }
}

function setText(id, value){
    const el = document.getElementById(id)
    if(el) el.innerText = value
}

function setHTML(id, value){
    const el = document.getElementById(id)
    if(el) el.innerHTML = value
}

function setActiveLang(idUz, idRu){
    const uz = document.getElementById(idUz)
    const ru = document.getElementById(idRu)

    if(uz) uz.classList.toggle("active", lang === "uz")
    if(ru) ru.classList.toggle("active", lang === "ru")
}

function setLang(l){
    impact()
    lang = l
    localStorage.setItem("lang", l)
    update()
}

function update(){
    const d = t[lang]

    document.documentElement.lang = lang === "uz" ? "uz" : "ru"

    setText("m1-mobile", d.m1)
    setText("m4-mobile", d.m4)
    setText("m5-mobile", d.m5)
    setText("m6-mobile", d.m6)

    setText("mobileIntroTitle", d.introTitle)
    setText("mobileIntroText", d.introText)
    setText("popularTitle-mobile", d.popular)
    setText("smmDesc-mobile", d.smmDesc)
    setText("targetDesc-mobile", d.targetDesc)
    setText("ai-mobile", d.ai)
    setText("aiDesc-mobile", d.aiDesc)
    setText("heroAbout-mobile", d.aboutMini)
    setText("heroAboutText-mobile", d.aboutMiniText)

    setText("home-desktop", d.home)
    setText("m1-desktop", d.m1)
    setText("m4-desktop", d.m4)
    setText("m5-desktop", d.m5)
    setText("m6-desktop", d.m6)
    setText("catalog-desktop", d.catalog)

    setText("kicker-desktop", d.kicker)
    setHTML("heroTitle-desktop", d.heroTitle)
    setText("point1-desktop", d.point1)
    setText("point2-desktop", d.point2)
    setText("point3-desktop", d.point3)
    setText("point4-desktop", d.point4)
    setText("heroBuy-desktop", d.heroBuy)
    setText("heroAbout-desktop", d.heroAbout)

    setText("stat1Title-desktop", d.stat1Title)
    setText("stat1Value-desktop", d.stat1Value)
    setText("stat2Title-desktop", d.stat2Title)
    setText("stat2Value-desktop", d.stat2Value)
    setText("stat3Title-desktop", d.stat3Title)
    setText("stat3Value-desktop", d.stat3Value)
    setText("stat4Title-desktop", d.stat4Title)
    setText("stat4Value-desktop", d.stat4Value)

    setText("popularTitle-desktop", d.popular)
    setText("smmDesc-desktop", d.smmDesc)
    setText("targetDesc-desktop", d.targetDesc)
    setText("ai-desktop", d.ai)
    setText("aiDesc-desktop", d.aiDesc)

    setActiveLang("uz-mobile", "ru-mobile")
    setActiveLang("uz-desktop", "ru-desktop")
}

function openCourse(name){
    impact()
    localStorage.setItem("lang", lang)

    if(name === "smm"){
        window.location.href = "smm.html"
        return
    }

    if(name === "target"){
        window.location.href = "target.html"
        return
    }

    if(name === "ai"){
        window.location.href = "ai.html"
        return
    }
}

function goHome(){
    impact()
    localStorage.setItem("lang", lang)
    window.location.href = "index.html"
}

function goCourses(){
    impact()
    localStorage.setItem("lang", lang)
    window.location.href = "courses.html"
}

function goAbout(){
    impact()
    localStorage.setItem("lang", lang)
    window.location.href = "about.html"
}

function goPage(page){
    impact()
    localStorage.setItem("lang", lang)
    window.location.href = page
}

function initTelegram(){
    if(window.Telegram && Telegram.WebApp){
        const tg = Telegram.WebApp

        tg.ready()
        tg.expand()

        try{
            tg.requestFullscreen()
        }catch(e){}

        document.body.style.minHeight = tg.viewportHeight + "px"
    }
}

update()
initTelegram()
</script>
