<style>
:root{
    --otabek-accent:#cb6ce6;
    --otabek-accent-2:#a855f7;

    --otabek-bg:#12111a;
    --otabek-bg-2:#171621;

    --otabek-text:#ffffff;
    --otabek-muted:#9f98aa;

    --otabek-line:rgba(255,255,255,.08);

    --otabek-shadow:0 18px 40px rgba(0,0,0,.34);
}

/* =========================
   ROOT
========================= */

.otabek-root{
    color:var(--otabek-text);
}

.otabek-root *{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

.otabek-root button,
.otabek-root input{
    font-family:Arial,sans-serif;
}

.otabek-root button{
    cursor:pointer;
}

/* =========================
   SHARED CARD
========================= */

.otabek-card,
.otabek-mobile-card{
    overflow:hidden;

    display:flex;
    flex-direction:column;

    background:
        radial-gradient(circle at 84% 14%, rgba(203,108,230,.18), transparent 24%),
        radial-gradient(circle at 14% 88%, rgba(203,108,230,.08), transparent 24%),
        linear-gradient(180deg,#171621 0%,#0f0e17 100%);

    border:1px solid rgba(255,255,255,.06);
    box-shadow:var(--otabek-shadow);
}

.otabek-head,
.otabek-mobile-top{
    display:flex;
    align-items:center;
}

.otabek-avatar{
    overflow:hidden;

    display:flex;
    align-items:center;
    justify-content:center;

    flex-shrink:0;

    color:#fff;

    background:
        radial-gradient(circle at 50% 38%, rgba(203,108,230,.22), transparent 34%),
        linear-gradient(180deg,#1c1a27 0%,#111017 100%);

    border:1px solid rgba(255,255,255,.07);
}

.otabek-avatar-img{
    width:100%;
    height:100%;

    object-fit:cover;

    display:block;
}

.otabek-avatar-letter{
    font-weight:900;
}

.otabek-name{
    font-weight:900;
}

.otabek-role{
    color:var(--otabek-muted);
    font-weight:700;
}

.otabek-actions{
    display:grid;
    grid-template-columns:1fr;
    gap:9px;
}

.otabek-action,
.otabek-history-btn{
    width:100%;

    border:none;
    border-radius:16px;

    background:rgba(255,255,255,.045);
    border:1px solid rgba(255,255,255,.07);

    color:#fff;

    font-weight:800;

    transition:.18s ease;
}

.otabek-action{
    min-height:48px;

    padding:0 12px;

    display:flex;
    align-items:center;
    gap:10px;

    text-align:left;

    font-size:13px;
    line-height:1.2;
}

.otabek-action::before{
    width:30px;
    height:30px;

    border-radius:12px;

    background:rgba(203,108,230,.12);

    display:flex;
    align-items:center;
    justify-content:center;

    flex-shrink:0;

    font-size:14px;
}

.otabek-action:nth-child(1)::before{
    content:"?";
}

.otabek-action:nth-child(2)::before{
    content:"#";
}

.otabek-action:nth-child(3)::before{
    content:"!";
}

.otabek-action:hover,
.otabek-history-btn:hover{
    transform:translateY(-1px);
    border-color:rgba(203,108,230,.28);
    background:rgba(203,108,230,.08);
}

.otabek-history-btn{
    min-height:46px;

    font-size:14px;
}

.otabek-input-row{
    display:grid;
    grid-template-columns:minmax(0,1fr) 42px;
    gap:8px;
}

.otabek-input{
    width:100%;
    height:42px;

    border:none;
    outline:none;

    border-radius:15px;

    padding:0 13px;

    background:rgba(255,255,255,.045);
    border:1px solid rgba(255,255,255,.07);

    color:#fff;

    font-size:13px;
}

.otabek-input::placeholder{
    color:rgba(255,255,255,.42);
}

.otabek-send{
    width:42px;
    height:42px;

    border:none;
    border-radius:15px;

    background:
        linear-gradient(
            90deg,
            var(--otabek-accent),
            var(--otabek-accent-2)
        );

    color:#fff;

    font-size:18px;
    font-weight:900;
}

/* =========================
   MESSAGES
========================= */

.otabek-messages{
    flex:1;
    min-height:0;

    overflow:auto;

    flex-direction:column;
    gap:10px;

    padding:2px 2px 14px;
}

.otabek-message{
    max-width:92%;

    padding:12px 13px;

    border-radius:18px;

    font-size:14px;
    line-height:1.45;
}

.otabek-message.bot{
    align-self:flex-start;

    background:rgba(255,255,255,.055);
    border:1px solid rgba(255,255,255,.07);

    color:#ebe4f5;
}

.otabek-message.user{
    align-self:flex-end;

    background:
        linear-gradient(
            90deg,
            rgba(203,108,230,.34),
            rgba(168,85,247,.24)
        );

    border:1px solid rgba(203,108,230,.36);

    color:#fff;
}

/* =========================
   CHAT HISTORY
========================= */

.otabek-chat-history-item{
    width:100%;

    border:none;
    border-radius:16px;

    padding:12px 13px;

    background:rgba(255,255,255,.055);
    border:1px solid rgba(255,255,255,.08);

    color:#fff;

    display:flex;
    flex-direction:column;
    gap:5px;

    text-align:left;
}

.otabek-chat-history-title{
    font-size:13px;
    line-height:1.25;
    font-weight:800;
}

.otabek-chat-history-date{
    color:var(--otabek-muted);

    font-size:11px;
    line-height:1.2;
    font-weight:700;
}

.otabek-history-empty{
    padding:14px;

    border-radius:16px;

    background:rgba(255,255,255,.045);
    border:1px solid rgba(255,255,255,.07);

    color:var(--otabek-muted);

    font-size:13px;
    line-height:1.35;
}

/* =========================
   DESKTOP
========================= */

.otabek-desktop{
    position:sticky;
    top:0;
}

.otabek-card{
    height:calc(100vh - 58px);
    min-height:620px;

    border-radius:28px;

    padding:18px;

    gap:16px;
}

.otabek-head{
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:0;

    margin-bottom:0;
    padding-top:4px;
}

.otabek-desktop .otabek-avatar{
    width:86px;
    height:86px;

    border-radius:28px;

    margin-bottom:12px;
}

.otabek-desktop .otabek-avatar-letter{
    font-size:36px;
    line-height:1;
}

.otabek-desktop .otabek-name{
    font-size:21px;
    line-height:1.1;
}

.otabek-desktop .otabek-role{
    margin-top:4px;

    font-size:13px;
    line-height:1.35;
}

.otabek-desktop .otabek-messages{
    display:none;

    margin-top:4px;
}

.otabek-desktop .otabek-messages.active{
    display:flex;
}

.otabek-desktop .otabek-history-btn{
    margin-top:auto;
}

/* =========================
   MOBILE
========================= */

.otabek-mobile-fab{
    position:fixed;

    right:16px;
    bottom:calc(18px + env(safe-area-inset-bottom));

    width:58px;
    height:58px;

    border:none;
    border-radius:22px;

    overflow:hidden;

    background:
        linear-gradient(
            135deg,
            var(--otabek-accent),
            var(--otabek-accent-2)
        );

    color:#fff;

    display:flex;
    align-items:center;
    justify-content:center;

    z-index:3000;

    box-shadow:0 18px 38px rgba(203,108,230,.32);
}

.otabek-mobile-fab .otabek-avatar-letter{
    font-size:22px;
}

.otabek-mobile-overlay{
    position:fixed;
    inset:0;

    display:none;

    align-items:flex-end;

    padding:14px;
    padding-bottom:calc(14px + env(safe-area-inset-bottom));

    background:rgba(0,0,0,.58);

    backdrop-filter:blur(10px);

    z-index:4000;
}

.otabek-mobile-overlay.active{
    display:flex;
}

.otabek-mobile-card{
    width:100%;
    height:min(680px, 84vh);

    border-radius:30px;

    padding:16px;

    gap:12px;
}

.otabek-mobile-top{
    justify-content:space-between;

    gap:12px;

    margin-bottom:2px;
}

.otabek-mobile-left{
    display:flex;
    align-items:center;
    gap:12px;
}

.otabek-mobile-left .otabek-avatar{
    width:46px;
    height:46px;

    border-radius:18px;
}

.otabek-mobile-left .otabek-avatar-letter{
    font-size:20px;
}

.otabek-mobile-left .otabek-name{
    font-size:17px;
    line-height:1.1;
}

.otabek-mobile-left .otabek-role{
    margin-top:4px;

    font-size:12px;
    line-height:1.2;
}

.otabek-mobile-card .otabek-messages{
    display:flex;
}

.otabek-mobile-card .otabek-history-btn{
    margin-top:0;
}

.otabek-close{
    width:34px;
    height:34px;

    border:none;
    border-radius:50%;

    background:rgba(255,255,255,.08);

    color:#fff;

    font-size:22px;

    display:flex;
    align-items:center;
    justify-content:center;
}

.otabek-close:active{
    transform:scale(.94);
}

/* =========================
   RESPONSIVE VISIBILITY
========================= */

@media (max-width:1023px){
    .otabek-desktop{
        display:none;
    }
}

@media (min-width:1024px){
    .otabek-mobile-fab,
    .otabek-mobile-overlay{
        display:none;
    }
}
</style>

<div class="otabek-root">

    <!-- DESKTOP -->

    <aside class="otabek-desktop">

        <div class="otabek-card">

            <div class="otabek-head">

                <div class="otabek-avatar">
                    <img
                        class="otabek-avatar-img"
                        src="images/otabek.png"
                        alt="Отабек"
                        onerror="this.style.display='none'; this.parentElement.querySelector('.otabek-avatar-letter').style.display='block';"
                    >
                    <span class="otabek-avatar-letter" style="display:none;">O</span>
                </div>

                <div>
                    <div class="otabek-name">
                        Отабек
                    </div>

                    <div class="otabek-role">
                        AI-помощник урока
                    </div>
                </div>

            </div>

            <div
                class="otabek-messages"
                id="otabekMessages"
            >
                <div class="otabek-message bot">
                    Привет. Я помогу разобраться с уроком. Можешь спросить меня про SMM, аудиторию, контент или тест.
                </div>
            </div>

            <div class="otabek-actions">

                <button
                    class="otabek-action"
                    onclick="otabekQuick('Объясни тему проще')"
                >
                    Объясни проще
                </button>

                <button
                    class="otabek-action"
                    onclick="otabekQuick('Приведи пример')"
                >
                    Пример
                </button>

                <button
                    class="otabek-action"
                    onclick="otabekQuick('Что главное запомнить?')"
                >
                    Главное
                </button>

            </div>

            <button
                class="otabek-history-btn"
                onclick="toggleOtabekHistory()"
            >
                История чатов
            </button>

            <div class="otabek-input-row">

                <input
                    type="text"
                    class="otabek-input"
                    id="otabekInput"
                    placeholder="Спроси по уроку..."
                    onkeydown="otabekEnter(event)"
                >

                <button
                    class="otabek-send"
                    onclick="sendOtabekMessage()"
                >
                    ↑
                </button>

            </div>

        </div>

    </aside>

    <!-- MOBILE -->

    <button
        class="otabek-mobile-fab"
        onclick="toggleOtabekMobile()"
    >
        <img
            class="otabek-avatar-img"
            src="images/otabek-mobile.png"
            alt="Отабек"
            onerror="this.style.display='none'; this.parentElement.querySelector('.otabek-avatar-letter').style.display='block';"
        >
        <span class="otabek-avatar-letter" style="display:none;">O</span>
    </button>

    <div
        class="otabek-mobile-overlay"
        id="otabekMobileOverlay"
    >

        <div class="otabek-mobile-card">

            <div class="otabek-mobile-top">

                <div class="otabek-mobile-left">

                    <div class="otabek-avatar">
                        <img
                            class="otabek-avatar-img"
                            src="images/otabek.png"
                            alt="Отабек"
                            onerror="this.style.display='none'; this.parentElement.querySelector('.otabek-avatar-letter').style.display='block';"
                        >
                        <span class="otabek-avatar-letter" style="display:none;">O</span>
                    </div>

                    <div>
                        <div class="otabek-name">
                            Отабек
                        </div>

                        <div class="otabek-role">
                            AI-помощник урока
                        </div>
                    </div>

                </div>

                <button
                    class="otabek-close"
                    onclick="toggleOtabekMobile()"
                >
                    ×
                </button>

            </div>

            <div
                class="otabek-messages"
                id="otabekMessagesMobile"
            >
                <div class="otabek-message bot">
                    Привет. Я помогу разобраться с уроком. Можешь спросить меня про SMM, аудиторию, контент или тест.
                </div>
            </div>

            <div class="otabek-actions">

                <button
                    class="otabek-action"
                    onclick="otabekQuick('Объясни тему проще')"
                >
                    Проще
                </button>

                <button
                    class="otabek-action"
                    onclick="otabekQuick('Приведи пример')"
                >
                    Пример
                </button>

                <button
                    class="otabek-action"
                    onclick="otabekQuick('Что главное запомнить?')"
                >
                    Главное
                </button>

            </div>

            <button
                class="otabek-history-btn"
                onclick="toggleOtabekHistory()"
            >
                История чатов
            </button>

            <div class="otabek-input-row">

                <input
                    type="text"
                    class="otabek-input"
                    id="otabekInputMobile"
                    placeholder="Спроси по уроку..."
                    onkeydown="otabekEnterMobile(event)"
                >

                <button
                    class="otabek-send"
                    onclick="sendOtabekMessageMobile()"
                >
                    ↑
                </button>

            </div>

        </div>

    </div>

    <script>
const OTABEK_STORAGE_KEY =
    window.OTABEK_STORAGE_KEY || "gaphub_otabek_default"

const OTABEK_CHATS_KEY =
    OTABEK_STORAGE_KEY + "_chats"

let otabekChats = JSON.parse(
    localStorage.getItem(OTABEK_CHATS_KEY) || "[]"
)

let currentOtabekChatId = null
let otabekHistoryViewOpen = false

function saveOtabekChats(){

    localStorage.setItem(
        OTABEK_CHATS_KEY,
        JSON.stringify(otabekChats)
    )
}

function createOtabekChat(firstText){

    const chat = {
        id:"chat_" + Date.now(),
        title:firstText ? firstText.slice(0, 42) : "Новый чат",
        createdAt:new Date().toISOString(),
        updatedAt:new Date().toISOString(),
        messages:[]
    }

    otabekChats.unshift(chat)
    currentOtabekChatId = chat.id

    saveOtabekChats()

    return chat
}

function getCurrentOtabekChat(){

    if(!currentOtabekChatId) return null

    return otabekChats.find(chat => chat.id === currentOtabekChatId) || null
}

function renderOtabekMessages(){

    const desktopRoot =
        document.getElementById("otabekMessages")

    const mobileRoot =
        document.getElementById("otabekMessagesMobile")

    const currentChat = getCurrentOtabekChat()

    const defaultMessage = `
        <div class="otabek-message bot">
            Привет. Я помогу разобраться с уроком. Можешь спросить меня про SMM, аудиторию, контент или тест.
        </div>
    `

    let html = defaultMessage

    if(currentChat){
        html += currentChat.messages.map(item => `
            <div class="otabek-message ${item.role}">
                ${item.text}
            </div>
        `).join("")
    }

    if(desktopRoot){
        desktopRoot.innerHTML = html
        desktopRoot.scrollTop = desktopRoot.scrollHeight
    }

    if(mobileRoot){
        mobileRoot.innerHTML = html
        mobileRoot.scrollTop = mobileRoot.scrollHeight
    }
}

function renderOtabekChatHistory(){

    const desktopRoot =
        document.getElementById("otabekMessages")

    const mobileRoot =
        document.getElementById("otabekMessagesMobile")

    const html = otabekChats.length
        ? otabekChats.map(chat => `
            <button
                class="otabek-chat-history-item"
                onclick="openOtabekChat('${chat.id}')"
            >
                <span class="otabek-chat-history-title">
                    ${chat.title}
                </span>
                <span class="otabek-chat-history-date">
                    ${formatOtabekChatDate(chat.updatedAt)}
                </span>
            </button>
        `).join("")
        : `
            <div class="otabek-history-empty">
                История пока пустая
            </div>
        `

    if(desktopRoot){
        desktopRoot.innerHTML = html
    }

    if(mobileRoot){
        mobileRoot.innerHTML = html
    }
}

function toggleOtabekHistory(){

    otabekHistoryViewOpen = !otabekHistoryViewOpen

    const desktopRoot =
        document.getElementById("otabekMessages")

    if(desktopRoot){
        desktopRoot.classList.add("active")
    }

    if(otabekHistoryViewOpen){
        renderOtabekChatHistory()
    }else{
        renderOtabekMessages()
    }
}

function openOtabekChat(chatId){

    currentOtabekChatId = chatId
    otabekHistoryViewOpen = false

    const desktopRoot =
        document.getElementById("otabekMessages")

    if(desktopRoot){
        desktopRoot.classList.add("active")
    }

    renderOtabekMessages()
}

function formatOtabekChatDate(value){

    const date = new Date(value)

    return date.toLocaleString("ru-RU", {
        day:"2-digit",
        month:"2-digit",
        hour:"2-digit",
        minute:"2-digit"
    })
}

function toggleOtabekMobile(){

    const overlay =
        document.getElementById("otabekMobileOverlay")

    if(!overlay) return

    overlay.classList.toggle("active")
}

function otabekEnter(event){

    if(event.key === "Enter"){
        sendOtabekMessage()
    }
}

function otabekEnterMobile(event){

    if(event.key === "Enter"){
        sendOtabekMessageMobile()
    }
}

function otabekQuick(text){

    const desktopInput =
        document.getElementById("otabekInput")

    const mobileInput =
        document.getElementById("otabekInputMobile")

    if(desktopInput){
        desktopInput.value = text
    }

    if(mobileInput){
        mobileInput.value = text
    }

    if(window.innerWidth >= 1024){
        sendOtabekMessage()
    }else{
        sendOtabekMessageMobile()
    }
}

function sendOtabekMessage(){

    const input =
        document.getElementById("otabekInput")

    if(!input) return

    const text = input.value.trim()

    if(!text) return

    input.value = ""

    addOtabekMessage(text)
}

function sendOtabekMessageMobile(){

    const input =
        document.getElementById("otabekInputMobile")

    if(!input) return

    const text = input.value.trim()

    if(!text) return

    input.value = ""

    addOtabekMessage(text)
}

function addOtabekMessage(text){

    let currentChat = getCurrentOtabekChat()

    if(!currentChat){
        currentChat = createOtabekChat(text)
    }

    currentChat.messages.push({
        role:"user",
        text:text
    })

    currentChat.messages.push({
        role:"bot",
        text:getOtabekMockAnswer(text)
    })

    currentChat.updatedAt = new Date().toISOString()

    if(!currentChat.title || currentChat.title === "Новый чат"){
        currentChat.title = text.slice(0, 42)
    }

    otabekChats =
        otabekChats.filter(chat => chat.id !== currentChat.id)

    otabekChats.unshift(currentChat)

    currentOtabekChatId = currentChat.id
    otabekHistoryViewOpen = false

    saveOtabekChats()

    const desktopRoot =
        document.getElementById("otabekMessages")

    if(desktopRoot){
        desktopRoot.classList.add("active")
    }

    renderOtabekMessages()
}

function getOtabekMockAnswer(text){

    const lower = text.toLowerCase()

    if(
        lower.includes("проще") ||
        lower.includes("oddiy") ||
        lower.includes("тушун")
    ){
        return "Если проще: SMM помогает бизнесу быть заметным в соцсетях, объяснять ценность продукта и постепенно приводить людей к покупке."
    }

    if(
        lower.includes("пример") ||
        lower.includes("misol")
    ){
        return "Например, салон красоты может показывать не только результат, но и процесс работы, уход после процедуры и ответы на частые вопросы клиентов."
    }

    if(
        lower.includes("главное") ||
        lower.includes("asosiy")
    ){
        return "Главное из урока: SMM это не просто публикация постов. Это система: контент, внимание, доверие и действие."
    }

    if(
        lower.includes("ца") ||
        lower.includes("аудитория") ||
        lower.includes("auditoriya")
    ){
        return "ЦА — это люди, которым реально может быть интересен продукт или услуга. Без понимания аудитории сложно делать хороший контент."
    }

    return "Пока я работаю в тестовом режиме. Позже меня подключат к полноценному AI, и я смогу отвечать намного глубже и точнее."
}

renderOtabekMessages()
</script>
