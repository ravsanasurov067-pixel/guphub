<style>
:root{
    --otabek-accent:#cb6ce6;
    --otabek-accent-2:#a855f7;

    --otabek-bg:#12111a;
    --otabek-bg-2:#171621;

    --otabek-text:#ffffff;
    --otabek-muted:#9f98aa;

    --otabek-line:rgba(255,255,255,.08);

    --otabek-shadow:0 18px 40px rgba(0,0,0,.34);
}

/* =========================
   ROOT
========================= */

.otabek-root{
    color:var(--otabek-text);
}

.otabek-root *{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

.otabek-root button,
.otabek-root input{
    font-family:Arial,sans-serif;
}

.otabek-root button{
    cursor:pointer;
}

/* =========================
   SHARED CARD
========================= */

.otabek-card,
.otabek-mobile-card{
    overflow:hidden;

    display:flex;
    flex-direction:column;

    background:
        radial-gradient(circle at 84% 14%, rgba(203,108,230,.18), transparent 24%),
        radial-gradient(circle at 14% 88%, rgba(203,108,230,.08), transparent 24%),
        linear-gradient(180deg,#171621 0%,#0f0e17 100%);

    border:1px solid rgba(255,255,255,.06);
    box-shadow:var(--otabek-shadow);
}

.otabek-head,
.otabek-mobile-top{
    display:flex;
    align-items:center;
}

.otabek-avatar{
    overflow:hidden;

    display:flex;
    align-items:center;
    justify-content:center;

    flex-shrink:0;

    color:#fff;

    background:
        radial-gradient(circle at 50% 38%, rgba(203,108,230,.22), transparent 34%),
        linear-gradient(180deg,#1c1a27 0%,#111017 100%);

    border:1px solid rgba(255,255,255,.07);
}

.otabek-avatar-img{
    width:100%;
    height:100%;

    object-fit:cover;

    display:block;
}

.otabek-avatar-letter{
    font-weight:900;
}

.otabek-name{
    font-weight:900;
}

.otabek-role{
    color:var(--otabek-muted);
    font-weight:700;
}

.otabek-actions{
    display:grid;
    grid-template-columns:1fr;
    gap:9px;
}

.otabek-action,
.otabek-history-btn{
    width:100%;

    border:none;
    border-radius:16px;

    background:rgba(255,255,255,.045);
    border:1px solid rgba(255,255,255,.07);

    color:#fff;

    font-weight:800;

    transition:.18s ease;
}

.otabek-action{
    min-height:48px;

    padding:0 12px;

    display:flex;
    align-items:center;
    gap:10px;

    text-align:left;

    font-size:13px;
    line-height:1.2;
}

.otabek-action::before{
    width:30px;
    height:30px;

    border-radius:12px;

    background:rgba(203,108,230,.12);

    display:flex;
    align-items:center;
    justify-content:center;

    flex-shrink:0;

    font-size:14px;
}

.otabek-action:nth-child(1)::before{
    content:"?";
}

.otabek-action:nth-child(2)::before{
    content:"#";
}

.otabek-action:nth-child(3)::before{
    content:"!";
}

.otabek-action:hover,
.otabek-history-btn:hover{
    transform:translateY(-1px);
    border-color:rgba(203,108,230,.28);
    background:rgba(203,108,230,.08);
}

.otabek-history-btn{
    min-height:46px;

    font-size:14px;
}

.otabek-input-row{
    display:grid;
    grid-template-columns:minmax(0,1fr) 42px;
    gap:8px;
}

.otabek-input{
    width:100%;
    height:42px;

    border:none;
    outline:none;

    border-radius:15px;

    padding:0 13px;

    background:rgba(255,255,255,.045);
    border:1px solid rgba(255,255,255,.07);

    color:#fff;

    font-size:13px;
}

.otabek-input::placeholder{
    color:rgba(255,255,255,.42);
}

.otabek-send{
    width:42px;
    height:42px;

    border:none;
    border-radius:15px;

    background:
        linear-gradient(
            90deg,
            var(--otabek-accent),
            var(--otabek-accent-2)
        );

    color:#fff;

    font-size:18px;
    font-weight:900;
}

/* =========================
   MESSAGES
========================= */

.otabek-messages{
    flex:1;
    min-height:0;

    overflow:auto;

    flex-direction:column;
    gap:10px;

    padding:2px 2px 14px;
}

.otabek-message{
    max-width:92%;

    padding:12px 13px;

    border-radius:18px;

    font-size:14px;
    line-height:1.45;
}

.otabek-message.bot{
    align-self:flex-start;

    background:rgba(255,255,255,.055);
    border:1px solid rgba(255,255,255,.07);

    color:#ebe4f5;
}

.otabek-message.user{
    align-self:flex-end;

    background:
        linear-gradient(
            90deg,
            rgba(203,108,230,.34),
            rgba(168,85,247,.24)
        );

    border:1px solid rgba(203,108,230,.36);

    color:#fff;
}

/* =========================
   CHAT HISTORY
========================= */

.otabek-chat-history-item{
    width:100%;

    border:none;
    border-radius:16px;

    padding:12px 13px;

    background:rgba(255,255,255,.055);
    border:1px solid rgba(255,255,255,.08);

    color:#fff;

    display:flex;
    flex-direction:column;
    gap:5px;

    text-align:left;
}

.otabek-chat-history-title{
    font-size:13px;
    line-height:1.25;
    font-weight:800;
}

.otabek-chat-history-date{
    color:var(--otabek-muted);

    font-size:11px;
    line-height:1.2;
    font-weight:700;
}

.otabek-history-empty{
    padding:14px;

    border-radius:16px;

    background:rgba(255,255,255,.045);
    border:1px solid rgba(255,255,255,.07);

    color:var(--otabek-muted);

    font-size:13px;
    line-height:1.35;
}

/* =========================
   DESKTOP
========================= */

.otabek-desktop{
    position:sticky;
    top:0;
}

.otabek-card{
    height:calc(100vh - 58px);
    min-height:620px;

    border-radius:28px;

    padding:18px;

    gap:16px;
}

.otabek-head{
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:0;

    margin-bottom:0;
    padding-top:4px;
}

.otabek-desktop .otabek-avatar{
    width:86px;
    height:86px;

    border-radius:28px;

    margin-bottom:12px;
}

.otabek-desktop .otabek-avatar-letter{
    font-size:36px;
    line-height:1;
}

.otabek-desktop .otabek-name{
    font-size:21px;
    line-height:1.1;
}

.otabek-desktop .otabek-role{
    margin-top:4px;

    font-size:13px;
    line-height:1.35;
}

.otabek-desktop .otabek-messages{
    display:flex;

    flex:1;
    min-height:0;

    margin-top:4px;
}

.otabek-desktop .otabek-messages.active{
    display:flex;
}

.otabek-desktop .otabek-history-btn{
    margin-top:auto;
}

/* =========================
   MOBILE
========================= */

.otabek-mobile-fab{
    position:fixed;

    right:16px;
    bottom:calc(18px + env(safe-area-inset-bottom));

    width:58px;
    height:58px;

    border:none;
    border-radius:22px;

    overflow:hidden;

    background:#000;

    color:#fff;

    display:flex;
    align-items:center;
    justify-content:center;

    z-index:3000;

    box-shadow:0 18px 38px rgba(203,108,230,.32);
}


.otabek-mobile-fab .otabek-avatar-letter{
    font-size:22px;
}

.otabek-mobile-overlay{
    position:fixed;
    inset:0;

    display:none;

    align-items:flex-end;

    padding:14px;
    padding-bottom:calc(14px + env(safe-area-inset-bottom));

    background:rgba(0,0,0,.58);

    backdrop-filter:blur(10px);

    z-index:4000;
}

.otabek-mobile-overlay.active{
    display:flex;
}

.otabek-mobile-card{
    width:100%;
    height:min(680px, 84vh);

    border-radius:30px;

    padding:16px;

    gap:12px;
}

.otabek-mobile-top{
    justify-content:space-between;

    gap:12px;

    margin-bottom:2px;
}

.otabek-mobile-left{
    display:flex;
    align-items:center;
    gap:12px;
}

.otabek-mobile-left .otabek-avatar{
    width:46px;
    height:46px;

    border-radius:18px;
}

.otabek-mobile-left .otabek-avatar-letter{
    font-size:20px;
}

.otabek-mobile-left .otabek-name{
    font-size:17px;
    line-height:1.1;
}

.otabek-mobile-left .otabek-role{
    margin-top:4px;

    font-size:12px;
    line-height:1.2;
}

.otabek-mobile-card .otabek-messages{
    display:flex;
}

.otabek-mobile-card .otabek-history-btn{
    margin-top:0;
}

.otabek-close{
    width:34px;
    height:34px;

    border:none;
    border-radius:50%;

    background:rgba(255,255,255,.08);

    color:#fff;

    font-size:22px;

    display:flex;
    align-items:center;
    justify-content:center;
}

.otabek-close:active{
    transform:scale(.94);
}

@media (max-width:1023px){
    .otabek-mobile-card .otabek-input{
        font-size:16px;
    }
}

/* =========================
   HISTORY BUTTON
========================= */

.otabek-card{
    position:relative;
}

.otabek-history-icon{
    position:absolute;
    top:18px;
    right:18px;

    width:38px;
    height:38px;

    border:none;
    border-radius:14px;

    background:rgba(255,255,255,.055);
    border:1px solid rgba(255,255,255,.08);

    color:#fff;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:18px;
    font-weight:900;
}

.otabek-history-icon span{
    position:absolute;
    top:44px;
    right:0;

    padding:8px 10px;

    border-radius:12px;

    background:#1b1924;
    border:1px solid rgba(255,255,255,.08);

    color:#fff;

    font-size:11px;
    line-height:1;
    font-weight:800;
    white-space:nowrap;

    opacity:0;
    pointer-events:none;
    transform:translateY(-4px);

    transition:.16s ease;
}

.otabek-history-icon:hover span{
    opacity:1;
    transform:translateY(0);
}

.otabek-actions.hidden{
    display:none;
}

@media (max-width:1023px){
    .otabek-history-icon{
        display:none;
    }
}

/* =========================
   RESPONSIVE VISIBILITY
========================= */

@media (max-width:1023px){
    .otabek-desktop{
        display:none;
    }
}

@media (min-width:1024px){
    .otabek-mobile-fab,
    .otabek-mobile-overlay{
        display:none;
    }
}
</style>

<script>
(function(){

    const otabekLang =
        window.OTABEK_LANG || localStorage.getItem("lang") || "uz"

    const OTABEK_STORAGE_KEY =
        window.OTABEK_STORAGE_KEY || `gaphub_otabek_default_${otabekLang}`

    const OTABEK_CHATS_KEY =
        OTABEK_STORAGE_KEY + "_chats"

    const otabekText = {

        ru:{
            name:"Отабек",
            role:"AI-помощник урока",
            history:"История чатов",
            historyEmpty:"История пока пустая",
            newChat:"Новый чат",
            placeholder:"Спроси по уроку...",

            hello:"Привет. Я помогу разобраться с уроком. Можешь спросить меня про SMM, аудиторию, контент или тест.",

            quickSimple:"Объясни проще",
            quickSimpleMobile:"Проще",
            quickSimplePrompt:"Объясни тему проще",

            quickExample:"Пример",
            quickExamplePrompt:"Приведи пример",

            quickMain:"Главное",
            quickMainPrompt:"Что главное запомнить?",

            answerSimple:"Если проще: SMM помогает бизнесу быть заметным в соцсетях, объяснять ценность продукта и постепенно приводить людей к покупке.",
            answerExample:"Например, салон красоты может показывать не только результат, но и процесс работы, уход после процедуры и ответы на частые вопросы клиентов.",
            answerMain:"Главное из урока: SMM это не просто публикация постов. Это система: контент, внимание, доверие и действие.",
            answerAudience:"ЦА — это люди, которым реально может быть интересен продукт или услуга. Без понимания аудитории сложно делать хороший контент.",
            answerDefault:"Пока я работаю в тестовом режиме. Позже меня подключат к полноценному AI, и я смогу отвечать намного глубже и точнее.",

            locale:"ru-RU"
        },

        uz:{
            name:"Otabek",
            role:"Dars AI yordamchisi",
            history:"Chatlar tarixi",
            historyEmpty:"Tarix hozircha bo‘sh",
            newChat:"Yangi chat",
            placeholder:"Dars bo‘yicha savol yozing...",

            hello:"Salom. Men darsni tushunishga yordam beraman. Mendan SMM, auditoriya, kontent yoki test bo‘yicha so‘rashingiz mumkin.",

            quickSimple:"Soddaroq tushuntir",
            quickSimpleMobile:"Soddaroq",
            quickSimplePrompt:"Mavzuni soddaroq tushuntir",

            quickExample:"Misol",
            quickExamplePrompt:"Misol keltir",

            quickMain:"Asosiy fikr",
            quickMainPrompt:"Eng asosiy nimani eslab qolish kerak?",

            answerSimple:"Soddaroq aytganda: SMM biznesga ijtimoiy tarmoqlarda ko‘rinish, mahsulot qiymatini tushuntirish va odamlarni asta-sekin xaridga olib kelishga yordam beradi.",
            answerExample:"Masalan, go‘zallik saloni faqat natijani emas, jarayonni, protseduradan keyingi parvarishni va mijozlarning ko‘p so‘raydigan savollariga javoblarni ham ko‘rsatishi mumkin.",
            answerMain:"Darsdagi eng asosiy fikr: SMM shunchaki post joylash emas. Bu tizim: kontent, e’tibor, ishonch va harakat.",
            answerAudience:"Auditoriya — mahsulot yoki xizmatga haqiqatda qiziqishi mumkin bo‘lgan odamlar. Auditoriyani tushunmasdan yaxshi kontent qilish qiyin.",
            answerDefault:"Hozir men test rejimida ishlayapman. Keyinroq meni to‘liq AI bilan ulaymiz va men ancha chuqurroq hamda aniqroq javob bera olaman.",

            locale:"uz-UZ"
        }
    }

    const d =
        otabekText[otabekLang] || otabekText.uz

    let otabekChats = JSON.parse(
        localStorage.getItem(OTABEK_CHATS_KEY) || "[]"
    )

    let currentOtabekChatId = null
    let otabekHistoryViewOpen = false

    function saveOtabekChats(){

        localStorage.setItem(
            OTABEK_CHATS_KEY,
            JSON.stringify(otabekChats)
        )
    }

    function createOtabekChat(firstText){

        const chat = {
            id:"chat_" + Date.now(),
            title:firstText ? firstText.slice(0, 42) : d.newChat,
            createdAt:new Date().toISOString(),
            updatedAt:new Date().toISOString(),
            messages:[]
        }

        otabekChats.unshift(chat)
        currentOtabekChatId = chat.id

        saveOtabekChats()

        return chat
    }

    function getCurrentOtabekChat(){

        if(!currentOtabekChatId) return null

        return otabekChats.find(chat => chat.id === currentOtabekChatId) || null
    }

    function updateOtabekStaticText(){

        document
            .querySelectorAll(".otabek-name")
            .forEach(item => {
                item.innerText = d.name
            })

        document
            .querySelectorAll(".otabek-role")
            .forEach(item => {
                item.innerText = d.role
            })

        document
            .querySelectorAll(".otabek-avatar-img")
            .forEach(item => {
                item.alt = d.name
            })

        const historyIcon =
            document.querySelector(".otabek-history-icon")

        if(historyIcon){
            historyIcon.setAttribute("aria-label", d.history)

            const span =
                historyIcon.querySelector("span")

            if(span){
                span.innerText = d.history
            }
        }

        document
            .querySelectorAll(".otabek-history-btn")
            .forEach(item => {
                item.innerText = d.history
            })

        document
            .querySelectorAll(".otabek-input")
            .forEach(item => {
                item.placeholder = d.placeholder
            })

        const desktopActions =
            document.querySelectorAll("#otabekActionsDesktop .otabek-action")

        if(desktopActions[0]){
            desktopActions[0].innerText = d.quickSimple
            desktopActions[0].setAttribute(
                "onclick",
                `otabekQuick('${d.quickSimplePrompt}')`
            )
        }

        if(desktopActions[1]){
            desktopActions[1].innerText = d.quickExample
            desktopActions[1].setAttribute(
                "onclick",
                `otabekQuick('${d.quickExamplePrompt}')`
            )
        }

        if(desktopActions[2]){
            desktopActions[2].innerText = d.quickMain
            desktopActions[2].setAttribute(
                "onclick",
                `otabekQuick('${d.quickMainPrompt}')`
            )
        }

        const mobileActions =
            document.querySelectorAll("#otabekActionsMobile .otabek-action")

        if(mobileActions[0]){
            mobileActions[0].innerText = d.quickSimpleMobile
            mobileActions[0].setAttribute(
                "onclick",
                `otabekQuick('${d.quickSimplePrompt}')`
            )
        }

        if(mobileActions[1]){
            mobileActions[1].innerText = d.quickExample
            mobileActions[1].setAttribute(
                "onclick",
                `otabekQuick('${d.quickExamplePrompt}')`
            )
        }

        if(mobileActions[2]){
            mobileActions[2].innerText = d.quickMain
            mobileActions[2].setAttribute(
                "onclick",
                `otabekQuick('${d.quickMainPrompt}')`
            )
        }
    }

    function updateOtabekActionsVisibility(){

        const currentChat = getCurrentOtabekChat()

        const desktopActions =
            document.getElementById("otabekActionsDesktop")

        const mobileActions =
            document.getElementById("otabekActionsMobile")

        const shouldHide =
            otabekHistoryViewOpen ||
            Boolean(currentChat && currentChat.messages.length > 0)

        if(desktopActions){
            desktopActions.classList.toggle("hidden", shouldHide)
        }

        if(mobileActions){
            mobileActions.classList.toggle("hidden", shouldHide)
        }
    }

    function renderOtabekMessages(){

        const desktopRoot =
            document.getElementById("otabekMessages")

        const mobileRoot =
            document.getElementById("otabekMessagesMobile")

        const currentChat = getCurrentOtabekChat()

        const defaultMessage = `
            <div class="otabek-message bot">
                ${d.hello}
            </div>
        `

        let html = defaultMessage

        if(currentChat){
            html += currentChat.messages.map(item => `
                <div class="otabek-message ${item.role}">
                    ${item.text}
                </div>
            `).join("")
        }

        if(desktopRoot){
            desktopRoot.innerHTML = html
            desktopRoot.scrollTop = desktopRoot.scrollHeight
        }

        if(mobileRoot){
            mobileRoot.innerHTML = html
            mobileRoot.scrollTop = mobileRoot.scrollHeight
        }

        updateOtabekActionsVisibility()
    }

    function renderOtabekChatHistory(){

        const desktopRoot =
            document.getElementById("otabekMessages")

        const mobileRoot =
            document.getElementById("otabekMessagesMobile")

        const html = otabekChats.length
            ? otabekChats.map(chat => `
                <button
                    class="otabek-chat-history-item"
                    onclick="openOtabekChat('${chat.id}')"
                >
                    <span class="otabek-chat-history-title">
                        ${chat.title}
                    </span>
                    <span class="otabek-chat-history-date">
                        ${formatOtabekChatDate(chat.updatedAt)}
                    </span>
                </button>
            `).join("")
            : `
                <div class="otabek-history-empty">
                    ${d.historyEmpty}
                </div>
            `

        if(desktopRoot){
            desktopRoot.innerHTML = html
        }

        if(mobileRoot){
            mobileRoot.innerHTML = html
        }

        updateOtabekActionsVisibility()
    }

    function toggleOtabekHistory(){

        otabekHistoryViewOpen = !otabekHistoryViewOpen

        const desktopRoot =
            document.getElementById("otabekMessages")

        if(desktopRoot){
            desktopRoot.classList.add("active")
        }

        if(otabekHistoryViewOpen){
            renderOtabekChatHistory()
        }else{
            renderOtabekMessages()
        }
    }

    function openOtabekChat(chatId){

        currentOtabekChatId = chatId
        otabekHistoryViewOpen = false

        const desktopRoot =
            document.getElementById("otabekMessages")

        if(desktopRoot){
            desktopRoot.classList.add("active")
        }

        renderOtabekMessages()
    }

    function formatOtabekChatDate(value){

        const date =
            new Date(value)

        return date.toLocaleString(d.locale, {
            day:"2-digit",
            month:"2-digit",
            hour:"2-digit",
            minute:"2-digit"
        })
    }

    function toggleOtabekMobile(){

        const overlay =
            document.getElementById("otabekMobileOverlay")

        if(!overlay) return

        const willOpen =
            !overlay.classList.contains("active")

        overlay.classList.toggle("active")

        if(willOpen){
            currentOtabekChatId = null
            otabekHistoryViewOpen = false
            renderOtabekMessages()
        }
    }

    function otabekEnter(event){

        if(event.key === "Enter"){
            sendOtabekMessage()
        }
    }

    function otabekEnterMobile(event){

        if(event.key === "Enter"){
            sendOtabekMessageMobile()
        }
    }

    function otabekQuick(text){

        const desktopInput =
            document.getElementById("otabekInput")

        const mobileInput =
            document.getElementById("otabekInputMobile")

        if(desktopInput){
            desktopInput.value = text
        }

        if(mobileInput){
            mobileInput.value = text
        }

        if(window.innerWidth >= 1024){
            sendOtabekMessage()
        }else{
            sendOtabekMessageMobile()
        }
    }

    function sendOtabekMessage(){

        const input =
            document.getElementById("otabekInput")

        if(!input) return

        const text =
            input.value.trim()

        if(!text) return

        input.value = ""

        addOtabekMessage(text)
    }

    function sendOtabekMessageMobile(){

        const input =
            document.getElementById("otabekInputMobile")

        if(!input) return

        const text =
            input.value.trim()

        if(!text) return

        input.value = ""

        addOtabekMessage(text)
    }

    function addOtabekMessage(text){

        let currentChat =
            getCurrentOtabekChat()

        if(!currentChat){
            currentChat = createOtabekChat(text)
        }

        currentChat.messages.push({
            role:"user",
            text:text
        })

        currentChat.messages.push({
            role:"bot",
            text:getOtabekMockAnswer(text)
        })

        currentChat.updatedAt =
            new Date().toISOString()

        if(!currentChat.title || currentChat.title === d.newChat){
            currentChat.title = text.slice(0, 42)
        }

        otabekChats =
            otabekChats.filter(chat => chat.id !== currentChat.id)

        otabekChats.unshift(currentChat)

        currentOtabekChatId = currentChat.id
        otabekHistoryViewOpen = false

        saveOtabekChats()

        const desktopRoot =
            document.getElementById("otabekMessages")

        if(desktopRoot){
            desktopRoot.classList.add("active")
        }

        renderOtabekMessages()
    }

    function getOtabekMockAnswer(text){

        const lower =
            text.toLowerCase()

        if(
            lower.includes("проще") ||
            lower.includes("sodda") ||
            lower.includes("soddaroq") ||
            lower.includes("oddiy") ||
            lower.includes("tushuntir")
        ){
            return d.answerSimple
        }

        if(
            lower.includes("пример") ||
            lower.includes("misol")
        ){
            return d.answerExample
        }

        if(
            lower.includes("главное") ||
            lower.includes("asosiy") ||
            lower.includes("eslab")
        ){
            return d.answerMain
        }

        if(
            lower.includes("ца") ||
            lower.includes("аудитория") ||
            lower.includes("auditoriya")
        ){
            return d.answerAudience
        }

        return d.answerDefault
    }

    window.toggleOtabekHistory = toggleOtabekHistory
    window.openOtabekChat = openOtabekChat
    window.toggleOtabekMobile = toggleOtabekMobile
    window.otabekEnter = otabekEnter
    window.otabekEnterMobile = otabekEnterMobile
    window.otabekQuick = otabekQuick
    window.sendOtabekMessage = sendOtabekMessage
    window.sendOtabekMessageMobile = sendOtabekMessageMobile

    updateOtabekStaticText()
    renderOtabekMessages()

})()
</script>
