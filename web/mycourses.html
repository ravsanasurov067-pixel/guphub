<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>gaphub - my courses</title>

<style>
:root{
    --accent:#cb6ce6;
    --accent-2:#a855f7;
    --bg:#0c0b14;
    --bg-soft:#15141e;
    --card:#111117;
    --card-2:#17171f;
    --text:#ffffff;
    --muted:#a8a4b5;
    --muted-soft:#8f8a9e;
    --line:rgba(255,255,255,.07);
    --shadow:0 12px 38px rgba(0,0,0,.35);

    --radius-xl:28px;
    --radius-lg:22px;
    --radius-md:16px;
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html, body{
    margin:0;
    padding:0;
    min-height:100%;
    font-family:Arial, sans-serif;
    background:#000;
    color:#fff;
}

body{
    position:relative;
}

img{
    display:block;
    max-width:100%;
}

button{
    font-family:inherit;
    cursor:pointer;
}

.desktop-only{
    display:none;
}

.btn{
    border:none;
    border-radius:18px;
    transition:.2s ease;
    font-weight:700;
}

.btn:active{
    transform:scale(.99);
}

.btn-primary{
    color:#fff;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    box-shadow:0 14px 32px rgba(203,108,230,.22);
}

.btn-secondary{
    color:#fff;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.10);
}

.glow-card{
    background:
        radial-gradient(circle at 86% 14%, rgba(203,108,230,.18), transparent 26%),
        radial-gradient(circle at 15% 88%, rgba(203,108,230,.08), transparent 22%),
        linear-gradient(180deg, #171621 0%, #0f0e17 100%);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:var(--shadow);
}

.soft-card{
    background:
        radial-gradient(circle at 88% 18%, rgba(203,108,230,.10), transparent 24%),
        linear-gradient(180deg, #121219 0%, #0d0d12 100%);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:var(--shadow);
}

/* =========================
   MOBILE
========================= */
.mobile-shell{
    display:block;
}

.mobile-page{
    min-height:calc(100vh + 24px);
    padding:
        calc(env(safe-area-inset-top) + 78px)
        16px
        calc(112px + env(safe-area-inset-bottom));

    background:
        radial-gradient(circle at 20% 8%, rgba(203,108,230,.12), transparent 24%),
        linear-gradient(180deg, #09080f 0%, #0c0b14 100%);
}

.mobile-header{
    animation:fadeUp .42s ease both;
}

.mobile-title{
    margin:0 0 8px;
    font-size:clamp(34px,9vw,42px);
    line-height:.94;
    font-weight:800;
    letter-spacing:-1px;
}

.mobile-subtitle{
    margin:0;
    max-width:330px;
    color:var(--muted);
    font-size:15px;
    line-height:1.45;
}

.mobile-catalog-action{
    margin-top:18px;
    animation:fadeUp .45s ease both;
    animation-delay:.06s;
}

.mobile-catalog-btn{
    width:100%;
    min-height:56px;
    border:none;
    border-radius:20px;
    color:#fff;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    box-shadow:0 14px 32px rgba(203,108,230,.25);
    font-size:16px;
    font-weight:800;
    transition:transform .18s ease, opacity .18s ease;
}

.mobile-catalog-btn:active{
    transform:scale(.985);
    opacity:.92;
}

.mobile-section{
    margin-top:22px;
}

.mobile-section-title{
    margin:0 0 14px;
    font-size:22px;
    line-height:1.1;
    font-weight:800;
    animation:fadeUp .45s ease both;
    animation-delay:.10s;
}

.mobile-loading{
    border-radius:24px;
    padding:20px;
    color:var(--muted);
    text-align:center;
    animation:fadeUp .45s ease both;
}

.mobile-empty{
    border-radius:26px;
    padding:24px 18px;
    text-align:center;
    animation:fadeUp .45s ease both;
}

.mobile-empty-icon{
    width:76px;
    height:76px;
    margin:0 auto 14px;
    border-radius:24px;
    background:rgba(255,255,255,.05);
    display:flex;
    align-items:center;
    justify-content:center;
}

.mobile-empty-icon img{
    width:42px;
    height:42px;
    object-fit:contain;
}

.mobile-empty-title{
    margin:0 0 8px;
    font-size:23px;
    line-height:1.12;
    font-weight:800;
}

.mobile-empty-text{
    margin:0 auto 18px;
    max-width:310px;
    color:var(--muted);
    font-size:14px;
    line-height:1.48;
}

.mobile-empty-btn{
    width:100%;
    min-height:54px;
    border:none;
    border-radius:18px;
    color:#fff;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    box-shadow:0 14px 32px rgba(203,108,230,.22);
    font-size:16px;
    font-weight:800;
    transition:transform .18s ease, opacity .18s ease;
}

.mobile-empty-btn:active{
    transform:scale(.985);
    opacity:.92;
}

.mobile-course-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.mobile-course-card{
    display:flex;
    gap:13px;
    border-radius:24px;
    padding:14px;
    cursor:pointer;
    overflow:hidden;
    animation:fadeUp .45s ease both;
    transition:transform .18s ease, opacity .18s ease;
}

.mobile-course-list .mobile-course-card:nth-child(1){
    animation-delay:.12s;
}

.mobile-course-list .mobile-course-card:nth-child(2){
    animation-delay:.18s;
}

.mobile-course-list .mobile-course-card:nth-child(3){
    animation-delay:.24s;
}

.mobile-course-card:active{
    transform:scale(.985);
    opacity:.92;
}

.mobile-course-cover{
    width:88px;
    height:88px;
    border-radius:20px;
    background:#1a1a1a;
    object-fit:cover;
    flex-shrink:0;
}

.mobile-course-body{
    min-width:0;
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.mobile-course-label{
    display:inline-flex;
    align-items:center;
    width:max-content;
    max-width:100%;
    background:#2a1933;
    color:#d68cff;
    border-radius:999px;
    padding:6px 9px;
    font-size:11px;
    margin-bottom:8px;
}

.mobile-course-title{
    margin:0 0 6px;
    font-size:18px;
    font-weight:800;
    line-height:1.16;
}

.mobile-course-sub{
    color:var(--muted-soft);
    font-size:13px;
    line-height:1.35;
    margin-bottom:10px;
}

.mobile-progress-line{
    height:7px;
    border-radius:999px;
    background:rgba(255,255,255,.08);
    overflow:hidden;
}

.mobile-progress-fill{
    height:100%;
    border-radius:999px;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    width:0%;
}

.mobile-progress-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    margin-top:7px;
    color:var(--muted-soft);
    font-size:12px;
}

.mobile-course-summary{
    margin-top:12px;
    display:inline-flex;
    align-items:center;
    max-width:100%;
    min-height:34px;
    padding:0 12px;
    border-radius:999px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08);
    color:#e9e2f1;
    font-size:13px;
    font-weight:700;
    line-height:1.25;
    animation:fadeUp .45s ease both;
    animation-delay:.04s;
}

/* BOTTOM NAV */
.bottom-nav{
    position:fixed;
    left:0;
    bottom:0;
    width:100%;
    background:#000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 10px;
    padding-bottom:calc(8px + env(safe-area-inset-bottom));
    z-index:50;
}

.nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:12px;
    color:#fff;
    width:20%;
    text-align:center;
    cursor:pointer;
}

.nav-item img{
    width:27px;
    margin-bottom:2px;
}

.nav-item span{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.nav-item.active-mobile-nav span{
    color:#d68cff;
}

.nav-item.active-mobile-nav img{
    filter:
        drop-shadow(0 0 10px rgba(203,108,230,.45))
        brightness(1.08);
}

.nav-center{
    position:relative;
    top:-18px;
    width:20%;
    display:flex;
    justify-content:center;
}

.circle{
    width:60px;
    height:60px;
    background:#ffffff;
    border-radius:50%;
    border:4px solid var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 10px 30px rgba(203,108,230,.25);
}

.circle img{
    width:24px;
    height:24px;
    object-fit:contain;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(14px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* =========================
   DESKTOP
========================= */
@media (min-width:1024px){
    html, body{
        min-height:100vh;
        background:
            radial-gradient(circle at 15% 18%, rgba(203,108,230,.08), transparent 24%),
            radial-gradient(circle at 85% 28%, rgba(203,108,230,.07), transparent 24%),
            linear-gradient(180deg, #09080f 0%, #0c0b14 100%);
        color:var(--text);
    }

    body{
        overflow:hidden;
    }

    .mobile-shell{
        display:none;
    }

    .desktop-only{
        display:block;
    }

    .desktop-app{
        min-height:100vh;
        color:var(--text);
    }

    .desktop-layout{
        display:grid;
        grid-template-columns:270px minmax(0,1fr);
        min-height:100vh;
    }

    .desktop-sidebar{
        padding:22px 20px;
        border-right:1px solid rgba(255,255,255,.05);
        background:linear-gradient(180deg, rgba(14,13,23,.70) 0%, rgba(12,11,20,.40) 100%);
        overflow:auto;
    }

    .desktop-brand{
        font-size:34px;
        font-weight:800;
        line-height:1;
        margin:8px 0 56px;
    }

    .desktop-nav{
        display:flex;
        flex-direction:column;
        gap:10px;
        margin-top:4px;
    }

    .desktop-nav-item{
        display:flex;
        align-items:center;
        gap:14px;
        width:100%;
        min-height:56px;
        padding:0 18px;
        border-radius:16px;
        color:#f1f1f1;
        background:transparent;
        border:1px solid transparent;
        font-size:16px;
        font-weight:600;
        transition:.2s ease;
        cursor:pointer;
        text-align:left;
    }

    .desktop-nav-item img{
        width:28px;
        height:28px;
        object-fit:contain;
        flex-shrink:0;
    }

    .desktop-nav-item.active-nav{
        background:linear-gradient(180deg, rgba(255,255,255,.06) 0%, rgba(255,255,255,.03) 100%);
        border-color:rgba(255,255,255,.06);
        box-shadow:var(--shadow);
    }

    .desktop-nav-item-accent{
        background:linear-gradient(90deg, #b85bda 0%, #cb6ce6 100%);
        border-color:transparent;
        color:#fff;
        box-shadow:0 12px 26px rgba(203,108,230,.28);
        margin-top:8px;
    }

    .desktop-nav-item-accent:hover{
        transform:translateY(-1px);
    }

    .desktop-nav-item-accent img{
        filter:brightness(0) invert(1);
    }

    .desktop-main{
        padding:24px 22px 30px;
        height:100vh;
        overflow:auto;
    }

    .desktop-back{
        display:inline-flex;
        align-items:center;
        gap:14px;
        font-size:24px;
        color:#fff;
        margin-bottom:18px;
        cursor:pointer;
        user-select:none;
    }

    .desktop-back-arrow{
        font-size:42px;
        line-height:1;
        transform:translateY(-1px);
    }

    .desktop-hero{
        position:relative;
        overflow:hidden;
        border-radius:30px;
        padding:24px 22px 22px;
    }

    .desktop-badge{
        display:inline-flex;
        align-items:center;
        gap:8px;
        background:rgba(255,255,255,.06);
        border:1px solid rgba(255,255,255,.06);
        border-radius:999px;
        padding:10px 14px;
        font-size:13px;
        color:#ebe4f5;
        margin-bottom:18px;
    }

    .desktop-hero-grid{
        display:grid;
        grid-template-columns:minmax(0,1.15fr) minmax(320px,.85fr);
        gap:18px;
        align-items:stretch;
    }

    .desktop-hero-title{
        margin:0 0 10px;
        font-size:clamp(38px,3.2vw,56px);
        line-height:.96;
        font-weight:800;
        letter-spacing:-1px;
    }

    .desktop-hero-text{
        margin:0;
        color:var(--muted);
        font-size:17px;
        line-height:1.52;
        max-width:680px;
    }

    .desktop-side-panel{
        display:flex;
        flex-direction:column;
        gap:12px;
        min-width:0;
    }

    .desktop-mini-grid{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:12px;
    }

    .desktop-mini-card{
        background:rgba(255,255,255,.04);
        border-radius:18px;
        padding:14px;
        min-height:92px;
    }

    .desktop-mini-label{
        color:var(--muted-soft);
        font-size:12px;
        margin-bottom:8px;
    }

    .desktop-mini-value{
        font-size:16px;
        font-weight:700;
        line-height:1.35;
    }

    .desktop-top-actions{
        display:flex;
        justify-content:center;
        gap:12px;
    }

    .desktop-top-btn{
        width:100%;
        max-width:420px;
        height:58px;
        font-size:16px;
    }

    .desktop-section{
        margin-top:16px;
    }

    .desktop-section-title{
        margin:0 0 14px;
        font-size:28px;
        line-height:1.1;
        font-weight:800;
    }

    .desktop-loading{
        border-radius:24px;
        padding:28px;
        color:var(--muted);
        text-align:center;
    }

    .desktop-empty{
        border-radius:28px;
        padding:38px 24px;
        text-align:center;
    }

    .desktop-empty-icon{
        width:96px;
        height:96px;
        margin:0 auto 16px;
        border-radius:28px;
        background:rgba(255,255,255,.05);
        display:flex;
        align-items:center;
        justify-content:center;
    }

    .desktop-empty-icon img{
        width:54px;
        height:54px;
        object-fit:contain;
    }

    .desktop-empty-title{
        margin:0 0 10px;
        font-size:30px;
        font-weight:800;
        line-height:1.1;
    }

    .desktop-empty-text{
        margin:0 auto 18px;
        max-width:520px;
        color:var(--muted);
        font-size:16px;
        line-height:1.55;
    }

    .desktop-course-grid{
        display:grid;
        grid-template-columns:repeat(3, minmax(0,1fr));
        gap:14px;
    }

    .desktop-course-card{
        border-radius:24px;
        overflow:hidden;
        cursor:pointer;
        min-height:100%;
    }

    .desktop-course-cover{
        width:100%;
        height:168px;
        background:#1a1a1a;
        object-fit:cover;
    }

    .desktop-course-body{
        padding:16px;
    }

    .desktop-course-label{
        display:inline-flex;
        align-items:center;
        max-width:100%;
        background:#2a1933;
        color:#d68cff;
        border-radius:999px;
        padding:7px 10px;
        font-size:12px;
        margin-bottom:10px;
    }

    .desktop-course-title{
        margin:0 0 8px;
        font-size:20px;
        font-weight:800;
        line-height:1.18;
    }

    .desktop-course-sub{
        color:var(--muted-soft);
        font-size:14px;
        line-height:1.45;
        margin-bottom:14px;
    }

    .desktop-progress-line{
        height:8px;
        border-radius:999px;
        background:rgba(255,255,255,.08);
        overflow:hidden;
    }

    .desktop-progress-fill{
        height:100%;
        border-radius:999px;
        background:linear-gradient(90deg,var(--accent),var(--accent-2));
        width:0%;
    }

    .desktop-progress-row{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:8px;
        margin-top:8px;
        color:var(--muted-soft);
        font-size:13px;
    }

    .desktop-actions-grid{
        display:grid;
        grid-template-columns:repeat(3, minmax(0,1fr));
        gap:14px;
    }

    .desktop-action-card{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:14px;
        border-radius:22px;
        padding:18px;
        min-height:124px;
        cursor:pointer;
    }

    .desktop-action-left{
        display:flex;
        align-items:center;
        gap:14px;
        min-width:0;
    }

    .desktop-action-icon{
        width:50px;
        height:50px;
        border-radius:14px;
        background:#22222d;
        flex-shrink:0;
        display:flex;
        align-items:center;
        justify-content:center;
        overflow:hidden;
    }

    .desktop-action-icon img{
        width:30px;
        height:30px;
        object-fit:contain;
    }

    .desktop-action-title{
        font-size:18px;
        font-weight:700;
        line-height:1.25;
    }

    .desktop-action-sub{
        margin-top:4px;
        font-size:14px;
        color:var(--muted-soft);
    }

    .desktop-action-arrow{
        font-size:24px;
        color:#bfbfbf;
        line-height:1;
        flex-shrink:0;
    }
}

@media (max-width:1360px) and (min-width:1024px){
    .desktop-layout{
        grid-template-columns:245px minmax(0,1fr);
    }

    .desktop-main{
        padding:22px 18px 26px;
    }

    .desktop-hero-grid{
        grid-template-columns:1fr;
    }

    .desktop-course-grid{
        grid-template-columns:repeat(2, minmax(0,1fr));
    }

    .desktop-actions-grid{
        grid-template-columns:1fr;
    }
}

@media (max-width:760px){
    .mobile-mini-grid{
        grid-template-columns:1fr 1fr;
    }
}

@media (max-width:420px){
    .mobile-hero{
        border-radius:22px;
    }

    .mobile-mini-grid{
        grid-template-columns:1fr;
    }

    .mobile-course-cover{
        width:82px;
        height:82px;
    }
}
</style>
</head>

<body>

<!-- MOBILE -->
<div class="mobile-shell">
    <div class="mobile-page">

        <section class="mobile-header">
            <h1 class="mobile-title" id="heroTitle-mobile"></h1>
            <p class="mobile-subtitle" id="heroText-mobile"></p>
            <div class="mobile-course-summary" id="mobileCourseSummary"></div>

            <div class="mobile-catalog-action" id="mobileCatalogAction">
                <button class="mobile-catalog-btn" onclick="goCourses()" id="catalogBtn-mobile"></button>
            </div>
        </section>

        <section class="mobile-section">
            <h2 class="mobile-section-title" id="sectionTitle-mobile"></h2>
            <div id="mobile-content"></div>
        </section>

    </div>

    <div class="bottom-nav">
        <div class="nav-item active-mobile-nav" onclick="goPage('mycourses.html')">
            <img src="images/icon/courses2.png" alt="">
            <span id="m1-mobile"></span>
        </div>

        <div class="nav-item" onclick="goPage('support.html')">
            <img src="images/icon/support.png" alt="">
            <span id="m4-mobile"></span>
        </div>

        <div class="nav-center" onclick="goHome()">
            <div class="circle">
                <img src="images/icon/home2.png" alt="home">
            </div>
        </div>

        <div class="nav-item" onclick="goPage('chat.html')">
            <img src="images/icon/feedback.png" alt="">
            <span id="m5-mobile"></span>
        </div>

        <div class="nav-item" onclick="goPage('myprofile.html')">
            <img src="images/icon/profile2.png" alt="">
            <span id="m6-mobile"></span>
        </div>
    </div>
</div>

<!-- DESKTOP -->
<div class="desktop-app desktop-only">
    <div class="desktop-layout">
        <aside class="desktop-sidebar">
            <div class="desktop-brand">gaphub</div>

            <nav class="desktop-nav">
                <button class="desktop-nav-item" onclick="goHome()">
                    <img src="images/icon/home.png" alt="">
                    <span id="home-desktop"></span>
                </button>

                <button class="desktop-nav-item active-nav" onclick="goPage('mycourses.html')">
                    <img src="images/icon/courses2.png" alt="">
                    <span id="m1-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('support.html')">
                    <img src="images/icon/support.png" alt="">
                    <span id="m4-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('chat.html')">
                    <img src="images/icon/feedback.png" alt="">
                    <span id="m5-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('myprofile.html')">
                    <img src="images/icon/profile2.png" alt="">
                    <span id="m6-desktop"></span>
                </button>

                <button class="desktop-nav-item desktop-nav-item-accent" onclick="goCourses()">
                    <img src="images/icon/catalog.png" alt="">
                    <span id="catalog-desktop"></span>
                </button>
            </nav>
        </aside>

        <main class="desktop-main">

            <section class="desktop-hero glow-card">
                <div class="desktop-badge" id="badge-desktop"></div>

                <div class="desktop-hero-grid">
                    <div>
                        <h1 class="desktop-hero-title" id="heroTitle-desktop"></h1>
                        <p class="desktop-hero-text" id="heroText-desktop"></p>
                    </div>

                    <div class="desktop-side-panel">
                        <div class="desktop-mini-grid">
                            <div class="desktop-mini-card">
                                <div class="desktop-mini-label" id="mini1Label-desktop"></div>
                                <div class="desktop-mini-value" id="mini1Value-desktop"></div>
                            </div>
                            <div class="desktop-mini-card">
                                <div class="desktop-mini-label" id="mini2Label-desktop"></div>
                                <div class="desktop-mini-value" id="mini2Value-desktop"></div>
                            </div>
                        </div>

                        <div class="desktop-top-actions">
                            <button class="btn btn-primary desktop-top-btn" id="catalogBtn-desktop" onclick="goCourses()"></button>
                        </div>
                    </div>
                </div>
            </section>

            <section class="desktop-section">
                <h2 class="desktop-section-title" id="sectionTitle-desktop"></h2>
                <div id="desktop-content"></div>
            </section>

        </main>
    </div>
</div>

<script>
let lang = localStorage.getItem("lang") || "uz"

let telegramUser = null
let coursesData = []

const TOTAL_MAIN_COURSES = 3

const t = {
    uz:{
        home:"Bosh sahifa",
        m1:"Kurslarim",
        m4:"Aloqa",
        m5:"Sharhlar",
        m6:"Profil",

        heroTitle:"Mening kurslarim",
        heroText:"Davom eting va skilllaringizni rivojlantiring.",

        catalogBtn:"Yangi kurs olish",

        sectionTitle:"Faol kurslar",

        loading:"Kurslar yuklanmoqda...",

        emptyTitle:"Sizda hali kurs yo‘q",
        emptyText:"Kurs sotib olganingizdan keyin ular shu yerda paydo bo‘ladi.",
        emptyBtn:"Kurslarni ko‘rish",

        continue:"Davom etish",
        completed:"Tugallangan",
        lessons:"dars",

        smm:"SMM kursi",
        target:"Target kursi",
        ai:"AI kursi"
    },

    ru:{
        home:"Главное меню",
        m1:"Мои курсы",
        m4:"Поддержка",
        m5:"Отзывы",
        m6:"Профиль",

        heroTitle:"Мои курсы",
        heroText:"Продолжай обучение и развивай навыки.",

        catalogBtn:"Купить новый курс",

        sectionTitle:"Активные курсы",

        loading:"Загрузка курсов...",

        emptyTitle:"У вас пока нет курсов",
        emptyText:"После покупки курсы появятся здесь.",
        emptyBtn:"Посмотреть курсы",

        continue:"Продолжить",
        completed:"Завершено",
        lessons:"уроков",

        smm:"Курс SMM",
        target:"Курс Target",
        ai:"Курс AI"
    }
}

function impact(){
    if(window.Telegram && Telegram.WebApp && Telegram.WebApp.HapticFeedback){
        Telegram.WebApp.HapticFeedback.impactOccurred("light")
    }
}

function setText(id, value){
    const el = document.getElementById(id)
    if(el) el.innerText = value
}

function normalizeCourse(course){
    const slug = String(
        course.slug ||
        course.course ||
        course.name ||
        ""
    ).toLowerCase()

    return {
        slug,
        progress:Number(course.progress || 0),
        completedLessons:Number(course.completed_lessons || 0)
    }
}

function getCourseInfo(slug){
    const d = t[lang]

    if(slug.includes("smm")){
        return {
            title:d.smm,
            image:"images/home/smm2.webp",
            page:"learn-smm-v2.html"
        }
    }

    if(slug.includes("target")){
        return {
            title:d.target,
            image:"images/home/target2.webp",
            page:"learn-target.html"
        }
    }

    if(slug.includes("ai")){
        return {
            title:d.ai,
            image:"images/home/ai2.webp",
            page:"learn-ai.html"
        }
    }

    return {
        title:"Course",
        image:"images/course-placeholder.webp",
        page:"courses.html"
    }
}

function updateCatalogVisibility(){
    const wrap = document.getElementById("mobileCatalogAction")

    if(!wrap) return

    if(coursesData.length >= TOTAL_MAIN_COURSES){
        wrap.style.display = "none"
    }else{
        wrap.style.display = "block"
    }
}

function updateCourseSummary(){
    const el = document.getElementById("mobileCourseSummary")
    if(!el) return

    const count = coursesData.length

    if(count === 0){
        el.innerText = lang === "uz"
            ? "Kurslar hali yo‘q"
            : "Курсов пока нет"
        return
    }

    const first = coursesData[0]
    const info = getCourseInfo(first.slug)
    const lesson = first.completedLessons ? first.completedLessons + 1 : 1

    if(count === 1){
        el.innerText = lang === "uz"
            ? `1 ta kurs • ${info.title} • ${lesson}-dars`
            : `1 курс • ${info.title} • урок ${lesson}`
        return
    }

    el.innerText = lang === "uz"
        ? `${count} ta kurs faol • keyingi: ${info.title}, ${lesson}-dars`
        : `${count} курса активно • дальше: ${info.title}, урок ${lesson}`
}

function renderLoading(){
    const d = t[lang]
    const root = document.getElementById("mobile-content")

    if(!root) return

    root.innerHTML = `
        <div class="mobile-loading soft-card">
            ${d.loading}
        </div>
    `
}

function renderEmpty(){
    const d = t[lang]

    coursesData = []

    const mobileRoot = document.getElementById("mobile-content")
    const desktopRoot = document.getElementById("desktop-content")

    const mobileHTML = `
        <div class="mobile-empty soft-card">

            <div class="mobile-empty-icon">
                <img src="images/icon/courses2.png" alt="">
            </div>

            <h3 class="mobile-empty-title">
                ${d.emptyTitle}
            </h3>

            <p class="mobile-empty-text">
                ${d.emptyText}
            </p>

            <button class="mobile-empty-btn" onclick="goCourses()">
                ${d.emptyBtn}
            </button>

        </div>
    `

    const desktopHTML = `
        <div class="desktop-empty soft-card">

            <div class="desktop-empty-icon">
                <img src="images/icon/courses2.png" alt="">
            </div>

            <h3 class="desktop-empty-title">
                ${d.emptyTitle}
            </h3>

            <p class="desktop-empty-text">
                ${d.emptyText}
            </p>

            <button class="btn btn-primary desktop-top-btn" onclick="goCourses()">
                ${d.emptyBtn}
            </button>

        </div>
    `

    if(mobileRoot) mobileRoot.innerHTML = mobileHTML
    if(desktopRoot) desktopRoot.innerHTML = desktopHTML

    updateCatalogVisibility()
    updateCourseSummary()
    updateStaticText()
}

function renderCourses(){
    const mobileRoot = document.getElementById("mobile-content")
    const desktopRoot = document.getElementById("desktop-content")

    if(!coursesData.length){
        renderEmpty()
        updateCatalogVisibility()
        updateCourseSummary()
        return
    }

    const mobileHTML = `
        <div class="mobile-course-list">
            ${coursesData.map(course => {
                const info = getCourseInfo(course.slug)

                return `
                    <div class="mobile-course-card soft-card" onclick="openCourse('${info.page}')">

                        <img class="mobile-course-cover" src="${info.image}" alt="course">

                        <div class="mobile-course-body">

                            <div class="mobile-course-label">
                                ${t[lang].continue}
                            </div>

                            <h3 class="mobile-course-title">
                                ${info.title}
                            </h3>

                            <div class="mobile-course-sub">
                                ${course.completedLessons} ${t[lang].lessons}
                            </div>

                            <div class="mobile-progress-line">
                                <div
                                    class="mobile-progress-fill"
                                    style="width:${course.progress}%"
                                ></div>
                            </div>

                            <div class="mobile-progress-row">
                                <span>${course.progress}%</span>
                                <span>${t[lang].completed}</span>
                            </div>

                        </div>

                    </div>
                `
            }).join("")}
        </div>
    `

    const desktopHTML = `
        <div class="desktop-course-grid">
            ${coursesData.map(course => {
                const info = getCourseInfo(course.slug)

                return `
                    <div class="desktop-course-card soft-card" onclick="openCourse('${info.page}')">

                        <img class="desktop-course-cover" src="${info.image}" alt="course">

                        <div class="desktop-course-body">

                            <div class="desktop-course-label">
                                ${t[lang].continue}
                            </div>

                            <h3 class="desktop-course-title">
                                ${info.title}
                            </h3>

                            <div class="desktop-course-sub">
                                ${course.completedLessons} ${t[lang].lessons}
                            </div>

                            <div class="desktop-progress-line">
                                <div
                                    class="desktop-progress-fill"
                                    style="width:${course.progress}%"
                                ></div>
                            </div>

                            <div class="desktop-progress-row">
                                <span>${course.progress}%</span>
                                <span>${t[lang].completed}</span>
                            </div>

                        </div>

                    </div>
                `
            }).join("")}
        </div>
    `

    if(mobileRoot) mobileRoot.innerHTML = mobileHTML
    if(desktopRoot) desktopRoot.innerHTML = desktopHTML

    updateCatalogVisibility()
    updateCourseSummary()
    updateStaticText()
}

function openCourse(page){
    impact()
    localStorage.setItem("lang", lang)
    window.location.href = page
}

function loadCourses(userId){
    if(!userId){
        renderEmpty()
        return
    }

    renderLoading()

    fetch(`https://api.gaphub.uz/mycourses/${userId}`)
        .then(res => res.json())
        .then(data => {
            let arr = []

            if(Array.isArray(data)){
                arr = data
            }else if(data && Array.isArray(data.courses)){
                arr = data.courses
            }

            coursesData = arr.map(normalizeCourse)

            renderCourses()
        })
        .catch(err => {
            console.log("Courses error:", err)
            coursesData = []
            renderEmpty()
        })
}

function updateStaticText(){
    const d = t[lang]

    document.documentElement.lang = lang === "uz" ? "uz" : "ru"

    /* MOBILE */
    setText("heroTitle-mobile", d.heroTitle)
    setText("heroText-mobile", d.heroText)
    setText("catalogBtn-mobile", d.catalogBtn)
    setText("sectionTitle-mobile", d.sectionTitle)

    setText("m1-mobile", d.m1)
    setText("m4-mobile", d.m4)
    setText("m5-mobile", d.m5)
    setText("m6-mobile", d.m6)

    /* DESKTOP */
    setText("back-desktop", lang === "uz"
        ? "Orqaga"
        : "Назад"
    )

    setText("home-desktop", d.home)
    setText("m1-desktop", d.m1)
    setText("m4-desktop", d.m4)
    setText("m5-desktop", d.m5)
    setText("m6-desktop", d.m6)

    setText("catalog-desktop", lang === "uz"
        ? "Kurslar katalogi"
        : "Каталог курсов"
    )

    setText("badge-desktop", lang === "uz"
        ? "Shaxsiy kabinet"
        : "Личный кабинет"
    )

    setText("heroTitle-desktop", d.heroTitle)
    setText("heroText-desktop", d.heroText)

    setText("mini1Label-desktop", lang === "uz"
        ? "Kurslar"
        : "Курсы"
    )

    setText("mini1Value-desktop",
        `${coursesData.length}/${TOTAL_MAIN_COURSES}`
    )

    setText("mini2Label-desktop", lang === "uz"
        ? "Status"
        : "Статус"
    )

    setText("mini2Value-desktop", coursesData.length
        ? (lang === "uz" ? "Faol o‘qish" : "Активное обучение")
        : (lang === "uz" ? "Kurs yo‘q" : "Нет курсов")
    )

    setText("catalogBtn-desktop", d.catalogBtn)

    setText("sectionTitle-desktop", d.sectionTitle)
}

function goHome(){
    impact()
    localStorage.setItem("lang", lang)
    window.location.href = "index.html"
}

function goCourses(){
    impact()
    localStorage.setItem("lang", lang)
    window.location.href = "courses.html"
}

function goPage(page){
    impact()
    localStorage.setItem("lang", lang)
    window.location.href = page
}

function initTelegram(){
    if(window.Telegram && Telegram.WebApp){
        const tg = Telegram.WebApp

        tg.ready()
        tg.expand()

        try{
            tg.requestFullscreen()
        }catch(e){}

        document.body.style.minHeight = tg.viewportHeight + "px"

        telegramUser = tg.initDataUnsafe?.user || null

        if(telegramUser && telegramUser.id){
            loadCourses(telegramUser.id)
        }else{
            renderEmpty()
        }
    }else{
        renderEmpty()
    }
}

updateStaticText()
initTelegram()
</script>

</body>
</html>
