<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>gaphub - AI</title>

<style>
:root{
    --accent:#cb6ce6;
    --text:#ffffff;
    --muted:#a8a8a8;
    --bg:#0c0b14;
    --card:#111111;
    --card-soft:#17171f;
    --line:rgba(255,255,255,.08);
    --shadow:0 10px 35px rgba(0,0,0,.35);
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html, body{
    margin:0;
    padding:0;
    min-height:100%;
    font-family:Arial, sans-serif;
    background:#000;
    color:#fff;
}

body{
    position:relative;
}

img{
    display:block;
    max-width:100%;
}

button{
    font-family:inherit;
    cursor:pointer;
}

.desktop-only{
    display:none;
}

.btn-gradient{
    border:none;
    color:#fff;
    background:linear-gradient(90deg,#cb6ce6,#a855f7);
}

/* =========================
   MOBILE
========================= */
.mobile-shell{
    display:block;
}

.mobile-page{
    min-height:calc(100vh + 24px);
    padding:
        calc(env(safe-area-inset-top) + 60px)
        16px
        calc(154px + env(safe-area-inset-bottom));

    background:
        radial-gradient(circle at 20% 8%, rgba(203,108,230,.12), transparent 24%),
        linear-gradient(180deg, #09080f 0%, #0c0b14 100%);
}

.mobile-sales-hero{
    border-radius:30px;
    padding:20px 18px 18px;
    overflow:hidden;
    animation:fadeUp .42s ease both;
}

.mobile-hero-topline{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:14px;
}

.mobile-back{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:46px;
    height:32px;
    padding:0;
    border-radius:999px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(203,108,230,.55);
    color:#fff;
    font-size:16px;
    font-weight:800;
    backdrop-filter:blur(12px);
    transition:transform .10s ease, opacity .10s ease;
    position:relative;
}

.mobile-back::before{
    content:"";
    position:absolute;
    inset:-10px;
}

.mobile-back:active{
    transform:scale(.94);
    opacity:.9;
}

.mobile-back-text{
    display:none;
}

.mobile-back-arrow{
    font-size:20px;
    line-height:1;
    transform:translateY(-1px);
}

.mobile-kicker{
    display:inline-flex;
    align-items:center;
    min-height:32px;
    padding:0 12px;
    border-radius:999px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08);
    color:#e8e3f0;
    font-size:12px;
    font-weight:800;
    margin-bottom:0;
}

.mobile-title{
    margin:0 0 10px;
    font-size:clamp(34px,9vw,43px);
    line-height:.94;
    font-weight:800;
    letter-spacing:-1px;
}

.mobile-subtitle{
    margin:0;
    color:var(--muted);
    font-size:15px;
    line-height:1.48;
    max-width:340px;
}

.mobile-proof-row{
    margin-top:16px;
    display:grid;
    grid-template-columns:repeat(3, minmax(0,1fr));
    gap:8px;
}

.mobile-proof{
    min-height:74px;
    border-radius:18px;
    padding:11px 10px;
    background:rgba(255,255,255,.045);
    border:1px solid rgba(255,255,255,.06);
}

.mobile-proof-label{
    color:var(--muted);
    font-size:11px;
    line-height:1.2;
    margin-bottom:6px;
}

.mobile-proof-value{
    color:#fff;
    font-size:13px;
    line-height:1.25;
    font-weight:800;
}

.mobile-cover-card{
    margin-top:16px;
    height:190px;
    border-radius:24px;
    overflow:hidden;
    background:#111117;
    border:1px solid rgba(255,255,255,.06);
    position:relative;
}

.mobile-cover-card::after{
    content:"";
    position:absolute;
    inset:0;
    background:
        linear-gradient(180deg, transparent 45%, rgba(0,0,0,.28) 100%),
        radial-gradient(circle at 80% 18%, rgba(203,108,230,.16), transparent 30%);
    pointer-events:none;
}

.mobile-cover{
    width:100%;
    height:100%;
    object-fit:cover;
}

.mobile-section{
    margin-top:22px;
}

.mobile-section-title{
    margin:0 0 14px;
    font-size:22px;
    line-height:1.1;
    font-weight:800;
    animation:fadeUp .45s ease both;
}

.mobile-card-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.mobile-sales-card{
    border-radius:24px;
    padding:16px;
    display:flex;
    align-items:flex-start;
    gap:14px;
    animation:fadeUp .45s ease both;
    transition:transform .10s ease, opacity .10s ease;
}

.mobile-card-list .mobile-sales-card:nth-child(1){
    animation-delay:.08s;
}

.mobile-card-list .mobile-sales-card:nth-child(2){
    animation-delay:.14s;
}

.mobile-card-list .mobile-sales-card:nth-child(3){
    animation-delay:.20s;
}

.mobile-card-list .mobile-sales-card:nth-child(4){
    animation-delay:.26s;
}

.mobile-sales-card:active{
    transform:scale(.985);
    opacity:.92;
}

.mobile-sales-icon{
    width:50px;
    height:50px;
    border-radius:17px;
    background:rgba(255,255,255,.06);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    flex-shrink:0;
}

.mobile-sales-icon img{
    width:30px;
    height:30px;
    object-fit:contain;
}

.mobile-sales-body{
    min-width:0;
    flex:1;
}

.mobile-sales-title{
    margin:0 0 5px;
    font-size:17px;
    line-height:1.2;
    font-weight:800;
}

.mobile-sales-text{
    margin:0;
    color:var(--muted);
    font-size:14px;
    line-height:1.45;
}

.mobile-inside-card{
    border-radius:26px;
    padding:18px;
    animation:fadeUp .45s ease both;
    animation-delay:.22s;
}

.mobile-inside-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.mobile-inside-item{
    border-radius:18px;
    padding:13px 12px;
    background:rgba(255,255,255,.045);
    border:1px solid rgba(255,255,255,.06);
    min-height:84px;
}

.mobile-inside-label{
    color:var(--muted);
    font-size:12px;
    margin-bottom:7px;
}

.mobile-inside-value{
    color:#fff;
    font-size:15px;
    line-height:1.25;
    font-weight:800;
}

.mobile-price-card{
    margin-top:22px;
    border-radius:28px;
    padding:18px;
    text-align:left;
    animation:fadeUp .45s ease both;
    animation-delay:.28s;
}

.mobile-price-label{
    color:var(--muted);
    font-size:13px;
    margin-bottom:8px;
}

.mobile-price-value{
    font-size:30px;
    line-height:1;
    font-weight:800;
    letter-spacing:-.6px;
    margin-bottom:10px;
}

.mobile-price-text{
    margin:0;
    color:var(--muted);
    font-size:14px;
    line-height:1.45;
}

.mobile-buy-bar{
    position:fixed;
    left:0;
    right:0;
    bottom:calc(92px + env(safe-area-inset-bottom));
    padding:0 16px;
    z-index:60;
    pointer-events:none;
}

.mobile-buy-btn{
    width:100%;
    height:58px;
    border:none;
    border-radius:20px;
    color:#fff;
    background:linear-gradient(90deg,#cb6ce6,#a855f7);
    box-shadow:0 14px 32px rgba(203,108,230,.28);
    font-size:17px;
    font-weight:800;
    transition:transform .10s ease, opacity .10s ease;
    pointer-events:auto;
}

.mobile-buy-btn:active{
    transform:scale(.985);
    opacity:.92;
}

/* BOTTOM NAV */
.bottom-nav{
    position:fixed;
    left:0;
    bottom:0;
    width:100%;
    background:#000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 10px;
    padding-bottom:calc(8px + env(safe-area-inset-bottom));
    z-index:50;
}

.nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:58px;
    font-size:12px;
    color:#fff;
    width:20%;
    text-align:center;
    cursor:pointer;
    touch-action:manipulation;
}

.nav-item img{
    width:27px;
    margin-bottom:2px;
}

.nav-item span{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.nav-center{
    position:relative;
    top:-18px;
    width:20%;
    min-height:58px;
    display:flex;
    justify-content:center;
    touch-action:manipulation;
}

.circle{
    width:60px;
    height:60px;
    background:#ffffff;
    border-radius:50%;
    border:4px solid var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 10px 30px rgba(203,108,230,.25);
    position:relative;
}

.circle::before{
    content:"";
    position:absolute;
    inset:-10px;
}

.circle img{
    width:24px;
    height:24px;
    object-fit:contain;
}

button,
.nav-item,
.nav-center,
.mobile-sales-card{
    touch-action:manipulation;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(14px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media (max-width:380px){
    .mobile-title{
        font-size:32px;
    }

    .mobile-proof-row{
        grid-template-columns:1fr;
    }

    .mobile-cover-card{
        height:168px;
    }

    .mobile-inside-grid{
        grid-template-columns:1fr;
    }

    .mobile-buy-btn{
        height:52px;
        font-size:16px;
    }
}

/* =========================
   DESKTOP
========================= */
@media (min-width:1024px){

    html, body{
        min-height:100vh;
        background:
            radial-gradient(circle at 15% 18%, rgba(203,108,230,.08), transparent 24%),
            radial-gradient(circle at 85% 28%, rgba(203,108,230,.07), transparent 24%),
            linear-gradient(180deg, #09080f 0%, #0c0b14 100%);
        color:var(--text);
    }

    body{
        overflow:hidden;
    }

    .mobile-shell{
        display:none;
    }

    .desktop-only{
        display:block;
    }

    .desktop-app{
        min-height:100vh;
        color:var(--text);
    }

    .desktop-layout{
        display:grid;
        grid-template-columns:280px minmax(0, 1fr);
        min-height:100vh;
    }

    .desktop-sidebar{
        padding:22px 22px;
        border-right:1px solid rgba(255,255,255,.05);
        background:linear-gradient(180deg, rgba(14,13,23,.70) 0%, rgba(12,11,20,.40) 100%);
        overflow:auto;
    }

    .desktop-brand{
        font-size:34px;
        font-weight:800;
        line-height:1;
        margin:8px 0 56px;
    }

    .desktop-nav{
        display:flex;
        flex-direction:column;
        gap:10px;
        margin-top:4px;
    }

    .desktop-nav-item{
        display:flex;
        align-items:center;
        gap:14px;
        width:100%;
        min-height:56px;
        padding:0 18px;
        border-radius:16px;
        color:#f1f1f1;
        background:transparent;
        border:1px solid transparent;
        font-size:16px;
        font-weight:600;
        transition:.2s ease;
        cursor:pointer;
        text-align:left;
    }

    .desktop-nav-item img{
        width:28px;
        height:28px;
        object-fit:contain;
        flex-shrink:0;
    }

    .desktop-nav-item.active-nav{
        background:linear-gradient(180deg, rgba(255,255,255,.06) 0%, rgba(255,255,255,.03) 100%);
        border-color:rgba(255,255,255,.06);
        box-shadow:var(--shadow);
    }

    .desktop-nav-item-accent{
        background:linear-gradient(90deg, #b85bda 0%, #cb6ce6 100%);
        border-color:transparent;
        color:#fff;
        box-shadow:0 12px 26px rgba(203,108,230,.28);
        margin-top:8px;
    }

    .desktop-nav-item-accent:hover{
        transform:translateY(-1px);
    }

    .desktop-nav-item-accent img{
        filter:brightness(0) invert(1);
    }

    .desktop-main{
        padding:26px 28px 110px;
        height:100vh;
        overflow:auto;
    }

    .desktop-back{
        display:inline-flex;
        align-items:center;
        gap:14px;
        font-size:24px;
        color:#fff;
        margin-bottom:18px;
        cursor:pointer;
        user-select:none;
    }

    .desktop-back-arrow{
        font-size:42px;
        line-height:1;
        transform:translateY(-1px);
    }

    .desktop-hero{
        background:#0f0f13;
        border-radius:28px;
        overflow:hidden;
        border:1px solid rgba(255,255,255,.05);
        box-shadow:var(--shadow);
    }

    .desktop-cover{
        width:100%;
        height:280px;
        object-fit:cover;
        background:#1a1a1a;
    }

    .desktop-hero-content{
        padding:24px 26px 34px;
    }

    .desktop-title{
        margin:0 0 10px;
        font-size:56px;
        line-height:1;
        font-weight:800;
    }

    .desktop-subtitle{
        margin:0 0 18px;
        max-width:900px;
        color:var(--muted);
        font-size:19px;
        line-height:1.45;
    }

    .desktop-stats{
        display:grid;
        grid-template-columns:repeat(4, minmax(0,1fr));
        gap:12px;
    }

    .desktop-stat{
        background:#17171f;
        border-radius:16px;
        padding:14px 16px;
        min-height:84px;
    }

    .desktop-stat-label{
        color:#9a9a9a;
        font-size:13px;
        margin-bottom:8px;
    }

    .desktop-stat-value{
        font-size:17px;
        font-weight:700;
        line-height:1.35;
    }

    .desktop-peek{
        margin-top:-22px;
        padding:0 14px;
        position:relative;
        z-index:2;
    }

    .desktop-section-card{
        background:#141419;
        border-radius:24px;
        padding:22px 18px;
        border:1px solid rgba(255,255,255,.05);
        box-shadow:var(--shadow);
    }

    .desktop-section{
        padding-top:16px;
    }

    .desktop-section-title{
        margin:0 0 14px;
        font-size:30px;
        line-height:1.1;
        font-weight:800;
    }

    .desktop-accordion{
        display:flex;
        flex-direction:column;
        gap:12px;
    }

    .desktop-item{
        background:#111;
        border-radius:18px;
        overflow:hidden;
        border:1px solid rgba(255,255,255,.04);
    }

    .desktop-item-btn{
        width:100%;
        background:transparent;
        border:none;
        color:#fff;
        padding:18px 20px;
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:16px;
        text-align:left;
    }

    .desktop-item-left{
        display:flex;
        align-items:center;
        gap:14px;
        flex:1;
    }

    .desktop-item-icon{
        width:46px;
        height:46px;
        object-fit:contain;
        flex-shrink:0;
        background:#1a1a1a;
        border-radius:12px;
        padding:8px;
    }

    .desktop-item-title{
        font-size:20px;
        font-weight:700;
        line-height:1.35;
    }

    .desktop-arrow{
        width:12px;
        height:12px;
        border-right:3px solid var(--accent);
        border-bottom:3px solid var(--accent);
        transform:rotate(45deg);
        transition:transform .25s ease;
        flex-shrink:0;
        margin-right:4px;
    }

    .desktop-item.open .desktop-arrow{
        transform:rotate(225deg);
    }

    .desktop-answer-wrap{
        max-height:0;
        overflow:hidden;
        transition:max-height .28s ease;
    }

    .desktop-answer{
        padding:0 20px 20px 80px;
        color:#d0d0d0;
        font-size:17px;
        line-height:1.55;
    }

    .desktop-buy-bar{
        position:fixed;
        right:28px;
        bottom:28px;
        left:calc(280px + 28px);
        display:flex;
        justify-content:center;
        pointer-events:none;
        z-index:70;
    }

    .desktop-buy-btn{
        width:100%;
        max-width:520px;
        height:62px;
        border:none;
        border-radius:18px;
        font-size:21px;
        font-weight:700;
        box-shadow:0 14px 32px rgba(203,108,230,.28);
        pointer-events:auto;
    }
}

@media (min-width:1024px) and (max-width:1400px){
    .desktop-layout{
        grid-template-columns:260px minmax(0,1fr);
    }

    .desktop-main{
        padding:22px 22px 100px;
    }

    .desktop-title{
        font-size:44px;
    }

    .desktop-cover{
        height:230px;
    }

    .desktop-subtitle{
        font-size:17px;
    }

    .desktop-stats{
        grid-template-columns:repeat(2, minmax(0,1fr));
    }

    .desktop-section-title{
        font-size:25px;
    }

    .desktop-item-title{
        font-size:17px;
    }

    .desktop-answer{
        font-size:15px;
        padding:0 18px 18px 72px;
    }

    .desktop-buy-bar{
        left:calc(260px + 22px);
        right:22px;
        bottom:22px;
    }
}

@media (max-width:430px){
    .mobile-cover{
        height:196px;
    }

    .mobile-title{
        font-size:31px;
    }
}

@media (max-width:380px){
    .mobile-page{
        padding-top:calc(env(safe-area-inset-top) + 72px);
        padding-bottom:calc(146px + env(safe-area-inset-bottom));
    }

    .mobile-cover{
        height:178px;
    }

    .mobile-title{
        font-size:28px;
    }

    .mobile-subtitle{
        font-size:13px;
    }

    .mobile-stat{
        padding:10px;
        min-height:62px;
    }

    .mobile-stat-value{
        font-size:14px;
    }

    .mobile-buy-btn{
        height:52px;
        font-size:16px;
    }
}
</style>
</head>

<body>

<!-- =========================
     MOBILE VERSION
========================= -->
<div class="mobile-shell">
    <div class="mobile-page">

        <section class="mobile-sales-hero glow-card">

            <div class="mobile-hero-topline">
                <button class="mobile-back" onclick="goBack()">
                    <span class="mobile-back-arrow">←</span>
                    <span class="mobile-back-text" id="back-mobile"></span>
                </button>

                <div class="mobile-kicker" id="kicker-mobile"></div>
            </div>

            <h1 class="mobile-title" id="title-mobile"></h1>
            <p class="mobile-subtitle" id="subtitle-mobile"></p>

            <div class="mobile-proof-row">
                <div class="mobile-proof">
                    <div class="mobile-proof-label" id="proof1Label-mobile"></div>
                    <div class="mobile-proof-value" id="proof1Value-mobile"></div>
                </div>

                <div class="mobile-proof">
                    <div class="mobile-proof-label" id="proof2Label-mobile"></div>
                    <div class="mobile-proof-value" id="proof2Value-mobile"></div>
                </div>

                <div class="mobile-proof">
                    <div class="mobile-proof-label" id="proof3Label-mobile"></div>
                    <div class="mobile-proof-value" id="proof3Value-mobile"></div>
                </div>
            </div>

            <div class="mobile-cover-card">
                <img class="mobile-cover" src="images/ai/neural.webp" alt="AI">
            </div>
        </section>

        <section class="mobile-section">
            <h2 class="mobile-section-title" id="fitTitle-mobile"></h2>
            <div class="mobile-card-list" id="fitList-mobile"></div>
        </section>

        <section class="mobile-section">
            <h2 class="mobile-section-title" id="resultTitle-mobile"></h2>
            <div class="mobile-card-list" id="resultList-mobile"></div>
        </section>

        <section class="mobile-section">
            <h2 class="mobile-section-title" id="insideTitle-mobile"></h2>

            <div class="mobile-inside-card soft-card">
                <div class="mobile-inside-grid">
                    <div class="mobile-inside-item">
                        <div class="mobile-inside-label" id="inside1Label-mobile"></div>
                        <div class="mobile-inside-value" id="inside1Value-mobile"></div>
                    </div>

                    <div class="mobile-inside-item">
                        <div class="mobile-inside-label" id="inside2Label-mobile"></div>
                        <div class="mobile-inside-value" id="inside2Value-mobile"></div>
                    </div>

                    <div class="mobile-inside-item">
                        <div class="mobile-inside-label" id="inside3Label-mobile"></div>
                        <div class="mobile-inside-value" id="inside3Value-mobile"></div>
                    </div>

                    <div class="mobile-inside-item">
                        <div class="mobile-inside-label" id="inside4Label-mobile"></div>
                        <div class="mobile-inside-value" id="inside4Value-mobile"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="mobile-price-card soft-card">
            <div class="mobile-price-label" id="priceLabel-mobile"></div>
            <div class="mobile-price-value" id="priceValue-mobile"></div>
            <p class="mobile-price-text" id="priceText-mobile"></p>
        </section>

    </div>

    <div class="mobile-buy-bar">
        <button class="mobile-buy-btn" id="buyBtn-mobile"></button>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="goPage('mycourses.html')">
            <img src="images/icon/courses2.png" alt="">
            <span id="m1-mobile"></span>
        </div>

        <div class="nav-item" onclick="goPage('support.html')">
            <img src="images/icon/support.png" alt="">
            <span id="m4-mobile"></span>
        </div>

        <div class="nav-center" onclick="goHome()">

    root.innerHTML = cards.map(card => `

                <p class="mobile-sales-text">${card.text}</p>

}
