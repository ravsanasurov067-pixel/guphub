<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/plyr/3.8.4/plyr.css"
>

<title>gaphub - SMM lesson 13</title>

<style>
:root{
    --accent:#cb6ce6;
    --accent-2:#a855f7;

    --bg:#0c0b14;
    --bg-dark:#09080f;

    --card:#111117;
    --card-soft:#171621;

    --text:#ffffff;
    --muted:#a8a4b5;
    --muted-soft:#8f8a9e;

    --line:rgba(255,255,255,.07);
    --line-strong:rgba(255,255,255,.10);

    --shadow:0 12px 38px rgba(0,0,0,.35);

    --radius-xl:30px;
    --radius-lg:28px;
    --radius-md:22px;
    --radius-sm:18px;
}

/* =========================
   BASE
========================= */

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,
body{
    margin:0;
    padding:0;

    min-height:100%;

    font-family:Arial,sans-serif;

    background:#000;
    color:var(--text);
}

body{
    position:relative;
    overflow-x:hidden;
}

img{
    display:block;
    max-width:100%;
}

button,
input{
    font-family:inherit;
}

button{
    cursor:pointer;
}

.desktop-only{
    display:none;
}

.lesson-step{
    display:none;
}

.lesson-step.active{
    display:block;
}

/* =========================
   COMMON UI
========================= */

.btn{
    border:none;
    border-radius:var(--radius-sm);

    font-weight:800;

    transition:.18s ease;
}

.btn:active{
    transform:scale(.985);
}

.btn-primary{
    color:#fff;

    background:
        linear-gradient(
            90deg,
            var(--accent),
            var(--accent-2)
        );

    box-shadow:0 14px 32px rgba(203,108,230,.22);
}

.btn-secondary{
    color:#fff;

    background:rgba(255,255,255,.05);
    border:1px solid var(--line-strong);
}

.glow-card{
    background:
        radial-gradient(circle at 86% 14%, rgba(203,108,230,.18), transparent 26%),
        radial-gradient(circle at 15% 88%, rgba(203,108,230,.08), transparent 22%),
        linear-gradient(180deg,#171621 0%,#0f0e17 100%);

    border:1px solid rgba(255,255,255,.05);

    box-shadow:var(--shadow);
}

.soft-card{
    background:
        radial-gradient(circle at 88% 18%, rgba(203,108,230,.10), transparent 24%),
        linear-gradient(180deg,#121219 0%,#0d0d12 100%);

    border:1px solid rgba(255,255,255,.05);

    box-shadow:var(--shadow);
}

/* =========================
   PLYR
========================= */

.plyr{
    border-radius:0;

    --plyr-color-main:var(--accent);
    --plyr-video-control-color:#fff;
    --plyr-video-control-background-hover:rgba(203,108,230,.28);
    --plyr-video-controls-background:linear-gradient(transparent, rgba(0,0,0,.78));
}

.plyr--video{
    height:100%;
}

.plyr__video-wrapper{
    height:100%;
    background:#000;
}

.plyr video{
    width:100%;
    height:100%;

    object-fit:cover;
}

/* =========================
   MOBILE LAYOUT
========================= */

.mobile-shell{
    display:block;
}

.mobile-page{
    min-height:100vh;

    padding:
        calc(env(safe-area-inset-top) + 76px)
        14px
        calc(178px + env(safe-area-inset-bottom));

    background:
        radial-gradient(circle at 20% 10%, rgba(203,108,230,.10), transparent 24%),
        linear-gradient(180deg,#09080f 0%,#0c0b14 100%);
}

.mobile-top{
    margin-bottom:16px;
}

.mobile-lesson-bar{
    display:grid;
    grid-template-columns:46px minmax(0,1fr) 64px;
    gap:8px;

    align-items:center;

    margin-bottom:14px;
}

.mobile-back{
    width:46px;
    height:34px;

    border:none;
    border-radius:999px;

    background:rgba(255,255,255,.04);
    border:1px solid rgba(203,108,230,.55);

    color:#fff;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:0;

    transition:.18s ease;
}

.mobile-back:active{
    transform:scale(.94);
    opacity:.9;
}

.mobile-back-arrow{
    font-size:20px;
    line-height:1;

    transform:translateY(-1px);
}

.mobile-step-title{
    min-height:34px;

    padding:0 12px;

    border-radius:999px;

    background:rgba(255,255,255,.055);
    border:1px solid rgba(255,255,255,.075);

    color:#ebe4f5;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:12px;
    font-weight:800;

    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.mobile-lang-chip{
    height:34px;

    border:none;
    border-radius:999px;

    background:
        linear-gradient(
            90deg,
            rgba(203,108,230,.30),
            rgba(168,85,247,.22)
        );

    border:1px solid rgba(203,108,230,.50);

    color:#fff;

    font-size:12px;
    font-weight:900;

    box-shadow:0 10px 24px rgba(203,108,230,.14);
}

.mobile-lang-chip:active{
    transform:scale(.95);
}

.mobile-video-head{
    display:block;
}

.mobile-badge,
.mobile-subtitle,
.mobile-video-title,
.mobile-video-text{
    display:none;
}

.mobile-title{
    margin:0 0 10px;

    font-size:32px;
    line-height:.98;

    font-weight:800;

    letter-spacing:-.6px;
}

/* =========================
   VIDEO
========================= */

.mobile-video-card,
.desktop-video-card{
    position:relative;

    overflow:hidden;

    background:#0d0d12;

    border:1px solid rgba(255,255,255,.05);

    box-shadow:var(--shadow);
}

.mobile-video-card{
    border-radius:26px;
}

.desktop-video-card{
    border-radius:30px;
}

.mobile-video-frame,
.desktop-video-frame{
    width:100%;
    aspect-ratio:16/9;

    position:relative;

    overflow:hidden;

    background:
        radial-gradient(circle at 50% 38%, rgba(203,108,230,.18), transparent 28%),
        linear-gradient(135deg,#171621,#0b0b10);
}

.mobile-video-frame video,
.desktop-video-frame video{
    width:100%;
    height:100%;

    object-fit:cover;
}

.mobile-video-bottom{
    padding:16px;
}

.desktop-video-bottom{
    padding:18px 20px 20px;
}

.mobile-video-actions{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
}

.desktop-video-actions{
    display:grid;
    grid-template-columns:minmax(0,1fr) 250px;
    gap:14px;

    align-items:center;
}

.mobile-main-btn,
.desktop-main-btn{
    width:100%;

    border:none;
    border-radius:var(--radius-sm);

    color:#fff;

    background:
        linear-gradient(
            90deg,
            var(--accent),
            var(--accent-2)
        );

    box-shadow:0 14px 32px rgba(203,108,230,.25);

    font-size:16px;
    font-weight:800;
}

.mobile-main-btn{
    min-height:56px;
}

.desktop-main-btn{
    min-height:58px;
}

.mobile-material-btn,
.desktop-material-btn{
    width:100%;

    border-radius:var(--radius-sm);

    font-size:15px;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
}

.mobile-material-btn{
    min-height:52px;
}

.desktop-material-btn{
    min-height:56px;
}

/* =========================
   SUMMARY SLIDER
========================= */

.summary-slider{
    width:100%;
}

.summary-stage{
    width:100%;

    position:relative;

    overflow:hidden;

    border-radius:var(--radius-lg);

    background:
        radial-gradient(circle at 82% 18%, rgba(203,108,230,.18), transparent 26%),
        linear-gradient(180deg,#171621 0%,#0f0e17 100%);

    border:1px solid rgba(255,255,255,.06);

    box-shadow:var(--shadow);
}

.summary-image-wrap{
    width:100%;

    position:relative;

    overflow:hidden;

    background:
        radial-gradient(circle at 50% 42%, rgba(203,108,230,.14), transparent 30%),
        linear-gradient(135deg,#171621,#0b0b10);
}

.summary-image{
    width:100%;
    height:100%;

    object-fit:cover;

    display:block;
}

.summary-placeholder{
    width:100%;
    height:100%;
    min-height:360px;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    padding:28px;

    text-align:center;
}

.summary-placeholder-kicker{
    margin-bottom:12px;

    color:var(--accent);

    font-size:13px;
    font-weight:900;
    letter-spacing:.08em;
    text-transform:uppercase;
}

.summary-placeholder-title{
    margin:0 0 12px;

    font-size:28px;
    line-height:1.08;
    font-weight:900;
}

.summary-placeholder-text{
    margin:0;

    max-width:420px;

    color:var(--muted);

    font-size:15px;
    line-height:1.55;
}

.summary-pages{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;

    gap:8px;

    margin-top:14px;
}

.summary-page-btn{
    min-width:34px;
    height:32px;

    border:none;
    border-radius:999px;

    background:rgba(255,255,255,.045);
    border:1px solid rgba(255,255,255,.07);

    color:rgba(255,255,255,.62);

    font-size:12px;
    font-weight:900;

    transition:.18s ease;
}

.summary-page-btn.active{
    color:#fff;

    background:
        linear-gradient(
            90deg,
            rgba(203,108,230,.34),
            rgba(168,85,247,.22)
        );

    border-color:rgba(203,108,230,.50);

    box-shadow:0 10px 22px rgba(203,108,230,.16);
}

.summary-page-btn:active{
    transform:scale(.94);
}

.summary-slider-action{
    margin-top:18px;
}

/* SUMMARY ARROWS */

.summary-overlay-arrow{
    position:absolute;
    top:50%;
    z-index:5;

    width:48px;
    height:48px;

    border:none;
    border-radius:999px;

    background:rgba(0,0,0,.38);
    border:1px solid rgba(255,255,255,.12);

    color:#fff;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:24px;
    font-weight:900;

    backdrop-filter:blur(12px);

    box-shadow:0 10px 24px rgba(0,0,0,.28);

    transform:translateY(-50%);

    transition:.18s ease;
}

.summary-overlay-arrow:active{
    transform:translateY(-50%) scale(.94);
}

.summary-overlay-arrow:disabled{
    opacity:.28;
    cursor:not-allowed;
}

.summary-overlay-arrow-left{
    left:14px;
}

.summary-overlay-arrow-right{
    right:14px;
}

/* SUMMARY SWIPE */

.summary-swipe-stack{
    width:100%;
    height:100%;

    position:relative;

    overflow:hidden;
}

.summary-swipe-current{
    width:100%;
    height:100%;

    position:relative;
    z-index:3;

    transition:
        transform .28s cubic-bezier(.22,.9,.28,1),
        opacity .28s ease;

    will-change:transform;
}

.summary-swipe-current.dragging{
    transition:none;
}

.summary-swipe-ghost{
    display:none;
}

/* =========================
   MATERIALS
========================= */

.material-showcase{
    width:100%;
}

.material-cover-shell{
    position:relative;
}

.material-cover-card{
    position:relative;

    overflow:hidden;

    border-radius:var(--radius-lg);

    background:
        radial-gradient(circle at 50% 18%, rgba(203,108,230,.18), transparent 26%),
        linear-gradient(180deg,#171621 0%,#0f0e17 100%);

    border:1px solid rgba(255,255,255,.07);

    box-shadow:var(--shadow);
}

.material-cover-img{
    width:100%;
    height:100%;

    object-fit:cover;

    display:block;
}

.material-cover-placeholder{
    width:100%;
    height:100%;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    padding:28px;

    text-align:center;

    background:
        radial-gradient(circle at 50% 42%, rgba(203,108,230,.16), transparent 30%),
        linear-gradient(135deg,#171621,#0b0b10);
}

.material-cover-kicker{
    margin-bottom:12px;

    color:var(--accent);

    font-size:13px;
    font-weight:900;
    letter-spacing:.08em;
    text-transform:uppercase;
}

.material-cover-title{
    margin:0 0 12px;

    font-size:30px;
    line-height:1.08;
    font-weight:900;
}

.material-cover-text{
    margin:0;

    max-width:360px;

    color:var(--muted);

    font-size:15px;
    line-height:1.55;
}

.material-info-card{
    border-radius:var(--radius-lg);

    padding:22px;
}

.material-info-title{
    margin:0 0 10px;

    font-size:28px;
    line-height:1.08;
    font-weight:900;
}

.material-info-text{
    margin:0 0 18px;

    color:var(--muted);

    font-size:15px;
    line-height:1.6;
}

.material-actions{
    display:grid;
    gap:12px;
}

.material-action-btn{
    width:100%;
    min-height:56px;

    border-radius:var(--radius-sm);

    font-size:15px;

    display:flex;
    align-items:center;
    justify-content:center;

    text-align:center;
}

/* =========================
   TEST
========================= */

.mobile-test-head,
.desktop-test-top{
    margin-bottom:16px;
}

.test-progress-line{
    height:7px;

    margin-top:14px;

    border-radius:999px;

    background:rgba(255,255,255,.08);

    overflow:hidden;
}

.test-progress-fill{
    height:100%;
    width:0%;

    border-radius:999px;

    background:
        linear-gradient(
            90deg,
            var(--accent),
            var(--accent-2)
        );

    transition:width .25s ease;
}

.test-question{
    margin:0 0 16px;

    font-size:26px;
    line-height:1.15;
    font-weight:800;
}

.test-question.long-question{
    font-size:26px;
    line-height:1.18;
}

.test-question.very-long-question{
    font-size:22px;
    line-height:1.22;
}

.test-answers{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.test-answer{
    width:100%;

    min-height:56px;

    border:none;
    border-radius:var(--radius-sm);

    background:rgba(255,255,255,.05);
    border:1px solid var(--line);

    color:#fff;

    padding:15px;

    text-align:left;

    font-size:15px;
    line-height:1.35;

    transition:.2s ease;
}

.test-answer.correct{
    background:rgba(57,145,84,.28);
    border-color:rgba(93,210,128,.35);
}

.test-answer.wrong{
    background:rgba(170,45,66,.30);
    border-color:rgba(255,90,112,.35);
}

.test-next{
    width:100%;
    height:56px;

    margin-top:16px;

    display:none;

    font-size:16px;
}

/* =========================
   SECTION TEXT
========================= */

.mobile-summary-head{
    display:none;
}

.mobile-section-title,
.desktop-section-title{
    margin:0 0 10px;

    font-weight:800;
}

.mobile-section-title{
    font-size:24px;
    line-height:1.08;
}

.desktop-section-title{
    font-size:30px;
    line-height:1.08;
}

.mobile-note,
.desktop-note{
    margin:0;

    color:var(--muted-soft);

    line-height:1.55;
}

.mobile-note{
    font-size:13px;
}

.desktop-note{
    font-size:14px;
}

/* =========================
   OTABEK SLOTS
========================= */

#otabek-mobile-slot{
    display:none;
}

@media (max-width:1023px){
    #otabek-mobile-slot{
        display:block;
    }
}

@media (min-width:1024px){
    #otabek-mobile-slot{
        display:none;
    }
}

/* =========================
   DESKTOP
========================= */

@media (min-width:1024px){

    html,
    body{
        min-height:100vh;

        background:
            radial-gradient(circle at 15% 18%, rgba(203,108,230,.08), transparent 24%),
            radial-gradient(circle at 85% 28%, rgba(203,108,230,.07), transparent 24%),
            linear-gradient(180deg,#09080f 0%,#0c0b14 100%);

        color:var(--text);
    }

    body{
        overflow:hidden;
    }

    .mobile-shell{
        display:none;
    }

    .desktop-only{
        display:block;
    }

    .desktop-app{
        min-height:100vh;

        color:var(--text);
    }

    .desktop-layout{
        display:block;

        min-height:100vh;
    }

    .desktop-main{
        height:100vh;

        padding:24px 22px 34px;

        overflow:auto;
    }

    .desktop-content-grid{
        display:grid;
        grid-template-columns:260px minmax(0,1fr) 260px;
        gap:18px;

        align-items:start;

        max-width:1440px;

        margin:0 auto;
    }

    .desktop-main-column{
        min-width:0;
    }

    .desktop-head{
        margin-bottom:16px;
    }

    .desktop-lesson-line{
        display:flex;
        align-items:center;
        gap:10px;

        margin-bottom:14px;
    }

    .desktop-step-back{
        width:44px;
        height:36px;

        border:none;
        border-radius:999px;

        background:rgba(255,255,255,.045);
        border:1px solid rgba(203,108,230,.45);

        color:#fff;

        display:flex;
        align-items:center;
        justify-content:center;

        font-size:22px;
        font-weight:800;

        flex-shrink:0;

        transition:.18s ease;
    }

    .desktop-step-back:hover{
        transform:translateX(-2px);

        background:rgba(203,108,230,.10);
    }

    .desktop-step-back:active{
        transform:scale(.95);
    }

    .desktop-badge{
        min-height:36px;

        display:inline-flex;
        align-items:center;
        gap:8px;

        padding:0 14px;

        border-radius:999px;

        background:rgba(255,255,255,.06);
        border:1px solid rgba(255,255,255,.06);

        color:#ebe4f5;

        font-size:13px;
        font-weight:800;
    }

    .desktop-title{
        margin:0;

        font-size:clamp(38px,3.2vw,54px);
        line-height:.96;
        font-weight:800;

        letter-spacing:-1px;
    }

    .desktop-subtitle,
    .desktop-video-title,
    .desktop-video-text{
        display:none;
    }

    .desktop-side-column{
        position:sticky;
        top:0;

        display:flex;
        flex-direction:column;
        gap:14px;
    }

    .desktop-control-card{
        min-height:calc(100vh - 58px);

        position:relative;
        overflow:hidden;

        display:flex;
        flex-direction:column;
        gap:18px;

        padding:18px;

        border-radius:var(--radius-lg);
    }

    .desktop-side-character{
        position:absolute;

        left:50%;
        bottom:0;

        width:100%;
        max-width:none;

        transform:translateX(-50%);

        z-index:0;

        pointer-events:none;
        user-select:none;
    }

    .desktop-language-block,
    .desktop-steps-list{
        position:relative;
        z-index:2;
    }

    .desktop-language-title{
        margin:0 0 12px;

        font-size:20px;
        line-height:1.1;
        font-weight:800;
    }

    .desktop-language-options{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:10px;
    }

    .desktop-language-option{
        width:100%;
        min-height:50px;

        border:none;
        border-radius:var(--radius-sm);

        padding:0 12px;

        background:rgba(255,255,255,.045);
        border:1px solid var(--line);

        color:#fff;

        display:flex;
        align-items:center;
        justify-content:center;
        gap:8px;

        text-align:center;

        transition:.18s ease;
    }

    .desktop-language-option:hover{
        transform:translateY(-1px);

        border-color:rgba(203,108,230,.28);

        background:rgba(203,108,230,.08);
    }

    .desktop-language-option.active{
        background:
            linear-gradient(
                90deg,
                rgba(203,108,230,.28),
                rgba(168,85,247,.18)
            );

        border-color:rgba(203,108,230,.55);

        box-shadow:0 12px 26px rgba(203,108,230,.18);
    }

    .desktop-language-flag{
        font-size:13px;
        font-weight:900;
    }

    .desktop-language-name{
        display:none;
    }

    .desktop-steps-list{
        display:flex;
        flex-direction:column;
        gap:10px;
    }

    .desktop-step-item{
        min-height:48px;

        display:flex;
        align-items:center;
        gap:10px;

        padding:0 12px;

        border-radius:16px;

        background:rgba(255,255,255,.04);

        color:#e9e2f1;

        font-size:14px;
        font-weight:800;

        cursor:pointer;

        transition:.18s ease;
    }

    .desktop-step-item:hover{
        transform:translateX(2px);

        background:rgba(203,108,230,.12);
    }

    .desktop-step-item.locked{
        cursor:not-allowed;
        opacity:.42;
    }

    .desktop-step-item.locked:hover{
        transform:none;

        background:rgba(255,255,255,.04);
    }

    .desktop-step-dot{
        width:10px;
        height:10px;

        border-radius:50%;

        background:rgba(255,255,255,.22);

        flex-shrink:0;
    }

    .desktop-step-item.active .desktop-step-dot{
        background:var(--accent);
        box-shadow:0 0 12px rgba(203,108,230,.55);
    }

    .desktop-step-item.available .desktop-step-dot{
        background:rgba(203,108,230,.65);
    }

    .desktop-step-item.locked .desktop-step-dot{
        background:rgba(255,255,255,.12);

function setText(id, value){

    const el =
        document.getElementById(id)

    if(el){
        el.innerText = value
    }
}

function impact(type = "light"){

    try{
        if(
            window.Telegram &&
            Telegram.WebApp &&
            Telegram.WebApp.HapticFeedback
        ){
            Telegram.WebApp.HapticFeedback.impactOccurred(type)
        }
    }catch(error){}
}

function goBack(){

    impact()

    if(currentStep !== "video"){
        const currentIndex = getStepIndex(currentStep)
        const previousStep = STEP_ORDER[currentIndex - 1]

        if(previousStep){
            goStep(previousStep)
            return
        }
    }

    window.location.href = "learn-smm-v2.html"
}

    setLessonLang(nextLang)
}

    impact()

    lang = value

    localStorage.setItem("lang", value)

    currentQuestionIndex = 0
    score = 0

    currentSummaryCardIndex = 0

    updateStaticText()

}

function updateLessonLangButtons(){

    const buttons = [
        ["lessonLangUz-desktop", "uz"],
        ["lessonLangRu-desktop", "ru"]
    ]

    buttons.forEach(([id, value]) => {

        const el =
            document.getElementById(id)

        if(el){
            el.classList.toggle("active", lang === value)
        }
    })
}

function updateMobileStepTitle(){

    const title =
        document.getElementById("mobileStepTitle")

    const chip =
        document.getElementById("mobileLangCurrent")

    if(title){
        title.innerText =
            t[lang][`step${capitalizeStep(currentStep)}`]
    }

    if(chip){
        chip.innerText =
            lang.toUpperCase()
    }
}

function capitalizeStep(step){

    return step.charAt(0).toUpperCase() + step.slice(1)
}

========================= */

function initPlyr(){

    const mobileVideo =
        document.getElementById("lessonVideo-mobile")

    const desktopVideo =
        document.getElementById("lessonVideo-desktop")

    const plyrOptions = {
        fullscreen:{
            enabled:true,
            fallback:"force",
            iosNative:true
        }
    }

    if(window.Plyr && mobileVideo){
        mobilePlyr = new Plyr(mobileVideo, plyrOptions)
    }

    if(window.Plyr && desktopVideo){
        desktopPlyr = new Plyr(desktopVideo, plyrOptions)
    }
}

function initVideo(){

    const mobileSource =
        document.getElementById("videoSource-mobile")

    const desktopSource =
        document.getElementById("videoSource-desktop")

    const src =
        VIDEO_PATHS[lang]

    if(mobileSource){
        mobileSource.src = src
    }

    if(desktopSource){
        desktopSource.src = src
    }

    const mobileVideo =
        document.getElementById("lessonVideo-mobile")

    const desktopVideo =
        document.getElementById("lessonVideo-desktop")

    if(mobileVideo){
        mobileVideo.load()
    }

    if(desktopVideo){
        desktopVideo.load()
    }

    if(mobilePlyr){
        mobilePlyr.source = {
            type:"video",
            sources:[
                {
                    src:src,
                    type:"video/mp4"
                }
            ]
        }
    }

    if(desktopPlyr){
        desktopPlyr.source = {
            type:"video",
            sources:[
                {
                    src:src,
                    type:"video/mp4"
                }
            ]
        }
    }
}

function initMobilePlyrSwipeExit(){

    let touchStartX = 0
    let touchStartY = 0
    let touchMoveX = 0
    let touchMoveY = 0

    let isDraggingVideo = false
    let activeFullscreen = null
    let swipeBackdrop = null

    function createSwipeBackdrop(){

        swipeBackdrop =
            document.getElementById("videoSwipeBackdrop")

        if(!swipeBackdrop){
            swipeBackdrop =
                document.createElement("div")

            swipeBackdrop.id = "videoSwipeBackdrop"
            swipeBackdrop.className = "video-swipe-backdrop"

            document.body.appendChild(swipeBackdrop)
        }

        requestAnimationFrame(function(){
            swipeBackdrop.style.opacity = "1"
        })
    }

    function resetSwipeBackdrop(){

        if(!swipeBackdrop) return

        swipeBackdrop.style.opacity = "0"

        setTimeout(function(){

            if(swipeBackdrop){
                swipeBackdrop.remove()
                swipeBackdrop = null
            }

        }, 220)
    }

    function resetActiveFullscreen(){

        if(!activeFullscreen) return

        activeFullscreen.style.transition = ""
        activeFullscreen.style.transform = ""
        activeFullscreen.style.willChange = ""
        activeFullscreen.style.borderRadius = ""
    }

    document.addEventListener("touchstart", function(event){

        activeFullscreen =
            document.querySelector(".plyr--fullscreen-fallback")

        if(!activeFullscreen) return
        if(!event.touches || !event.touches[0]) return

        touchStartX =
            event.touches[0].clientX

        touchStartY =
            event.touches[0].clientY

        touchMoveX =
            touchStartX

        touchMoveY =
            touchStartY

        isDraggingVideo = false

        createSwipeBackdrop()

        activeFullscreen.style.transition = "none"
        activeFullscreen.style.willChange = "transform"
        activeFullscreen.style.borderRadius = "26px"

    }, { passive:true })

    document.addEventListener("touchmove", function(event){

        if(!activeFullscreen) return
        if(!event.touches || !event.touches[0]) return

        touchMoveX =
            event.touches[0].clientX

        touchMoveY =
            event.touches[0].clientY

        const diffX =
            touchMoveX - touchStartX

        const diffY =
            touchMoveY - touchStartY

        const isVertical =
            Math.abs(diffY) > 10 &&
            Math.abs(diffY) > Math.abs(diffX) * 1.2

        if(!isVertical && !isDraggingVideo) return

        isDraggingVideo = true

        const limitedY =
            Math.max(Math.min(diffY, 240), -240)

        const progress =
            Math.min(Math.abs(limitedY) / 240, 1)

        const scale =
            1 - progress * 0.10

        activeFullscreen.style.transform =
            `translateY(${limitedY}px) scale(${scale})`

        if(swipeBackdrop){
            swipeBackdrop.style.opacity =
                String(0.35 + progress * 0.55)
        }

    }, { passive:true })

    document.addEventListener("touchend", function(){

        if(!activeFullscreen) return

        const diffY =
            touchMoveY - touchStartY

        const shouldExit =
            isDraggingVideo &&
            Math.abs(diffY) > 115

        activeFullscreen.style.transition =
            "transform .22s ease"

        if(shouldExit){

            const exitY =
                diffY > 0 ? window.innerHeight : -window.innerHeight

            activeFullscreen.style.transform =
                `translateY(${exitY}px) scale(.88)`

            resetSwipeBackdrop()

            setTimeout(function(){

                try{
                    if(mobilePlyr && mobilePlyr.fullscreen){
                        mobilePlyr.fullscreen.exit()
                    }
                }catch(error){}

                resetActiveFullscreen()

                activeFullscreen = null
                isDraggingVideo = false

            }, 190)

            return
        }

        activeFullscreen.style.transform =
            "translateY(0) scale(1)"

        setTimeout(function(){

            resetActiveFullscreen()
            resetSwipeBackdrop()

            activeFullscreen = null
            isDraggingVideo = false

        }, 230)

    }, { passive:true })
}

/* =========================
   SUMMARY
========================= */

function renderSummary(){

    const mobileWrap =
        document.getElementById("summaryImageWrap-mobile")

    const desktopWrap =
        document.getElementById("summaryImageWrap-desktop")

    const mobilePrev =
        document.getElementById("summaryPrev-mobile")

    const desktopPrev =
        document.getElementById("summaryPrev-desktop")

    const mobileNext =
        document.getElementById("summaryNext-mobile")

    const desktopNext =
        document.getElementById("summaryNext-desktop")

    const mobilePages =
        document.getElementById("summaryPages-mobile")

    const desktopPages =
        document.getElementById("summaryPages-desktop")

    renderSummaryImage(mobileWrap, "mobile")
    renderSummaryImage(desktopWrap, "desktop")

    if(mobilePrev){
        mobilePrev.disabled =
            currentSummaryCardIndex === 0
    }

    if(desktopPrev){
        desktopPrev.disabled =
            currentSummaryCardIndex === 0
    }

    if(mobileNext){
        mobileNext.disabled =
            currentSummaryCardIndex === SUMMARY_CARDS_COUNT - 1
    }

    if(desktopNext){
        desktopNext.disabled =
            currentSummaryCardIndex === SUMMARY_CARDS_COUNT - 1
    }

    renderSummaryPages(mobilePages)
    renderSummaryPages(desktopPages)
}

function renderSummaryImage(root, device){

    if(!root) return

    const currentSrc =
        getSummaryImagePath(currentSummaryCardIndex, device)

    const prevIndex =
        Math.max(currentSummaryCardIndex - 1, 0)

    const nextIndex =
        Math.min(currentSummaryCardIndex + 1, SUMMARY_CARDS_COUNT - 1)

    const prevSrc =
        getSummaryImagePath(prevIndex, device)

    const nextSrc =
        getSummaryImagePath(nextIndex, device)

    root.innerHTML = `
        <div class="summary-swipe-stack">

            <div class="summary-swipe-ghost prev">
                ${renderSummaryCardContent(prevSrc, prevIndex, device)}
            </div>

            <div class="summary-swipe-ghost next">
                ${renderSummaryCardContent(nextSrc, nextIndex, device)}
            </div>

            <div
                class="summary-swipe-current"
                id="summarySwipeCurrent-${device}"
            >
                ${renderSummaryCardContent(currentSrc, currentSummaryCardIndex, device)}
            </div>

        </div>
    `
}

function renderSummaryCardContent(src, index, device){

    const number =
        String(index + 1).padStart(2, "0")

    const deviceText =
        device === "mobile" ? "mobile" : "desktop"

    return `
        <img
            class="summary-image"
            src="${src}"
            alt="Summary ${number}"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
        >

        <div
            class="summary-placeholder"
            style="display:none;"
        >
            <div class="summary-placeholder-kicker">
                ${lang.toUpperCase()} • ${deviceText}
            </div>

            <h3 class="summary-placeholder-title">
                Карточка ${number}
            </h3>

            <p class="summary-placeholder-text">
                Здесь позже будет изображение:<br>
                summary-${index + 1}-${lang}-${device}.png
            </p>
        </div>
    `
}

function renderSummaryPages(root){

    if(!root) return

    let html = ""

    for(let i = 0; i < SUMMARY_CARDS_COUNT; i++){

        const label =
            String(i + 1).padStart(2, "0")

        const activeClass =
            i === currentSummaryCardIndex ? "active" : ""

        html += `
            <button
                class="summary-page-btn ${activeClass}"
                onclick="setSummaryCard(${i})"
            >
                ${label}
            </button>
        `
    }

    root.innerHTML = html
}

function setSummaryCard(index){

    if(index < 0) return
    if(index >= SUMMARY_CARDS_COUNT) return

    impact()

    currentSummaryCardIndex = index

    renderSummary()
}

function nextSummaryCard(){

    if(currentSummaryCardIndex >= SUMMARY_CARDS_COUNT - 1) return

    setSummaryCard(currentSummaryCardIndex + 1)
}

function prevSummaryCard(){

    if(currentSummaryCardIndex <= 0) return

    setSummaryCard(currentSummaryCardIndex - 1)
}

/* =========================
   SUMMARY SWIPE
========================= */

function summaryTouchStart(event){

    if(!event.touches || !event.touches[0]) return

    summaryTouchStartX =
        event.touches[0].clientX

    summaryTouchStartY =
        event.touches[0].clientY

    summaryTouchMoveX =
        summaryTouchStartX

    summaryTouchMoveY =
        summaryTouchStartY

    summaryIsDragging = true
    summaryIsHorizontalSwipe = false

    const current =
        document.getElementById("summarySwipeCurrent-mobile")

    if(current){
        current.classList.add("dragging")
        current.classList.remove("swipe-left")
        current.classList.remove("swipe-right")
        current.style.transform = "translateX(0px) rotate(0deg)"
    }
}

function summaryTouchMove(event){

    if(!summaryIsDragging) return
    if(!event.touches || !event.touches[0]) return

    summaryTouchMoveX =
        event.touches[0].clientX

    summaryTouchMoveY =
        event.touches[0].clientY

    const diffX =
        summaryTouchMoveX - summaryTouchStartX

    const diffY =
        summaryTouchMoveY - summaryTouchStartY

    if(
        Math.abs(diffX) > 12 &&
        Math.abs(diffX) > Math.abs(diffY)
    ){
        summaryIsHorizontalSwipe = true
    }

    if(!summaryIsHorizontalSwipe) return

    event.preventDefault()

    const current =
        document.getElementById("summarySwipeCurrent-mobile")

    if(!current) return

    const limitedX =
        Math.max(Math.min(diffX, 130), -130)

    const rotate =
        limitedX / 38

    current.style.transform =
        `translateX(${limitedX}px) rotate(${rotate}deg)`
}

function summaryTouchEnd(){

    if(!summaryIsDragging) return

    summaryIsDragging = false

    const diffX =
        summaryTouchMoveX - summaryTouchStartX

    const diffY =
        summaryTouchMoveY - summaryTouchStartY

    const current =
        document.getElementById("summarySwipeCurrent-mobile")

    if(current){
        current.classList.remove("dragging")
        current.style.transform = ""
    }

    if(!summaryIsHorizontalSwipe) return
    if(Math.abs(diffX) < 70) return
    if(Math.abs(diffY) > 90) return

    if(diffX < 0){

        if(current){
            current.classList.add("swipe-left")
        }

        setTimeout(() => {
            nextSummaryCard()
        }, 160)

        return
    }

    if(diffX > 0){

        if(current){
            current.classList.add("swipe-right")
        }

        setTimeout(() => {
            prevSummaryCard()
        }, 160)
    }
}

/* =========================
   STEPS
========================= */

function getStepIndex(step){

    return STEP_ORDER.indexOf(step)
}

function canOpenStep(step){

    const index =
        getStepIndex(step)

    return index <= maxUnlockedStepIndex
}

function unlockNextStep(step){

    const index =
        getStepIndex(step)

    if(index < 0) return

    const nextIndex =
        Math.min(index + 1, STEP_ORDER.length - 1)

    if(nextIndex > maxUnlockedStepIndex){
        maxUnlockedStepIndex = nextIndex
    }
}

function goStep(step){

    const targetIndex =
        getStepIndex(step)

    if(targetIndex === -1) return

    if(!canOpenStep(step)){
        impact("medium")
        updateDesktopSteps()
        return
    }

    impact()

    currentStep = step

    unlockNextStep(step)

    updateMobileStepTitle()
    updateStepHeaders(step)
    updateStepVisibility(step)
    updateDesktopSteps()

    window.scrollTo({
        top:0,
        behavior:"smooth"
    })

    if(step === "test"){
        renderQuestion()
    }
}

function updateStepHeaders(step){

    const mobileVideoHead =
        document.getElementById("mobileVideoHead")

    const desktopHead =
        document.querySelector(".desktop-head")

    const display =
        step === "video" ? "block" : "none"

    if(mobileVideoHead){
        mobileVideoHead.style.display = display
    }

    if(desktopHead){
        desktopHead.style.display = display
    }
}

function updateStepVisibility(step){

    const mobileSteps =
        document.querySelectorAll(
            "#step-video-mobile, #step-summary-mobile, #step-deep-mobile, #step-test-mobile"
        )

    const desktopSteps =
        document.querySelectorAll(
            "#step-video-desktop, #step-summary-desktop, #step-deep-desktop, #step-test-desktop"
        )

    mobileSteps.forEach(item => {
        item.classList.remove("active")
    })

    desktopSteps.forEach(item => {
        item.classList.remove("active")
    })

    const mobileTarget =
        document.getElementById(`step-${step}-mobile`)

    const desktopTarget =
        document.getElementById(`step-${step}-desktop`)

    if(mobileTarget){
        mobileTarget.classList.add("active")
    }

    if(desktopTarget){
        desktopTarget.classList.add("active")
    }
}

function updateDesktopSteps(){

    document
        .querySelectorAll(".desktop-step-item")
        .forEach(item => {
            item.classList.remove("active")
            item.classList.remove("available")
            item.classList.remove("locked")
        })

    STEP_ORDER.forEach((step, index) => {

        const item =
            document.getElementById(`desktopStep-${step}`)

        const lock =
            document.getElementById(`desktopStepLock-${step}`)

        if(!item) return

        if(lock){
            lock.innerText = ""
        }

        if(step === currentStep){
            item.classList.add("active")
            return
        }

        if(index <= maxUnlockedStepIndex){
            item.classList.add("available")
            return
        }

        item.classList.add("locked")

        if(lock){
            lock.innerText = "🔒"
        }
    })
}

/* =========================
   TEST
========================= */

function updateQuestionSize(element, text){

    if(!element) return

    element.classList.remove("long-question")
    element.classList.remove("very-long-question")

    if(text.length > 120){
        element.classList.add("very-long-question")
        return
    }

    if(text.length > 80){
        element.classList.add("long-question")
    }
}

function renderQuestion(){

    const list =
        questions[lang]

    const item =
        list[currentQuestionIndex]

    const mobileQuestion =
        document.getElementById("testQuestion-mobile")

    const desktopQuestion =
        document.getElementById("testQuestion-desktop")

    const mobileAnswers =
        document.getElementById("testAnswers-mobile")

    const desktopAnswers =
        document.getElementById("testAnswers-desktop")

    const mobileNext =
        document.getElementById("nextQuestionBtn-mobile")

    const desktopNext =
        document.getElementById("nextQuestionBtn-desktop")

    if(!item) return

    selectedAnswer = false

    if(mobileQuestion){
        mobileQuestion.innerText = item.question
        updateQuestionSize(mobileQuestion, item.question)
    }

    if(desktopQuestion){
        desktopQuestion.innerText = item.question
        updateQuestionSize(desktopQuestion, item.question)
    }

    const html =
        item.answers.map((answer, index) => `
            <button
                class="test-answer"
                onclick="selectAnswer(${index})"
            >
                ${answer}
            </button>
        `).join("")

    if(mobileAnswers){
        mobileAnswers.innerHTML = html
    }

    if(desktopAnswers){
        desktopAnswers.innerHTML = html
    }

    const isLastQuestion =
        currentQuestionIndex === list.length - 1

    if(mobileNext){
        mobileNext.innerText =
            isLastQuestion ? t[lang].showResults : t[lang].nextQuestion

        mobileNext.style.display = "none"
    }

    if(desktopNext){
        desktopNext.innerText =
            isLastQuestion ? t[lang].showResults : t[lang].nextQuestion

        desktopNext.style.display = "none"
    }

    updateTestProgress()
}

function selectAnswer(index){

    if(selectedAnswer) return

    impact()

    selectedAnswer = true

    const item =
        questions[lang][currentQuestionIndex]

    const answerButtons =
        document.querySelectorAll(".test-answer")

    answerButtons.forEach((button, buttonIndex) => {

        const localIndex =
            buttonIndex % item.answers.length

        if(localIndex === item.correct){
            button.classList.add("correct")
        }

        if(localIndex === index && index !== item.correct){
            button.classList.add("wrong")
        }
    })

    if(index === item.correct){
        score++
    }

    const mobileNext =
        document.getElementById("nextQuestionBtn-mobile")

    const desktopNext =
        document.getElementById("nextQuestionBtn-desktop")

    if(mobileNext){
        mobileNext.style.display = "block"
    }

    if(desktopNext){
        desktopNext.style.display = "block"
    }
}

function nextQuestion(){

    impact()

    const list =
        questions[lang]

    if(currentQuestionIndex < list.length - 1){
        currentQuestionIndex++
        renderQuestion()
        return
    }

    const mobileProgress =
        document.getElementById("testProgress-mobile")

    const desktopProgress =
        document.getElementById("testProgress-desktop")

    if(mobileProgress){
        mobileProgress.style.width = "100%"
    }

    if(desktopProgress){
        desktopProgress.style.width = "100%"
    }

    finishLesson()
}

function updateTestProgress(){

    const list =
        questions[lang]

    const percent =
        (currentQuestionIndex / list.length) * 100

    const mobileProgress =
        document.getElementById("testProgress-mobile")

    const desktopProgress =
        document.getElementById("testProgress-desktop")

    if(mobileProgress){
        mobileProgress.style.width = percent + "%"
    }

    if(desktopProgress){
        desktopProgress.style.width = percent + "%"
    }
}

async function saveProgress(){

    try{

        if(!telegramUserId){
            console.log("No telegram user id, progress not saved")
            return false
        }

        const response =
            await fetch("https://api.gaphub.uz/progress/complete", {

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    telegram_id:telegramUserId,
                    course_slug:COURSE_SLUG,
                    lesson_id:LESSON_ID
                })
            })

        return response.ok

    }catch(error){

        console.log("Progress save error:", error)
        return false
    }
}

function getResultStatus(){

    const total =
        questions[lang].length

    if(score <= 4){
        return {
            key:"bad",
            title:t[lang].resultBadTitle,
            text:t[lang].resultBadText,
            scoreText:`${score}/${total}`
        }
    }

    if(score <= 7){
        return {
            key:"good",
            title:t[lang].resultGoodTitle,
            text:t[lang].resultGoodText,
            scoreText:`${score}/${total}`
        }
    }

    return {
        key:"great",
        title:t[lang].resultGreatTitle,
        text:t[lang].resultGreatText,
        scoreText:`${score}/${total}`
    }
}

function finishLesson(){

    impact("medium")

    const result =
        getResultStatus()

    let overlay =
        document.getElementById("resultOverlay")

    if(!overlay){
        overlay = document.createElement("div")
        overlay.id = "resultOverlay"
        overlay.className = "result-overlay"
        document.body.appendChild(overlay)
    }

    overlay.innerHTML = `
        <div class="result-modal">

            <div class="result-fire">
                🔥
            </div>

            <h2 class="result-title">
                ${result.title}
            </h2>

            <p class="result-score">
                ${result.text}<br>
                ${result.scoreText}
            </p>

            <div class="result-scale">

                <div class="result-scale-item ${result.key === "bad" ? "active" : ""}">
                    ${t[lang].resultScaleBad}
                </div>

                <div class="result-scale-item ${result.key === "good" ? "active" : ""}">
                    ${t[lang].resultScaleGood}
                </div>

                <div class="result-scale-item ${result.key === "great" ? "active" : ""}">
                    ${t[lang].resultScaleGreat}
                </div>

            </div>

            <div class="result-actions">

                <button
                    class="result-btn result-btn-secondary"
                    onclick="restartLesson()"
                >
                    ${t[lang].restartLesson}
                </button>

                <button
                    class="result-btn result-btn-primary"
                    onclick="completeLesson()"
                >
                    ${t[lang].finishLessonBtn}
                </button>

            </div>

        </div>
    `

    overlay.classList.add("active")
}

function restartLesson(){

    impact()

    const overlay =
        document.getElementById("resultOverlay")

    if(overlay){
        overlay.classList.remove("active")
    }

    currentQuestionIndex = 0
    score = 0
    selectedAnswer = false

    renderQuestion()
    goStep("video")
}

async function completeLesson(){

    impact("medium")

    await saveProgress()

    window.location.href = "learn-smm-v2.html"
}

/* =========================
   OTABEK
========================= */

function loadOtabek(){

    window.OTABEK_STORAGE_KEY =
        `smm_lesson_${LESSON_ID}_${lang}`

     window.OTABEK_LANG = lang

    const isDesktop =
        window.innerWidth >= 1024

    const slot =
        isDesktop
            ? document.getElementById("otabek-slot")
            : document.getElementById("otabek-mobile-slot")

    if(!slot) return

    slot.innerHTML = ""

    fetch(`otabek.html?v=${Date.now()}`)
        .then(response => response.text())
        .then(html => {

            slot.innerHTML = html

            const oldOtabekScript =
                document.getElementById("otabekRuntimeScript")

            if(oldOtabekScript){
                oldOtabekScript.remove()
            }

            const scripts =
                slot.querySelectorAll("script")

            scripts.forEach(oldScript => {

                const newScript =
                    document.createElement("script")

                newScript.id = "otabekRuntimeScript"

                newScript.textContent =
                    oldScript.textContent

                document.body.appendChild(newScript)

                oldScript.remove()
            })
        })
        .catch(error => {
            console.log("Otabek load error:", error)
        })
}
