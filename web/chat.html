<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>gaphub - reviews</title>

<style>
:root{
    --accent:#cb6ce6;
    --accent-2:#a855f7;
    --bg:#0c0b14;
    --bg-soft:#15141e;
    --card:#111117;
    --card-2:#17171f;
    --text:#ffffff;
    --muted:#a8a4b5;
    --muted-soft:#8f8a9e;
    --line:rgba(255,255,255,.07);
    --shadow:0 12px 38px rgba(0,0,0,.35);

    --radius-xl:28px;
    --radius-lg:22px;
    --radius-md:16px;
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html, body{
    margin:0;
    padding:0;
    min-height:100%;
    font-family:Arial, sans-serif;
    background:#000;
    color:#fff;
}

body{
    position:relative;
}

img{
    display:block;
    max-width:100%;
}

button{
    font-family:inherit;
    cursor:pointer;
}

.desktop-only{
    display:none;
}

.btn{
    border:none;
    border-radius:18px;
    transition:.2s ease;
    font-weight:700;
}

.btn:active{
    transform:scale(.99);
}

.btn-primary{
    color:#fff;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    box-shadow:0 14px 32px rgba(203,108,230,.22);
}

.btn-secondary{
    color:#fff;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.10);
}

.glow-card{
    background:
        radial-gradient(circle at 86% 14%, rgba(203,108,230,.18), transparent 26%),
        radial-gradient(circle at 15% 88%, rgba(203,108,230,.08), transparent 22%),
        linear-gradient(180deg, #171621 0%, #0f0e17 100%);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:var(--shadow);
}

.soft-card{
    background:
        radial-gradient(circle at 88% 18%, rgba(203,108,230,.10), transparent 24%),
        linear-gradient(180deg, #121219 0%, #0d0d12 100%);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:var(--shadow);
}

/* =========================
   MOBILE
========================= */
.mobile-shell{
    display:block;
}

.mobile-page{
    min-height:calc(100vh + 24px);
    padding:
        calc(env(safe-area-inset-top) + 78px)
        16px
        calc(112px + env(safe-area-inset-bottom));

    background:
        radial-gradient(circle at 20% 8%, rgba(203,108,230,.12), transparent 24%),
        linear-gradient(180deg, #09080f 0%, #0c0b14 100%);
}

.mobile-header{
    margin-bottom:18px;
    animation:fadeUp .42s ease both;
}

.mobile-page-title{
    margin:0 0 8px;
    font-size:clamp(34px,9vw,42px);
    line-height:.94;
    font-weight:800;
    letter-spacing:-1px;
}

.mobile-page-text{
    margin:0;
    max-width:330px;
    color:var(--muted);
    font-size:15px;
    line-height:1.45;
}

.mobile-top-actions{
    margin-top:16px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.mobile-top-btn{
    min-height:54px;
    border-radius:18px;
    font-size:14px;
    font-weight:800;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    text-decoration:none;
    transition:transform .18s ease, opacity .18s ease;
}

.mobile-top-btn:active{
    transform:scale(.985);
    opacity:.92;
}

.mobile-section{
    margin-top:20px;
}

.mobile-section-title{
    margin:0 0 14px;
    font-size:22px;
    line-height:1.1;
    font-weight:800;
}

.mobile-stack-wrap{
    position:relative;
    min-height:274px;
    margin-top:2px;
    animation:fadeUp .45s ease both;
}

.mobile-review-stack{
    position:relative;
    height:248px;
}

.mobile-stack-card{
    position:absolute;
    top:0;
    left:50%;
    width:74%;
    min-height:238px;
    border-radius:26px;
    padding:18px;
    transform:translateX(-50%);
    transition:
        transform .34s ease,
        opacity .34s ease,
        filter .34s ease;
    overflow:hidden;
}

.mobile-stack-card.is-main{
    z-index:3;
    opacity:1;
    transform:translateX(-50%) scale(1);
    filter:none;
}

.mobile-stack-card.is-left{
    z-index:2;
    opacity:.34;
    transform:translateX(-76%) scale(.88);
    filter:blur(.2px);
}

.mobile-stack-card.is-right{
    z-index:2;
    opacity:.34;
    transform:translateX(-24%) scale(.88);
    filter:blur(.2px);
}

.mobile-stack-card.is-hidden{
    z-index:1;
    opacity:0;
    transform:translateX(-50%) scale(.82);
    pointer-events:none;
}

.mobile-stack-top{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:14px;
}

.mobile-stack-avatar{
    width:58px;
    height:58px;
    border-radius:20px;
    background:
        radial-gradient(circle at 50% 38%, rgba(255,255,255,.12), transparent 28%),
        linear-gradient(135deg,#232330,#111117);
    border:1px solid rgba(255,255,255,.08);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#d6c5df;
    font-size:11px;
    text-align:center;
    overflow:hidden;
    flex-shrink:0;
}

.mobile-stack-avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.mobile-stack-info{
    min-width:0;
    flex:1;
}

.mobile-stack-name{
    margin:0 0 4px;
    font-size:18px;
    line-height:1.12;
    font-weight:800;
}

.mobile-stack-role{
    color:var(--muted-soft);
    font-size:13px;
    line-height:1.35;
}

.mobile-stack-text{
    margin:0;
    color:#e4e0eb;
    font-size:14px;
    line-height:1.55;
}

.mobile-stack-controls{
    margin-top:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
}

.mobile-stack-btn{
    width:42px;
    height:42px;
    border-radius:14px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08);
    color:#fff;
    font-size:22px;
    line-height:1;
    transition:transform .18s ease, opacity .18s ease;
}

.mobile-stack-btn:active{
    transform:scale(.94);
    opacity:.85;
}

.mobile-dots{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:7px;
}

.mobile-dot{
    width:7px;
    height:7px;
    border-radius:999px;
    background:rgba(255,255,255,.25);
    transition:.2s ease;
}

.mobile-dot.active{
    width:22px;
    background:var(--accent);
}

.mobile-divider{
    margin:22px 0 0;
    height:1px;
    background:linear-gradient(90deg, transparent, rgba(203,108,230,.55), transparent);
    animation:fadeUp .45s ease both;
}

html, body{
    overflow-x:hidden;
}

.mobile-shell,
.mobile-page{
    overflow-x:hidden;
}

.mobile-review-stack{
    touch-action:pan-y;
    overflow:visible;
}

.mobile-review-stack.swiping{
    touch-action:none;
}

.mobile-stack-card{
    will-change:transform, opacity;
}

.mobile-stack-card.is-main.dragging{
    transition:none;
}

html,
body,
.mobile-shell,
.mobile-page{
    overflow-x:hidden;
}

/* BOTTOM NAV */
.bottom-nav{
    position:fixed;
    left:0;
    bottom:0;
    width:100%;
    background:#000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 10px;
    padding-bottom:calc(8px + env(safe-area-inset-bottom));
    z-index:50;
}

.nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:12px;
    color:#fff;
    width:20%;
    text-align:center;
    cursor:pointer;
}

.nav-item img{
    width:27px;
    margin-bottom:2px;
}

.nav-item span{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.nav-item.active-mobile-nav span{
    color:#d68cff;
}

.nav-item.active-mobile-nav img{
    filter:
        drop-shadow(0 0 10px rgba(203,108,230,.45))
        brightness(1.08);
}

.nav-center{
    position:relative;
    top:-18px;
    width:20%;
    display:flex;
    justify-content:center;
}

.circle{
    width:60px;
    height:60px;
    background:#ffffff;
    border-radius:50%;
    border:4px solid var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 10px 30px rgba(203,108,230,.25);
}

.circle img{
    width:24px;
    height:24px;
    object-fit:contain;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(14px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* =========================
   DESKTOP
========================= */
@media (min-width:1024px){
    html, body{
        min-height:100vh;
        background:
            radial-gradient(circle at 15% 18%, rgba(203,108,230,.08), transparent 24%),
            radial-gradient(circle at 85% 28%, rgba(203,108,230,.07), transparent 24%),
            linear-gradient(180deg, #09080f 0%, #0c0b14 100%);
        color:var(--text);
    }

    body{
        overflow:hidden;
    }

    .mobile-shell{
        display:none;
    }

    .desktop-only{
        display:block;
    }

    .desktop-app{
        min-height:100vh;
        color:var(--text);
    }

    .desktop-layout{
        display:grid;
        grid-template-columns:270px minmax(0,1fr);
        min-height:100vh;
    }

    .desktop-sidebar{
        padding:22px 20px;
        border-right:1px solid rgba(255,255,255,.05);
        background:linear-gradient(180deg, rgba(14,13,23,.70) 0%, rgba(12,11,20,.40) 100%);
        overflow:auto;
    }

    .desktop-brand{
        font-size:34px;
        font-weight:800;
        line-height:1;
        margin:8px 0 56px;
    }

    .desktop-nav{
        display:flex;
        flex-direction:column;
        gap:10px;
        margin-top:4px;
    }

    .desktop-nav-item{
        display:flex;
        align-items:center;
        gap:14px;
        width:100%;
        min-height:56px;
        padding:0 18px;
        border-radius:16px;
        color:#f1f1f1;
        background:transparent;
        border:1px solid transparent;
        font-size:16px;
        font-weight:600;
        transition:.2s ease;
        cursor:pointer;
        text-align:left;
    }

    .desktop-nav-item img{
        width:28px;
        height:28px;
        object-fit:contain;
        flex-shrink:0;
    }

    .desktop-nav-item.active-nav{
        background:linear-gradient(180deg, rgba(255,255,255,.06) 0%, rgba(255,255,255,.03) 100%);
        border-color:rgba(255,255,255,.06);
        box-shadow:var(--shadow);
    }

    .desktop-nav-item-accent{
        background:linear-gradient(90deg, #b85bda 0%, #cb6ce6 100%);
        border-color:transparent;
        color:#fff;
        box-shadow:0 12px 26px rgba(203,108,230,.28);
        margin-top:8px;
    }

    .desktop-nav-item-accent:hover{
        transform:translateY(-1px);
    }

    .desktop-nav-item-accent img{
        filter:brightness(0) invert(1);
    }

    .desktop-main{
        padding:24px 22px 30px;
        height:100vh;
        overflow:auto;
    }

    .desktop-hero{
        position:relative;
        overflow:hidden;
        border-radius:30px;
        padding:24px 22px 22px;
    }

    .desktop-badge{
        display:inline-flex;
        align-items:center;
        gap:8px;
        background:rgba(255,255,255,.06);
        border:1px solid rgba(255,255,255,.06);
        border-radius:999px;
        padding:10px 14px;
        font-size:13px;
        color:#ebe4f5;
        margin-bottom:18px;
    }

    .desktop-hero-grid{
        display:grid;
        grid-template-columns:minmax(0,1.1fr) minmax(320px,.9fr);
        gap:18px;
        align-items:stretch;
    }

    .desktop-hero-title{
        margin:0 0 10px;
        font-size:clamp(38px,3.2vw,56px);
        line-height:.96;
        font-weight:800;
        letter-spacing:-1px;
    }

    .desktop-hero-text{
        margin:0;
        color:var(--muted);
        font-size:17px;
        line-height:1.52;
        max-width:720px;
    }

    .desktop-hero-actions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    align-content:end;
}

    .desktop-hero-btn{
        width:100%;
        height:58px;
        font-size:16px;
        display:flex;
        align-items:center;
        justify-content:center;
        text-decoration:none;
    }

    .desktop-section{
        margin-top:16px;
    }

    .desktop-section-title{
        margin:0 0 14px;
        font-size:28px;
        line-height:1.1;
        font-weight:800;
    }

    .desktop-featured-grid{
        display:grid;
        grid-template-columns:repeat(3, minmax(0,1fr));
        gap:14px;
    }

    .desktop-featured-card{
        border-radius:24px;
        overflow:hidden;
    }

    .desktop-featured-photo{
        height:180px;
        background:
            radial-gradient(circle at 50% 40%, rgba(203,108,230,.20), transparent 28%),
            linear-gradient(135deg,#1b1b24,#101015);
        display:flex;
        align-items:center;
        justify-content:center;
        color:#d6c5df;
        font-size:13px;
    }

    .desktop-featured-body{
        padding:16px;
    }

    .desktop-featured-name{
        margin:0 0 4px;
        font-size:20px;
        font-weight:800;
        line-height:1.2;
    }

    .desktop-featured-role{
        color:var(--muted-soft);
        font-size:14px;
        margin-bottom:10px;
    }

    .desktop-featured-text{
        margin:0;
        color:#e4e0eb;
        font-size:15px;
        line-height:1.55;
    }

    .desktop-slider-card{
        border-radius:28px;
        padding:24px;
        position:relative;
        overflow:hidden;
    }

    .desktop-slider-inner{
        display:grid;
        grid-template-columns:130px minmax(0,1fr);
        gap:22px;
        align-items:center;
    }

    .desktop-slider-avatar{
        width:118px;
        height:118px;
        border-radius:50%;
        border:5px solid var(--accent);
        background:
            radial-gradient(circle at 50% 38%, rgba(255,255,255,.12), transparent 28%),
            linear-gradient(135deg,#232330,#111117);
        display:flex;
        align-items:center;
        justify-content:center;
        color:#d6c5df;
        font-size:13px;
        overflow:hidden;
    }

    .desktop-slider-name{
        margin:0 0 5px;
        font-size:24px;
        font-weight:800;
    }

    .desktop-slider-role{
        color:var(--muted-soft);
        font-size:14px;
        margin-bottom:12px;
    }

    .desktop-slider-text{
        min-height:72px;
        margin:0;
        color:#e4e0eb;
        font-size:17px;
        line-height:1.55;
        max-width:920px;
    }

    .desktop-slider-footer{
        margin-top:18px;
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:16px;
    }

    .desktop-slider-controls{
        display:flex;
        align-items:center;
        gap:10px;
    }

    .desktop-slider-btn{
        width:46px;
        height:46px;
        border-radius:15px;
        background:rgba(255,255,255,.06);
        border:1px solid rgba(255,255,255,.08);
        color:#fff;
        font-size:24px;
        line-height:1;
    }

    .desktop-dots{
        display:flex;
        align-items:center;
        justify-content:center;
        gap:8px;
    }

    .desktop-dot{
        width:8px;
        height:8px;
        border-radius:999px;
        background:rgba(255,255,255,.25);
    }

    .desktop-dot.active{
        width:26px;
        background:var(--accent);
    }
}

@media (max-width:1360px) and (min-width:1024px){
    .desktop-layout{
        grid-template-columns:245px minmax(0,1fr);
    }

    .desktop-main{
        padding:22px 18px 26px;
    }

    .desktop-hero-grid{
        grid-template-columns:1fr;
    }

    .desktop-featured-grid{
        grid-template-columns:repeat(3, minmax(0,1fr));
    }

    .desktop-featured-card{
        display:block;
    }

    .desktop-featured-photo{
        height:150px;
        min-height:150px;
    }
}
</style>
</head>

<body>

<!-- MOBILE -->
<div class="mobile-shell">
    <div class="mobile-page">

        <section class="mobile-header">
            <h1 class="mobile-page-title" id="heroTitle-mobile"></h1>
            <p class="mobile-page-text" id="heroText-mobile"></p>

            <div class="mobile-top-actions">
                <a class="btn btn-primary mobile-top-btn" id="writeReviewBtn-mobile" href="https://t.me/username" target="_blank"></a>
                <button class="btn btn-secondary mobile-top-btn" id="moreReviewsBtn-mobile" onclick="openReviewsChannel()"></button>
            </div>
        </section>

        <section class="mobile-section">
            <h2 class="mobile-section-title" id="featuredTitle-mobile"></h2>

            <div class="mobile-stack-wrap">
                <div class="mobile-review-stack" id="featuredStack-mobile"></div>

                <div class="mobile-stack-controls">
                    <button class="mobile-stack-btn" onclick="prevFeatured()">‹</button>
                    <div class="mobile-dots" id="featuredDots-mobile"></div>
                    <button class="mobile-stack-btn" onclick="nextFeatured()">›</button>
                </div>
            </div>
        </section>

        <div class="mobile-divider"></div>

        <section class="mobile-section">
            <h2 class="mobile-section-title" id="sliderTitle-mobile"></h2>

            <div class="mobile-stack-wrap">
                <div class="mobile-review-stack" id="studentStack-mobile"></div>

                <div class="mobile-stack-controls">
                    <button class="mobile-stack-btn" onclick="prevStudent()">‹</button>
                    <div class="mobile-dots" id="studentDots-mobile"></div>
                    <button class="mobile-stack-btn" onclick="nextStudent()">›</button>
                </div>
            </div>
        </section>

    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="goPage('mycourses.html')">
            <img src="images/icon/courses2.png" alt="">
            <span id="m1-mobile"></span>
        </div>

        <div class="nav-item" onclick="goPage('support.html')">
            <img src="images/icon/support.png" alt="">
            <span id="m4-mobile"></span>
        </div>

        <div class="nav-center" onclick="goHome()">
            <div class="circle">
                <img src="images/icon/home2.png" alt="home">
            </div>
        </div>

        <div class="nav-item active-mobile-nav" onclick="goPage('chat.html')">
            <img src="images/icon/feedback.png" alt="">
            <span id="m5-mobile"></span>
        </div>

        <div class="nav-item" onclick="goPage('myprofile.html')">
            <img src="images/icon/profile2.png" alt="">
            <span id="m6-mobile"></span>
        </div>
    </div>
</div>

<!-- DESKTOP -->
<div class="desktop-app desktop-only">
    <div class="desktop-layout">
        <aside class="desktop-sidebar">
            <div class="desktop-brand">gaphub</div>

            <nav class="desktop-nav">
                <button class="desktop-nav-item" onclick="goHome()">
                    <img src="images/icon/home.png" alt="">
                    <span id="home-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('mycourses.html')">
                    <img src="images/icon/courses2.png" alt="">
                    <span id="m1-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('support.html')">
                    <img src="images/icon/support.png" alt="">
                    <span id="m4-desktop"></span>
                </button>

                <button class="desktop-nav-item active-nav" onclick="goPage('chat.html')">
                    <img src="images/icon/feedback.png" alt="">
                    <span id="m5-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('myprofile.html')">
                    <img src="images/icon/profile2.png" alt="">
                    <span id="m6-desktop"></span>
                </button>

                <button class="desktop-nav-item desktop-nav-item-accent" onclick="goCourses()">
                    <img src="images/icon/catalog.png" alt="">
                    <span id="catalog-desktop"></span>
                </button>
            </nav>
        </aside>

        <main class="desktop-main">

            <section class="desktop-hero glow-card">
                <div class="desktop-badge" id="badge-desktop"></div>

                <div class="desktop-hero-grid">
                    <div>
                        <h1 class="desktop-hero-title" id="heroTitle-desktop"></h1>
                        <p class="desktop-hero-text" id="heroText-desktop"></p>
                    </div>

                    <div class="desktop-hero-actions">
                        <a class="btn btn-primary desktop-hero-btn" id="writeReviewBtn-desktop" href="https://t.me/username" target="_blank"></a>
                        <button class="btn btn-secondary desktop-hero-btn" id="moreReviewsBtn-desktop" onclick="openReviewsChannel()"></button>
                    </div>
                </div>
            </section>

            <section class="desktop-section">
                <h2 class="desktop-section-title" id="featuredTitle-desktop"></h2>

                <div class="desktop-featured-grid" id="featuredList-desktop"></div>
            </section>

            <section class="desktop-section">
                <h2 class="desktop-section-title" id="sliderTitle-desktop"></h2>

                <div class="desktop-slider-card soft-card">
                    <div class="desktop-slider-inner">
                        <div class="desktop-slider-avatar" id="sliderAvatar-desktop"></div>

                        <div>
                            <h3 class="desktop-slider-name" id="sliderName-desktop"></h3>
                            <div class="desktop-slider-role" id="sliderRole-desktop"></div>
                            <p class="desktop-slider-text" id="sliderText-desktop"></p>

                            <div class="desktop-slider-footer">

function impact(){
    if(window.Telegram && Telegram.WebApp && Telegram.WebApp.HapticFeedback){

function setText(id, value){
    const el = document.getElementById(id)
    if(el) el.innerText = value
}

function getStackClass(index, current, total){
    const left = (current - 1 + total) % total
    const right = (current + 1) % total

    if(index === current) return "is-main"
    if(index === left) return "is-left"
    if(index === right) return "is-right"

    return "is-hidden"
}

function renderStack(containerId, dotsId, items, current){
    const container = document.getElementById(containerId)
    const dots = document.getElementById(dotsId)
    const d = t[lang]

    if(container){
        container.innerHTML = items.map((item, index) => {
            const cardClass = getStackClass(index, current, items.length)

            return `
                <article class="mobile-stack-card soft-card ${cardClass}">
                    <div class="mobile-stack-top">
                        <div class="mobile-stack-avatar">
                            ${d.photoPlaceholder}
                        </div>

                        <div class="mobile-stack-info">
                            <h3 class="mobile-stack-name">${item.name}</h3>
                            <div class="mobile-stack-role">${item.role}</div>
                        </div>
                    </div>

                    <p class="mobile-stack-text">${item.text}</p>
                </article>
            `
        }).join("")
    }

    if(dots){
        dots.innerHTML = items.map((_, index) => `
            <span class="${index === current ? "mobile-dot active" : "mobile-dot"}"></span>
        `).join("")
    }
}

function initCardSwipe(stackId, nextFn, prevFn){
    const stack = document.getElementById(stackId)
    if(!stack) return

    let startX = 0
    let startY = 0
    let currentX = 0
    let isDragging = false
    let isHorizontal = false

    function getMainCard(){
        return stack.querySelector(".mobile-stack-card.is-main")
    }

    stack.addEventListener("touchstart", function(e){
        if(!e.touches || !e.touches.length) return

        const touch = e.touches[0]

        startX = touch.clientX
        startY = touch.clientY
        currentX = startX
        isDragging = true
        isHorizontal = false

        const card = getMainCard()
        if(card){
            card.classList.add("dragging")
        }
    }, {passive:true})

    stack.addEventListener("touchmove", function(e){
        if(!isDragging || !e.touches || !e.touches.length) return

        const touch = e.touches[0]
        const diffX = touch.clientX - startX
        const diffY = touch.clientY - startY

        currentX = touch.clientX

        if(!isHorizontal){
            if(Math.abs(diffX) > 12 && Math.abs(diffX) > Math.abs(diffY)){
                isHorizontal = true
                stack.classList.add("swiping")
            }
        }

        if(isHorizontal){
            e.preventDefault()

            const card = getMainCard()
            if(card){
                const limitedX = Math.max(-70, Math.min(70, diffX))
                const rotate = limitedX / 18

                card.style.transform = `translateX(calc(-50% + ${limitedX}px)) scale(1) rotate(${rotate}deg)`
            }
        }
    }, {passive:false})

    stack.addEventListener("touchend", function(){
        if(!isDragging) return

        const diffX = currentX - startX
        const card = getMainCard()

        if(card){
            card.classList.remove("dragging")
            card.style.transform = ""
        }

        stack.classList.remove("swiping")

        if(isHorizontal && Math.abs(diffX) > 55){
            if(diffX < 0){
                nextFn()
            }else{
                prevFn()
            }
        }

        isDragging = false
        isHorizontal = false
    }, {passive:true})

    stack.addEventListener("touchcancel", function(){
        const card = getMainCard()

        if(card){
            card.classList.remove("dragging")
            card.style.transform = ""
        }

        stack.classList.remove("swiping")

        isDragging = false
        isHorizontal = false
    }, {passive:true})
}

function initSwipes(){
    initCardSwipe("featuredStack-mobile", nextFeatured, prevFeatured)
    initCardSwipe("studentStack-mobile", nextStudent, prevStudent)
