<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>gaphub - courses</title>

<style>
:root{
    --accent:#cb6ce6;
    --text:#ffffff;
    --muted:#a8a8b3;
    --bg:#0c0b14;
    --card:#111117;
    --card-soft:#17171f;
    --line:rgba(255,255,255,.08);
    --shadow:0 10px 35px rgba(0,0,0,.35);
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html, body{
    margin:0;
    padding:0;
    min-height:100%;
    font-family:Arial, sans-serif;
    background:#000;
    color:#fff;
}

body{
    position:relative;
}

img{
    display:block;
    max-width:100%;
}

button{
    font-family:inherit;
    cursor:pointer;
}

.desktop-only{
    display:none;
}

.btn-gradient{
    border:none;
    color:#fff;
    background:linear-gradient(90deg,#cb6ce6,#a855f7);
}

/* =========================
   MOBILE
========================= */
.mobile-shell{
    display:block;
}

.mobile-page{
    padding:calc(env(safe-area-inset-top) + 76px) 14px calc(110px + env(safe-area-inset-bottom));
    background:
        radial-gradient(circle at 18% 12%, rgba(203,108,230,.08), transparent 24%),
        linear-gradient(180deg, #09080f 0%, #0c0b14 100%);
    min-height:100vh;
}

.mobile-back{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:#1a1a1a;
    color:#fff;
    border:none;
    border-radius:12px;
    padding:10px 14px;
    font-size:15px;
    margin-bottom:16px;
}

.mobile-back svg{
    width:16px;
    height:16px;
    flex-shrink:0;
}

.mobile-header{
    margin-bottom:18px;
}

.mobile-kicker{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.06);
    border-radius:999px;
    padding:8px 12px;
    font-size:12px;
    color:#ebe4f5;
    margin-bottom:12px;
}

.mobile-title{
    margin:0 0 8px;
    font-size:34px;
    line-height:.96;
    font-weight:800;
    letter-spacing:-0.8px;
}

.mobile-desc{
    margin:0;
    color:var(--muted);
    font-size:14px;
    line-height:1.5;
    max-width:96%;
}

.mobile-courses{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.mobile-course-card{
    position:relative;
    overflow:hidden;
    background:
        radial-gradient(circle at 88% 18%, rgba(203,108,230,.10), transparent 24%),
        linear-gradient(180deg, #111117 0%, #0d0d12 100%);
    border:1px solid rgba(255,255,255,.05);
    border-radius:24px;
    padding:14px;
    box-shadow:var(--shadow);
}

.mobile-course-cover{
    width:100%;
    height:165px;
    object-fit:cover;
    background:#1a1a1a;
    border-radius:18px;
    margin-bottom:14px;
}

.mobile-course-top{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:10px;
}

.mobile-course-title{
    margin:0;
    font-size:24px;
    line-height:1.05;
    font-weight:800;
}

.mobile-course-desc{
    margin:0 0 12px;
    color:var(--muted);
    font-size:14px;
    line-height:1.5;
}

.mobile-course-meta{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-bottom:14px;
}

.mobile-meta-item{
    background:#17171f;
    border-radius:12px;
    padding:10px;
}

.mobile-meta-label{
    color:#9898a5;
    font-size:11px;
    margin-bottom:5px;
}

.mobile-meta-value{
    font-size:13px;
    font-weight:700;
    line-height:1.35;
}

.mobile-course-btn{
    width:100%;
    height:50px;
    border:none;
    border-radius:16px;
    font-size:15px;
    font-weight:700;
}

/* BOTTOM NAV */
.bottom-nav{
    position:fixed;
    left:0;
    bottom:0;
    width:100%;
    background:#000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 10px;
    padding-bottom:calc(8px + env(safe-area-inset-bottom));
    z-index:50;
}

.nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:12px;
    color:#fff;
    width:20%;
    text-align:center;
    cursor:pointer;
}

.nav-item img{
    width:27px;
    margin-bottom:2px;
}

.nav-item span{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.nav-center{
    position:relative;
    top:-18px;
    width:20%;
    display:flex;
    justify-content:center;
}

.circle{
    width:60px;
    height:60px;
    background:#ffffff;
    border-radius:50%;
    border:4px solid var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
}

.circle img{
    width:24px;
    height:24px;
    object-fit:contain;
}

/* =========================
   DESKTOP
========================= */
@media (min-width:1024px){

    html, body{
        min-height:100vh;
        background:
            radial-gradient(circle at 15% 18%, rgba(203,108,230,.08), transparent 24%),
            radial-gradient(circle at 85% 28%, rgba(203,108,230,.07), transparent 24%),
            linear-gradient(180deg, #09080f 0%, #0c0b14 100%);
        color:var(--text);
    }

    body{
        overflow:hidden;
    }

    .mobile-shell{
        display:none;
    }

    .desktop-only{
        display:block;
    }

    .desktop-app{
        min-height:100vh;
        color:var(--text);
    }

    .desktop-layout{
        display:grid;
        grid-template-columns:280px minmax(0,1fr);
        min-height:100vh;
    }

    .desktop-sidebar{
        padding:22px 22px;
        border-right:1px solid rgba(255,255,255,.05);
        background:linear-gradient(180deg, rgba(14,13,23,.70) 0%, rgba(12,11,20,.40) 100%);
        overflow:auto;
    }

    .desktop-brand{
        font-size:34px;
        font-weight:800;
        line-height:1;
        margin:8px 0 56px;
    }

    .desktop-nav{
        display:flex;
        flex-direction:column;
        gap:10px;
        margin-top:4px;
    }

    .desktop-nav-item{
        display:flex;
        align-items:center;
        gap:14px;
        width:100%;
        min-height:56px;
        padding:0 18px;
        border-radius:16px;
        color:#f1f1f1;
        background:transparent;
        border:1px solid transparent;
        font-size:16px;
        font-weight:600;
        transition:.2s ease;
        cursor:pointer;
        text-align:left;
    }

        width:28px;
        height:28px;
        object-fit:contain;
        flex-shrink:0;
    }

    .desktop-nav-item.active-nav{

        border-color:rgba(255,255,255,.06);

    }

    .desktop-nav-item-accent{

        color:#fff;

        margin-top:8px;

    .desktop-main{

    }

    .desktop-back{

        gap:14px;
        font-size:24px;
        color:#fff;
        margin-bottom:18px;
        cursor:pointer;
        user-select:none;
    }

    .desktop-back-arrow{
        font-size:42px;
        line-height:1;
        transform:translateY(-1px);
    }

    .desktop-header{
        margin-bottom:18px;
    }

    .desktop-kicker{
        display:inline-flex;
        align-items:center;
        gap:8px;
        background:rgba(255,255,255,.06);
        border:1px solid rgba(255,255,255,.06);

        padding:10px 14px;
        font-size:13px;
        color:#ebe4f5;
        margin-bottom:14px;
    }

    .desktop-title{
        margin:0 0 8px;
        font-size:clamp(42px,4vw,60px);
        line-height:.94;
        font-weight:800;
        letter-spacing:-1px;
        max-width:900px;
    }

    .desktop-desc{
        margin:0;
        color:var(--muted);
        font-size:clamp(16px,1.15vw,18px);
        line-height:1.55;
        max-width:900px;
    }

    .desktop-courses{
        display:grid;
        grid-template-columns:repeat(3, minmax(0,1fr));
        gap:16px;
        align-items:stretch;
    }

    .desktop-course-card{
        position:relative;
        overflow:hidden;
        background:
            radial-gradient(circle at 88% 18%, rgba(203,108,230,.10), transparent 24%),
            linear-gradient(180deg, #111117 0%, #0d0d12 100%);
        border:1px solid rgba(255,255,255,.05);
        border-radius:26px;
        padding:16px;
        box-shadow:var(--shadow);
        display:flex;
        flex-direction:column;
        min-height:100%;
    }

    .desktop-course-cover{
        width:100%;
        height:190px;
        object-fit:cover;
        background:#1a1a1a;
        border-radius:18px;
        margin-bottom:16px;
    }

    .desktop-course-top{
        display:flex;
        align-items:center;
        gap:12px;
        margin-bottom:12px;
    }

    .desktop-course-title{
        margin:0;
        font-size:28px;
        line-height:1.02;
        font-weight:800;
    }

    .desktop-course-desc{
        margin:0 0 14px;
        color:var(--muted);
        font-size:15px;
        line-height:1.55;
        min-height:96px;
    }

    .desktop-course-meta{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:8px;
        margin-bottom:16px;
    }

    .desktop-meta-item{
        background:#17171f;
        border-radius:12px;
        padding:10px;
    }

    .desktop-meta-label{
        color:#9898a5;
        font-size:11px;
        margin-bottom:5px;
    }

    .desktop-meta-value{
        font-size:13px;
        font-weight:700;
        line-height:1.35;
    }

    .desktop-course-btn{
        margin-top:auto;
        width:100%;
        height:52px;
        border:none;
        border-radius:16px;
        font-size:16px;
        font-weight:700;
    }
}

@media (min-width:1024px) and (max-width:1360px){
    .desktop-layout{
        grid-template-columns:260px minmax(0,1fr);
    }

    .desktop-main{
        padding:22px 22px 28px;
    }

    .desktop-title{
        font-size:46px;
    }

    .desktop-courses{
        grid-template-columns:1fr 1fr;
    }
}

@media (min-width:1024px) and (max-width:1120px){
    .desktop-courses{
        grid-template-columns:1fr;
    }

    .desktop-course-desc{
        min-height:auto;
    }
}
</style>
</head>

function goBack(){
    if (window.history.length > 1) {
        window.history.back()
    } else {
        window.location.href = "index.html"
    }
}

function goHome(){
    localStorage.setItem("lang", lang)
    window.location.href = "index.html"
}

function goPage(page){
    localStorage.setItem("lang", lang)
    window.location.href = page
}

function initTelegram(){
    if(window.Telegram && Telegram.WebApp){
        const tg = Telegram.WebApp
        tg.ready()
        tg.expand()

        try{
            tg.requestFullscreen()
        }catch(e){}

        document.body.style.minHeight = tg.viewportHeight + "px"
    }
}
