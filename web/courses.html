<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>gaphub - courses</title>

<style>
:root{
    --accent:#cb6ce6;
    --text:#ffffff;
    --muted:#a8a8b3;
    --bg:#0c0b14;
    --card:#111117;
    --card-soft:#17171f;
    --line:rgba(255,255,255,.08);
    --shadow:0 10px 35px rgba(0,0,0,.35);
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html, body{
    margin:0;
    padding:0;
    min-height:100%;
    font-family:Arial, sans-serif;
    background:#000;
    color:#fff;
}

body{
    position:relative;
}

img{
    display:block;
    max-width:100%;
}

button{
    font-family:inherit;
    cursor:pointer;
}

.desktop-only{
    display:none;
}

.btn-gradient{
    border:none;
    color:#fff;
    background:linear-gradient(90deg,#cb6ce6,#a855f7);
}

/* =========================
   MOBILE
========================= */
.mobile-shell{
    display:block;
}

.mobile-page{
    min-height:calc(100vh + 24px);
    padding:
    max(90px, calc(env(safe-area-inset-top) + 28px))
    16px
    calc(112px + env(safe-area-inset-bottom));

    background:
        radial-gradient(circle at 20% 8%, rgba(203,108,230,.13), transparent 24%),
        radial-gradient(circle at 88% 18%, rgba(168,85,247,.09), transparent 26%),
        linear-gradient(180deg, #09080f 0%, #0c0b14 100%);
}

.mobile-topline{
    display:flex;
    align-items:center;
    margin-bottom:14px;
}

.mobile-back{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:46px;
    height:32px;
    padding:0;
    border-radius:999px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(203,108,230,.55);
    color:#fff;
    font-size:16px;
    font-weight:800;
    backdrop-filter:blur(12px);
    transition:transform .10s ease, opacity .10s ease;
    position:relative;
}

.mobile-back::before{
    content:"";
    position:absolute;
    inset:-10px;
}

.mobile-back:active{
    transform:scale(.94);
    opacity:.9;
}

.mobile-back-arrow{
    font-size:20px;
    line-height:1;
    transform:translateY(-1px);
}

.mobile-header{
    animation:fadeUp .42s ease both;
}

.mobile-kicker{
    display:inline-flex;
    align-items:center;
    min-height:32px;
    padding:0 12px;
    border-radius:999px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08);
    color:#e8e3f0;
    font-size:12px;
    font-weight:800;
    margin-bottom:14px;
}

.mobile-title{
    margin:0 0 10px;
    font-size:clamp(36px,10vw,46px);
    line-height:.92;
    font-weight:800;
    letter-spacing:-1.1px;
}

.mobile-desc{
    margin:0;
    max-width:340px;
    color:var(--muted);
    font-size:15px;
    line-height:1.45;
}

.mobile-stats-row{
    margin-top:18px;
    display:grid;
    grid-template-columns:repeat(3, minmax(0,1fr));
    gap:8px;
    animation:fadeUp .45s ease both;
    animation-delay:.06s;
}

.mobile-stat-pill{
    min-height:66px;
    border-radius:18px;
    padding:10px;
    background:rgba(255,255,255,.045);
    border:1px solid rgba(255,255,255,.07);
}

.mobile-stat-label{
    color:var(--muted);
    font-size:11px;
    line-height:1.2;
    margin-bottom:6px;
}

.mobile-stat-value{
    color:#fff;
    font-size:13px;
    line-height:1.25;
    font-weight:800;
}

.mobile-courses{
    margin-top:22px;
    display:flex;
    flex-direction:column;
    gap:14px;
}

.mobile-course-card{
    position:relative;
    overflow:hidden;
    border-radius:28px;
    padding:14px;
    background:
        radial-gradient(circle at 88% 18%, rgba(203,108,230,.12), transparent 25%),
        linear-gradient(180deg, #111117 0%, #0d0d12 100%);
    border:1px solid rgba(255,255,255,.06);
    box-shadow:var(--shadow);
    cursor:pointer;
    animation:fadeUp .45s ease both;
    transition:transform .10s ease, opacity .10s ease, box-shadow .18s ease;
    touch-action:manipulation;
}

.mobile-course-card:active{
    transform:scale(.985);
    opacity:.94;
}

.mobile-course-card.hero-course{
    padding:16px;
    border-radius:30px;
    background:
        radial-gradient(circle at 82% 12%, rgba(203,108,230,.24), transparent 28%),
        radial-gradient(circle at 18% 88%, rgba(168,85,247,.10), transparent 26%),
        linear-gradient(180deg, #171621 0%, #0f0e17 100%);
    box-shadow:
        0 18px 48px rgba(0,0,0,.42),
        0 0 34px rgba(203,108,230,.14);
    animation:fadeUp .45s ease both, heroGlow 3.8s ease-in-out infinite;
    animation-delay:.12s, 0s;
}

.mobile-course-card:nth-child(2){
    animation-delay:.18s;
}

.mobile-course-card:nth-child(3){
    animation-delay:.24s;
}

.mobile-course-cover-wrap{
    position:relative;
    height:178px;
    border-radius:22px;
    overflow:hidden;
    background:#1a1a1a;
    margin-bottom:14px;
}

.hero-course .mobile-course-cover-wrap{
    height:216px;
    border-radius:24px;
}

.mobile-course-cover{
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scale(1);
    transition:transform .35s ease;
}

.mobile-course-card:active .mobile-course-cover{
    transform:scale(1.035);
}

.mobile-course-cover-wrap::after{
    content:"";
    position:absolute;
    inset:0;
    background:
        linear-gradient(180deg, rgba(0,0,0,.02) 35%, rgba(0,0,0,.45) 100%),
        radial-gradient(circle at 82% 18%, rgba(203,108,230,.18), transparent 32%);
    pointer-events:none;
}

.mobile-course-badge{
    position:absolute;
    left:12px;
    top:12px;
    min-height:30px;
    padding:0 11px;
    border-radius:999px;
    background:rgba(10,10,14,.66);
    border:1px solid rgba(255,255,255,.12);
    backdrop-filter:blur(12px);
    color:#fff;
    font-size:11px;
    font-weight:800;
    display:flex;
    align-items:center;
    z-index:2;
}

.mobile-course-content{
    padding:0 2px 2px;
}

.mobile-course-title{
    margin:0 0 7px;
    font-size:28px;
    line-height:1;
    font-weight:800;
    letter-spacing:-.5px;
}

.hero-course .mobile-course-title{
    font-size:32px;
}

.mobile-course-desc{
    margin:0;
    color:var(--muted);
    font-size:14px;
    line-height:1.45;
}

.mobile-tags{
    margin-top:13px;
    display:flex;
    flex-wrap:wrap;
    gap:7px;
}

.mobile-tag{
    display:inline-flex;
    align-items:center;
    min-height:30px;
    padding:0 10px;
    border-radius:999px;
    background:rgba(255,255,255,.055);
    border:1px solid rgba(255,255,255,.07);
    color:#e8e3f0;
    font-size:12px;
    font-weight:700;
}

.mobile-course-meta{
    margin-top:14px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
}

.mobile-meta-item{
    border-radius:16px;
    padding:11px 10px;
    background:rgba(255,255,255,.045);
    border:1px solid rgba(255,255,255,.06);
}

.mobile-meta-label{
    color:var(--muted);
    font-size:11px;
    margin-bottom:5px;
}

.mobile-meta-value{
    color:#fff;
    font-size:13px;
    line-height:1.3;
    font-weight:800;
}

.mobile-course-btn{
    margin-top:14px;
    width:100%;
    min-height:54px;
    border:none;
    border-radius:18px;
    color:#fff;
    background:linear-gradient(90deg,#cb6ce6,#a855f7);
    box-shadow:0 14px 32px rgba(203,108,230,.24);
    font-size:15px;
    font-weight:800;
    transition:transform .10s ease, opacity .10s ease;
}

.mobile-course-btn:active{
    transform:scale(.985);
    opacity:.92;
}

.mobile-soon-card{
    margin-top:22px;
    border-radius:28px;
    padding:18px;
    background:
        radial-gradient(circle at 88% 18%, rgba(203,108,230,.10), transparent 24%),
        linear-gradient(180deg, #111117 0%, #0d0d12 100%);
    border:1px solid rgba(255,255,255,.06);
    box-shadow:var(--shadow);
    animation:fadeUp .45s ease both;
    animation-delay:.30s;
}

.mobile-soon-title{
    margin:0 0 10px;
    font-size:22px;
    line-height:1.1;
    font-weight:800;
}

.mobile-soon-text{
    margin:0 0 14px;
    color:var(--muted);
    font-size:14px;
    line-height:1.45;
}

.mobile-soon-tags{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}

.mobile-soon-tag{
    display:inline-flex;
    align-items:center;
    min-height:32px;
    padding:0 11px;
    border-radius:999px;
    background:rgba(255,255,255,.055);
    border:1px solid rgba(255,255,255,.07);
    color:#e8e3f0;
    font-size:12px;
    font-weight:800;
}

.mobile-help-card{
    margin-top:14px;
    border-radius:28px;
    padding:18px;
    text-align:left;
    background:
        radial-gradient(circle at 88% 18%, rgba(203,108,230,.13), transparent 26%),
        linear-gradient(180deg, #15141e 0%, #0f0e17 100%);
    border:1px solid rgba(255,255,255,.06);
    box-shadow:var(--shadow);
    animation:fadeUp .45s ease both;
    animation-delay:.36s;
}

.mobile-help-title{
    margin:0 0 8px;
    font-size:22px;
    line-height:1.1;
    font-weight:800;
}

.mobile-help-text{
    margin:0 0 14px;
    color:var(--muted);
    font-size:14px;
    line-height:1.45;
}

.mobile-help-btn{
    width:100%;
    min-height:52px;
    border:none;
    border-radius:18px;
    color:#fff;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.09);
    font-size:15px;
    font-weight:800;
    transition:transform .10s ease, opacity .10s ease;
}

.mobile-help-btn:active{
    transform:scale(.985);
    opacity:.92;
}

/* BOTTOM NAV */
.bottom-nav{
    position:fixed;
    left:0;
    bottom:0;
    width:100%;
    background:#000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 10px;
    padding-bottom:calc(8px + env(safe-area-inset-bottom));
    z-index:50;
}

.nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:58px;
    font-size:12px;
    color:#fff;
    width:20%;
    text-align:center;
    cursor:pointer;
    touch-action:manipulation;
}

.nav-item img{
    width:27px;
    margin-bottom:2px;
}

.nav-item span{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.nav-item.active-mobile-nav span{
    color:#d68cff;
}

.nav-item.active-mobile-nav img{
    filter:
        drop-shadow(0 0 10px rgba(203,108,230,.45))
        brightness(1.08);
}

.nav-center{
    position:relative;
    top:-18px;
    width:20%;
    min-height:58px;
    display:flex;
    justify-content:center;
    touch-action:manipulation;
}

.circle{
    width:60px;
    height:60px;
    background:#ffffff;
    border-radius:50%;
    border:4px solid var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 10px 30px rgba(203,108,230,.25);
    position:relative;
}

.circle::before{
    content:"";
    position:absolute;
    inset:-10px;
}

.circle img{
    width:24px;
    height:24px;
    object-fit:contain;
}

button,
.nav-item,
.nav-center,
.mobile-course-card,
.mobile-course-btn,
.mobile-help-btn{
    touch-action:manipulation;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(14px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes heroGlow{
    0%,100%{
        box-shadow:
            0 18px 48px rgba(0,0,0,.42),
            0 0 30px rgba(203,108,230,.11);
    }

    50%{
        box-shadow:
            0 18px 52px rgba(0,0,0,.46),
            0 0 44px rgba(203,108,230,.20);
    }
}

@media (max-width:380px){
    .mobile-title{
        font-size:34px;
    }

    .mobile-stats-row{
        grid-template-columns:1fr;
    }

    .hero-course .mobile-course-cover-wrap{
        height:190px;
    }

    .mobile-course-cover-wrap{
        height:160px;
    }
}

/* =========================
   DESKTOP
========================= */
@media (min-width:1024px){

    html, body{
        min-height:100vh;
        background:
            radial-gradient(circle at 15% 18%, rgba(203,108,230,.08), transparent 24%),
            radial-gradient(circle at 85% 28%, rgba(203,108,230,.07), transparent 24%),
            linear-gradient(180deg, #09080f 0%, #0c0b14 100%);
        color:var(--text);
    }

    body{
        overflow:hidden;
    }

    .mobile-shell{
        display:none;
    }

    .desktop-only{
        display:block;
    }

    .desktop-app{
        min-height:100vh;
        color:var(--text);
    }

    .desktop-layout{
        display:grid;
        grid-template-columns:280px minmax(0,1fr);
        min-height:100vh;
    }

    .desktop-sidebar{
        padding:22px 22px;
        border-right:1px solid rgba(255,255,255,.05);
        background:linear-gradient(180deg, rgba(14,13,23,.70) 0%, rgba(12,11,20,.40) 100%);
        overflow:auto;
    }

    .desktop-brand{
        font-size:34px;
        font-weight:800;
        line-height:1;
        margin:8px 0 56px;
    }

    .desktop-nav{
        display:flex;
        flex-direction:column;
        gap:10px;
        margin-top:4px;
    }

    .desktop-nav-item{
        display:flex;
        align-items:center;
        gap:14px;
        width:100%;
        min-height:56px;
        padding:0 18px;
        border-radius:16px;
        color:#f1f1f1;
        background:transparent;
        border:1px solid transparent;
        font-size:16px;
        font-weight:600;
        transition:.2s ease;
        cursor:pointer;
        text-align:left;
    }

    .desktop-nav-item img{
        width:28px;
        height:28px;
        object-fit:contain;
        flex-shrink:0;
    }

    .desktop-nav-item.active-nav{
        background:linear-gradient(180deg, rgba(255,255,255,.06) 0%, rgba(255,255,255,.03) 100%);
        border-color:rgba(255,255,255,.06);
        box-shadow:var(--shadow);
    }

    .desktop-nav-item-accent{
        background:linear-gradient(90deg, #b85bda 0%, #cb6ce6 100%);
        border-color:transparent;
        color:#fff;
        box-shadow:0 12px 26px rgba(203,108,230,.28);
        margin-top:8px;
    }

    .desktop-nav-item-accent:hover{
        transform:translateY(-1px);
    }

    .desktop-nav-item-accent img{
        filter:brightness(0) invert(1);
    }

    .desktop-main{
        padding:26px 28px 34px;
        height:100vh;
        overflow:auto;
    }

    .desktop-back{
        display:inline-flex;
        align-items:center;
        gap:14px;
        font-size:24px;
        color:#fff;
        margin-bottom:18px;
        cursor:pointer;
        user-select:none;
    }

    .desktop-back-arrow{
        font-size:42px;
        line-height:1;
        transform:translateY(-1px);
    }

    .desktop-header{
        margin-bottom:18px;
    }

    .desktop-kicker{
        display:inline-flex;
        align-items:center;
        gap:8px;
        background:rgba(255,255,255,.06);
        border:1px solid rgba(255,255,255,.06);
        border-radius:999px;
        padding:10px 14px;
        font-size:13px;
        color:#ebe4f5;
        margin-bottom:14px;
    }

    .desktop-title{
        margin:0 0 8px;
        font-size:clamp(42px,4vw,60px);
        line-height:.94;
        font-weight:800;
        letter-spacing:-1px;
        max-width:900px;
    }

    .desktop-desc{
        margin:0;
        color:var(--muted);
        font-size:clamp(16px,1.15vw,18px);
        line-height:1.55;
        max-width:900px;
    }

    .desktop-courses{
        display:grid;
        grid-template-columns:repeat(3, minmax(0,1fr));
        gap:16px;
        align-items:stretch;
    }

    .desktop-course-card{
        position:relative;
        overflow:hidden;
        background:
            radial-gradient(circle at 88% 18%, rgba(203,108,230,.10), transparent 24%),
            linear-gradient(180deg, #111117 0%, #0d0d12 100%);
        border:1px solid rgba(255,255,255,.05);
        border-radius:26px;
        padding:16px;
        box-shadow:var(--shadow);
        display:flex;
        flex-direction:column;
        min-height:100%;
    }

    .desktop-course-cover{
        width:100%;
        height:190px;
        object-fit:cover;
        background:#1a1a1a;
        border-radius:18px;
        margin-bottom:16px;
    }

    .desktop-course-top{
        display:flex;
        align-items:center;
        gap:12px;
        margin-bottom:12px;
    }

    .desktop-course-title{
        margin:0;
        font-size:28px;
        line-height:1.02;
        font-weight:800;
    }

    .desktop-course-desc{
        margin:0 0 14px;
        color:var(--muted);
        font-size:15px;
        line-height:1.55;
        min-height:96px;
    }

    .desktop-course-meta{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:8px;
        margin-bottom:16px;
    }

    .desktop-meta-item{
        background:#17171f;
        border-radius:12px;
        padding:10px;
    }

    .desktop-meta-label{
        color:#9898a5;
        font-size:11px;
        margin-bottom:5px;
    }

    .desktop-meta-value{
        font-size:13px;
        font-weight:700;
        line-height:1.35;
    }

    .desktop-course-btn{
        margin-top:auto;
        width:100%;
        height:52px;
        border:none;
        border-radius:16px;
        font-size:16px;
        font-weight:700;
    }
}

@media (min-width:1024px) and (max-width:1360px){
    .desktop-layout{
        grid-template-columns:260px minmax(0,1fr);
    }

    .desktop-main{
        padding:22px 22px 28px;
    }

    .desktop-title{
        font-size:46px;
    }

    .desktop-courses{
        grid-template-columns:1fr 1fr;
    }
}

@media (min-width:1024px) and (max-width:1120px){
    .desktop-courses{
        grid-template-columns:1fr;
    }

    .desktop-course-desc{
        min-height:auto;
    }
}
</style>
</head>

<body>

<!-- =========================
     MOBILE VERSION
========================= -->
<div class="mobile-shell">
    <div class="mobile-page">

        <div class="mobile-topline">
            <button class="mobile-back" onclick="goBack()">
                <span class="mobile-back-arrow">←</span>
            </button>
        </div>
        <header class="mobile-header">
            <div class="mobile-kicker" id="kicker-mobile"></div>

            <h1 class="mobile-title" id="title-mobile"></h1>
            <p class="mobile-desc" id="desc-mobile"></p>

            <div class="mobile-stats-row">
                <div class="mobile-stat-pill">
                    <div class="mobile-stat-label" id="stat1Label-mobile"></div>
                    <div class="mobile-stat-value" id="stat1Value-mobile"></div>
                </div>

                <div class="mobile-stat-pill">
                    <div class="mobile-stat-label" id="stat2Label-mobile"></div>
                    <div class="mobile-stat-value" id="stat2Value-mobile"></div>
                </div>

                <div class="mobile-stat-pill">
                    <div class="mobile-stat-label" id="stat3Label-mobile"></div>
                    <div class="mobile-stat-value" id="stat3Value-mobile"></div>
                </div>
            </div>
        </header>

        <section class="mobile-courses">

            <article class="mobile-course-card hero-course" onclick="goPage('ai.html')">
                <div class="mobile-course-cover-wrap">
                    <img class="mobile-course-cover" src="images/course/aicourcepic.png" alt="AI">
                    <div class="mobile-course-badge" id="aiBadge-mobile"></div>
                </div>

                <div class="mobile-course-content">
                    <h2 class="mobile-course-title" id="aiTitle-mobile"></h2>
                    <p class="mobile-course-desc" id="aiDesc-mobile"></p>

                    <div class="mobile-tags">
                        <span class="mobile-tag" id="aiTag1-mobile"></span>
                        <span class="mobile-tag" id="aiTag2-mobile"></span>
                        <span class="mobile-tag" id="aiTag3-mobile"></span>
                    </div>

                    <div class="mobile-course-meta">
                        <div class="mobile-meta-item">
                            <div class="mobile-meta-label" id="meta1Label-mobile"></div>
                            <div class="mobile-meta-value" id="aiMeta1-mobile"></div>
                        </div>

                        <div class="mobile-meta-item">
                            <div class="mobile-meta-label" id="meta2Label-mobile"></div>
                            <div class="mobile-meta-value" id="aiMeta2-mobile"></div>
                        </div>
                    </div>

                    <button class="mobile-course-btn" id="btnAi-mobile" onclick="event.stopPropagation(); goPage('ai.html')"></button>
                </div>
            </article>

            <article class="mobile-course-card" onclick="goPage('smm.html')">
