<html lang="ru">
<head>
<meta charset="UTF-8">

<title>gaphub - Target</title>

<style>
:root{
    --accent:#cb6ce6;
    --text:#ffffff;
    --muted:#a8a8a8;
    --bg:#0c0b14;
    --card:#111111;
    --card-soft:#17171f;
    --line:rgba(255,255,255,.08);
    --shadow:0 10px 35px rgba(0,0,0,.35);
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html, body{
    margin:0;
    padding:0;
    min-height:100%;
    font-family:Arial, sans-serif;
    background:#000;
    color:#fff;
}

body{
    position:relative;
}

img{
    display:block;
    max-width:100%;
}

button{
    font-family:inherit;
    cursor:pointer;
}

.desktop-only{
    display:none;
}

.btn-gradient{
    border:none;
    color:#fff;
    background:linear-gradient(90deg,#cb6ce6,#a855f7);
}

/* =========================
   MOBILE
========================= */
.mobile-shell{
    display:block;
}

.mobile-page{
    padding-bottom:160px;
}

.mobile-top{
    padding:calc(env(safe-area-inset-top) + 14px) 16px 0;
}

.mobile-back{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:#1a1a1a;
    color:#fff;
    border:none;
    border-radius:12px;
    padding:10px 14px;
    font-size:15px;
    cursor:pointer;
}

.mobile-back svg{
    width:16px;
    height:16px;
    flex-shrink:0;
}

.mobile-hero{
    padding:14px 16px 0;
    position:relative;
}

.mobile-hero-card{
    background:#0f0f13;
    border-radius:24px;
    overflow:hidden;
    box-shadow:var(--shadow);
    border:1px solid rgba(255,255,255,.05);
}

.mobile-cover{
    width:100%;
    height:210px;
    object-fit:cover;
    background:#1a1a1a;
}

.mobile-hero-content{
    padding:18px 16px 28px;
}

.mobile-title{
    margin:0 0 10px;
    font-size:34px;
    font-weight:800;
    line-height:1;
}

.mobile-subtitle{
    margin:0 0 16px;
    color:var(--muted);
    font-size:14px;
    line-height:1.45;
}

.mobile-stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.mobile-stat{
    background:#17171f;
    border-radius:14px;
    padding:12px;
    min-height:68px;
}

.mobile-stat-label{
    color:#9a9a9a;
    font-size:12px;
    margin-bottom:6px;
}

.mobile-stat-value{
    font-size:15px;
    font-weight:700;
    line-height:1.3;
}

.mobile-peek{
    margin-top:-18px;
    padding:0 16px;
    position:relative;
    z-index:2;
}

.mobile-section-card{
    background:#141419;
    border-radius:22px;
    padding:18px 14px;
    border:1px solid rgba(255,255,255,.05);
    box-shadow:var(--shadow);
}

.mobile-section{
    padding:12px 16px 0;
}

.mobile-section-title{
    margin:0 0 12px;
    font-size:22px;
    font-weight:800;
    line-height:1.15;
}

.mobile-accordion{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.mobile-item{
    background:#111;
    border-radius:16px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.04);
}

.mobile-item-btn{
    width:100%;
    background:transparent;
    border:none;
    color:#fff;
    padding:14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    text-align:left;
}

.mobile-item-left{
    display:flex;
    align-items:center;
    gap:12px;
    flex:1;
}

.mobile-item-icon{
    width:38px;
    height:38px;
    object-fit:contain;
    flex-shrink:0;
    background:#1a1a1a;
    border-radius:10px;
    padding:7px;
}

.mobile-item-title{
    font-size:15px;
    font-weight:700;
    line-height:1.35;
}

.mobile-arrow{
    width:10px;
    height:10px;
    border-right:2px solid var(--accent);
    border-bottom:2px solid var(--accent);
    transform:rotate(45deg);
    transition:transform .25s ease;
    flex-shrink:0;
    margin-right:4px;
}

.mobile-item.open .mobile-arrow{
    transform:rotate(225deg);
}

.mobile-answer-wrap{
    max-height:0;
    overflow:hidden;
    transition:max-height .28s ease;
}

.mobile-answer{
    padding:0 14px 14px 62px;
    color:#d0d0d0;
    font-size:14px;
    line-height:1.5;
}

.mobile-buy-bar{
    position:fixed;
    left:0;
    right:0;
    bottom:calc(76px + env(safe-area-inset-bottom));
    padding:0 16px;
    z-index:60;
}

.mobile-buy-btn{
    width:100%;
    height:56px;
    border:none;
    border-radius:18px;
    font-size:17px;
    font-weight:700;
    box-shadow:0 14px 32px rgba(203,108,230,.28);
}

/* BOTTOM NAV */
.bottom-nav{
    position:fixed;
    left:0;
    bottom:0;
    width:100%;
    background:#000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 10px;
    padding-bottom:calc(8px + env(safe-area-inset-bottom));
    z-index:50;
}

.nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:12px;
    color:#fff;
    width:20%;
    text-align:center;
    cursor:pointer;
}

.nav-item img{
    width:27px;
    margin-bottom:2px;
}

.nav-item span{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.nav-center{
    position:relative;
    top:-18px;
    width:20%;
    display:flex;
    justify-content:center;
}

.circle{
    width:60px;
    height:60px;
    background:#ffffff;
    border-radius:50%;
    border:4px solid var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
}

.circle img{
    width:24px;
    height:24px;
    object-fit:contain;
}

   DESKTOP

function setText(id, value){
    const el = document.getElementById(id);
    if(el) el.innerText = value;
}

function renderAccordion(listId, items, type){
    const list = document.getElementById(listId);
    if(!list) return;

    list.innerHTML = items.map(item => `
        <div class="${type}-item">
            <button class="${type}-item-btn" onclick="toggleAccordion(this, '${type}')">
                <div class="${type}-item-left">
                    <img class="${type}-item-icon" src="images/placeholder-icon.png" alt="">
                    <div class="${type}-item-title">${item.title}</div>
                </div>
                <span class="${type}-arrow"></span>
            </button>
            <div class="${type}-answer-wrap">
                <div class="${type}-answer">${item.text}</div>
            </div>
        </div>
    `).join("");
}

function toggleAccordion(button, type){
    const item = button.parentElement;
    const wrap = item.querySelector(`.${type}-answer-wrap`);
    const isOpen = item.classList.contains("open");

    document.querySelectorAll(`.${type}-item`).forEach(el => {
        el.classList.remove("open");
        const target = el.querySelector(`.${type}-answer-wrap`);
        if(target) target.style.maxHeight = null;
    });

    if(!isOpen){
        item.classList.add("open");
        wrap.style.maxHeight = wrap.scrollHeight + "px";
    }
}

}
