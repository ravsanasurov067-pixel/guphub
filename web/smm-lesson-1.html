<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/plyr/3.8.4/plyr.css">

<title>gaphub - SMM lesson 1</title>

<style>
:root{
    --accent:#cb6ce6;
    --accent-2:#a855f7;

    --bg:#0c0b14;
    --bg-soft:#15141e;

    --card:#111117;
    --card-2:#17171f;

    --text:#ffffff;
    --muted:#a8a4b5;
    --muted-soft:#8f8a9e;

    --line:rgba(255,255,255,.07);

    --shadow:0 12px 38px rgba(0,0,0,.35);

    --radius-xl:28px;
    --radius-lg:22px;
    --radius-md:16px;
}

.plyr{
    border-radius:0;
    --plyr-color-main:var(--accent);
    --plyr-video-control-color:#fff;
    --plyr-video-control-background-hover:rgba(203,108,230,.28);
    --plyr-video-controls-background:linear-gradient(transparent, rgba(0,0,0,.78));
}

.plyr--video{
    height:100%;
}

.plyr__video-wrapper{
    height:100%;
    background:#000;
}

.plyr video{
    width:100%;
    height:100%;
    object-fit:cover;
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,
body{
    margin:0;
    padding:0;
    min-height:100%;
    font-family:Arial,sans-serif;
    background:#000;
    color:#fff;
}

body{
    position:relative;
    overflow-x:hidden;
}

img{
    display:block;
    max-width:100%;
}

button,
input{
    font-family:inherit;
}

button{
    cursor:pointer;
}

.desktop-only{
    display:none;
}

.btn{
    border:none;
    border-radius:18px;
    transition:.18s ease;
    font-weight:700;
}

.btn:active{
    transform:scale(.985);
}

.btn-primary{
    color:#fff;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    box-shadow:0 14px 32px rgba(203,108,230,.22);
}

.btn-secondary{
    color:#fff;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.10);
}

.glow-card{
    background:
        radial-gradient(circle at 86% 14%, rgba(203,108,230,.18), transparent 26%),
        radial-gradient(circle at 15% 88%, rgba(203,108,230,.08), transparent 22%),
        linear-gradient(180deg,#171621 0%,#0f0e17 100%);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:var(--shadow);
}

.soft-card{
    background:
        radial-gradient(circle at 88% 18%, rgba(203,108,230,.10), transparent 24%),
        linear-gradient(180deg,#121219 0%,#0d0d12 100%);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:var(--shadow);
}

.lesson-step{
    display:none;
}

.lesson-step.active{
    display:block;
}

/* =========================
   MOBILE
========================= */

.mobile-shell{
    display:block;
}

.mobile-page{
    min-height:100vh;

    padding:
        calc(env(safe-area-inset-top) + 76px)
        14px
        calc(178px + env(safe-area-inset-bottom));

    background:
        radial-gradient(circle at 20% 10%, rgba(203,108,230,.10), transparent 24%),
        linear-gradient(180deg,#09080f 0%,#0c0b14 100%);
}

/* TOP */

.mobile-top{
    margin-bottom:16px;
}

.mobile-lesson-bar{
    display:grid;
    grid-template-columns:46px minmax(0,1fr) 64px;
    gap:8px;
    align-items:center;
    margin-bottom:14px;
}

.mobile-back{
    width:46px;
    height:34px;
    border:none;
    border-radius:999px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(203,108,230,.55);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
    transition:.18s ease;
}

.mobile-back:active{
    transform:scale(.94);
    opacity:.9;
}

.mobile-back-arrow{
    font-size:20px;
    line-height:1;
    transform:translateY(-1px);
}

.mobile-step-title{
    min-height:34px;
    padding:0 12px;
    border-radius:999px;
    background:rgba(255,255,255,.055);
    border:1px solid rgba(255,255,255,.075);
    color:#ebe4f5;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:800;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.mobile-lang-chip{
    height:34px;
    border:none;
    border-radius:999px;
    background:linear-gradient(90deg, rgba(203,108,230,.30), rgba(168,85,247,.22));
    border:1px solid rgba(203,108,230,.50);
    color:#fff;
    font-size:12px;
    font-weight:900;
    box-shadow:0 10px 24px rgba(203,108,230,.14);
}

.mobile-lang-chip:active{
    transform:scale(.95);
}

.mobile-video-head{
    display:block;
}

.mobile-badge{
    display:none;
}

.mobile-title{
    margin:0 0 10px;

    font-size:32px;
    line-height:.98;

    font-weight:800;

    letter-spacing:-.6px;
}

.mobile-subtitle{
    display:none;
}

/* VIDEO STEP */

.mobile-video-card{
    border-radius:26px;

    overflow:hidden;

    position:relative;

    background:#0d0d12;

    border:1px solid rgba(255,255,255,.05);

    box-shadow:var(--shadow);
}

.mobile-video-frame{
    width:100%;
    aspect-ratio:16/9;

    position:relative;

    overflow:hidden;

    background:
        radial-gradient(circle at 50% 38%, rgba(203,108,230,.18), transparent 28%),
        linear-gradient(135deg,#171621,#0b0b10);
}

.mobile-video-frame video{
    width:100%;
    height:100%;
    object-fit:cover;
}

.mobile-video-bottom{
    padding:16px;
}

.mobile-video-title{
    display:none;
}

.mobile-video-text{
    display:none;
}

.mobile-video-actions{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
}

.mobile-video-action{
    margin-top:16px;
}

.mobile-main-btn{
    width:100%;

    min-height:56px;

    border:none;

    border-radius:18px;

    color:#fff;

    background:linear-gradient(90deg,var(--accent),var(--accent-2));

    box-shadow:0 14px 32px rgba(203,108,230,.25);

    font-size:16px;

    font-weight:800;
}

.mobile-material-btn{
    width:100%;
    min-height:52px;
    border-radius:18px;
    font-size:15px;
}

/* SUMMARY STEP */

.mobile-summary-head{
    margin-bottom:16px;
}

.mobile-section-title{
    margin:0 0 10px;

    font-size:24px;

    line-height:1.08;

    font-weight:800;
}

.mobile-note{
    margin:0;

    color:var(--muted-soft);

    font-size:13px;

    line-height:1.5;
}

.summary-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.summary-card{
    border-radius:22px;
    overflow:hidden;
}

.summary-question{
    width:100%;

    min-height:66px;

    background:transparent;

    border:none;

    color:#fff;

    padding:0 16px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    gap:12px;

    text-align:left;
}

.summary-question-text{
    font-size:15px;

    line-height:1.35;

    font-weight:800;
}

.summary-arrow{
    width:11px;
    height:11px;

    border-right:2px solid var(--accent);
    border-bottom:2px solid var(--accent);

    transform:rotate(45deg);

    transition:.25s ease;

    flex-shrink:0;

    margin-right:4px;
}

.summary-card.open .summary-arrow{
    transform:rotate(225deg);
}

.summary-answer-wrap{
    max-height:0;
    overflow:hidden;
    transition:max-height .28s ease;
}

.summary-answer{
    padding:0 16px 16px;

    color:#d8d2e3;

    font-size:14px;

    line-height:1.58;
}

.summary-answer ul{
    margin:8px 0 0;
    padding-left:18px;
}

.summary-answer li{
    margin:5px 0;
}

.mobile-summary-action{
    margin-top:18px;
}


/* SUMMARY SLIDER */

.summary-slider{
    width:100%;
}

.summary-stage{
    width:100%;
    border-radius:28px;
    overflow:hidden;
    position:relative;
    background:
        radial-gradient(circle at 82% 18%, rgba(203,108,230,.18), transparent 26%),
        linear-gradient(180deg,#171621 0%,#0f0e17 100%);
    border:1px solid rgba(255,255,255,.06);
    box-shadow:var(--shadow);
}

.summary-image-wrap{
    width:100%;
    position:relative;
    overflow:hidden;
    background:
        radial-gradient(circle at 50% 42%, rgba(203,108,230,.14), transparent 30%),
        linear-gradient(135deg,#171621,#0b0b10);
}

.summary-image{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.summary-placeholder{
    width:100%;
    height:100%;
    min-height:360px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:28px;
    text-align:center;
}

.summary-placeholder-kicker{
    color:var(--accent);
    font-size:13px;
    font-weight:900;
    letter-spacing:.08em;
    text-transform:uppercase;
    margin-bottom:12px;
}

.summary-placeholder-title{
    margin:0 0 12px;
    font-size:28px;
    line-height:1.08;
    font-weight:900;
}

.summary-placeholder-text{
    margin:0;
    max-width:420px;
    color:var(--muted);
    font-size:15px;
    line-height:1.55;
}

.summary-controls{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    margin-top:16px;
}

.summary-arrow-btn{
    width:52px;
    height:44px;
    border:none;
    border-radius:999px;
    background:rgba(255,255,255,.055);
    border:1px solid rgba(255,255,255,.08);
    color:#fff;
    font-size:22px;
    font-weight:900;
    transition:.18s ease;
}

.summary-arrow-btn:active{
    transform:scale(.94);
}

.summary-arrow-btn:disabled{
    opacity:.35;
    cursor:not-allowed;
}

.summary-counter{
    min-width:74px;
    height:44px;
    border-radius:999px;
    background:rgba(203,108,230,.12);
    border:1px solid rgba(203,108,230,.28);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    font-weight:900;
}

.summary-pages{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
    margin-top:14px;
}

.summary-page-btn{
    min-width:34px;
    height:32px;
    border:none;
    border-radius:999px;
    background:rgba(255,255,255,.045);
    border:1px solid rgba(255,255,255,.07);
    color:rgba(255,255,255,.62);
    font-size:12px;
    font-weight:900;
    transition:.18s ease;
}

.summary-page-btn.active{
    color:#fff;
    background:linear-gradient(90deg, rgba(203,108,230,.34), rgba(168,85,247,.22));
    border-color:rgba(203,108,230,.50);
    box-shadow:0 10px 22px rgba(203,108,230,.16);
}

.summary-page-btn:active{
    transform:scale(.94);
}

.summary-slider-action{
    margin-top:18px;
}

@media (max-width:1023px){

    .summary-stage{
        border-radius:28px;
    }

    .summary-image-wrap{
        aspect-ratio:9/14;
    }

    .summary-placeholder{
        min-height:420px;
    }

    .summary-placeholder-title{
        font-size:25px;
    }

    .summary-controls{
        margin-top:14px;
    }
}

@media (min-width:1024px){

    .summary-image-wrap{
        aspect-ratio:16/9;
    }

    .summary-placeholder{
        min-height:430px;
    }

    .summary-placeholder-title{
        font-size:34px;
    }
}

/* DEEP MODAL */

.deep-overlay{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,.74);

    backdrop-filter:blur(12px);

    display:none;

    align-items:center;
    justify-content:center;

    padding:16px;

    z-index:999;
}

.deep-overlay.active{
    display:flex;
}

.deep-modal{
    width:100%;
    max-width:420px;

    border-radius:28px;

    padding:22px;
    position:relative;
}

.deep-close{
    position:absolute;
    top:14px;
    right:14px;
    width:34px;
    height:34px;
    border:none;
    border-radius:50%;
    background:rgba(255,255,255,.07);
    color:#fff;
    font-size:22px;
    line-height:1;
    display:flex;
    align-items:center;
    justify-content:center;
}

.deep-close:active{
    transform:scale(.94);
}

.deep-icon{
    width:78px;
    height:78px;

    margin:0 auto 16px;

    border-radius:26px;

    background:rgba(203,108,230,.14);

    display:flex;

    align-items:center;
    justify-content:center;

    font-size:34px;
}

.deep-title{
    margin:0 0 10px;

    text-align:center;

    font-size:28px;

    line-height:1.08;

    font-weight:800;
}

.deep-text{
    margin:0 auto 18px;

    max-width:320px;

    text-align:center;

    color:var(--muted);

    font-size:15px;

    line-height:1.55;
}

.deep-actions{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
}

.deep-btn{
    width:100%;
    height:56px;
    font-size:15px;
}

/* TEST STEP */

.mobile-test-head{
    margin-bottom:16px;
}

.test-progress-line{
    height:7px;

    border-radius:999px;

    background:rgba(255,255,255,.08);

    overflow:hidden;

    margin-top:14px;
}

.test-progress-fill{
    height:100%;

    border-radius:999px;

    background:linear-gradient(90deg,var(--accent),var(--accent-2));

    width:0%;

    transition:width .25s ease;
}

.test-question{
    margin:0 0 16px;

    font-size:26px;

    line-height:1.15;

    font-weight:800;
}

.test-answers{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.test-answer{
    width:100%;

    min-height:56px;

    border:none;

    border-radius:18px;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.07);

    color:#fff;

    padding:15px;

    text-align:left;

    font-size:15px;

    line-height:1.35;

    transition:.2s ease;
}

.test-answer.correct{
    background:rgba(57,145,84,.28);
    border-color:rgba(93,210,128,.35);
}

.test-answer.wrong{
    background:rgba(170,45,66,.30);
    border-color:rgba(255,90,112,.35);
}

.test-next{
    width:100%;

    height:56px;

    margin-top:16px;

    display:none;

    font-size:16px;
}

/* =========================
   DESKTOP
========================= */

@media (min-width:1024px){

    html,
    body{
        min-height:100vh;

        background:
            radial-gradient(circle at 15% 18%, rgba(203,108,230,.08), transparent 24%),
            radial-gradient(circle at 85% 28%, rgba(203,108,230,.07), transparent 24%),
            linear-gradient(180deg,#09080f 0%,#0c0b14 100%);

        color:var(--text);
    }

    body{
        overflow:hidden;
    }

    .mobile-shell{
        display:none;
    }

    .desktop-only{
        display:block;
    }

    .desktop-app{
        min-height:100vh;
        color:var(--text);
    }

    .desktop-layout{
        display:block;
        min-height:100vh;
    }

    .desktop-main{
        padding:24px 22px 34px;
        height:100vh;
        overflow:auto;
    }

    .desktop-content-grid{
        display:grid;
        grid-template-columns:260px minmax(0,1fr) 260px;
        gap:18px;
        align-items:start;
        max-width:1440px;
        margin:0 auto;
    }

    .desktop-main-column{
        min-width:0;
    }

    /* LEFT ASSISTANT */

    .desktop-assistant-card{
        position:sticky;
        top:0;

        min-height:calc(100vh - 58px);

        border-radius:28px;
        padding:18px;

        display:flex;
        flex-direction:column;
        gap:16px;
    }

    .assistant-profile{
        display:flex;
        flex-direction:column;
        align-items:center;
        text-align:center;
        padding-top:4px;
    }

    .assistant-avatar{
        width:86px;
        height:86px;

        border-radius:28px;

        background:
            radial-gradient(circle at 50% 38%, rgba(203,108,230,.22), transparent 34%),
            linear-gradient(180deg,#1c1a27 0%,#111017 100%);

        border:1px solid rgba(255,255,255,.07);

        display:flex;
        align-items:center;
        justify-content:center;

        overflow:hidden;

        margin-bottom:12px;
    }

    .assistant-avatar img{
        width:100%;
        height:100%;
        object-fit:cover;
    }

    .assistant-avatar-fallback{
        font-size:36px;
        line-height:1;
    }

    .assistant-name{
        margin:0 0 4px;
        font-size:21px;
        line-height:1.1;
        font-weight:900;
    }

    .assistant-role{
        margin:0;
        color:var(--muted-soft);
        font-size:13px;
        line-height:1.35;
        font-weight:700;
    }

    .assistant-quick-list{
        display:grid;
        grid-template-columns:1fr;
        gap:9px;
        margin-top:2px;
    }

    .assistant-quick-btn{
        width:100%;
        min-height:48px;

        border:none;
        border-radius:16px;

        background:rgba(255,255,255,.045);
        border:1px solid rgba(255,255,255,.07);

        color:#fff;

        padding:0 12px;

        display:flex;
        align-items:center;
        gap:10px;

        text-align:left;

        transition:.18s ease;
    }

    .assistant-quick-btn:hover{
        transform:translateY(-1px);
        border-color:rgba(203,108,230,.28);
        background:rgba(203,108,230,.08);
    }

    .assistant-quick-icon{
        width:30px;
        height:30px;
        border-radius:12px;
        background:rgba(203,108,230,.12);
        display:flex;
        align-items:center;
        justify-content:center;
        flex-shrink:0;
        font-size:14px;
    }

    .assistant-quick-text{
        font-size:13px;
        font-weight:800;
        line-height:1.2;
    }

    .assistant-history-btn{
        width:100%;
        min-height:46px;
        border-radius:16px;
        font-size:14px;
        margin-top:auto;
    }

    .assistant-input-wrap{
        display:grid;
        grid-template-columns:minmax(0,1fr) 42px;
        gap:8px;
    }

    .assistant-input{
        width:100%;
        height:42px;
        border:none;
        outline:none;

        border-radius:15px;

        background:rgba(255,255,255,.045);
        border:1px solid rgba(255,255,255,.07);

        color:#fff;

        padding:0 13px;

        font-size:13px;
    }

    .assistant-input::placeholder{
        color:rgba(255,255,255,.40);
    }

    .assistant-send{
        width:42px;
        height:42px;
        border:none;
        border-radius:15px;

        color:#fff;
        background:linear-gradient(90deg,var(--accent),var(--accent-2));

        box-shadow:0 12px 24px rgba(203,108,230,.18);

        font-size:18px;
        font-weight:900;
    }

    /* DESKTOP HEAD */

    .desktop-head{
        margin-bottom:16px;
    }

    .desktop-lesson-line{
        display:flex;
        align-items:center;
        gap:10px;
        margin-bottom:14px;
    }

    .desktop-step-back{
        width:44px;
        height:36px;
        border:none;
        border-radius:999px;
        background:rgba(255,255,255,.045);
        border:1px solid rgba(203,108,230,.45);
        color:#fff;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:22px;
        font-weight:800;
        transition:.18s ease;
        flex-shrink:0;
    }

    .desktop-step-back:hover{
        transform:translateX(-2px);
        background:rgba(203,108,230,.10);
    }

    .desktop-step-back:active{
        transform:scale(.95);
    }

    .desktop-badge{
        min-height:36px;

        display:inline-flex;
        align-items:center;
        gap:8px;

        background:rgba(255,255,255,.06);

        border:1px solid rgba(255,255,255,.06);

        border-radius:999px;

        padding:0 14px;

        font-size:13px;

        color:#ebe4f5;

        font-weight:800;
    }

    .desktop-title{
        margin:0;

        font-size:clamp(38px,3.2vw,54px);

        line-height:.96;

        font-weight:800;

        letter-spacing:-1px;
    }

    .desktop-subtitle{
        display:none;
    }

    /* VIDEO STEP */

    .desktop-video-card{
        border-radius:30px;

        overflow:hidden;

        position:relative;

        background:#0d0d12;

        border:1px solid rgba(255,255,255,.05);

        box-shadow:var(--shadow);
    }

    .desktop-video-frame{
        width:100%;
        aspect-ratio:16/9;

        position:relative;

        overflow:hidden;

        background:
            radial-gradient(circle at 50% 38%, rgba(203,108,230,.18), transparent 28%),
            linear-gradient(135deg,#171621,#0b0b10);
    }

    .desktop-video-frame video{
        width:100%;
        height:100%;

        object-fit:cover;
    }

    .desktop-video-bottom{
        padding:18px 20px 20px;
    }

    .desktop-video-title,
    .desktop-video-text{
        display:none;
    }

    .desktop-video-actions{
        display:grid;
        grid-template-columns:minmax(0,1fr) 250px;
        gap:14px;
        align-items:center;
    }

    .desktop-material-btn{
        width:100%;
        min-height:56px;
        border-radius:18px;
        font-size:15px;

        display:flex;
        align-items:center;
        justify-content:center;
        gap:8px;
    }

    .desktop-main-btn{
        width:100%;

        min-height:58px;

        border:none;

        border-radius:18px;

        color:#fff;

        background:
            linear-gradient(
                90deg,
                var(--accent),
                var(--accent-2)

        box-shadow:0 14px 32px rgba(203,108,230,.25);

        font-size:16px;

        font-weight:800;

        max-width:none;

    /* SUMMARY STEP */

    .desktop-summary-top{
        margin-bottom:16px;
    }

    .desktop-section-title{
        margin:0 0 10px;

        font-size:30px;

        line-height:1.08;

        font-weight:800;
    }

    .desktop-note{
        margin:0;

        color:var(--muted-soft);

        font-size:14px;

        line-height:1.55;
    }

    .desktop-summary-grid{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:12px;
        align-items:start;
    }

    .summary-list{
        display:flex;
        flex-direction:column;
        gap:12px;
    }

    .summary-card{
        border-radius:22px;
        overflow:hidden;
    }

    .summary-question{
        width:100%;

        min-height:72px;

        background:transparent;

        border:none;

        color:#fff;

        display:flex;

        align-items:center;

        justify-content:space-between;

        gap:14px;

        text-align:left;

        font-size:16px;

        line-height:1.35;

        font-weight:800;
    }

    .summary-answer{
        padding:0 18px 18px;

        color:#d8d2e3;

        font-size:15px;

        line-height:1.62;

    .desktop-summary-action{
        margin-top:18px;

    .desktop-side-column{
        position:sticky;
        top:0;

        display:flex;
        flex-direction:column;
        gap:14px;
    }

    .desktop-control-card{
        border-radius:28px;
        padding:18px;

        display:flex;
        flex-direction:column;
        gap:18px;

        min-height:calc(100vh - 58px);
    }

    .desktop-language-title{
        margin:0 0 12px;
        font-size:20px;
        line-height:1.1;
        font-weight:800;
    }

    .desktop-language-options{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:10px;
    }

    .desktop-language-option{
        width:100%;
        min-height:50px;

        border:none;
        border-radius:18px;

        padding:0 12px;

        background:rgba(255,255,255,.045);
        border:1px solid rgba(255,255,255,.07);

        color:#fff;

        display:flex;
        align-items:center;
        justify-content:center;
        gap:8px;

        text-align:center;

        transition:.18s ease;
    }

    .desktop-language-option:hover{
        transform:translateY(-1px);
        border-color:rgba(203,108,230,.28);
        background:rgba(203,108,230,.08);
    }

    .desktop-language-option.active{
        background:linear-gradient(90deg, rgba(203,108,230,.28), rgba(168,85,247,.18));
        border-color:rgba(203,108,230,.55);
        box-shadow:0 12px 26px rgba(203,108,230,.18);
    }

    .desktop-language-flag{
        font-size:13px;
        font-weight:900;
    }

    .desktop-language-name{
        display:none;
    }

    .desktop-steps-list{
        display:flex;
        flex-direction:column;
        gap:10px;
    }

    .desktop-step-item{
        display:flex;
        align-items:center;
        gap:10px;

        min-height:48px;

        border-radius:16px;

        padding:0 12px;

        background:rgba(255,255,255,.04);

        color:#e9e2f1;

        font-size:14px;

        font-weight:800;

        cursor:pointer;

        transition:.18s ease;
    }

    .desktop-step-item:hover{
        background:rgba(203,108,230,.12);
        transform:translateX(2px);
    }

    .desktop-step-item.locked{
        cursor:not-allowed;
        opacity:.42;
    }

    .desktop-step-item.locked:hover{
        background:rgba(255,255,255,.04);
        transform:none;
    }

    .desktop-step-dot{
        width:10px;
        height:10px;

        border-radius:50%;

        background:rgba(255,255,255,.22);

        flex-shrink:0;
    }

    .desktop-step-item.active .desktop-step-dot{
        background:var(--accent);
        box-shadow:0 0 12px rgba(203,108,230,.55);
    }

    .desktop-step-item.available .desktop-step-dot{
        background:rgba(203,108,230,.65);
    }

    .desktop-step-item.locked .desktop-step-dot{
        background:rgba(255,255,255,.12);
    }

    .desktop-step-label{
        flex:1;
        min-width:0;
    }

    .desktop-step-lock{
        font-size:13px;
        opacity:.85;
    }

    .desktop-side-card,
    .desktop-steps-card,
    .desktop-language-card,
    .desktop-steps-label,
    .desktop-language-kicker{
        display:none;
    }

    /* TEST */

    .desktop-test-top{
        margin-bottom:18px;
    }

    .test-progress-line{
        height:8px;

        border-radius:999px;

        background:rgba(255,255,255,.08);

        overflow:hidden;

        margin-top:16px;
    }

    .test-progress-fill{
        height:100%;

        border-radius:999px;

        background:
            linear-gradient(
                90deg,
                var(--accent),
                var(--accent-2)
            );

        width:0%;

        transition:width .25s ease;
    }

    .test-question{
        margin:0 0 18px;

        font-size:34px;

        line-height:1.12;

        font-weight:800;
    }

    .test-answers{
        display:flex;
        flex-direction:column;
        gap:12px;
    }

    .test-answer{
        width:100%;

        min-height:62px;

        border:none;

        border-radius:18px;

        background:rgba(255,255,255,.05);

        border:1px solid rgba(255,255,255,.07);

        color:#fff;

        padding:18px;

        text-align:left;

        font-size:16px;

        line-height:1.42;

        transition:.2s ease;
    }

    .test-answer.correct{
        background:rgba(57,145,84,.28);
        border-color:rgba(93,210,128,.35);
    }

    .test-answer.wrong{
        background:rgba(170,45,66,.30);
        border-color:rgba(255,90,112,.35);
    }

    .test-next{
        width:100%;

        max-width:340px;

        height:58px;

        margin-top:18px;

        display:none;

        font-size:16px;
    }
}

}

.summary-overlay-arrow:disabled{

        width:34px;
        height:54px;

        background:transparent;
        border:none;
        box-shadow:none;
        backdrop-filter:none;

        text-shadow:0 4px 18px rgba(0,0,0,.75);

    }

/* MOBILE SUMMARY SWIPE */

.summary-swipe-stack{
    width:100%;
    height:100%;
    position:relative;
    overflow:hidden;
}

.summary-swipe-current{
    width:100%;
    height:100%;
    position:relative;
    z-index:3;
    transition:
        transform .28s cubic-bezier(.22,.9,.28,1),
        opacity .28s ease;
    will-change:transform;
}

.summary-swipe-current.dragging{
    transition:none;
}

.summary-swipe-ghost{
    display:none;
}

@media (max-width:1023px){

    .summary-swipe-ghost{
        display:block;
        position:absolute;
        top:0;
        width:100%;
        height:100%;
        z-index:1;
        opacity:.34;
        filter:blur(8px);
        transform:scale(.94);
        pointer-events:none;
    }

    .summary-swipe-ghost.prev{
        left:-82%;
    }

    .summary-swipe-ghost.next{
        right:-82%;
    }

    .summary-swipe-current.swipe-left{
        transform:translateX(-120%) rotate(-4deg);
        opacity:.75;
    }

    .summary-swipe-current.swipe-right{
        transform:translateX(120%) rotate(4deg);
        opacity:.75;
    }
}

    const prevSrc = getSummaryImagePath(prevIndex, device)
    const nextSrc = getSummaryImagePath(nextIndex, device)

    const number = String(currentSummaryCardIndex + 1).padStart(2, "0")
    const deviceText = device === "mobile" ? "mobile" : "desktop"

    root.innerHTML = `
        <div class="summary-swipe-stack">

            </div>

    if(index < 0) return

function nextSummaryCard(){

    if(currentSummaryCardIndex >= SUMMARY_CARDS_COUNT - 1) return

    setSummaryCard(currentSummaryCardIndex + 1)
}

function prevSummaryCard(){

    if(currentSummaryCardIndex <= 0) return

    setSummaryCard(currentSummaryCardIndex - 1)
}

let summaryTouchMoveX = 0
let summaryTouchMoveY = 0
let summaryIsDragging = false
let summaryIsHorizontalSwipe = false

function summaryTouchStart(event){

    if(!event.touches || !event.touches[0]) return

    summaryTouchStartX = event.touches[0].clientX
    summaryTouchStartY = event.touches[0].clientY

    summaryTouchMoveX = summaryTouchStartX
    summaryTouchMoveY = summaryTouchStartY

    summaryIsDragging = true
    summaryIsHorizontalSwipe = false

    const current = document.getElementById("summarySwipeCurrent-mobile")

    if(current){
        current.classList.add("dragging")
        current.classList.remove("swipe-left")
        current.classList.remove("swipe-right")
        current.style.transform = "translateX(0px) rotate(0deg)"
    }
}

function summaryTouchMove(event){

    if(!summaryIsDragging) return
    if(!event.touches || !event.touches[0]) return

    summaryTouchMoveX = event.touches[0].clientX
    summaryTouchMoveY = event.touches[0].clientY

    const diffX = summaryTouchMoveX - summaryTouchStartX
    const diffY = summaryTouchMoveY - summaryTouchStartY

    if(Math.abs(diffX) > 12 && Math.abs(diffX) > Math.abs(diffY)){
        summaryIsHorizontalSwipe = true
    }

    if(!summaryIsHorizontalSwipe) return

    event.preventDefault()

    const current = document.getElementById("summarySwipeCurrent-mobile")

    if(!current) return

    const limitedX = Math.max(Math.min(diffX, 130), -130)
    const rotate = limitedX / 38

    current.style.transform = `translateX(${limitedX}px) rotate(${rotate}deg)`
}

function summaryTouchEnd(event){

    if(!summaryIsDragging) return

    summaryIsDragging = false

    const diffX = summaryTouchMoveX - summaryTouchStartX
    const diffY = summaryTouchMoveY - summaryTouchStartY

    const current = document.getElementById("summarySwipeCurrent-mobile")

    if(current){
        current.classList.remove("dragging")
        current.style.transform = ""
    }

    if(!summaryIsHorizontalSwipe) return
    if(Math.abs(diffX) < 70) return
    if(Math.abs(diffY) > 90) return

    if(diffX < 0){

        if(current){
            current.classList.add("swipe-left")
        }

        setTimeout(() => {
            nextSummaryCard()
        }, 160)

        return
    }

    if(diffX > 0){

        if(current){
            current.classList.add("swipe-right")
        }

        setTimeout(() => {
            prevSummaryCard()
        }, 160)
    }
}

function getStepIndex(step){

    return STEP_ORDER.indexOf(step)
}

function canOpenStep(step){

    const index = getStepIndex(step)

    return index <= maxUnlockedStepIndex
}

function unlockNextStep(step){

    const index = getStepIndex(step)

    if(index >= 0){
        const nextIndex = Math.min(index + 1, STEP_ORDER.length - 1)

        if(nextIndex > maxUnlockedStepIndex){
            maxUnlockedStepIndex = nextIndex
        }
    }
}

function updateDesktopSteps(){

    document.querySelectorAll(".desktop-step-item").forEach(item => {
        item.classList.remove("active")
        item.classList.remove("available")
        item.classList.remove("locked")
    })

    STEP_ORDER.forEach((step, index) => {

        const item = document.getElementById(`desktopStep-${step}`)
        const lock = document.getElementById(`desktopStepLock-${step}`)

        if(!item) return

        if(lock){
            lock.innerText = ""
        }

        if(step === currentStep){
            item.classList.add("active")
            return
        }

        if(index <= maxUnlockedStepIndex){
            item.classList.add("available")
            return
        }

        item.classList.add("locked")

        if(lock){
            lock.innerText = "🔒"
        }
    })
}

function goStep(step){

    const targetIndex = getStepIndex(step)

    if(targetIndex === -1) return

    if(!canOpenStep(step)){
        impact("medium")
        updateDesktopSteps()
        return
    }

    impact()

    currentStep = step

    unlockNextStep(step)

    const mobileVideoHead = document.getElementById("mobileVideoHead")
    const desktopHead = document.querySelector(".desktop-head")

    if(step === "video"){

        if(mobileVideoHead){
            mobileVideoHead.style.display = "block"
        }

        if(desktopHead){
            desktopHead.style.display = "block"
        }

    }else{

        if(mobileVideoHead){
            mobileVideoHead.style.display = "none"
        }

        if(desktopHead){
            desktopHead.style.display = "none"
        }
    }

    updateMobileStepTitle()

    const mobileSteps = document.querySelectorAll("#step-video-mobile, #step-summary-mobile, #step-deep-mobile, #step-test-mobile")
    const desktopSteps = document.querySelectorAll("#step-video-desktop, #step-summary-desktop, #step-deep-desktop, #step-test-desktop")

    mobileSteps.forEach(item => {
        item.classList.remove("active")
    })

    desktopSteps.forEach(item => {
        item.classList.remove("active")
    })

    const mobileTarget = document.getElementById(`step-${step}-mobile`)
    const desktopTarget = document.getElementById(`step-${step}-desktop`)

    if(mobileTarget){
        mobileTarget.classList.add("active")
    }

    if(desktopTarget){
        desktopTarget.classList.add("active")
    }

    updateDesktopSteps()

    window.scrollTo({
        top:0,
        behavior:"smooth"
    })

    if(step === "test"){
        renderQuestion()
    }
}

function openDeepModal(){

    impact()

    const modal = document.getElementById("deepOverlay")

    if(modal){
        modal.classList.add("active")
    }
}

function closeDeepModal(){

    const modal = document.getElementById("deepOverlay")

    if(modal){
        modal.classList.remove("active")
    }
}

function updateQuestionSize(element, text){

    if(!element) return

    element.classList.remove("long-question")
    element.classList.remove("very-long-question")

    if(text.length > 120){
        element.classList.add("very-long-question")
        return
    }

    if(text.length > 80){
        element.classList.add("long-question")
    }
}

function renderQuestion(){

    const data = questions[lang]
    const question = data[currentQuestionIndex]

    if(!question){
        finishLesson()
        return
    }

    selectedAnswer = false

    const mobileQuestion = document.getElementById("testQuestion-mobile")
    const desktopQuestion = document.getElementById("testQuestion-desktop")

    if(mobileQuestion){
        mobileQuestion.innerText = question.question
        updateQuestionSize(mobileQuestion, question.question)
    }

    if(desktopQuestion){
        desktopQuestion.innerText = question.question
        updateQuestionSize(desktopQuestion, question.question)
    }

    const mobileAnswers = document.getElementById("testAnswers-mobile")
    const desktopAnswers = document.getElementById("testAnswers-desktop")

    const answersHTML = question.answers.map((answer, index) => `
        <button
            class="test-answer"
            onclick="selectAnswer(this, ${index})"
        >
            ${answer}
        </button>
    `).join("")

    if(mobileAnswers){
        mobileAnswers.innerHTML = answersHTML
    }

    if(desktopAnswers){
        desktopAnswers.innerHTML = answersHTML
    }

    updateTestProgress()

    const mobileNext = document.getElementById("nextQuestionBtn-mobile")
    const desktopNext = document.getElementById("nextQuestionBtn-desktop")

    if(mobileNext){
        mobileNext.style.display = "none"
    }

    if(desktopNext){
        desktopNext.style.display = "none"
    }
}

function selectAnswer(button, index){

    if(selectedAnswer) return

    selectedAnswer = true

    impact()

    const data = questions[lang]
    const question = data[currentQuestionIndex]

    const stepRoot = button.closest(".lesson-step")
    const allButtons = stepRoot
        ? stepRoot.querySelectorAll(".test-answer")
        : document.querySelectorAll(".test-answer")

    allButtons.forEach(btn => {
        btn.disabled = true
    })

    if(index === question.correct){

        button.classList.add("correct")
        score++

    }else{

        button.classList.add("wrong")

        allButtons.forEach((btn, btnIndex) => {

            if(btnIndex === question.correct){
                btn.classList.add("correct")
            }

        })
    }

    const mobileNext = document.getElementById("nextQuestionBtn-mobile")
    const desktopNext = document.getElementById("nextQuestionBtn-desktop")

    if(mobileNext && stepRoot && stepRoot.id.includes("mobile")){
        mobileNext.style.display = "block"
    }

    if(desktopNext && stepRoot && stepRoot.id.includes("desktop")){
        desktopNext.style.display = "block"
    }
}

function nextQuestion(){

    impact()

    currentQuestionIndex++

    renderQuestion()
}

function updateTestProgress(){

    const data = questions[lang]

    const percent = ((currentQuestionIndex) / data.length) * 100

    const mobileProgress = document.getElementById("testProgress-mobile")
    const desktopProgress = document.getElementById("testProgress-desktop")

    if(mobileProgress){
        mobileProgress.style.width = `${percent}%`
    }

    if(desktopProgress){
        desktopProgress.style.width = `${percent}%`
    }
}

async function saveProgress(){

    try{

        if(!telegramUserId) return

        await fetch("https://api.gaphub.uz/progress/complete",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                telegram_id:telegramUserId,
                course_slug:COURSE_SLUG,
                lesson_id:LESSON_ID
            })
        })

    }catch(error){

        console.log(error)
    }
}

async function finishLesson(){

    await saveProgress()

    const d = t[lang]

    const mobileRoot = document.getElementById("step-test-mobile")
    const desktopRoot = document.getElementById("step-test-desktop")

    const html = `
        <div class="glow-card" style="
            border-radius:28px;
            padding:24px;
        ">

            <h2 style="
                margin:0 0 12px;
                font-size:32px;
                line-height:1.1;
                font-weight:800;
            ">
                ${d.finishTitle}
            </h2>

            <p style="
                margin:0 0 20px;
                color:var(--muted);
                line-height:1.6;
                font-size:15px;
            ">
                ${d.finishText}
            </p>

            <button
                class="mobile-main-btn"
                onclick="openNextLesson()"
            >
                ${d.finishNext}
            </button>

        </div>
    `

    if(mobileRoot){
        mobileRoot.innerHTML = html
    }

    if(desktopRoot){
        desktopRoot.innerHTML = html
    }
}

function openNextLesson(){

    impact()

    window.location.href = `smm-lesson-${NEXT_LESSON_ID}.html`
}

function openMaterial(){

    impact()

    const path = MATERIAL_PATHS[lang]

    if(!path){
        alert(t[lang].materialMissing)
        return
    }

    if(
        window.Telegram &&
        Telegram.WebApp &&
        Telegram.WebApp.openLink
    ){
        Telegram.WebApp.openLink(path)
        return
    }

    const opened = window.open(path, "_blank")

    if(!opened){
        window.location.href = path
    }
}

function initVideo(){

    const mobileVideo = document.getElementById("lessonVideo-mobile")
    const desktopVideo = document.getElementById("lessonVideo-desktop")

    const mobileSource = document.getElementById("videoSource-mobile")
    const desktopSource = document.getElementById("videoSource-desktop")

    if(mobilePlyr){
        mobilePlyr.pause()
    }

    if(desktopPlyr){
        desktopPlyr.pause()
    }

    if(mobileSource){
        mobileSource.src = VIDEO_PATHS[lang]
    }

    if(desktopSource){
        desktopSource.src = VIDEO_PATHS[lang]
    }

    if(mobileVideo){
        mobileVideo.load()
    }

    if(desktopVideo){
        desktopVideo.load()
    }

    if(mobilePlyr){
        mobilePlyr.source = {
            type:"video",
            sources:[
                {
                    src:VIDEO_PATHS[lang],
                    type:"video/mp4"
                }
            ]
        }
    }

    if(desktopPlyr){
        desktopPlyr.source = {
            type:"video",
            sources:[
                {
                    src:VIDEO_PATHS[lang],
                    type:"video/mp4"
                }
            ]
        }
    }
}

function initPlyr(){

    const controls = [
        "play-large",
        "play",
        "progress",
        "current-time",
        "duration",
        "mute",
        "volume",
        "settings",
        "fullscreen"
    ]

    const mobileVideo = document.getElementById("lessonVideo-mobile")
    const desktopVideo = document.getElementById("lessonVideo-desktop")

    if(window.Plyr && mobileVideo && !mobilePlyr){
        mobilePlyr = new Plyr(mobileVideo, {
            controls:controls,
            fullscreen:{
                enabled:true,
                fallback:true,
                iosNative:true
            }
        })
    }

    if(window.Plyr && desktopVideo && !desktopPlyr){
        desktopPlyr = new Plyr(desktopVideo, {
            controls:controls,
            fullscreen:{
                enabled:true,
                fallback:true,
                iosNative:true
            }
        })
    }
}

function loadOtabek(){

    window.OTABEK_STORAGE_KEY = `smm_lesson_${LESSON_ID}_${lang}`

    const mobileSlot = document.getElementById("otabek-mobile-slot")

    if(!mobileSlot) return

    fetch("otabek.html")
        .then(response => response.text())
        .then(html => {

            mobileSlot.innerHTML = html

            const scripts = document.querySelectorAll("#otabek-mobile-slot script")

            scripts.forEach(oldScript => {
                const newScript = document.createElement("script")
                newScript.textContent = oldScript.textContent
                document.body.appendChild(newScript)
                oldScript.remove()
            })
        })
        .catch(error => {
            console.log("Otabek load error:", error)
        })
}
