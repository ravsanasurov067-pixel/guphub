<title>gaphub - SMM lesson 1</title>

<style>
:root{
    --accent:#cb6ce6;
    --accent-2:#a855f7;

    --bg:#0c0b14;
    --bg-soft:#15141e;

    --card:#111117;
    --card-2:#17171f;

    --text:#ffffff;
    --muted:#a8a4b5;
    --muted-soft:#8f8a9e;

    --line:rgba(255,255,255,.07);

    --shadow:0 12px 38px rgba(0,0,0,.35);

    --radius-xl:28px;
    --radius-lg:22px;
    --radius-md:16px;
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,
body{
    margin:0;
    padding:0;
    min-height:100%;
    font-family:Arial,sans-serif;
    background:#000;
    color:#fff;
}

body{
    position:relative;
    overflow-x:hidden;
}

img{
    display:block;
    max-width:100%;
}

button{
    font-family:inherit;
    cursor:pointer;
}

.desktop-only{
    display:none;
}

.btn{
    border:none;
    border-radius:18px;
    transition:.18s ease;
    font-weight:700;
}

.btn:active{
    transform:scale(.985);
}

.btn-primary{
    color:#fff;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    box-shadow:0 14px 32px rgba(203,108,230,.22);
}

.btn-secondary{
    color:#fff;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.10);
}

.glow-card{
    background:
        radial-gradient(circle at 86% 14%, rgba(203,108,230,.18), transparent 26%),
        radial-gradient(circle at 15% 88%, rgba(203,108,230,.08), transparent 22%),
        linear-gradient(180deg,#171621 0%,#0f0e17 100%);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:var(--shadow);
}

.soft-card{
    background:
        radial-gradient(circle at 88% 18%, rgba(203,108,230,.10), transparent 24%),
        linear-gradient(180deg,#121219 0%,#0d0d12 100%);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:var(--shadow);
}

.lesson-step{
    display:none;
}

.lesson-step.active{
    display:block;
}

/* =========================
   MOBILE
========================= */

.mobile-shell{
    display:block;
}

.mobile-page{
    min-height:100vh;

    padding:
        calc(env(safe-area-inset-top) + 76px)
        14px
        calc(178px + env(safe-area-inset-bottom));

    background:
        radial-gradient(circle at 20% 10%, rgba(203,108,230,.10), transparent 24%),
        linear-gradient(180deg,#09080f 0%,#0c0b14 100%);
}

/* TOP */

.mobile-top{
    margin-bottom:16px;
}

.mobile-lesson-bar{
    display:grid;
    grid-template-columns:46px minmax(0,1fr) 64px;
    gap:8px;
    align-items:center;
    margin-bottom:14px;
}

.mobile-back{
    width:46px;
    height:34px;
    border:none;
    border-radius:999px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(203,108,230,.55);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
    transition:.18s ease;
}

.mobile-back:active{
    transform:scale(.94);
    opacity:.9;
}

.mobile-back-arrow{
    font-size:20px;
    line-height:1;
    transform:translateY(-1px);
}

.mobile-step-title{
    min-height:34px;
    padding:0 12px;
    border-radius:999px;
    background:rgba(255,255,255,.055);
    border:1px solid rgba(255,255,255,.075);
    color:#ebe4f5;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:800;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.mobile-lang-chip{
    height:34px;
    border:none;
    border-radius:999px;
    background:linear-gradient(90deg, rgba(203,108,230,.30), rgba(168,85,247,.22));
    border:1px solid rgba(203,108,230,.50);
    color:#fff;
    font-size:12px;
    font-weight:900;
    box-shadow:0 10px 24px rgba(203,108,230,.14);
}

.mobile-lang-chip:active{
    transform:scale(.95);
}

.mobile-video-head{
    display:block;
}

.mobile-badge{
    display:inline-flex;
    align-items:center;
    gap:8px;

    background:rgba(255,255,255,.06);

    border:1px solid rgba(255,255,255,.06);

    border-radius:999px;

    padding:9px 13px;

    font-size:12px;

    color:#ebe4f5;

    margin-bottom:12px;
}

.mobile-title{
    margin:0 0 10px;

    font-size:32px;
    line-height:.98;

    font-weight:800;

    letter-spacing:-.6px;
}

.mobile-subtitle{
    margin:0;

    color:var(--muted);

    font-size:14px;

    line-height:1.5;

    max-width:330px;
}

/* VIDEO STEP */

.mobile-video-card{
    border-radius:26px;

    overflow:hidden;

    position:relative;

    background:#0d0d12;

    border:1px solid rgba(255,255,255,.05);

    box-shadow:var(--shadow);
}

.mobile-video-frame{
    width:100%;
    aspect-ratio:16/9;

    position:relative;

    overflow:hidden;

    background:
        radial-gradient(circle at 50% 38%, rgba(203,108,230,.18), transparent 28%),
        linear-gradient(135deg,#171621,#0b0b10);
}

.mobile-video-frame video{
    width:100%;
    height:100%;
    object-fit:cover;
}

.mobile-video-bottom{
    padding:16px;
}

.mobile-video-title{
    margin:0 0 8px;

    font-size:18px;

    font-weight:800;

    line-height:1.2;
}

.mobile-video-text{
    margin:0;

    color:var(--muted);

    font-size:14px;

    line-height:1.55;
}

.mobile-video-action{
    margin-top:16px;
}

.mobile-main-btn{
    width:100%;

    min-height:56px;

    border:none;

    border-radius:18px;

    color:#fff;

    background:linear-gradient(90deg,var(--accent),var(--accent-2));

    box-shadow:0 14px 32px rgba(203,108,230,.25);

    font-size:16px;

    font-weight:800;
}

/* SUMMARY STEP */

.mobile-summary-head{
    margin-bottom:16px;
}

.mobile-section-title{
    margin:0 0 10px;

    font-size:24px;

    line-height:1.08;

    font-weight:800;
}

.mobile-note{
    margin:0;

    color:var(--muted-soft);

    font-size:13px;

    line-height:1.5;
}

.summary-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.summary-card{
    border-radius:22px;
    overflow:hidden;
}

.summary-question{
    width:100%;

    min-height:66px;

    background:transparent;

    border:none;

    color:#fff;

    padding:0 16px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    gap:12px;

    text-align:left;
}

.summary-question-text{
    font-size:15px;

    line-height:1.35;

    font-weight:800;
}

.summary-arrow{
    width:11px;
    height:11px;

    border-right:2px solid var(--accent);
    border-bottom:2px solid var(--accent);

    transform:rotate(45deg);

    transition:.25s ease;

    flex-shrink:0;

    margin-right:4px;
}

.summary-card.open .summary-arrow{
    transform:rotate(225deg);
}

.summary-answer-wrap{
    max-height:0;
    overflow:hidden;
    transition:max-height .28s ease;
}

.summary-answer{
    padding:0 16px 16px;

    color:#d8d2e3;

    font-size:14px;

    line-height:1.58;
}

.summary-answer ul{
    margin:8px 0 0;
    padding-left:18px;
}

.summary-answer li{
    margin:5px 0;
}

.mobile-summary-action{
    margin-top:18px;

/* DEEP MODAL */

.deep-overlay{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,.74);

    backdrop-filter:blur(12px);

    display:none;

    align-items:center;
    justify-content:center;

.deep-overlay.active{

.deep-modal{

.deep-icon{

    justify-content:center;

.deep-title{

    line-height:1.08;

    font-weight:800;

.deep-text{

    line-height:1.55;

.deep-actions{

    grid-template-columns:1fr;
    gap:10px;

.deep-btn{
    width:100%;

    font-size:15px;

/* TEST STEP */

.mobile-test-head{

.test-progress-line{

    transition:width .25s ease;

.test-question{

    line-height:1.15;

    font-weight:800;
}

.test-answers{
    display:flex;
    flex-direction:column;
    gap:10px;

.test-answer{
    width:100%;

    min-height:56px;

    border:none;

    border-radius:18px;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.07);

    color:#fff;

    padding:15px;

    text-align:left;

    font-size:15px;

    line-height:1.35;

    transition:.2s ease;
}

.test-answer.correct{
    background:rgba(57,145,84,.28);
    border-color:rgba(93,210,128,.35);
}

.test-answer.wrong{
    background:rgba(170,45,66,.30);
    border-color:rgba(255,90,112,.35);
}

.test-next{
    width:100%;

    height:56px;

    margin-top:16px;

    display:none;

    font-size:16px;
}

function renderSummary(){

    const data = summaryData[lang]

    const mobileRoot = document.getElementById("summaryList-mobile")
    const desktopRoot = document.getElementById("summaryList-desktop")

    const html = data.map(item => `
        <div class="summary-card soft-card">

            <button
                class="summary-question"
                onclick="toggleSummary(this)"
            >

                <span class="summary-question-text">
                    ${item.q}
                </span>

                <span class="summary-arrow"></span>

            </button>

            <div class="summary-answer-wrap">

                <div class="summary-answer">
                    ${item.a.replace(/\n/g, "<br>")}
                </div>

            </div>

        </div>
    `).join("")

    if(mobileRoot){
        mobileRoot.innerHTML = html
    }

    if(desktopRoot){
        desktopRoot.innerHTML = html
    }
}


function updateLessonLangButtons(){

    const buttons = [
        ["lessonLangUz-mobile", "uz"],
        ["lessonLangRu-mobile", "ru"],
        ["lessonLangUz-desktop", "uz"],
        ["lessonLangRu-desktop", "ru"]
    ]

    buttons.forEach(([id, value]) => {
        const el = document.getElementById(id)

        if(el){
            el.classList.toggle("active", lang === value)
        }
    })
}

function setLessonLang(value){

    impact()

    lang = value
    localStorage.setItem("lang", value)

    updateStaticText()
    initVideo()
    renderQuestion()
}

function toggleSummary(button){

    impact()

    const card = button.closest(".summary-card")
    const wrap = card.querySelector(".summary-answer-wrap")

    const isOpen = card.classList.contains("open")

    document.querySelectorAll(".summary-card").forEach(item => {
        item.classList.remove("open")
    })

    document.querySelectorAll(".summary-answer-wrap").forEach(item => {
        item.style.maxHeight = "0px"
    })

    if(!isOpen){
        card.classList.add("open")
        wrap.style.maxHeight = wrap.scrollHeight + "px"
    }
}

function updateDesktopSteps(){

    document.querySelectorAll(".desktop-step-item").forEach(item => {
        item.classList.remove("active")
    })

    const current = document.getElementById(`desktopStep-${currentStep}`)

    if(current){
        current.classList.add("active")
    }
}

function goStep(step){

    impact()

    currentStep = step

    const mobileVideoHead = document.getElementById("mobileVideoHead")
    const desktopHead = document.querySelector(".desktop-head")

    if(step === "video"){

        if(mobileVideoHead){
            mobileVideoHead.style.display = "block"
        }

        if(desktopHead){
            desktopHead.style.display = "block"
        }

    }else{

        if(mobileVideoHead){
            mobileVideoHead.style.display = "none"
        }

        if(desktopHead){
            desktopHead.style.display = "none"
        }
    }

    updateMobileStepTitle()

    const mobileSteps = document.querySelectorAll("#step-video-mobile, #step-summary-mobile, #step-deep-mobile, #step-test-mobile")
    const desktopSteps = document.querySelectorAll("#step-video-desktop, #step-summary-desktop, #step-deep-desktop, #step-test-desktop")

    mobileSteps.forEach(item => {
        item.classList.remove("active")
    })

    desktopSteps.forEach(item => {
        item.classList.remove("active")
    })

    const mobileTarget = document.getElementById(`step-${step}-mobile`)
    const desktopTarget = document.getElementById(`step-${step}-desktop`)

    if(mobileTarget){
        mobileTarget.classList.add("active")
    }

    if(desktopTarget){
        desktopTarget.classList.add("active")
    }

    updateDesktopSteps()

    window.scrollTo({
        top:0,
        behavior:"smooth"
    })

    if(step === "test"){
        renderQuestion()
    }
}

function openDeepModal(){

    impact()

    const modal = document.getElementById("deepOverlay")

    if(modal){
        modal.classList.add("active")
    }
}

function closeDeepModal(){

    const modal = document.getElementById("deepOverlay")

    if(modal){
        modal.classList.remove("active")
    }
}

function renderQuestion(){

    const data = questions[lang]
    const question = data[currentQuestionIndex]

    if(!question){
        finishLesson()
        return
    }

    selectedAnswer = false

    const mobileQuestion = document.getElementById("testQuestion-mobile")
    const desktopQuestion = document.getElementById("testQuestion-desktop")

    if(mobileQuestion){
        mobileQuestion.innerText = question.question
    }

    if(desktopQuestion){
        desktopQuestion.innerText = question.question
    }

    const mobileAnswers = document.getElementById("testAnswers-mobile")
    const desktopAnswers = document.getElementById("testAnswers-desktop")

    const answersHTML = question.answers.map((answer, index) => `
        <button
            class="test-answer"
            onclick="selectAnswer(this, ${index})"
        >
            ${answer}
        </button>
    `).join("")

    if(mobileAnswers){
        mobileAnswers.innerHTML = answersHTML
    }

    if(desktopAnswers){
        desktopAnswers.innerHTML = answersHTML
    }

    updateTestProgress()

    const mobileNext = document.getElementById("nextQuestionBtn-mobile")
    const desktopNext = document.getElementById("nextQuestionBtn-desktop")

    if(mobileNext){
        mobileNext.style.display = "none"
    }

    if(desktopNext){
        desktopNext.style.display = "none"
    }
}

function selectAnswer(button, index){

    if(selectedAnswer) return

    selectedAnswer = true

    impact()

    const data = questions[lang]
    const question = data[currentQuestionIndex]

    const allButtons = document.querySelectorAll(".test-answer")

    allButtons.forEach(btn => {
        btn.disabled = true
    })

    if(index === question.correct){

        button.classList.add("correct")
        score++

    }else{

        button.classList.add("wrong")

        allButtons.forEach((btn, btnIndex) => {

            if(btnIndex === question.correct){
                btn.classList.add("correct")
            }

        })
    }

    const mobileNext = document.getElementById("nextQuestionBtn-mobile")
    const desktopNext = document.getElementById("nextQuestionBtn-desktop")

    if(mobileNext){
        mobileNext.style.display = "block"
    }

    if(desktopNext){
        desktopNext.style.display = "block"
    }
}

function nextQuestion(){

    impact()

    currentQuestionIndex++

    renderQuestion()
}

function updateTestProgress(){

    const data = questions[lang]

    const percent = ((currentQuestionIndex) / data.length) * 100

    const mobileProgress = document.getElementById("testProgress-mobile")
    const desktopProgress = document.getElementById("testProgress-desktop")

    if(mobileProgress){
        mobileProgress.style.width = `${percent}%`
    }

    if(desktopProgress){
        desktopProgress.style.width = `${percent}%`
    }
}

async function saveProgress(){

    try{

        if(!telegramUserId) return

        await fetch("https://api.gaphub.uz/progress/complete",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                telegram_id:telegramUserId,
                course_slug:COURSE_SLUG,
                lesson_id:LESSON_ID
            })
        })

    }catch(error){

        console.log(error)
    }
}

async function finishLesson(){

    await saveProgress()

    const d = t[lang]

    const mobileRoot = document.getElementById("step-test-mobile")
    const desktopRoot = document.getElementById("step-test-desktop")

    const html = `
        <div class="glow-card" style="
            border-radius:28px;
            padding:24px;
        ">

            <h2 style="
                margin:0 0 12px;
                font-size:32px;
                line-height:1.1;
                font-weight:800;
            ">
                ${d.finishTitle}
            </h2>

            <p style="
                margin:0 0 20px;
                color:var(--muted);
                line-height:1.6;
                font-size:15px;
            ">
                ${d.finishText}
            </p>

            <button
                class="mobile-main-btn"
                onclick="openNextLesson()"
            >
                ${d.finishNext}
            </button>

        </div>
    `

    if(mobileRoot){
        mobileRoot.innerHTML = html
    }

    if(desktopRoot){
        desktopRoot.innerHTML = html
    }
}

function openNextLesson(){

    impact()

    window.location.href = `smm-lesson-${NEXT_LESSON_ID}.html`
}

function openMaterial(){

    impact()

    const path = MATERIAL_PATHS[lang]

    if(!path){
        alert(t[lang].materialMissing)
        return
    }

    if(
        window.Telegram &&
        Telegram.WebApp &&
        Telegram.WebApp.openLink
    ){
        Telegram.WebApp.openLink(path)
        return
    }

    const opened = window.open(path, "_blank")

    if(!opened){
        window.location.href = path
    }
}

function initVideo(){

    const mobileVideo = document.getElementById("lessonVideo-mobile")
    const desktopVideo = document.getElementById("lessonVideo-desktop")

    const mobileSource = document.getElementById("videoSource-mobile")
    const desktopSource = document.getElementById("videoSource-desktop")

    if(mobileSource){
        mobileSource.src = VIDEO_PATHS[lang]
    }

    if(desktopSource){
        desktopSource.src = VIDEO_PATHS[lang]
    }

    if(mobileVideo){
        mobileVideo.load()
    }

    if(desktopVideo){
        desktopVideo.load()
    }
}

function goBack(){

    impact()

    if(currentStep === "test"){
        goStep("deep")
        return
    }

    if(currentStep === "deep"){
        goStep("summary")
        return
    }

    if(currentStep === "summary"){
        goStep("video")
        return
    }

    window.location.href = "learn-smm-v2.html"
}

function goHome(){

    impact()

    localStorage.setItem("lang", lang)

    window.location.href = "index.html"
}

function goCourses(){

    impact()

    localStorage.setItem("lang", lang)

    window.location.href = "courses.html"
}

function goPage(page){

    impact()

    localStorage.setItem("lang", lang)

    window.location.href = page
}

function initTelegram(){

    if(window.Telegram && Telegram.WebApp){

        const tg = Telegram.WebApp

        tg.ready()
        tg.expand()

        try{
            tg.requestFullscreen()
        }catch(e){}

        if(tg.initDataUnsafe && tg.initDataUnsafe.user){

            telegramUserId = tg.initDataUnsafe.user.id
        }

        document.body.style.minHeight =
            tg.viewportHeight + "px"
    }
}

function toggleLessonLang(){

    if(lang === "ru"){
        setLessonLang("uz")
        return
    }

    setLessonLang("ru")
}

function updateMobileStepTitle(){

    const d = t[lang]
    const title = document.getElementById("mobileStepTitle")
    const langChip = document.getElementById("mobileLangCurrent")

    if(langChip){
        langChip.innerText = lang === "ru" ? "RU" : "UZ"
    }

    if(!title) return

    if(currentStep === "video"){
        title.innerText = d.lessonBadge
        return
    }

    if(currentStep === "summary"){
        title.innerText = d.summaryTitle
        return
    }

    if(currentStep === "deep"){
        title.innerText = d.deepTitle
        return
    }

    if(currentStep === "test"){
        title.innerText = d.testTitle
    }
}

function impact(style = "light"){

    if(
        window.Telegram &&
        Telegram.WebApp &&
        Telegram.WebApp.HapticFeedback
    ){

        Telegram.WebApp.HapticFeedback
            .impactOccurred(style)
    }
}

function loadOtabek(){

    window.OTABEK_STORAGE_KEY = "smm_lesson_1"

    fetch("otabek.html")
        .then(response => response.text())
        .then(html => {
            const desktopSlot = document.getElementById("otabek-slot")
            const mobileSlot = document.getElementById("otabek-mobile-slot")

            if(window.innerWidth >= 1024){

                if(desktopSlot){
                    desktopSlot.innerHTML = html
                }

            }else{

                if(mobileSlot){
                    mobileSlot.innerHTML = html
                }
            }

            const scripts = document.querySelectorAll("#otabek-slot script, #otabek-mobile-slot script")

            scripts.forEach(oldScript => {
                const newScript = document.createElement("script")
                newScript.textContent = oldScript.textContent
                document.body.appendChild(newScript)
                oldScript.remove()
            })
        })
        .catch(error => {
            console.log("Otabek load error:", error)
        })
}

updateStaticText()
initVideo()
initTelegram()
loadOtabek()

</script>
