<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>gaphub - SMM lesson 1</title>

<style>
:root{
    --accent:#cb6ce6;
    --accent-2:#a855f7;

    --bg:#0c0b14;
    --bg-soft:#15141e;

    --card:#111117;
    --card-2:#17171f;

    --text:#ffffff;
    --muted:#a8a4b5;
    --muted-soft:#8f8a9e;

    --line:rgba(255,255,255,.07);

    --shadow:0 12px 38px rgba(0,0,0,.35);

    --radius-xl:28px;
    --radius-lg:22px;
    --radius-md:16px;
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,
body{
    margin:0;
    padding:0;
    min-height:100%;
    font-family:Arial,sans-serif;
    background:#000;
    color:#fff;
}

body{
    position:relative;
    overflow-x:hidden;
}

img{
    display:block;
    max-width:100%;
}

button{
    font-family:inherit;
    cursor:pointer;
}

.desktop-only{
    display:none;
}

.btn{
    border:none;
    border-radius:18px;
    transition:.18s ease;
    font-weight:700;
}

.btn:active{
    transform:scale(.985);
}

.btn-primary{
    color:#fff;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    box-shadow:0 14px 32px rgba(203,108,230,.22);
}

.btn-secondary{
    color:#fff;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.10);
}

.glow-card{
    background:
        radial-gradient(circle at 86% 14%, rgba(203,108,230,.18), transparent 26%),
        radial-gradient(circle at 15% 88%, rgba(203,108,230,.08), transparent 22%),
        linear-gradient(180deg,#171621 0%,#0f0e17 100%);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:var(--shadow);
}

.soft-card{
    background:
        radial-gradient(circle at 88% 18%, rgba(203,108,230,.10), transparent 24%),
        linear-gradient(180deg,#121219 0%,#0d0d12 100%);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:var(--shadow);
}

.lesson-step{
    display:none;
}

.lesson-step.active{
    display:block;
}

/* =========================
   MOBILE
========================= */

.mobile-shell{
    display:block;
}

.mobile-page{
    min-height:100vh;

    padding:
        calc(env(safe-area-inset-top) + 76px)
        14px
        calc(178px + env(safe-area-inset-bottom));

    background:
        radial-gradient(circle at 20% 10%, rgba(203,108,230,.10), transparent 24%),
        linear-gradient(180deg,#09080f 0%,#0c0b14 100%);
}

/* TOP */

.mobile-top{
    margin-bottom:16px;
}

.mobile-back{
    display:inline-flex;
    align-items:center;
    justify-content:center;

    width:46px;
    height:34px;

    padding:0;

    border-radius:999px;

    background:rgba(255,255,255,.04);

    border:1px solid rgba(203,108,230,.55);

    color:#fff;

    font-size:16px;
    font-weight:800;

    margin-bottom:16px;

    backdrop-filter:blur(12px);

    transition:transform .18s ease, opacity .18s ease;
}

.mobile-back:active{
    transform:scale(.94);
    opacity:.9;
}

.mobile-back-arrow{
    font-size:20px;
    line-height:1;
    transform:translateY(-1px);
}

.mobile-badge{
    display:inline-flex;
    align-items:center;
    gap:8px;

    background:rgba(255,255,255,.06);

    border:1px solid rgba(255,255,255,.06);

    border-radius:999px;

    padding:9px 13px;

    font-size:12px;

    color:#ebe4f5;

    margin-bottom:12px;
}

.mobile-title{
    margin:0 0 10px;

    font-size:32px;
    line-height:.98;

    font-weight:800;

    letter-spacing:-.6px;
}

.mobile-subtitle{
    margin:0;

    color:var(--muted);

    font-size:14px;

    line-height:1.5;

    max-width:330px;
}

/* VIDEO STEP */

.mobile-video-card{
    border-radius:26px;

    overflow:hidden;

    position:relative;

    background:#0d0d12;

    border:1px solid rgba(255,255,255,.05);

    box-shadow:var(--shadow);
}

.mobile-video-frame{
    width:100%;
    aspect-ratio:16/9;

    position:relative;

    overflow:hidden;

    background:
        radial-gradient(circle at 50% 38%, rgba(203,108,230,.18), transparent 28%),
        linear-gradient(135deg,#171621,#0b0b10);
}

.mobile-video-frame video{
    width:100%;
    height:100%;
    object-fit:cover;
}

.mobile-video-bottom{
    padding:16px;
}

.mobile-video-title{
    margin:0 0 8px;

    font-size:18px;

    font-weight:800;

    line-height:1.2;
}

.mobile-video-text{
    margin:0;

    color:var(--muted);

    font-size:14px;

    line-height:1.55;
}

.mobile-video-action{
    margin-top:16px;
}

.mobile-main-btn{
    width:100%;

    min-height:56px;

    border:none;

    border-radius:18px;

    color:#fff;

    background:linear-gradient(90deg,var(--accent),var(--accent-2));

    box-shadow:0 14px 32px rgba(203,108,230,.25);

    font-size:16px;

    font-weight:800;
}

/* SUMMARY STEP */

.mobile-summary-head{
    margin-bottom:16px;
}

.mobile-section-title{
    margin:0 0 10px;

    font-size:24px;

    line-height:1.08;

    font-weight:800;
}

.mobile-note{
    margin:0;

    color:var(--muted-soft);

    font-size:13px;

    line-height:1.5;
}

.summary-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.summary-card{
    border-radius:22px;
    overflow:hidden;
}

.summary-question{
    width:100%;

    min-height:66px;

    background:transparent;

    border:none;

    color:#fff;

    padding:0 16px;

    display:flex;

    align-items:center;

    justify-content:space-between;

    gap:12px;

    text-align:left;
}

.summary-question-text{
    font-size:15px;

    line-height:1.35;

    font-weight:800;
}

.summary-arrow{
    width:11px;
    height:11px;

    border-right:2px solid var(--accent);
    border-bottom:2px solid var(--accent);

    transform:rotate(45deg);

    transition:.25s ease;

    flex-shrink:0;

    margin-right:4px;
}

.summary-card.open .summary-arrow{
    transform:rotate(225deg);
}

.summary-answer-wrap{
    max-height:0;
    overflow:hidden;
    transition:max-height .28s ease;
}

.summary-answer{
    padding:0 16px 16px;

    color:#d8d2e3;

    font-size:14px;

    line-height:1.58;
}

.summary-answer ul{
    margin:8px 0 0;
    padding-left:18px;
}

.summary-answer li{
    margin:5px 0;
}

.mobile-summary-action{
    margin-top:18px;
}

/* DEEP MODAL */

.deep-overlay{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,.74);

    backdrop-filter:blur(12px);

    display:none;

    align-items:center;
    justify-content:center;

    padding:16px;

    z-index:999;
}

.deep-overlay.active{
    display:flex;
}

.deep-modal{
    width:100%;
    max-width:420px;

    border-radius:28px;

    padding:22px;
}

.deep-icon{
    width:78px;
    height:78px;

    margin:0 auto 16px;

    border-radius:26px;

    background:rgba(203,108,230,.14);

    display:flex;

    align-items:center;
    justify-content:center;

    font-size:34px;
}

.deep-title{
    margin:0 0 10px;

    text-align:center;

    font-size:28px;

    line-height:1.08;

    font-weight:800;
}

.deep-text{
    margin:0 auto 18px;

    max-width:320px;

    text-align:center;

    color:var(--muted);

    font-size:15px;

    line-height:1.55;
}

.deep-actions{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
}

.deep-btn{
    width:100%;
    height:56px;
    font-size:15px;
}

/* TEST STEP */

.mobile-test-head{
    margin-bottom:16px;
}

.test-progress-line{
    height:7px;

    border-radius:999px;

    background:rgba(255,255,255,.08);

    overflow:hidden;

    margin-top:14px;
}

.test-progress-fill{
    height:100%;

    border-radius:999px;

    background:linear-gradient(90deg,var(--accent),var(--accent-2));

    width:0%;

    transition:width .25s ease;

.test-question{

    font-size:26px;

    line-height:1.15;

    font-weight:800;
}

.test-answers{
    display:flex;
    flex-direction:column;
    gap:10px;

    min-height:56px;

    border:none;

    border-radius:18px;

    border:1px solid rgba(255,255,255,.07);

    color:#fff;

    padding:15px;

    text-align:left;

    font-size:15px;

    line-height:1.35;

    transition:.2s ease;
}

.test-answer.correct{

    border-color:rgba(93,210,128,.35);
}

.test-answer.wrong{
    background:rgba(170,45,66,.30);

.test-next{
    width:100%;

    height:56px;

    margin-top:16px;

    display:none;

    font-size:16px;

    bottom:0;

    background:#000;

.nav-item{

    color:#fff;

    width:20%;

    text-align:center;

    cursor:pointer;

.nav-item img{
    width:27px;
    margin-bottom:2px;
}

.nav-item span{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;

.nav-item.active-mobile-nav span{

.nav-center{
    position:relative;
    top:-18px;

    width:20%;

    display:flex;

    justify-content:center;
}

.circle{
    width:60px;
    height:60px;

    background:#ffffff;

    border-radius:50%;

    border:4px solid var(--accent);

    display:flex;

    align-items:center;
    justify-content:center;

    width:24px;
    height:24px;
    object-fit:contain;

function toggleSummary(button){

    impact()

    const card = button.closest(".summary-card")
    const wrap = card.querySelector(".summary-answer-wrap")

    const isOpen = card.classList.contains("open")

    document.querySelectorAll(".summary-card").forEach(item => {
        item.classList.remove("open")
    })

    document.querySelectorAll(".summary-answer-wrap").forEach(item => {
        item.style.maxHeight = "0px"
    })

    if(!isOpen){
        card.classList.add("open")
        wrap.style.maxHeight = wrap.scrollHeight + "px"
    }
}

function updateDesktopSteps(){

    document.querySelectorAll(".desktop-step-item").forEach(item => {
        item.classList.remove("active")
    })

    const current = document.getElementById(`desktopStep-${currentStep}`)

    if(current){
        current.classList.add("active")
    }
}

function goStep(step){

    impact()

    currentStep = step

    const mobileSteps = document.querySelectorAll("#step-video-mobile, #step-summary-mobile, #step-deep-mobile, #step-test-mobile")

    const desktopSteps = document.querySelectorAll("#step-video-desktop, #step-summary-desktop, #step-deep-desktop, #step-test-desktop")

    mobileSteps.forEach(step => {
        step.classList.remove("active")
    })

    desktopSteps.forEach(step => {
        step.classList.remove("active")
    })

    const mobileTarget = document.getElementById(`step-${step}-mobile`)
    const desktopTarget = document.getElementById(`step-${step}-desktop`)

    if(mobileTarget){
        mobileTarget.classList.add("active")
    }

    if(desktopTarget){
        desktopTarget.classList.add("active")
    }

    updateDesktopSteps()

    window.scrollTo({
        top:0,
        behavior:"smooth"
    })

    if(step === "test"){
        renderQuestion()
    }
}

function openDeepModal(){

    impact()

    const modal = document.getElementById("deepOverlay")

    if(modal){
        modal.classList.add("active")
    }
}

function closeDeepModal(){

    const modal = document.getElementById("deepOverlay")

    if(modal){
        modal.classList.remove("active")
    }
}

function renderQuestion(){

    const data = questions[lang]
    const question = data[currentQuestionIndex]

    if(!question){
        finishLesson()
        return
    }

    selectedAnswer = false

    const mobileQuestion = document.getElementById("testQuestion-mobile")
    const desktopQuestion = document.getElementById("testQuestion-desktop")

    if(mobileQuestion){
        mobileQuestion.innerText = question.question
    }

    if(desktopQuestion){
        desktopQuestion.innerText = question.question
    }

    const mobileAnswers = document.getElementById("testAnswers-mobile")
    const desktopAnswers = document.getElementById("testAnswers-desktop")

    const answersHTML = question.answers.map((answer, index) => `
        <button
            class="test-answer"
            onclick="selectAnswer(this, ${index})"
        >
            ${answer}
        </button>
    `).join("")

    if(mobileAnswers){
        mobileAnswers.innerHTML = answersHTML
    }

    if(desktopAnswers){
        desktopAnswers.innerHTML = answersHTML
    }

    updateTestProgress()

    const mobileNext = document.getElementById("nextQuestionBtn-mobile")
    const desktopNext = document.getElementById("nextQuestionBtn-desktop")

    if(mobileNext){
        mobileNext.style.display = "none"
    }

    if(desktopNext){
        desktopNext.style.display = "none"
    }
}

function selectAnswer(button, index){

    if(selectedAnswer) return

    selectedAnswer = true

    impact()

    const data = questions[lang]
    const question = data[currentQuestionIndex]

    const allButtons = document.querySelectorAll(".test-answer")

    allButtons.forEach(btn => {
        btn.disabled = true
    })

    if(index === question.correct){

        button.classList.add("correct")
        score++

    }else{

        button.classList.add("wrong")

        allButtons.forEach((btn, btnIndex) => {

            if(btnIndex === question.correct){
                btn.classList.add("correct")
            }

        })
    }

    const mobileNext = document.getElementById("nextQuestionBtn-mobile")
    const desktopNext = document.getElementById("nextQuestionBtn-desktop")

    if(mobileNext){
        mobileNext.style.display = "block"
    }

    if(desktopNext){
        desktopNext.style.display = "block"
    }
}

function nextQuestion(){

    impact()

    currentQuestionIndex++

    renderQuestion()
}

function updateTestProgress(){

    const data = questions[lang]

    const percent = ((currentQuestionIndex) / data.length) * 100

    const mobileProgress = document.getElementById("testProgress-mobile")
    const desktopProgress = document.getElementById("testProgress-desktop")

    if(mobileProgress){
        mobileProgress.style.width = `${percent}%`
    }

    if(desktopProgress){
        desktopProgress.style.width = `${percent}%`
    }
}

async function saveProgress(){

    try{

        if(!telegramUserId) return

        await fetch("https://api.gaphub.uz/progress/complete",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                telegram_id:telegramUserId,
                course_slug:COURSE_SLUG,
                lesson_id:LESSON_ID
            })
        })

    }catch(error){

        console.log(error)
    }
}

async function finishLesson(){

    await saveProgress()

    const d = t[lang]

    const mobileRoot = document.getElementById("step-test-mobile")
    const desktopRoot = document.getElementById("step-test-desktop")

    const html = `

}

function initTelegram(){

    if(window.Telegram && Telegram.WebApp){

        const tg = Telegram.WebApp

        tg.ready()
        tg.expand()

        try{
            tg.requestFullscreen()
        }catch(e){}

        if(tg.initDataUnsafe && tg.initDataUnsafe.user){

            telegramUserId = tg.initDataUnsafe.user.id
        }

        document.body.style.minHeight =
            tg.viewportHeight + "px"
    }
}

function impact(style = "light"){

    if(
        window.Telegram &&
        Telegram.WebApp &&
        Telegram.WebApp.HapticFeedback
    ){

        Telegram.WebApp.HapticFeedback
            .impactOccurred(style)
    }
}
