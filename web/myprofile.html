<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#000;color:#fff}

/* WRAP */
.wrap{
padding:16px;
padding-top:150px; /* регулируешь руками */
padding-bottom:90px;
}

/* CARD */
.card{
background:#0B0B0B;
border-radius:20px;
padding:20px;
text-align:center;
position:relative;
}

/* BACK */
.back{
position:absolute;
top:10px;
left:12px;
background:#1a1a1a;
padding:6px 10px;
border-radius:10px;
font-size:12px;
color:#aaa;
cursor:pointer;
}

/* AVATAR */
.avatar{
width:90px;
height:90px;
border-radius:50%;
border:3px solid #cb6ce6;
margin:0 auto 10px;
background:#ddd;
overflow:hidden;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

/* TEXT */
.name{
font-size:20px;
font-weight:700;
}

.username{
color:#aaa;
margin-bottom:10px;
}

/* BUTTONS */
.reg-btn{
background:#cb6ce6;
border:none;
padding:8px 16px;
border-radius:12px;
color:#fff;
margin-bottom:12px;
}

.desc{
font-size:14px;
color:#aaa;
margin-bottom:16px;
}

/* BIG BTN */
.buy{
width:100%;
padding:14px;
border:none;
border-radius:16px;
background:linear-gradient(90deg,#cb6ce6,#a855f7);
color:#fff;
font-size:18px;
font-weight:600;
margin-bottom:16px;
}

/* MENU */
.menu{
background:#1a1a1a;
border-radius:12px;
overflow:hidden;
}

.menu-item{
padding:14px;
border-bottom:1px solid #333;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
}

.menu-item:last-child{
border-bottom:none;
}

.menu-item span{
color:#aaa;
}

/* BOTTOM NAV */
.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:#000;
display:flex;
justify-content:space-around;
align-items:center;
padding:8px 0;
padding-bottom:calc(8px + env(safe-area-inset-bottom));
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
font-size:10px;
color:#fff;
cursor:pointer;
}

.nav-item img{
width:22px;
margin-bottom:2px;
}

.nav-center{
position:relative;
top:-20px;
}

.circle{
width:60px;
height:60px;
background:#ddd;
border-radius:50%;
border:4px solid #cb6ce6;
}
</style>
</head>

<body>

<div class="wrap">

<div class="card">

    <div class="back" onclick="goHome()" id="back"></div>

    <div class="avatar">
        <img id="avatar" src="">
    </div>

    <div class="name" id="name">User</div>
    <div class="username" id="username">@username</div>

    <div class="reg-btn" id="phone"></div>

    <div class="desc" id="desc"></div>

    <button class="buy" id="buyBtn"></button>

    <div class="menu">
        <div class="menu-item" onclick="toggleLang()">
            <div id="langText"></div>
            <span id="langValue"></span>
        </div>

        <div class="menu-item" onclick="goPage('mycourses.html')" id="courses"></div>
        <div class="menu-item" onclick="goPage('support.html')" id="support"></div>
        <div class="menu-item" onclick="goPage('progress.html')" id="progress"></div>
    </div>

</div>

</div>

<!-- BOTTOM -->
<div class="bottom-nav">
    <div class="nav-item" onclick="goPage('mycourses.html')">
        <img src="images/courses2.png">
        <span id="m1"></span>
    </div>

    <div class="nav-item" onclick="goPage('earn.html')">
        <img src="images/money2.png">
        <span id="m4"></span>
    </div>

    <div class="nav-center">
        <div class="circle"></div>
    </div>

    <div class="nav-item">
        <img src="images/chat2.png">
        <span id="m5"></span>
    </div>

    <div class="nav-item" onclick="goPage('myprofile.html')">
        <img src="images/profile2.png">
        <span id="m6"></span>
    </div>
</div>

<script>
let lang = localStorage.getItem("lang") || "uz"

const t = {
uz:{
back:"← Orqaga",
desc:"Bu yerda ertaklar yo‘q. Faqat ish, tajriba va real daromad",
buy:"Kurs sotib olish",
lang:"Til",
courses:"Mening kurslarim",
support:"Yordam",
progress:"Mening progressim",
langVal:"O‘zbek",
m1:"Kurslarim",
m4:"Daromad",
m5:"Sharhlar",
m6:"Profil",
},
ru:{
back:"← Назад",
desc:"Здесь нет сказок про миллионы. Только работа, опыт и реальные деньги",
buy:"Купить курс",
lang:"Язык",
courses:"Мои курсы",
support:"Поддержка",
progress:"Мой прогресс",
langVal:"Русский",
m1:"Мои курсы",
m4:"Заработок",
m5:"Отзывы",
m6:"Профиль",
}
}

function update(){
    let d = t[lang]

    document.getElementById("back").innerText = d.back
    document.getElementById("desc").innerText = d.desc
    document.getElementById("buyBtn").innerText = d.buy

    document.getElementById("langText").innerText = d.lang
    document.getElementById("langValue").innerText = d.langVal

    document.getElementById("courses").innerText = d.courses
    document.getElementById("support").innerText = d.support
    document.getElementById("progress").innerText = d.progress

    document.getElementById("m1").innerText = d.m1
    document.getElementById("m4").innerText = d.m4
    document.getElementById("m5").innerText = d.m5
    document.getElementById("m6").innerText = d.m6
}

function toggleLang(){
    lang = lang === "uz" ? "ru" : "uz"
    localStorage.setItem("lang", lang)
    update()
}

function goHome(){
    window.location.href = "index.html"
}

function goPage(page){
    window.location.href = page
}

/* TELEGRAM */
if (window.Telegram && Telegram.WebApp) {
    const tg = Telegram.WebApp
    tg.ready()
    tg.expand()

    const user = tg.initDataUnsafe.user

    if (user) {
        const fullName = [user.first_name, user.last_name]
            .filter(Boolean)
            .join(" ")

        document.getElementById("name").innerText = fullName || "User"

        document.getElementById("username").innerText = user.username
            ? "@" + user.username
            : ""

        if (user.photo_url) {
            document.getElementById("avatar").src = user.photo_url
        }
    }
}

update()
  
</script>

</body>
</html>
