<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>gaphub - my profile</title>

<style>
:root{
    --accent:#cb6ce6;
    --accent-2:#a855f7;
    --bg:#0c0b14;
    --bg-soft:#15141e;
    --card:#111117;
    --card-2:#17171f;
    --text:#ffffff;
    --muted:#a8a4b5;
    --muted-soft:#8f8a9e;
    --line:rgba(255,255,255,.07);
    --shadow:0 12px 38px rgba(0,0,0,.35);

    --radius-xl:28px;
    --radius-lg:22px;
    --radius-md:16px;
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html, body{
    margin:0;
    padding:0;
    min-height:100%;
    font-family:Arial, sans-serif;
    background:#000;
    color:#fff;
}

body{
    position:relative;
}

img{
    display:block;
    max-width:100%;
}

button{
    font-family:inherit;
    cursor:pointer;
}

.desktop-only{
    display:none;
}

.btn{
    border:none;
    border-radius:18px;
    transition:.2s ease;
    font-weight:700;
}

.btn:active{
    transform:scale(.99);
}

.btn-primary{
    color:#fff;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    box-shadow:0 14px 32px rgba(203,108,230,.22);
}

.btn-secondary{
    color:#fff;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.10);
}

.glow-card{
    background:
        radial-gradient(circle at 86% 14%, rgba(203,108,230,.18), transparent 26%),
        radial-gradient(circle at 15% 88%, rgba(203,108,230,.08), transparent 22%),
        linear-gradient(180deg, #171621 0%, #0f0e17 100%);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:var(--shadow);
}

.soft-card{
    background:
        radial-gradient(circle at 88% 18%, rgba(203,108,230,.10), transparent 24%),
        linear-gradient(180deg, #121219 0%, #0d0d12 100%);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:var(--shadow);
}

/* =========================
   MOBILE
========================= */
.mobile-shell{
    display:block;
}

.mobile-page{
    min-height:100vh;
    padding:calc(env(safe-area-inset-top) + 76px) 14px calc(110px + env(safe-area-inset-bottom));
    background:
        radial-gradient(circle at 20% 10%, rgba(203,108,230,.10), transparent 24%),
        linear-gradient(180deg, #09080f 0%, #0c0b14 100%);
}

.mobile-back{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:#1a1a1a;
    color:#fff;
    border:none;
    border-radius:12px;
    padding:10px 14px;
    font-size:15px;
    margin-bottom:16px;
}

.mobile-back svg{
    width:16px;
    height:16px;
    flex-shrink:0;
}

.mobile-hero{
    position:relative;
    overflow:hidden;
    border-radius:var(--radius-xl);
    padding:18px 16px 16px;
}

.mobile-badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.06);
    border-radius:999px;
    padding:8px 12px;
    font-size:12px;
    color:#ebe4f5;
    margin-bottom:14px;
}

.mobile-profile-row{
    display:flex;
    align-items:center;
    gap:14px;
}

.mobile-avatar{
    width:88px;
    height:88px;
    border-radius:50%;
    border:4px solid var(--accent);
    background:linear-gradient(135deg,#f3bb63,#f7a35f);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:34px;
    font-weight:700;
    overflow:hidden;
    flex-shrink:0;
    box-shadow:0 12px 26px rgba(0,0,0,.28);
}

.mobile-avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.mobile-profile-meta{
    min-width:0;
    flex:1;
}

.mobile-name{
    margin:0 0 4px;
    font-size:27px;
    line-height:1.02;
    font-weight:800;
    letter-spacing:-0.4px;
}

.mobile-username{
    color:var(--muted-soft);
    font-size:14px;
    margin-bottom:10px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.mobile-phone{
    display:inline-block;
    background:#2a1933;
    color:#d68cff;
    border-radius:999px;
    padding:8px 12px;
    font-size:13px;
    min-width:110px;
}

.mobile-hero-note{
    margin-top:14px;
    color:var(--muted);
    font-size:14px;
    line-height:1.5;
}

.mobile-mini-grid{
    margin-top:14px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.mobile-mini-card{
    background:rgba(255,255,255,.04);
    border-radius:16px;
    padding:12px;
    min-height:78px;
}

.mobile-mini-label{
    color:var(--muted-soft);
    font-size:12px;
    margin-bottom:6px;
}

.mobile-mini-value{
    font-size:14px;
    font-weight:700;
    line-height:1.35;
}

.mobile-top-actions{
    margin-top:14px;
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
}

.mobile-top-btn{
    width:100%;
    height:54px;
    font-size:16px;
}

.mobile-section{
    margin-top:14px;
}

.mobile-section-title{
    margin:0 0 12px;
    font-size:21px;
    line-height:1.1;
    font-weight:800;
}

.mobile-actions-grid{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.mobile-action-card{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    border-radius:20px;
    padding:14px;
    cursor:pointer;
}

.mobile-action-left{
    display:flex;
    align-items:center;
    gap:12px;
    min-width:0;
}

.mobile-action-icon{
    width:44px;
    height:44px;
    border-radius:14px;
    background:#22222d;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

.mobile-action-icon img{
    width:26px;
    height:26px;
    object-fit:contain;
}

.mobile-action-title{
    font-size:15px;
    font-weight:700;
    line-height:1.3;
}

.mobile-action-sub{
    margin-top:3px;
    font-size:13px;
    color:var(--muted-soft);
}

.mobile-action-arrow{
    font-size:22px;
    color:#bfbfbf;
    line-height:1;
    flex-shrink:0;
}

/* BOTTOM NAV */
.bottom-nav{
    position:fixed;
    left:0;
    bottom:0;
    width:100%;
    background:#000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 10px;
    padding-bottom:calc(8px + env(safe-area-inset-bottom));
    z-index:50;
}

.nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:12px;
    color:#fff;
    width:20%;
    text-align:center;
    cursor:pointer;
}

.nav-item img{
    width:27px;
    margin-bottom:2px;
}

.nav-item span{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.nav-center{
    position:relative;
    top:-18px;
    width:20%;
    display:flex;
    justify-content:center;
}

.circle{
    width:60px;
    height:60px;
    background:#ffffff;
    border-radius:50%;
    border:4px solid var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
}

.circle img{
    width:24px;
    height:24px;
    object-fit:contain;
}

/* =========================
   DESKTOP
========================= */
@media (min-width:1024px){
    html, body{
        min-height:100vh;
        background:
            radial-gradient(circle at 15% 18%, rgba(203,108,230,.08), transparent 24%),
            radial-gradient(circle at 85% 28%, rgba(203,108,230,.07), transparent 24%),
            linear-gradient(180deg, #09080f 0%, #0c0b14 100%);
        color:var(--text);
    }

    body{
        overflow:hidden;
    }

    .mobile-shell{
        display:none;
    }

    .desktop-only{
        display:block;
    }

    .desktop-app{
        min-height:100vh;
        color:var(--text);
    }

    .desktop-layout{
        display:grid;
        grid-template-columns:270px minmax(0,1fr);
        min-height:100vh;
    }

    .desktop-sidebar{
        padding:22px 20px;
        border-right:1px solid rgba(255,255,255,.05);
        background:linear-gradient(180deg, rgba(14,13,23,.70) 0%, rgba(12,11,20,.40) 100%);
        overflow:auto;
    }

    .desktop-brand{
        font-size:34px;
        font-weight:800;
        line-height:1;
        margin:8px 0 56px;
    }

    .desktop-nav{
        display:flex;
        flex-direction:column;
        gap:10px;
        margin-top:4px;
    }

    .desktop-nav-item{
        display:flex;
        align-items:center;
        gap:14px;
        width:100%;
        min-height:56px;
        padding:0 18px;
        border-radius:16px;
        color:#f1f1f1;
        background:transparent;
        border:1px solid transparent;
        font-size:16px;
        font-weight:600;
        transition:.2s ease;
        cursor:pointer;
        text-align:left;
    }

    .desktop-nav-item img{
        width:28px;
        height:28px;
        object-fit:contain;
        flex-shrink:0;
    }

    .desktop-nav-item.active-nav{
        background:linear-gradient(180deg, rgba(255,255,255,.06) 0%, rgba(255,255,255,.03) 100%);
        border-color:rgba(255,255,255,.06);
        box-shadow:var(--shadow);
    }

    .desktop-nav-item-accent{
        background:linear-gradient(90deg, #b85bda 0%, #cb6ce6 100%);
        border-color:transparent;
        color:#fff;
        box-shadow:0 12px 26px rgba(203,108,230,.28);
        margin-top:8px;
    }

    .desktop-nav-item-accent:hover{
        transform:translateY(-1px);
    }

    .desktop-nav-item-accent img{
        filter:brightness(0) invert(1);
    }

    .desktop-main{
        padding:24px 22px 30px;
        height:100vh;
        overflow:auto;
    }

    .desktop-back{
        display:inline-flex;
        align-items:center;
        gap:14px;
        font-size:24px;
        color:#fff;
        margin-bottom:18px;
        cursor:pointer;
        user-select:none;
    }

    .desktop-back-arrow{
        font-size:42px;
        line-height:1;
        transform:translateY(-1px);
    }

    .desktop-hero{
        position:relative;
        overflow:hidden;
        border-radius:30px;
        padding:24px 22px 22px;
    }

    .desktop-badge{
        display:inline-flex;
        align-items:center;
        gap:8px;
        background:rgba(255,255,255,.06);
        border:1px solid rgba(255,255,255,.06);
        border-radius:999px;
        padding:10px 14px;
        font-size:13px;
        color:#ebe4f5;
        margin-bottom:18px;
    }

    .desktop-hero-grid{
        display:grid;
        grid-template-columns:minmax(0,1.1fr) minmax(320px,.9fr);
        gap:18px;
        align-items:stretch;
    }

    .desktop-profile-card{
        display:flex;
        align-items:center;
        gap:18px;
        min-width:0;
    }

    .desktop-avatar{
        width:130px;
        height:130px;
        border-radius:50%;
        border:6px solid var(--accent);
        background:linear-gradient(135deg,#f3bb63,#f7a35f);
        display:flex;
        align-items:center;
        justify-content:center;
        color:#fff;
        font-size:56px;
        font-weight:700;
        overflow:hidden;
        flex-shrink:0;
        box-shadow:0 14px 28px rgba(0,0,0,.28);
    }

    .desktop-avatar img{
        width:100%;
        height:100%;
        object-fit:cover;
    }

    .desktop-profile-meta{
        min-width:0;
    }

    .desktop-name{
        margin:0 0 6px;
        font-size:clamp(34px,3vw,50px);
        line-height:.96;
        font-weight:800;
        letter-spacing:-1px;
    }

    .desktop-username{
        font-size:18px;
        color:var(--muted-soft);
        margin-bottom:10px;
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
        max-width:100%;
    }

    .desktop-phone{
        display:inline-block;
        background:#2a1933;
        color:#d68cff;
        border-radius:999px;
        padding:8px 14px;
        font-size:15px;
        min-width:150px;
        text-align:center;
        margin-bottom:14px;
    }

    .desktop-hero-note{
        color:var(--muted);
        font-size:16px;
        line-height:1.52;
        max-width:560px;
    }

    .desktop-side-panel{
        display:flex;
        flex-direction:column;
        gap:12px;
        min-width:0;
    }

    .desktop-mini-grid{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:12px;
    }

    .desktop-mini-card{
        background:rgba(255,255,255,.04);
        border-radius:18px;
        padding:14px;
        min-height:92px;
    }

    .desktop-mini-label{
        color:var(--muted-soft);
        font-size:12px;
        margin-bottom:8px;
    }

    .desktop-mini-value{
        font-size:16px;
        font-weight:700;
        line-height:1.35;
    }

    .desktop-top-actions{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:12px;
    }

    .desktop-top-btn{
        width:100%;
        height:58px;
        font-size:16px;
    }

    .desktop-section{
        margin-top:16px;
    }

    .desktop-section-title{
        margin:0 0 14px;
        font-size:28px;
        line-height:1.1;
        font-weight:800;
    }

    .desktop-actions-grid{
        display:grid;
        grid-template-columns:repeat(3, minmax(0,1fr));
        gap:14px;
    }

    .desktop-action-card{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:14px;
        border-radius:22px;
        padding:18px;
        min-height:124px;
        cursor:pointer;
    }

    .desktop-action-left{
        display:flex;
        align-items:center;
        gap:14px;
        min-width:0;
    }

    .desktop-action-icon{
        width:50px;
        height:50px;
        border-radius:14px;
        background:#22222d;
        flex-shrink:0;
        display:flex;
        align-items:center;
        justify-content:center;
        overflow:hidden;
    }

    .desktop-action-icon img{
        width:30px;
        height:30px;
        object-fit:contain;
    }

    .desktop-action-title{
        font-size:18px;
        font-weight:700;
        line-height:1.25;
    }

    .desktop-action-sub{
        margin-top:4px;
        font-size:14px;
        color:var(--muted-soft);
    }

    .desktop-action-arrow{
        font-size:24px;
        color:#bfbfbf;
        line-height:1;
        flex-shrink:0;
    }
}

@media (max-width:1360px) and (min-width:1024px){
    .desktop-layout{
        grid-template-columns:245px minmax(0,1fr);
    }

    .desktop-main{
        padding:22px 18px 26px;
    }

    .desktop-hero-grid{
        grid-template-columns:1fr;
    }

    .desktop-actions-grid{
        grid-template-columns:1fr;
    }
}

@media (max-width:420px){
    .mobile-hero{
        border-radius:22px;
    }

    .mobile-mini-grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<!-- MOBILE -->
<div class="mobile-shell">
    <div class="mobile-page">
        <button class="mobile-back" onclick="goBack()">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M15 5L8 12L15 19" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span id="back-mobile"></span>
        </button>

        <section class="mobile-hero glow-card">
            <div class="mobile-badge" id="badge-mobile"></div>

            <div class="mobile-profile-row">
                <div class="mobile-avatar" id="avatarWrap-mobile">C</div>

                <div class="mobile-profile-meta">
                    <h1 class="mobile-name" id="name-mobile">User</h1>
                    <div class="mobile-username" id="username-mobile">@username</div>
                    <div class="mobile-phone" id="phone-mobile"></div>
                </div>
            </div>

            <div class="mobile-hero-note" id="note-mobile"></div>

            <div class="mobile-mini-grid">
                <div class="mobile-mini-card">
                    <div class="mobile-mini-label" id="mini1Label-mobile"></div>
                    <div class="mobile-mini-value" id="mini1Value-mobile"></div>
                </div>
                <div class="mobile-mini-card">
                    <div class="mobile-mini-label" id="mini2Label-mobile"></div>
                    <div class="mobile-mini-value" id="mini2Value-mobile"></div>
                </div>
            </div>

            <div class="mobile-top-actions">
                <button class="btn btn-primary mobile-top-btn" id="buyBtn-mobile"></button>

                <button class="btn btn-secondary mobile-top-btn" onclick="toggleLang()">
                    <span id="langText-mobile"></span>
                    <span style="margin-left:8px;color:#cfcfcf" id="langValue-mobile"></span>
                </button>
            </div>
        </section>

        <section class="mobile-section">
            <h2 class="mobile-section-title" id="sectionTitle-mobile"></h2>

            <div class="mobile-actions-grid">
                <div class="mobile-action-card soft-card" onclick="goPage('mycourses.html')">
                    <div class="mobile-action-left">
                        <div class="mobile-action-icon">
                            <img src="images/icon/courses2.png" alt="">
                        </div>
                        <div>
                            <div class="mobile-action-title" id="courses-mobile"></div>
                            <div class="mobile-action-sub" id="coursesSub-mobile"></div>
                        </div>
                    </div>
                    <span class="mobile-action-arrow">›</span>
                </div>

                <div class="mobile-action-card soft-card" onclick="goPage('progress.html')">
                    <div class="mobile-action-left">
                        <div class="mobile-action-icon">
                            <img src="images/icon/progress.png" alt="">
                        </div>
                        <div>
                            <div class="mobile-action-title" id="progress-mobile"></div>
                            <div class="mobile-action-sub" id="progressSub-mobile"></div>
                        </div>
                    </div>
                    <span class="mobile-action-arrow">›</span>
                </div>

                <div class="mobile-action-card soft-card" onclick="goPage('support.html')">
                    <div class="mobile-action-left">
                        <div class="mobile-action-icon">
                            <img src="images/icon/support.png" alt="">
                        </div>
                        <div>
                            <div class="mobile-action-title" id="support-mobile"></div>
                            <div class="mobile-action-sub" id="supportSub-mobile"></div>
                        </div>
                    </div>
                    <span class="mobile-action-arrow">›</span>
                </div>
            </div>
        </section>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="goPage('mycourses.html')">
            <img src="images/icon/courses2.png" alt="">
            <span id="m1-mobile"></span>
        </div>

        <div class="nav-item" onclick="goPage('support.html')">
            <img src="images/icon/support.png" alt="">
            <span id="m4-mobile"></span>
        </div>

        <div class="nav-center" onclick="goHome()">
            <div class="circle">
                <img src="images/icon/home2.png" alt="home">
            </div>
        </div>

        <div class="nav-item" onclick="goPage('chat.html')">
            <img src="images/icon/feedback.png" alt="">
            <span id="m5-mobile"></span>
        </div>

        <div class="nav-item" onclick="goPage('myprofile.html')">
            <img src="images/icon/profile2.png" alt="">
            <span id="m6-mobile"></span>
        </div>
    </div>
</div>

<!-- DESKTOP -->
<div class="desktop-app desktop-only">
    <div class="desktop-layout">
        <aside class="desktop-sidebar">
            <div class="desktop-brand">gaphub</div>

            <nav class="desktop-nav">
                <button class="desktop-nav-item" onclick="goHome()">
                    <img src="images/icon/home.png" alt="">
                    <span id="home-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('mycourses.html')">
                    <img src="images/icon/courses2.png" alt="">
                    <span id="m1-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('support.html')">
                    <img src="images/icon/support.png" alt="">
                    <span id="m4-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('chat.html')">
                    <img src="images/icon/feedback.png" alt="">
                    <span id="m5-desktop"></span>
                </button>

                <button class="desktop-nav-item active-nav" onclick="goPage('myprofile.html')">
                    <img src="images/icon/profile2.png" alt="">
                    <span id="m6-desktop"></span>
                </button>

                <button class="desktop-nav-item desktop-nav-item-accent" onclick="goCourses()">
                    <img src="images/icon/catalog.png" alt="">
                    <span id="catalog-desktop"></span>
                </button>
            </nav>
        </aside>

        <main class="desktop-main">
            <div class="desktop-back" onclick="goBack()">
                <span class="desktop-back-arrow">←</span>
                <span id="back-desktop"></span>
            </div>

            <section class="desktop-hero glow-card">
                <div class="desktop-badge" id="badge-desktop"></div>

                <div class="desktop-hero-grid">
                    <div class="desktop-profile-card">
                        <div class="desktop-avatar" id="avatarWrap-desktop">C</div>

                        <div class="desktop-profile-meta">
                            <h1 class="desktop-name" id="name-desktop"></h1>
                            <div class="desktop-username" id="username-desktop"></div>
                            <div class="desktop-phone" id="phone-desktop"></div>
                            <div class="desktop-hero-note" id="note-desktop"></div>
                        </div>
                    </div>

                    <div class="desktop-side-panel">
                        <div class="desktop-mini-grid">

<script>
let lang = localStorage.getItem("lang") || "uz"

const t = {
    uz:{
        back:"Orqaga",
        home:"Bosh sahifa",
        m1:"Kurslarim",
        m4:"Aloqa",
        m5:"Sharhlar",
        m6:"Profil",
        catalog:"Kurslar katalogi",

        badge:"Shaxsiy kabinet",
        note:"Bu yerda kurslar, progress va keyingi harakatlaring jamlangan. Profil ichidan kerakli bo‘limlarga tez o‘tish mumkin.",
        buy:"Kurs sotib olish",
        lang:"Til",
        langVal:"O‘zbek",

        mini1Label:"Kabinet holati",
        mini1Value:"Profil faol",

        mini2Label:"Asosiy yo‘nalish",
        mini2Value:"Digital start",

        sectionTitle:"Asosiy bo‘limlar",

        courses:"Mening kurslarim",
        coursesSub:"Sotib olingan kurslar va kirishlar",

        progress:"Mening progressim",
        progressSub:"Darslar va keyingi bosqich",

        support:"Yordam",
        supportSub:"Savollar va qo‘llab-quvvatlash"
    },

    ru:{
        back:"Назад",
        home:"Главное меню",
        m1:"Мои курсы",
        m4:"Поддержка",
        m5:"Отзывы",
        m6:"Профиль",
        catalog:"Каталог курсов",

        badge:"Личный кабинет",
        note:"Здесь собраны твои курсы, прогресс и следующие действия. Из профиля можно быстро перейти в нужный раздел без лишних шагов.",
        buy:"Купить курс",
        lang:"Язык",
        langVal:"Русский",

        mini1Label:"Состояние кабинета",
        mini1Value:"Профиль активен",

        mini2Label:"Основной вектор",
        mini2Value:"Digital start",

        sectionTitle:"Основные разделы",

        courses:"Мои курсы",
        coursesSub:"Купленные курсы и доступы",

        progress:"Мой прогресс",
        progressSub:"Уроки и следующий этап",

        support:"Поддержка",
        supportSub:"Вопросы и помощь"
    }
}

function setText(id, value){
    const el = document.getElementById(id)
    if(el) el.innerText = value
}

function update(){
    const d = t[lang]

    setText("back-mobile", d.back)
    setText("badge-mobile", d.badge)
    setText("note-mobile", d.note)
    setText("mini1Label-mobile", d.mini1Label)
    setText("mini1Value-mobile", d.mini1Value)
    setText("mini2Label-mobile", d.mini2Label)
    setText("mini2Value-mobile", d.mini2Value)
    setText("buyBtn-mobile", d.buy)
    setText("langText-mobile", d.lang)
    setText("langValue-mobile", d.langVal)
    setText("sectionTitle-mobile", d.sectionTitle)
    setText("courses-mobile", d.courses)
    setText("coursesSub-mobile", d.coursesSub)
    setText("progress-mobile", d.progress)
    setText("progressSub-mobile", d.progressSub)
    setText("support-mobile", d.support)
    setText("supportSub-mobile", d.supportSub)
    setText("m1-mobile", d.m1)
    setText("m4-mobile", d.m4)
    setText("m5-mobile", d.m5)
    setText("m6-mobile", d.m6)

    setText("back-desktop", d.back)
    setText("home-desktop", d.home)
    setText("m1-desktop", d.m1)
    setText("m4-desktop", d.m4)
    setText("m5-desktop", d.m5)
    setText("m6-desktop", d.m6)
    setText("catalog-desktop", d.catalog)
    setText("badge-desktop", d.badge)
    setText("note-desktop", d.note)
    setText("mini1Label-desktop", d.mini1Label)
    setText("mini1Value-desktop", d.mini1Value)
    setText("mini2Label-desktop", d.mini2Label)
    setText("mini2Value-desktop", d.mini2Value)
    setText("buyBtn-desktop", d.buy)
    setText("langText-desktop", d.lang)
    setText("langValue-desktop", d.langVal)
    setText("sectionTitle-desktop", d.sectionTitle)
    setText("courses-desktop", d.courses)
    setText("coursesSub-desktop", d.coursesSub)
    setText("progress-desktop", d.progress)
    setText("progressSub-desktop", d.progressSub)
    setText("support-desktop", d.support)
    setText("supportSub-desktop", d.supportSub)
}

function toggleLang(){
    lang = lang === "uz" ? "ru" : "uz"
    localStorage.setItem("lang", lang)
    update()
}

function goHome(){
    localStorage.setItem("lang", lang)
    window.location.href = "index.html"
}

function goPage(page){
    localStorage.setItem("lang", lang)
    window.location.href = page
}

function goBack(){
    if (window.history.length > 1) {
        window.history.back()
    } else {
        window.location.href = "index.html"
    }
}

function buyCourse(){
    localStorage.setItem("lang", lang)
    window.location.href = "courses.html"
}

function goCourses(){
    localStorage.setItem("lang", lang)
    window.location.href = "courses.html"
}

function setUserData(user){
    if(!user) return

    const fullName = [user.first_name, user.last_name].filter(Boolean).join(" ") || "User"
    const username = user.username ? "@" + user.username : ""

    setText("name-mobile", fullName)
    setText("username-mobile", username)
    setText("name-desktop", fullName)
    setText("username-desktop", username)

    if(user.photo_url){
        const avatarMobile = document.getElementById("avatarWrap-mobile")
        if(avatarMobile){
            avatarMobile.innerHTML = `<img src="${user.photo_url}" alt="avatar">`
        }

        const avatarDesktop = document.getElementById("avatarWrap-desktop")
        if(avatarDesktop){
            avatarDesktop.innerHTML = `<img src="${user.photo_url}" alt="avatar">`
        }
    }else{
        const letter = fullName.trim().charAt(0).toUpperCase()
        const avatarMobile = document.getElementById("avatarWrap-mobile")
        const avatarDesktop = document.getElementById("avatarWrap-desktop")

        if(avatarMobile) avatarMobile.textContent = letter
        if(avatarDesktop) avatarDesktop.textContent = letter
    }
}

function setPhone(phone){
    const mobilePhone = document.getElementById("phone-mobile")
    const desktopPhone = document.getElementById("phone-desktop")

    if(mobilePhone) mobilePhone.innerText = phone || ""
    if(desktopPhone) desktopPhone.innerText = phone || ""
}

function initButtons(){
    const mobileBtn = document.getElementById("buyBtn-mobile")
    const desktopBtn = document.getElementById("buyBtn-desktop")

    if(mobileBtn) mobileBtn.onclick = buyCourse
    if(desktopBtn) desktopBtn.onclick = buyCourse
}

function initTelegram(){
    if(window.Telegram && Telegram.WebApp){
        const tg = Telegram.WebApp
        tg.ready()
        tg.expand()

        try{
            tg.requestFullscreen()
        }catch(e){}

        document.body.style.minHeight = tg.viewportHeight + "px"

        const user = tg.initDataUnsafe?.user
        if(user){
            setUserData(user)

            fetch(`https://api.gaphub.uz/user/${user.id}`)
                .then(res => res.json())
                .then(data => {
                    if(data.phone){
                        setPhone(data.phone)
                    }
                })
                .catch(err => {
                    console.log("Phone fetch error:", err)
                })
        }
    }
}

update()
initButtons()
initTelegram()
</script>
