<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>gaphub - my profile</title>

<style>
:root{
    --accent:#cb6ce6;
    --accent-2:#a855f7;
    --bg:#0c0b14;
    --bg-soft:#15141e;
    --card:#111117;
    --card-2:#17171f;
    --text:#ffffff;
    --muted:#a8a4b5;
    --muted-soft:#8f8a9e;
    --line:rgba(255,255,255,.07);
    --shadow:0 12px 38px rgba(0,0,0,.35);

    --radius-xl:28px;
    --radius-lg:22px;
    --radius-md:16px;
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html, body{
    margin:0;
    padding:0;
    min-height:100%;
    font-family:Arial, sans-serif;
    background:#000;
    color:#fff;
}

body{
    position:relative;
}

img{
    display:block;
    max-width:100%;
}

button{
    font-family:inherit;
    cursor:pointer;
}

.desktop-only{
    display:none;
}

.btn{
    border:none;
    border-radius:18px;
    transition:.2s ease;
    font-weight:700;
}

.btn:active{
    transform:scale(.99);
}

.btn-primary{
    color:#fff;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    box-shadow:0 14px 32px rgba(203,108,230,.22);
}

.btn-secondary{
    color:#fff;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.10);
}

.glow-card{
    background:
        radial-gradient(circle at 86% 14%, rgba(203,108,230,.18), transparent 26%),
        radial-gradient(circle at 15% 88%, rgba(203,108,230,.08), transparent 22%),
        linear-gradient(180deg, #171621 0%, #0f0e17 100%);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:var(--shadow);
}

.soft-card{
    background:
        radial-gradient(circle at 88% 18%, rgba(203,108,230,.10), transparent 24%),
        linear-gradient(180deg, #121219 0%, #0d0d12 100%);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:var(--shadow);
}

/* =========================
   MOBILE
========================= */
.mobile-shell{
    display:block;
}

.mobile-page{
    min-height:calc(100vh + 24px);
    padding:
        calc(env(safe-area-inset-top) + 78px)
        16px
        calc(112px + env(safe-area-inset-bottom));

    background:
        radial-gradient(circle at 20% 8%, rgba(203,108,230,.12), transparent 24%),
        linear-gradient(180deg, #09080f 0%, #0c0b14 100%);
}

.mobile-profile-card{
    position:relative;
    overflow:hidden;
    border-radius:30px;
    padding:20px 18px 18px;
    animation:fadeUp .42s ease both;
}

.mobile-profile-top{
    display:flex;
    align-items:center;
    gap:14px;
}

.mobile-avatar{
    width:76px;
    height:76px;
    border-radius:24px;
    object-fit:cover;
    flex-shrink:0;
    border:1px solid rgba(255,255,255,.08);
}

.mobile-profile-info{
    min-width:0;
    flex:1;
}

.mobile-profile-name{
    margin:0 0 5px;
    font-size:24px;
    line-height:1.05;
    font-weight:800;
    letter-spacing:-.4px;
}

.mobile-profile-username{
    color:var(--muted);
    font-size:14px;
    line-height:1.4;
    margin-bottom:8px;
}

.mobile-phone-pill{
    display:inline-flex;
    align-items:center;
    min-height:32px;
    padding:0 12px;
    border-radius:999px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08);
    color:#fff;
    font-size:13px;
    font-weight:700;
}

.mobile-top-actions{
    margin-top:18px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.mobile-top-btn{
    height:54px;
    border:none;
    border-radius:18px;
    font-size:15px;
    font-weight:800;
    transition:.18s ease;
}

.mobile-top-btn:active{
    transform:scale(.985);
    opacity:.92;
}

.mobile-top-btn.primary{
    color:#fff;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    box-shadow:0 12px 28px rgba(203,108,230,.22);
}

.mobile-top-btn.secondary{
    color:#fff;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
}

.mobile-continue-card{
    margin-top:14px;
    border-radius:24px;
    padding:16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    cursor:pointer;
    animation:fadeUp .45s ease both;
    animation-delay:.10s;
    transition:transform .18s ease, opacity .18s ease;
}

.mobile-continue-card:active{
    transform:scale(.985);
    opacity:.92;
}

.mobile-continue-left{
    min-width:0;
    flex:1;
}

.mobile-continue-label{
    color:var(--muted-soft);
    font-size:12px;
    margin-bottom:6px;
}

.mobile-continue-title{
    font-size:18px;
    line-height:1.2;
    font-weight:800;
}

.mobile-continue-arrow{
    width:44px;
    height:44px;
    border-radius:15px;
    background:rgba(255,255,255,.06);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    font-size:24px;
}

.mobile-actions-grid{
    margin-top:16px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.mobile-action-card{
    border-radius:24px;
    padding:16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    cursor:pointer;
    animation:fadeUp .45s ease both;
    transition:transform .18s ease, opacity .18s ease;
}

.mobile-actions-grid .mobile-action-card:nth-child(1){
    animation-delay:.16s;
}

.mobile-actions-grid .mobile-action-card:nth-child(2){
    animation-delay:.22s;
}

.mobile-actions-grid .mobile-action-card:nth-child(3){
    animation-delay:.28s;
}

.mobile-action-card:active{
    transform:scale(.985);
    opacity:.92;
}

.mobile-action-left{
    display:flex;
    align-items:center;
    gap:14px;
    min-width:0;
}

.mobile-action-icon{
    width:54px;
    height:54px;
    border-radius:18px;
    background:rgba(255,255,255,.06);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
}

.mobile-action-icon img{
    width:26px;
    height:26px;
    object-fit:contain;
}

.mobile-action-content{
    min-width:0;
}

.mobile-action-title{
    margin:0 0 4px;
    font-size:17px;
    font-weight:800;
    line-height:1.2;
}

.mobile-action-text{
    color:var(--muted);
    font-size:13px;
    line-height:1.4;
}

.mobile-action-arrow{
    width:40px;
    height:40px;
    border-radius:14px;
    background:rgba(255,255,255,.05);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    flex-shrink:0;
}

/* bottom nav */
.bottom-nav{
    position:fixed;
    left:0;
    bottom:0;
    width:100%;
    background:#000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 10px;
    padding-bottom:calc(8px + env(safe-area-inset-bottom));
    z-index:50;
}

.nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:12px;
    color:#fff;
    width:20%;
    text-align:center;
    cursor:pointer;
}

.nav-item img{
    width:27px;
    margin-bottom:2px;
}

.nav-item span{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.nav-item.active-mobile-nav span{
    color:#d68cff;
}

.nav-item.active-mobile-nav img{
    filter:
        drop-shadow(0 0 10px rgba(203,108,230,.45))
        brightness(1.08);
}

.nav-center{
    position:relative;
    top:-18px;
    width:20%;
    display:flex;
    justify-content:center;
}

.circle{
    width:60px;
    height:60px;
    background:#fff;
    border-radius:50%;
    border:4px solid var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 10px 30px rgba(203,108,230,.25);
}

.circle img{
    width:24px;
    height:24px;
    object-fit:contain;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(14px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* =========================
   DESKTOP
========================= */
@media (min-width:1024px){
    html, body{
        min-height:100vh;
        background:
            radial-gradient(circle at 15% 18%, rgba(203,108,230,.08), transparent 24%),
            radial-gradient(circle at 85% 28%, rgba(203,108,230,.07), transparent 24%),
            linear-gradient(180deg, #09080f 0%, #0c0b14 100%);
        color:var(--text);
    }

    body{
        overflow:hidden;
    }

    .mobile-shell{
        display:none;
    }

    .desktop-only{
        display:block;
    }

    .desktop-app{
        min-height:100vh;
        color:var(--text);
    }

    .desktop-layout{
        display:grid;
        grid-template-columns:270px minmax(0,1fr);
        min-height:100vh;
    }

    .desktop-sidebar{
        padding:22px 20px;
        border-right:1px solid rgba(255,255,255,.05);
        background:linear-gradient(180deg, rgba(14,13,23,.70) 0%, rgba(12,11,20,.40) 100%);
        overflow:auto;
    }

    .desktop-brand{
        font-size:34px;
        font-weight:800;
        line-height:1;
        margin:8px 0 56px;
    }

    .desktop-nav{
        display:flex;
        flex-direction:column;
        gap:10px;
        margin-top:4px;
    }

    .desktop-nav-item{
        display:flex;
        align-items:center;
        gap:14px;
        width:100%;
        min-height:56px;
        padding:0 18px;
        border-radius:16px;
        color:#f1f1f1;
        background:transparent;
        border:1px solid transparent;
        font-size:16px;
        font-weight:600;
        transition:.2s ease;
        cursor:pointer;
        text-align:left;
    }

    .desktop-nav-item img{
        width:28px;
        height:28px;
        object-fit:contain;
        flex-shrink:0;
    }

    .desktop-nav-item.active-nav{
        background:linear-gradient(180deg, rgba(255,255,255,.06) 0%, rgba(255,255,255,.03) 100%);
        border-color:rgba(255,255,255,.06);
        box-shadow:var(--shadow);
    }

    .desktop-nav-item-accent{
        background:linear-gradient(90deg, #b85bda 0%, #cb6ce6 100%);
        border-color:transparent;
        color:#fff;
        box-shadow:0 12px 26px rgba(203,108,230,.28);
        margin-top:8px;
    }

    .desktop-nav-item-accent:hover{
        transform:translateY(-1px);
    }

    .desktop-nav-item-accent img{
        filter:brightness(0) invert(1);
    }

    .desktop-main{
        padding:24px 22px 30px;
        height:100vh;
        overflow:auto;
    }

    .desktop-back{
        display:inline-flex;
        align-items:center;
        gap:14px;
        font-size:24px;
        color:#fff;
        margin-bottom:18px;
        cursor:pointer;
        user-select:none;
    }

    .desktop-back-arrow{
        font-size:42px;
        line-height:1;
        transform:translateY(-1px);
    }

    .desktop-hero{
        position:relative;
        overflow:hidden;
        border-radius:30px;
        padding:24px 22px 22px;
    }

    .desktop-badge{
        display:inline-flex;
        align-items:center;
        gap:8px;
        background:rgba(255,255,255,.06);
        border:1px solid rgba(255,255,255,.06);
        border-radius:999px;
        padding:10px 14px;
        font-size:13px;
        color:#ebe4f5;
        margin-bottom:18px;
    }

    .desktop-hero-grid{
        display:grid;
        grid-template-columns:minmax(0,1.1fr) minmax(320px,.9fr);
        gap:18px;
        align-items:stretch;
    }

    .desktop-profile-card{
        display:flex;
        align-items:center;
        gap:18px;
        min-width:0;
    }

    .desktop-avatar{
        width:130px;
        height:130px;
        border-radius:50%;
        border:6px solid var(--accent);
        background:linear-gradient(135deg,#f3bb63,#f7a35f);
        display:flex;
        align-items:center;
        justify-content:center;
        color:#fff;
        font-size:56px;
        font-weight:700;
        overflow:hidden;
        flex-shrink:0;
        box-shadow:0 14px 28px rgba(0,0,0,.28);
    }

    .desktop-avatar img{
        width:100%;
        height:100%;
        object-fit:cover;
    }

    .desktop-profile-meta{
        min-width:0;
    }

    .desktop-name{
        margin:0 0 6px;
        font-size:clamp(34px,3vw,50px);
        line-height:.96;
        font-weight:800;
        letter-spacing:-1px;
    }

    .desktop-username{
        font-size:18px;
        color:var(--muted-soft);
        margin-bottom:10px;
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
        max-width:100%;
    }

    .desktop-phone{
        display:inline-block;
        background:#2a1933;
        color:#d68cff;
        border-radius:999px;
        padding:8px 14px;
        font-size:15px;
        min-width:150px;
        text-align:center;
        margin-bottom:14px;
    }

    .desktop-hero-note{
        color:var(--muted);
        font-size:16px;
        line-height:1.52;
        max-width:560px;
    }

    .desktop-side-panel{
        display:flex;
        flex-direction:column;
        gap:12px;
        min-width:0;
    }

    .desktop-mini-grid{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:12px;
    }

    .desktop-mini-card{
        background:rgba(255,255,255,.04);
        border-radius:18px;
        padding:14px;
        min-height:92px;
    }

    .desktop-mini-label{
        color:var(--muted-soft);
        font-size:12px;
        margin-bottom:8px;
    }

    .desktop-mini-value{
        font-size:16px;
        font-weight:700;
        line-height:1.35;
    }

    .desktop-top-actions{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:12px;
    }

    .desktop-top-btn{
        width:100%;
        height:58px;
        font-size:16px;
    }

    .desktop-section{
        margin-top:16px;
    }

    .desktop-section-title{
        margin:0 0 14px;
        font-size:28px;
        line-height:1.1;
        font-weight:800;
    }

    .desktop-actions-grid{
        display:grid;
        grid-template-columns:repeat(3, minmax(0,1fr));
        gap:14px;
    }

    .desktop-action-card{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:14px;
        border-radius:22px;
        padding:18px;
        min-height:124px;
        cursor:pointer;
    }

    .desktop-action-left{
        display:flex;
        align-items:center;
        gap:14px;
        min-width:0;
    }

    .desktop-action-icon{
        width:50px;
        height:50px;
        border-radius:14px;
        background:#22222d;
        flex-shrink:0;
        display:flex;
        align-items:center;
        justify-content:center;
        overflow:hidden;
    }

    .desktop-action-icon img{
        width:30px;
        height:30px;
        object-fit:contain;
    }

    .desktop-action-title{
        font-size:18px;
        font-weight:700;
        line-height:1.25;
    }

    .desktop-action-sub{
        margin-top:4px;
        font-size:14px;
        color:var(--muted-soft);
    }

    .desktop-action-arrow{
        font-size:24px;
        color:#bfbfbf;
        line-height:1;
        flex-shrink:0;
    }
}

@media (max-width:1360px) and (min-width:1024px){
    .desktop-layout{
        grid-template-columns:245px minmax(0,1fr);
    }

    .desktop-main{
        padding:22px 18px 26px;
    }

    .desktop-hero-grid{
        grid-template-columns:1fr;
    }

    .desktop-actions-grid{
        grid-template-columns:1fr;
    }
}

@media (max-width:420px){
    .mobile-hero{
        border-radius:22px;
    }

    .mobile-mini-grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<!-- MOBILE -->
<div class="mobile-shell">
    <div class="mobile-page">

        <section class="mobile-profile-card glow-card">

            <div class="mobile-profile-top">
                <img id="mobileAvatar" class="mobile-avatar" src="images/default-avatar.png" alt="avatar">

                <div class="mobile-profile-info">
                    <h1 class="mobile-profile-name" id="mobileName">User</h1>

                    <div class="mobile-profile-username" id="mobileUsername">@username</div>

                    <div class="mobile-phone-pill" id="mobilePhone">
                        +998 00 000 00 00
                    </div>
                </div>
            </div>

            <div class="mobile-top-actions">
                <button class="mobile-top-btn primary" onclick="goCourses()" id="buyBtn-mobile"></button>

                <button class="mobile-top-btn secondary" onclick="toggleLang()" id="langBtn-mobile"></button>
            </div>

            <div class="mobile-continue-card soft-card" onclick="continueLearning()">
                <div class="mobile-continue-left">
                    <div class="mobile-continue-label" id="continueLabel-mobile"></div>

                    <div class="mobile-continue-title" id="continueTitle-mobile"></div>
                </div>

                <div class="mobile-continue-arrow">›</div>
            </div>
        </section>

        <div class="mobile-actions-grid">

            <div class="mobile-action-card soft-card" onclick="goPage('mycourses.html')">

                <div class="mobile-action-left">
                    <div class="mobile-action-icon">
                        <img src="images/icon/courses2.png" alt="">
                    </div>

                    <div class="mobile-action-content">
                        <div class="mobile-action-title" id="coursesCardTitle-mobile"></div>
                        <div class="mobile-action-text" id="coursesCardText-mobile"></div>
                    </div>
                </div>

                <div class="mobile-action-arrow">›</div>
            </div>

            <div class="mobile-action-card soft-card" onclick="goPage('support.html')">

                <div class="mobile-action-left">
                    <div class="mobile-action-icon">
                        <img src="images/icon/support.png" alt="">
                    </div>

                    <div class="mobile-action-content">
                        <div class="mobile-action-title" id="supportCardTitle-mobile"></div>
                        <div class="mobile-action-text" id="supportCardText-mobile"></div>
                    </div>
                </div>

                <div class="mobile-action-arrow">›</div>
            </div>

            <div class="mobile-action-card soft-card" onclick="goPage('chat.html')">

                <div class="mobile-action-left">
                    <div class="mobile-action-icon">
                        <img src="images/icon/feedback.png" alt="">
                    </div>

                    <div class="mobile-action-content">
                        <div class="mobile-action-title" id="reviewsCardTitle-mobile"></div>
                        <div class="mobile-action-text" id="reviewsCardText-mobile"></div>
                    </div>
                </div>

                <div class="mobile-action-arrow">›</div>
            </div>

        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="goPage('mycourses.html')">
            <img src="images/icon/courses2.png" alt="">
            <span id="m1-mobile"></span>
        </div>

        <div class="nav-item" onclick="goPage('support.html')">
            <img src="images/icon/support.png" alt="">
            <span id="m4-mobile"></span>
        </div>

        <div class="nav-center" onclick="goHome()">
            <div class="circle">
                <img src="images/icon/home2.png" alt="home">
            </div>
        </div>

        <div class="nav-item" onclick="goPage('chat.html')">
            <img src="images/icon/feedback.png" alt="">
            <span id="m5-mobile"></span>
        </div>

        <div class="nav-item active-mobile-nav" onclick="goPage('myprofile.html')">
            <img src="images/icon/profile2.png" alt="">
            <span id="m6-mobile"></span>
        </div>
    </div>
</div>

<!-- DESKTOP -->
<div class="desktop-app desktop-only">
    <div class="desktop-layout">
        <aside class="desktop-sidebar">
            <div class="desktop-brand">gaphub</div>

            <nav class="desktop-nav">
                <button class="desktop-nav-item" onclick="goHome()">
                    <img src="images/icon/home.png" alt="">
                    <span id="home-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('mycourses.html')">
                    <img src="images/icon/courses2.png" alt="">
                    <span id="m1-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('support.html')">
                    <img src="images/icon/support.png" alt="">
                    <span id="m4-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('chat.html')">
                    <img src="images/icon/feedback.png" alt="">
                    <span id="m5-desktop"></span>
                </button>

                <button class="desktop-nav-item active-nav" onclick="goPage('myprofile.html')">
                    <img src="images/icon/profile2.png" alt="">
                    <span id="m6-desktop"></span>
                </button>

                <button class="desktop-nav-item desktop-nav-item-accent" onclick="goCourses()">
                    <img src="images/icon/catalog.png" alt="">
                    <span id="catalog-desktop"></span>
                </button>
            </nav>
        </aside>

        <main class="desktop-main">
            <div class="desktop-back" onclick="goBack()">
                <span class="desktop-back-arrow">←</span>
                <span id="back-desktop"></span>
            </div>

            <section class="desktop-hero glow-card">
                <div class="desktop-badge" id="badge-desktop"></div>

                <div class="desktop-hero-grid">
                    <div class="desktop-profile-card">
                        <div class="desktop-avatar" id="avatarWrap-desktop">C</div>

                        <div class="desktop-profile-meta">
                            <h1 class="desktop-name" id="name-desktop"></h1>
                            <div class="desktop-username" id="username-desktop"></div>
                            <div class="desktop-phone" id="phone-desktop"></div>
                            <div class="desktop-hero-note" id="note-desktop"></div>
                        </div>
                    </div>

                    <div class="desktop-side-panel">
                        <div class="desktop-mini-grid">
                            <div class="desktop-mini-card">
                                <div class="desktop-mini-label" id="mini1Label-desktop"></div>
                                <div class="desktop-mini-value" id="mini1Value-desktop"></div>
                            </div>
                            <div class="desktop-mini-card">
                                <div class="desktop-mini-label" id="mini2Label-desktop"></div>
                                <div class="desktop-mini-value" id="mini2Value-desktop"></div>
                            </div>
                        </div>

                        <div class="desktop-top-actions">
                            <button class="btn btn-primary desktop-top-btn" id="buyBtn-desktop"></button>

                            <button class="btn btn-secondary desktop-top-btn" onclick="toggleLang()">
                                <span id="langText-desktop"></span>
                                <span style="margin-left:8px;color:#cfcfcf" id="langValue-desktop"></span>
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <section class="desktop-section">
                <h2 class="desktop-section-title" id="sectionTitle-desktop"></h2>

                <div class="desktop-actions-grid">
                    <div class="desktop-action-card soft-card" onclick="goPage('mycourses.html')">
                        <div class="desktop-action-left">
                            <div class="desktop-action-icon">
                                <img src="images/icon/courses2.png" alt="">
                            </div>
                            <div>
                                <div class="desktop-action-title" id="courses-desktop"></div>
                                <div class="desktop-action-sub" id="coursesSub-desktop"></div>
                            </div>
                        </div>
                        <span class="desktop-action-arrow">›</span>
                    </div>

                    <div class="desktop-action-card soft-card" onclick="goPage('progress.html')">
                        <div class="desktop-action-left">
                            <div class="desktop-action-icon">
                                <img src="images/icon/progress.png" alt="">
                            </div>
                            <div>
                                <div class="desktop-action-title" id="progress-desktop"></div>
                                <div class="desktop-action-sub" id="progressSub-desktop"></div>
                            </div>
                        </div>
                        <span class="desktop-action-arrow">›</span>
                    </div>

                    <div class="desktop-action-card soft-card" onclick="goPage('support.html')">
                        <div class="desktop-action-left">
                            <div class="desktop-action-icon">
                                <img src="images/icon/support.png" alt="">
                            </div>
                            <div>
                                <div class="desktop-action-title" id="support-desktop"></div>
                                <div class="desktop-action-sub" id="supportSub-desktop"></div>
                            </div>
                        </div>
                        <span class="desktop-action-arrow">›</span>
                    </div>
                </div>
            </section>
        </main>
    </div>
</div>

<script>
let lang = localStorage.getItem("lang") || "uz"

let userCourses = []
let currentUserId = null

const t = {
    uz:{
        back:"Orqaga",
        home:"Bosh sahifa",
        m1:"Kurslarim",
        m4:"Aloqa",
        m5:"Sharhlar",
        m6:"Profil",
        catalog:"Kurslar katalogi",

        buy:"Kurs sotib olish",
        langBtn:"Til: UZ",

        continueLabel:"Davom etish",
        continueEmpty:"Hali faol kurs yo‘q",
        continueSmm:"SMM • 1-dars",
        continueTarget:"Target • 1-dars",
        continueAi:"AI • 1-dars",

        coursesTitle:"Mening kurslarim",
        coursesText:"Sotib olingan kurslar va darslar",

        supportTitle:"Yordam",
        supportText:"Savollar va qo‘llab-quvvatlash",

        reviewsTitle:"Sharhlar",
        reviewsText:"O‘quvchilar fikrlari",

        phoneEmpty:"Telefon yo‘q"
    },

    ru:{
        back:"Назад",
        home:"Главное меню",
        m1:"Мои курсы",
        m4:"Поддержка",
        m5:"Отзывы",
        m6:"Профиль",
        catalog:"Каталог курсов",

        buy:"Купить курс",
        langBtn:"Язык: RU",

        continueLabel:"Продолжить обучение",
        continueEmpty:"Пока нет активного курса",
        continueSmm:"SMM • Урок 1",
        continueTarget:"Target • Урок 1",
        continueAi:"AI • Урок 1",

        coursesTitle:"Мои курсы",
        coursesText:"Купленные курсы и уроки",

        supportTitle:"Поддержка",
        supportText:"Вопросы и помощь",

        reviewsTitle:"Отзывы",
        reviewsText:"Мнения учеников",

        phoneEmpty:"Телефон не указан"
    }
}

function impact(){
    if(window.Telegram && Telegram.WebApp && Telegram.WebApp.HapticFeedback){
        Telegram.WebApp.HapticFeedback.impactOccurred("light")
    }
}

function setText(id, value){
    const el = document.getElementById(id)
    if(el) el.innerText = value
}

function setImage(id, src){
    const el = document.getElementById(id)
    if(el && src) el.src = src
}

function update(){
    const d = t[lang]

    document.documentElement.lang = lang === "uz" ? "uz" : "ru"

    setText("m1-mobile", d.m1)
    setText("m4-mobile", d.m4)
    setText("m5-mobile", d.m5)
    setText("m6-mobile", d.m6)

    setText("buyBtn-mobile", d.buy)
    setText("langBtn-mobile", d.langBtn)

    setText("continueLabel-mobile", d.continueLabel)
    setText("continueTitle-mobile", getContinueTitle())

    setText("coursesCardTitle-mobile", d.coursesTitle)
    setText("coursesCardText-mobile", d.coursesText)

    setText("supportCardTitle-mobile", d.supportTitle)
    setText("supportCardText-mobile", d.supportText)

    setText("reviewsCardTitle-mobile", d.reviewsTitle)
    setText("reviewsCardText-mobile", d.reviewsText)

    setText("back-desktop", d.back)
    setText("home-desktop", d.home)
    setText("m1-desktop", d.m1)
    setText("m4-desktop", d.m4)
    setText("m5-desktop", d.m5)
    setText("m6-desktop", d.m6)
    setText("catalog-desktop", d.catalog)

    setText("buyBtn-desktop", d.buy)
    setText("langText-desktop", lang === "uz" ? "Til" : "Язык")
    setText("langValue-desktop", lang === "uz" ? "O‘zbek" : "Русский")

    setText("badge-desktop", lang === "uz" ? "Profil" : "Профиль")
    setText("note-desktop", lang === "uz" ? "Kurslaringiz va kerakli bo‘limlar shu yerda." : "Курсы и нужные разделы собраны здесь.")

    setText("mini1Label-desktop", lang === "uz" ? "Holat" : "Статус")
    setText("mini1Value-desktop", lang === "uz" ? "Profil faol" : "Профиль активен")

    setText("mini2Label-desktop", lang === "uz" ? "Yo‘nalish" : "Направление")
    setText("mini2Value-desktop", "Digital")

    setText("sectionTitle-desktop", lang === "uz" ? "Bo‘limlar" : "Разделы")

    setText("courses-desktop", d.coursesTitle)
    setText("coursesSub-desktop", d.coursesText)

    setText("progress-desktop", lang === "uz" ? "Progress" : "Прогресс")
    setText("progressSub-desktop", lang === "uz" ? "Darslar va keyingi bosqich" : "Уроки и следующий этап")

    setText("support-desktop", d.supportTitle)
    setText("supportSub-desktop", d.supportText)
}

function getContinueTitle(){
    const d = t[lang]

    if(!userCourses || userCourses.length === 0){
        return d.continueEmpty
    }

    const firstCourse = String(userCourses[0].slug || userCourses[0].course || userCourses[0].name || "").toLowerCase()

    if(firstCourse.includes("smm")){
        return d.continueSmm
    }

    if(firstCourse.includes("target")){
        return d.continueTarget
    }

    if(firstCourse.includes("ai")){
        return d.continueAi
    }

    return d.continueSmm
}

function getContinueUrl(){
    if(!userCourses || userCourses.length === 0){
        return "courses.html"
    }

    const firstCourse = String(userCourses[0].slug || userCourses[0].course || userCourses[0].name || "").toLowerCase()

    if(firstCourse.includes("smm")){
        return "/learn-smm-v2.html"
    }

    if(firstCourse.includes("target")){
        return "/learn-target.html"
    }

    if(firstCourse.includes("ai")){
        return "/learn-ai.html"
    }

    return "mycourses.html"
}

function toggleLang(){
    impact()
    lang = lang === "uz" ? "ru" : "uz"
    localStorage.setItem("lang", lang)
    update()
}

function continueLearning(){
    impact()
    localStorage.setItem("lang", lang)
    window.location.href = getContinueUrl()
}

function goHome(){
    impact()
    localStorage.setItem("lang", lang)
    window.location.href = "index.html"
}

function goPage(page){
    impact()
    localStorage.setItem("lang", lang)
    window.location.href = page
}

function goBack(){
    impact()

    if(window.history.length > 1){
        window.history.back()
    }else{
        window.location.href = "index.html"
    }
}

function buyCourse(){
    impact()
    localStorage.setItem("lang", lang)
    window.location.href = "courses.html"
}

function goCourses(){
    impact()
    localStorage.setItem("lang", lang)
    window.location.href = "courses.html"
}

function setUserData(user){
    if(!user) return

    const fullName = [user.first_name, user.last_name].filter(Boolean).join(" ") || "User"
    const username = user.username ? "@" + user.username : ""

    setText("mobileName", fullName)
    setText("mobileUsername", username || "")
    setText("name-desktop", fullName)
    setText("username-desktop", username || "")

    if(user.photo_url){
        setImage("mobileAvatar", user.photo_url)

        const avatarDesktop = document.getElementById("avatarWrap-desktop")
        if(avatarDesktop){
            avatarDesktop.innerHTML = `<img src="${user.photo_url}" alt="avatar">`
        }
    }else{
        const letter = fullName.trim().charAt(0).toUpperCase()

        const mobileAvatar = document.getElementById("mobileAvatar")
        if(mobileAvatar){
            mobileAvatar.removeAttribute("src")
            mobileAvatar.outerHTML = `<div id="mobileAvatar" class="mobile-avatar" style="display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f3bb63,#f7a35f);font-size:30px;font-weight:800;">${letter}</div>`
        }

        const avatarDesktop = document.getElementById("avatarWrap-desktop")
        if(avatarDesktop){
            avatarDesktop.textContent = letter
        }
    }
}

function setPhone(phone){
    const d = t[lang]
    const value = phone || d.phoneEmpty

    setText("mobilePhone", value)
    setText("phone-desktop", value)
}

function loadUserPhone(userId){
    if(!userId) return

    fetch(`https://api.gaphub.uz/user/${userId}`)
        .then(res => res.json())
        .then(data => {
            if(data && data.phone){
                setPhone(data.phone)
            }else{
                setPhone("")
            }
        })
        .catch(err => {
            console.log("Phone fetch error:", err)
            setPhone("")
        })
}

function loadUserCourses(userId){
    if(!userId){
        update()
        return
    }

    fetch(`https://api.gaphub.uz/mycourses/${userId}`)
        .then(res => res.json())
        .then(data => {
            if(Array.isArray(data)){
                userCourses = data
            }else if(data && Array.isArray(data.courses)){
                userCourses = data.courses
            }else{
                userCourses = []
            }

            update()
        })
        .catch(err => {
            console.log("Courses fetch error:", err)
            userCourses = []
            update()
        })
}

function initButtons(){
    const mobileBtn = document.getElementById("buyBtn-mobile")
    const desktopBtn = document.getElementById("buyBtn-desktop")

    if(mobileBtn) mobileBtn.onclick = buyCourse
    if(desktopBtn) desktopBtn.onclick = buyCourse
}

function initTelegram(){
    if(window.Telegram && Telegram.WebApp){
        const tg = Telegram.WebApp

        tg.ready()
        tg.expand()

        try{
            tg.requestFullscreen()
        }catch(e){}

        document.body.style.minHeight = tg.viewportHeight + "px"

        const user = tg.initDataUnsafe?.user

        if(user){
            currentUserId = user.id
            setUserData(user)
            loadUserPhone(user.id)
            loadUserCourses(user.id)
        }else{
            update()
        }
    }else{
        update()
    }
}

update()
initButtons()
initTelegram()
</script>
</body>
</html>
