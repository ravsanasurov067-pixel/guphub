<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>gaphub - my profile</title>

<style>
:root{
    --accent:#cb6ce6;
    --text:#ffffff;
    --muted:#aaa;
    --muted-soft:#9f98aa;
    --bg:#0c0b14;
    --card:#111117;
    --card-soft:#17171f;
    --line:rgba(255,255,255,.08);
    --shadow:0 10px 35px rgba(0,0,0,.35);
}

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html, body{
    margin:0;
    padding:0;
    min-height:100%;
    font-family:Arial, sans-serif;
    background:#000;
    color:#fff;
}

body{
    position:relative;
}

img{
    display:block;
    max-width:100%;
}

button{
    font-family:inherit;
    cursor:pointer;
}

.desktop-only{
    display:none;
}

.btn-gradient{
    border:none;
    color:#fff;
    background:linear-gradient(90deg,#cb6ce6,#a855f7);
}

/* =========================
   MOBILE
========================= */
.mobile-shell{
    display:block;
}

.mobile-page{
    padding:calc(env(safe-area-inset-top) + 14px) 16px calc(110px + env(safe-area-inset-bottom));
}

.mobile-back{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:#1a1a1a;
    color:#fff;
    border:none;
    border-radius:12px;
    padding:10px 14px;
    font-size:15px;
    margin-bottom:16px;
}

.mobile-back svg{
    width:16px;
    height:16px;
    flex-shrink:0;
}

.mobile-hero{
    position:relative;
    overflow:hidden;
    border-radius:26px;
    background:
        radial-gradient(circle at 85% 15%, rgba(203,108,230,.18), transparent 25%),
        linear-gradient(180deg, #15141e 0%, #0f0e17 100%);
    border:1px solid rgba(255,255,255,.05);
    box-shadow:var(--shadow);
    padding:20px 16px 18px;
}

.mobile-kicker{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.06);
    border-radius:999px;
    padding:8px 12px;
    font-size:12px;
    color:#ebe4f5;
    margin-bottom:14px;
}

.mobile-profile-row{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:16px;
}

.mobile-avatar{
    width:86px;
    height:86px;
    border-radius:50%;
    border:4px solid var(--accent);
    background:linear-gradient(135deg,#f3bb63,#f7a35f);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:34px;
    font-weight:700;
    overflow:hidden;
    flex-shrink:0;
}

.mobile-avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.mobile-name{
    margin:0 0 4px;
    font-size:26px;
    line-height:1.05;
    font-weight:800;
}

.mobile-username{
    color:var(--muted-soft);
    font-size:14px;
    margin-bottom:10px;
}

.mobile-phone{
    display:inline-block;
    background:#2a1933;
    color:#d68cff;
    border-radius:999px;
    padding:8px 12px;
    font-size:13px;
    min-width:110px;
}

.mobile-desc{
    margin:0;
    color:var(--muted);
    font-size:14px;
    line-height:1.5;
}

.mobile-stats{
    margin-top:14px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.mobile-stat{
    background:#17171f;
    border-radius:16px;
    padding:12px;
    min-height:78px;
}

.mobile-stat-label{
    color:#9f98aa;
    font-size:12px;
    margin-bottom:6px;
}

.mobile-stat-value{
    font-size:15px;
    font-weight:700;
    line-height:1.35;
}

.mobile-section{
    margin-top:14px;
    background:#121218;
    border:1px solid rgba(255,255,255,.05);
    border-radius:22px;
    padding:16px 14px;
    box-shadow:var(--shadow);
}

.mobile-section-title{
    margin:0 0 12px;
    font-size:20px;
    font-weight:800;
    line-height:1.15;
}

.mobile-actions{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.mobile-primary-btn{
    width:100%;
    height:54px;
    border:none;
    border-radius:16px;
    font-size:16px;
    font-weight:700;
}

.mobile-secondary-btn{
    width:100%;
    height:54px;
    border:none;
    border-radius:16px;
    background:#1a1a22;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 16px;
    font-size:15px;
    font-weight:600;
}

.mobile-secondary-btn span:last-child{
    color:#cfcfcf;
}

.mobile-list{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.mobile-list-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    background:#181821;
    border-radius:16px;
    padding:14px;
    cursor:pointer;
}

.mobile-list-left{
    display:flex;
    align-items:center;
    gap:12px;
}

.mobile-list-icon{
    width:40px;
    height:40px;
    object-fit:contain;
    border-radius:12px;
    background:#22222d;
    padding:8px;
    flex-shrink:0;
}

.mobile-list-title{
    font-size:15px;
    font-weight:700;
    line-height:1.3;
}

.mobile-list-text{
    font-size:13px;
    color:var(--muted-soft);
    margin-top:2px;
}

.mobile-list-arrow{
    font-size:18px;
    color:#bfbfbf;
    line-height:1;
}

/* BOTTOM NAV */
.bottom-nav{
    position:fixed;
    left:0;
    bottom:0;
    width:100%;
    background:#000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 10px;
    padding-bottom:calc(8px + env(safe-area-inset-bottom));
    z-index:50;
}

.nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:12px;
    color:#fff;
    width:20%;
    text-align:center;
    cursor:pointer;
}

.nav-item img{
    width:27px;
    margin-bottom:2px;
}

.nav-item span{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.nav-center{
    position:relative;
    top:-18px;
    width:20%;
    display:flex;
    justify-content:center;
}

.circle{
    width:60px;
    height:60px;
    background:#ffffff;
    border-radius:50%;
    border:4px solid var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
}

.circle img{
    width:24px;
    height:24px;
    object-fit:contain;
}

/* =========================
   DESKTOP
========================= */
@media (min-width:1024px){

    html, body{
        min-height:100vh;
        background:
            radial-gradient(circle at 15% 18%, rgba(203,108,230,.08), transparent 24%),
            radial-gradient(circle at 85% 28%, rgba(203,108,230,.07), transparent 24%),
            linear-gradient(180deg, #09080f 0%, #0c0b14 100%);
        color:var(--text);
    }

    body{
        overflow:hidden;
    }

    .mobile-shell{
        display:none;
    }

    .desktop-only{
        display:block;
    }

    .desktop-app{
        min-height:100vh;
        color:var(--text);
    }

    .desktop-layout{
        display:grid;
        grid-template-columns:280px 1fr;
        min-height:100vh;
    }

    .desktop-sidebar{
        padding:22px 22px;
        border-right:1px solid rgba(255,255,255,.05);
        background:linear-gradient(180deg, rgba(14,13,23,.70) 0%, rgba(12,11,20,.40) 100%);
    }

    .desktop-brand{
        font-size:34px;
        font-weight:800;
        line-height:1;
        margin:8px 0 56px;
    }

    .desktop-nav{
        display:flex;
        flex-direction:column;
        gap:10px;
        margin-top:4px;
    }

    .desktop-nav-item{
        display:flex;
        align-items:center;
        gap:14px;
        width:100%;
        min-height:56px;
        padding:0 18px;
        border-radius:16px;
        color:#f1f1f1;
        background:transparent;
        border:1px solid transparent;
        font-size:16px;
        font-weight:600;
        transition:.2s ease;
        cursor:pointer;
        text-align:left;
    }

    .desktop-nav-item img{
        width:28px;
        height:28px;
        object-fit:contain;
        flex-shrink:0;
    }

    .desktop-nav-item.active-nav{
        background:linear-gradient(180deg, rgba(255,255,255,.06) 0%, rgba(255,255,255,.03) 100%);
        border-color:rgba(255,255,255,.06);
        box-shadow:var(--shadow);
    }

    .desktop-nav-item-accent{
        background:linear-gradient(90deg, #b85bda 0%, #cb6ce6 100%);
        border-color:transparent;
        color:#fff;
        box-shadow:0 12px 26px rgba(203,108,230,.28);
        margin-top:8px;
    }

    .desktop-nav-item-accent:hover{
        transform:translateY(-1px);
    }

    .desktop-nav-item-accent img{
        filter:brightness(0) invert(1);
    }

    .desktop-main{
        padding:26px 28px 34px;
        height:100vh;
        overflow:auto;
    }

    .desktop-back{
        display:inline-flex;
        align-items:center;
        gap:14px;
        font-size:24px;
        color:#fff;
        margin-bottom:18px;
        cursor:pointer;
        user-select:none;
    }

    .desktop-back-arrow{
        font-size:42px;
        line-height:1;
        transform:translateY(-1px);
    }

    .desktop-hero{
        position:relative;
        overflow:hidden;
        border-radius:30px;
        background:
            radial-gradient(circle at 82% 18%, rgba(203,108,230,.18), transparent 24%),
            radial-gradient(circle at 12% 85%, rgba(203,108,230,.08), transparent 24%),
            linear-gradient(180deg, #15141e 0%, #0f0e17 100%);
        border:1px solid rgba(255,255,255,.05);
        box-shadow:var(--shadow);
        padding:28px 26px 24px;
    }

    .desktop-kicker{
        display:inline-flex;
        align-items:center;
        gap:8px;
        background:rgba(255,255,255,.06);
        border:1px solid rgba(255,255,255,.06);
        border-radius:999px;
        padding:10px 14px;
        font-size:13px;
        color:#ebe4f5;
        margin-bottom:18px;
    }

    .desktop-hero-top{
        display:grid;
        grid-template-columns:1.05fr .95fr;
        gap:26px;
        align-items:center;
    }

    .desktop-profile-card{
        display:flex;
        align-items:center;
        gap:18px;
    }

    .desktop-avatar{
        width:138px;
        height:138px;
        border-radius:50%;
        border:6px solid var(--accent);
        background:linear-gradient(135deg,#f3bb63,#f7a35f);
        display:flex;
        align-items:center;
        justify-content:center;
        color:#fff;
        font-size:60px;
        font-weight:700;
        overflow:hidden;
        flex-shrink:0;
    }

    .desktop-avatar img{
        width:100%;
        height:100%;
        object-fit:cover;
    }

    .desktop-name{
        margin:0 0 8px;
        font-size:54px;
        line-height:.96;
        font-weight:800;
        letter-spacing:-1px;
    }

    .desktop-username{
        font-size:23px;
        color:var(--muted-soft);
        margin-bottom:14px;
    }

    .desktop-phone{
        display:inline-block;
        background:#2a1933;
        color:#d68cff;
        border-radius:999px;
        padding:10px 16px;
        font-size:18px;
        min-width:170px;
        text-align:center;
    }

    .desktop-desc-box{
        background:rgba(255,255,255,.04);
        border-radius:22px;
        padding:18px 18px;
        min-height:160px;
        display:flex;
        flex-direction:column;
        justify-content:center;
    }

    .desktop-desc{
        margin:0;
        color:#f0ebf8;
        font-size:19px;
        line-height:1.6;
    }

    .desktop-grid{
        margin-top:16px;
        display:grid;
        grid-template-columns:repeat(3, minmax(0,1fr));
        gap:14px;
    }

    .desktop-stat{
        background:#141419;
        border:1px solid rgba(255,255,255,.05);
        border-radius:22px;
        padding:18px 16px;
        box-shadow:var(--shadow);
        min-height:126px;
    }

    .desktop-stat-label{
        color:#9f98aa;
        font-size:13px;
        margin-bottom:8px;
    }

    .desktop-stat-value{
        font-size:22px;
        line-height:1.25;
        font-weight:800;
    }

    .desktop-wide{
        margin-top:16px;
        background:
            radial-gradient(circle at 88% 18%, rgba(203,108,230,.10), transparent 20%),
            linear-gradient(180deg, #121218 0%, #101017 100%);
        border:1px solid rgba(255,255,255,.05);
        border-radius:28px;
        padding:22px;
        box-shadow:var(--shadow);
    }

    .desktop-section-title{
        margin:0 0 14px;
        font-size:30px;
        line-height:1.1;
        font-weight:800;
    }

    .desktop-actions{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:14px;
        margin-bottom:14px;
    }

    .desktop-primary-btn{
        height:62px;
        border:none;
        border-radius:18px;
        font-size:20px;
        font-weight:700;
    }

    .desktop-lang-btn{
        height:62px;
        border:none;
        border-radius:18px;
        background:#181820;
        color:#fff;
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding:0 22px;
        font-size:19px;
        font-weight:600;
    }

    .desktop-lang-btn span:last-child{
        color:#cfcfcf;
    }

    .desktop-list{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:14px;
    }

    .desktop-list-item{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:14px;
        background:#181821;
        border-radius:20px;
        padding:18px;
        min-height:96px;
        cursor:pointer;
    }

    .desktop-list-left{
        display:flex;
        align-items:center;
        gap:14px;
    }

    .desktop-list-icon{
        width:46px;
        height:46px;
        object-fit:contain;
        border-radius:14px;
        background:#22222d;
        padding:10px;
        flex-shrink:0;
    }

    .desktop-list-title{
        font-size:18px;
        font-weight:700;
        line-height:1.25;
    }

    .desktop-list-text{
        font-size:14px;
        color:var(--muted-soft);
        margin-top:3px;
    }

    .desktop-list-arrow{
        font-size:24px;
        color:#bfbfbf;
        line-height:1;
        flex-shrink:0;
    }
}

@media (min-width:1024px) and (max-width:1400px){
    .desktop-layout{
        grid-template-columns:260px 1fr;
    }

    .desktop-main{
        padding:22px 22px 28px;
    }

    .desktop-hero{
        padding:22px 20px 20px;
    }

    .desktop-name{
        font-size:42px;
    }

    .desktop-username{
        font-size:20px;
    }

    .desktop-avatar{
        width:116px;
        height:116px;
        font-size:48px;
    }

    .desktop-desc{
        font-size:17px;
    }

    .desktop-grid{
        grid-template-columns:1fr;
    }

    .desktop-list{
        grid-template-columns:1fr;
    }

    .desktop-actions{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<!-- =========================
     MOBILE VERSION
========================= -->
<div class="mobile-shell">
    <div class="mobile-page">
        <button class="mobile-back" onclick="goBack()">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M15 5L8 12L15 19" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span id="back-mobile"></span>
        </button>

        <section class="mobile-hero">
            <div class="mobile-kicker" id="kicker-mobile"></div>

            <div class="mobile-profile-row">
                <div class="mobile-avatar" id="avatarWrap-mobile">C</div>

                <div>
                    <h1 class="mobile-name" id="name-mobile">User</h1>
                    <div class="mobile-username" id="username-mobile">@username</div>
                    <div class="mobile-phone" id="phone-mobile"></div>
                </div>
            </div>

            <p class="mobile-desc" id="desc-mobile"></p>

            <div class="mobile-stats">
                <div class="mobile-stat">
                    <div class="mobile-stat-label" id="stat1Label-mobile"></div>
                    <div class="mobile-stat-value" id="stat1Value-mobile"></div>
                </div>

                <div class="mobile-stat">
                    <div class="mobile-stat-label" id="stat2Label-mobile"></div>
                    <div class="mobile-stat-value" id="stat2Value-mobile"></div>
                </div>
            </div>
        </section>

        <section class="mobile-section">
            <h2 class="mobile-section-title" id="actionTitle-mobile"></h2>

            <div class="mobile-actions">
                <button class="btn-gradient mobile-primary-btn" id="buyBtn-mobile"></button>

                <button class="mobile-secondary-btn" onclick="toggleLang()">
                    <span id="langText-mobile"></span>
                    <span id="langValue-mobile"></span>
                </button>
            </div>
        </section>

        <section class="mobile-section">
            <h2 class="mobile-section-title" id="menuTitle-mobile"></h2>

            <div class="mobile-list">
                <div class="mobile-list-item" onclick="goPage('mycourses.html')">
                    <div class="mobile-list-left">
                        <img class="mobile-list-icon" src="images/courses2.png" alt="">
                        <div>
                            <div class="mobile-list-title" id="courses-mobile"></div>
                            <div class="mobile-list-text" id="coursesSub-mobile"></div>
                        </div>
                    </div>
                    <span class="mobile-list-arrow">›</span>
                </div>

                <div class="mobile-list-item" onclick="goPage('support.html')">
                    <div class="mobile-list-left">
                        <img class="mobile-list-icon" src="images/support.png" alt="">
                        <div>
                            <div class="mobile-list-title" id="support-mobile"></div>
                            <div class="mobile-list-text" id="supportSub-mobile"></div>
                        </div>
                    </div>
                    <span class="mobile-list-arrow">›</span>
                </div>

                <div class="mobile-list-item" onclick="goPage('progress.html')">
                    <div class="mobile-list-left">
                        <img class="mobile-list-icon" src="images/brain.png" alt="">
                        <div>
                            <div class="mobile-list-title" id="progress-mobile"></div>
                            <div class="mobile-list-text" id="progressSub-mobile"></div>
                        </div>
                    </div>
                    <span class="mobile-list-arrow">›</span>
                </div>
            </div>
        </section>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="goPage('mycourses.html')">
            <img src="images/courses2.png" alt="">
            <span id="m1-mobile"></span>
        </div>

        <div class="nav-item" onclick="goPage('support.html')">
            <img src="images/support.png" alt="">
            <span id="m4-mobile"></span>
        </div>

        <div class="nav-center" onclick="goHome()">
            <div class="circle">
                <img src="images/home2.png" alt="home">
            </div>
        </div>

        <div class="nav-item" onclick="goPage('chat.html')">
            <img src="images/chat2.png" alt="">
            <span id="m5-mobile"></span>
        </div>

        <div class="nav-item" onclick="goPage('myprofile.html')">
            <img src="images/profile2.png" alt="">
            <span id="m6-mobile"></span>
        </div>
    </div>
</div>

<!-- =========================
     DESKTOP VERSION
========================= -->
<div class="desktop-app desktop-only">
    <div class="desktop-layout">
        <aside class="desktop-sidebar">
            <div class="desktop-brand">gaphub</div>

            <nav class="desktop-nav">
                <button class="desktop-nav-item" onclick="goHome()">
                    <img src="images/home.png" alt="">
                    <span id="home-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('mycourses.html')">
                    <img src="images/courses2.png" alt="">
                    <span id="m1-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('support.html')">
                    <img src="images/support.png" alt="">
                    <span id="m4-desktop"></span>
                </button>

                <button class="desktop-nav-item" onclick="goPage('chat.html')">
                    <img src="images/chat2.png" alt="">
                    <span id="m5-desktop"></span>
                </button>

                <button class="desktop-nav-item active-nav" onclick="goPage('myprofile.html')">
                    <img src="images/profile2.png" alt="">
                    <span id="m6-desktop"></span>
                </button>

                <button class="desktop-nav-item desktop-nav-item-accent" onclick="goCourses()">
                    <img src="images/courses-catalog.png" alt="">
                    <span id="catalog-desktop"></span>
                </button>
            </nav>
        </aside>

        <main class="desktop-main">
            <div class="desktop-back" onclick="goBack()">
                <span class="desktop-back-arrow">←</span>
                <span id="back-desktop"></span>
            </div>

            <section class="desktop-hero">
                <div class="desktop-kicker" id="kicker-desktop"></div>

                <div class="desktop-hero-top">
                    <div class="desktop-profile-card">
                        <div class="desktop-avatar" id="avatarWrap-desktop">C</div>

                        <div>
                            <h1 class="desktop-name" id="name-desktop">User</h1>
                            <div class="desktop-username" id="username-desktop">@username</div>
                            <div class="desktop-phone" id="phone-desktop"></div>
                        </div>
                    </div>

                    <div class="desktop-desc-box">
                        <p class="desktop-desc" id="desc-desktop"></p>
                    </div>
                </div>
            </section>

            <section class="desktop-grid">
                <article class="desktop-stat">
                    <div class="desktop-stat-label" id="stat1Label-desktop"></div>
                    <div class="desktop-stat-value" id="stat1Value-desktop"></div>
                </article>

<script>
let lang = localStorage.getItem("lang") || "uz"

const t = {
    uz:{
        back:"Orqaga",
        home:"Bosh sahifa",
        m1:"Kurslarim",
        m4:"Aloqa",
        m5:"Sharhlar",
        m6:"Profil",
        catalog:"Kurslar katalogi",

        kicker:"Shaxsiy kabinet",
        desc:"Bu yer sening markazing. Kurslar, progress, til va keyingi qadamlar shu yerdan boshqariladi.",
        buy:"Kurs sotib olish",
        lang:"Til",
        langVal:"O‘zbek",

        actionTitle:"Tezkor amallar",
        menuTitle:"Kabinet bo‘limlari",

        courses:"Mening kurslarim",
        coursesSub:"Sotib olingan kurslar va kirishlar",

        support:"Yordam",
        supportSub:"Savollar, aloqa va qo‘llab-quvvatlash",

        progress:"Mening progressim",
        progressSub:"Qayergacha borganingni kuzatish",

        homeCard:"Bosh sahifa",
        homeCardSub:"Kurslar va platforma bo‘limlariga qaytish",

        stat1Label:"Holat",
        stat1Value:"Faol foydalanuvchi",

        stat2Label:"Platforma",
        stat2Value:"gaphub ichida",

        stat3Label:"Keyingi qadam",
        stat3Value:"Kursni tanlash yoki davom ettirish"
    },

    ru:{
        back:"Назад",
        home:"Главное меню",
        m1:"Мои курсы",
        m4:"Поддержка",
        m5:"Отзывы",
        m6:"Профиль",
        catalog:"Каталог курсов",

        kicker:"Личный кабинет",
        desc:"Это твоя центральная точка. Здесь ты управляешь курсами, прогрессом, языком и следующими шагами внутри платформы.",
        buy:"Купить курс",
        lang:"Язык",
        langVal:"Русский",

        actionTitle:"Быстрые действия",
        menuTitle:"Разделы кабинета",

        courses:"Мои курсы",
        coursesSub:"Купленные курсы и доступы",

        support:"Поддержка",
        supportSub:"Вопросы, связь и помощь",

        progress:"Мой прогресс",
        progressSub:"Отслеживание того, где ты сейчас",

        homeCard:"Главное меню",
        homeCardSub:"Вернуться к курсам и основным разделам платформы",

        stat1Label:"Статус",
        stat1Value:"Активный пользователь",

        stat2Label:"Платформа",
        stat2Value:"Внутри gaphub",

        stat3Label:"Следующий шаг",
        stat3Value:"Выбрать курс или продолжить обучение"
    }
}

function setText(id, value){
    const el = document.getElementById(id)
    if(el) el.innerText = value
}

function update(){
    const d = t[lang]

    // mobile
    setText("back-mobile", d.back)
    setText("kicker-mobile", d.kicker)
    setText("desc-mobile", d.desc)
    setText("buyBtn-mobile", d.buy)
    setText("langText-mobile", d.lang)
    setText("langValue-mobile", d.langVal)
    setText("actionTitle-mobile", d.actionTitle)
    setText("menuTitle-mobile", d.menuTitle)
    setText("courses-mobile", d.courses)
    setText("coursesSub-mobile", d.coursesSub)
    setText("support-mobile", d.support)
    setText("supportSub-mobile", d.supportSub)
    setText("progress-mobile", d.progress)
    setText("progressSub-mobile", d.progressSub)
    setText("stat1Label-mobile", d.stat1Label)
    setText("stat1Value-mobile", d.stat1Value)
    setText("stat2Label-mobile", d.stat2Label)
    setText("stat2Value-mobile", d.stat2Value)
    setText("m1-mobile", d.m1)
    setText("m4-mobile", d.m4)
    setText("m5-mobile", d.m5)
    setText("m6-mobile", d.m6)

    // desktop
    setText("back-desktop", d.back)
    setText("home-desktop", d.home)
    setText("m1-desktop", d.m1)
    setText("m4-desktop", d.m4)
    setText("m5-desktop", d.m5)
    setText("m6-desktop", d.m6)
    setText("catalog-desktop", d.catalog)
    setText("kicker-desktop", d.kicker)
    setText("desc-desktop", d.desc)
    setText("buyBtn-desktop", d.buy)
    setText("langText-desktop", d.lang)
    setText("langValue-desktop", d.langVal)
    setText("actionTitle-desktop", d.actionTitle)
    setText("menuTitle-desktop", d.menuTitle)
    setText("courses-desktop", d.courses)
    setText("coursesSub-desktop", d.coursesSub)
    setText("support-desktop", d.support)
    setText("supportSub-desktop", d.supportSub)
    setText("progress-desktop", d.progress)
    setText("progressSub-desktop", d.progressSub)
    setText("homeCard-desktop", d.homeCard)
    setText("homeCardSub-desktop", d.homeCardSub)
    setText("stat1Label-desktop", d.stat1Label)
    setText("stat1Value-desktop", d.stat1Value)
    setText("stat2Label-desktop", d.stat2Label)
    setText("stat2Value-desktop", d.stat2Value)
    setText("stat3Label-desktop", d.stat3Label)
    setText("stat3Value-desktop", d.stat3Value)
}

function toggleLang(){
    lang = lang === "uz" ? "ru" : "uz"
    localStorage.setItem("lang", lang)
    update()
}

function goHome(){
    localStorage.setItem("lang", lang)
    window.location.href = "index.html"
}

function goPage(page){
    localStorage.setItem("lang", lang)
    window.location.href = page
}

function setUserData(user){
    if(!user) return

    const fullName = [user.first_name, user.last_name].filter(Boolean).join(" ") || "User"
    const username = user.username ? "@" + user.username : ""

    setText("name-mobile", fullName)
    setText("username-mobile", username)
    setText("name-desktop", fullName)
    setText("username-desktop", username)

    if(user.photo_url){
        const avatarMobile = document.getElementById("avatarWrap-mobile")
        if(avatarMobile){
            avatarMobile.innerHTML = `<img src="${user.photo_url}" alt="avatar">`
        }

        const avatarDesktop = document.getElementById("avatarWrap-desktop")
        if(avatarDesktop){
            avatarDesktop.innerHTML = `<img src="${user.photo_url}" alt="avatar">`
        }
    }else{
        const letter = fullName.trim().charAt(0).toUpperCase()
        const avatarMobile = document.getElementById("avatarWrap-mobile")
        const avatarDesktop = document.getElementById("avatarWrap-desktop")

        if(avatarMobile) avatarMobile.textContent = letter
        if(avatarDesktop) avatarDesktop.textContent = letter
    }
}

function setPhone(phone){
    const mobilePhone = document.getElementById("phone-mobile")
    const desktopPhone = document.getElementById("phone-desktop")

    if(mobilePhone) mobilePhone.innerText = phone || ""
    if(desktopPhone) desktopPhone.innerText = phone || ""
}

function goBack(){
    if (window.history.length > 1) {
        window.history.back()
    } else {
        window.location.href = "index.html"
    }
}

function buyCourse(){
    window.location.href = "index.html"
}

function goCourses(){
    localStorage.setItem("lang", lang)
    window.location.href = "courses.html"
}

function initButtons(){
    const mobileBtn = document.getElementById("buyBtn-mobile")
    const desktopBtn = document.getElementById("buyBtn-desktop")

    if(mobileBtn) mobileBtn.onclick = buyCourse
    if(desktopBtn) desktopBtn.onclick = buyCourse
}

function initTelegram(){
    if(window.Telegram && Telegram.WebApp){
        const tg = Telegram.WebApp
        tg.ready()
        tg.expand()

        try{
            tg.requestFullscreen()
        }catch(e){}

        document.body.style.minHeight = tg.viewportHeight + "px"

        const user = tg.initDataUnsafe?.user
        if(user){
            setUserData(user)

            fetch(`https://api.gaphub.uz/user/${user.id}`)
                .then(res => res.json())
                .then(data => {
                    if(data.phone){
                        setPhone(data.phone)
                    }
                })
                .catch(err => {
                    console.log("Phone fetch error:", err)
                })
        }
    }
}

update()
initButtons()
initTelegram()
</script>
